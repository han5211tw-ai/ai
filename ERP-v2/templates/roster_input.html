{% extends "base.html" %}
{% block title %}班表輸入 — COSH ERP{% endblock %}
{% block page_title %}班表輸入{% endblock %}

{% block styles %}
<style>
.ri-layout { display: flex; flex-direction: column; gap: 20px; }

/* ── 控制列 ── */
.ctrl-bar {
  background: #fff;
  border: 1px solid rgba(107,95,82,.14);
  border-radius: 14px; padding: 14px 20px;
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.ctrl-label { font-size: .78rem; color: #9a9188; letter-spacing: .04em; }
.ctl-sel {
  padding: 7px 12px; border: 1px solid rgba(107,95,82,.22); border-radius: 8px;
  font-size: .82rem; font-family: 'Noto Serif TC', serif; font-weight: 300;
  color: #2c2720; background: #f5f0e8;
}
.store-pills { display: flex; border: 1px solid rgba(107,95,82,.2); border-radius: 8px; overflow: hidden; }
.s-pill {
  padding: 7px 14px; font-size: .8rem; background: none; border: none;
  color: #6b5f52; cursor: pointer; font-family: 'Noto Serif TC', serif; font-weight: 300;
}
.s-pill + .s-pill { border-left: 1px solid rgba(107,95,82,.2); }
.s-pill.active { background: #2c2720; color: #f5f0e8; }

/* ── 班表 grid 卡片 ── */
.card {
  background: #fff;
  border: 1px solid rgba(107,95,82,.14);
  border-radius: 16px; overflow: hidden;
}
.card-head {
  padding: 12px 20px; border-bottom: 1px solid rgba(107,95,82,.08);
  display: flex; justify-content: space-between; align-items: center;
}
.card-title { font-size: .72rem; color: #9a9188; letter-spacing: .12em; text-transform: uppercase; }

/* ── 班表表格 ── */
.roster-table { width: 100%; border-collapse: collapse; }
.roster-table th {
  padding: 9px 10px; font-size: .7rem; font-weight: 300; color: #9a9188;
  letter-spacing: .04em; border-bottom: 1px solid rgba(107,95,82,.1);
  background: #faf7f2; text-align: center;
}
.roster-table th:first-child { text-align: left; min-width: 80px; }
.roster-table td {
  padding: 4px 6px; text-align: center;
  border-bottom: 1px solid rgba(107,95,82,.05);
  border-right: 1px solid rgba(107,95,82,.05);
}
.roster-table td:first-child { text-align: left; padding: 8px 10px; font-size: .84rem; color: #2c2720; }
.roster-table tr:last-child td { border-bottom: none; }

/* 班別 select */
.shift-sel {
  width: 48px; padding: 4px 2px;
  border: 1px solid rgba(107,95,82,.15); border-radius: 6px;
  font-size: .78rem; font-family: 'Noto Serif TC', serif;
  color: #2c2720; background: #f5f0e8;
  text-align: center;
}
.shift-sel.sc-值  { background: #d4edda; }
.shift-sel.sc-早  { background: #cfe2ff; }
.shift-sel.sc-晚  { background: #e2d9f3; }
.shift-sel.sc-全  { background: #fff3cd; }
.shift-sel.sc-休  { background: #f0f0f0; }
.shift-sel.sc-特  { background: #fde8d8; }

/* ── 按鈕 ── */
.save-btn {
  padding: 9px 22px; background: #2c2720; color: #f5f0e8;
  border: none; border-radius: 8px; font-size: .82rem;
  font-family: 'Noto Serif TC', serif; letter-spacing: .06em; cursor: pointer;
}
.save-btn:disabled { opacity: .5; cursor: default; }
.msg-ok  { font-size: .82rem; color: #4a7c59; }
.msg-err { font-size: .82rem; color: #8b3a3a; }

/* 週末列 */
.th-sun { color: #c07070 !important; }
.th-sat { color: #7090c0 !important; }
.td-sun { background: rgba(192,112,112,.04); }
.td-sat { background: rgba(112,144,192,.04); }
</style>
{% endblock %}

{% block content %}
<div class="ri-layout">

  <!-- 控制列 -->
  <div class="ctrl-bar">
    <span class="ctrl-label">月份</span>
    <select class="ctl-sel" id="yearSel"></select>
    <select class="ctl-sel" id="monthSel"></select>
    <div class="store-pills" id="storePills">
      <button class="s-pill active" data-store="豐原">豐原</button>
      <button class="s-pill" data-store="潭子">潭子</button>
      <button class="s-pill" data-store="大雅">大雅</button>
    </div>
    <span class="ctrl-label" style="margin-left:4px">班別：值/早/晚/全/休/特</span>
  </div>

  <!-- 班表卡片 -->
  <div class="card">
    <div class="card-head">
      <span class="card-title" id="cardTitle">班表輸入</span>
      <div style="display:flex;gap:12px;align-items:center">
        <span id="msgEl"></span>
        <button class="save-btn" id="saveBtn" onclick="saveRoster()">儲存班表</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="roster-table" id="rosterTable">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
const STORE_STAFF = {
  '豐原': ['林榮祺', '林峙文'],
  '潭子': ['劉育仕', '林煜捷'],
  '大雅': ['張永承', '張家碩'],
};
const SHIFTS = ['', '值', '早', '晚', '全', '休', '特'];
const DOW    = ['日','一','二','三','四','五','六'];

const now = new Date();
let rYear  = now.getFullYear();
let rMonth = now.getMonth() + 1;
let rStore = '豐原';
let existingRoster = {}; // {staffName: {date: shift}}

/* ── 選擇器 ── */
function initSelectors() {
  const yS = document.getElementById('yearSel');
  const mS = document.getElementById('monthSel');
  for (let y = now.getFullYear(); y >= 2024; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + '年';
    if (y === rYear) o.selected = true;
    yS.appendChild(o);
  }
  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option');
    o.value = m; o.textContent = m + '月';
    if (m === rMonth) o.selected = true;
    mS.appendChild(o);
  }
  yS.addEventListener('change', () => { rYear = +yS.value; load(); });
  mS.addEventListener('change', () => { rMonth = +mS.value; load(); });

  document.getElementById('storePills').addEventListener('click', e => {
    const btn = e.target.closest('.s-pill'); if (!btn) return;
    rStore = btn.dataset.store;
    document.querySelectorAll('.s-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    load();
  });
}

/* ── 載入已有班表 ── */
async function load() {
  document.getElementById('cardTitle').textContent =
    `${rYear}年${rMonth}月 — ${rStore}`;
  const res  = await fetch(`/api/roster/monthly?year=${rYear}&month=${rMonth}&location=${encodeURIComponent(rStore)}`);
  const data = await res.json();

  // 整理成 {staffName: {date: shift}}
  existingRoster = {};
  const roster = data.roster || {};
  Object.entries(roster).forEach(([date, entries]) => {
    entries.forEach(e => {
      if (!existingRoster[e.staff_name]) existingRoster[e.staff_name] = {};
      existingRoster[e.staff_name][date] = e.shift_code;
    });
  });
  buildTable();
}

/* ── 建立表格 ── */
function buildTable() {
  const daysInMonth = new Date(rYear, rMonth, 0).getDate();
  const staff       = STORE_STAFF[rStore] || [];

  // 表頭
  let theadHtml = '<tr><th>員工</th>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = new Date(rYear, rMonth-1, d).getDay();
    const cls = dow===0 ? 'th-sun' : dow===6 ? 'th-sat' : '';
    theadHtml += `<th class="${cls}">${d}<br><span style="font-size:.62rem">${DOW[dow]}</span></th>`;
  }
  theadHtml += '</tr>';
  document.getElementById('thead').innerHTML = theadHtml;

  // 表身
  let tbodyHtml = '';
  staff.forEach(name => {
    tbodyHtml += `<tr><td>${name}</td>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const date    = `${rYear}-${String(rMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cur     = (existingRoster[name] || {})[date] || '';
      const dow     = new Date(rYear, rMonth-1, d).getDay();
      const tdCls   = dow===0 ? 'td-sun' : dow===6 ? 'td-sat' : '';
      const selCls  = cur ? `sc-${cur}` : '';
      tbodyHtml += `<td class="${tdCls}">
        <select class="shift-sel ${selCls}" data-name="${name}" data-date="${date}"
                onchange="onShiftChange(this)">
          ${SHIFTS.map(s => `<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>`;
    }
    tbodyHtml += '</tr>';
  });
  document.getElementById('tbody').innerHTML = tbodyHtml;
}

function onShiftChange(sel) {
  sel.className = 'shift-sel' + (sel.value ? ` sc-${sel.value}` : '');
}

/* ── 儲存 ── */
async function saveRoster() {
  const entries = [];
  document.querySelectorAll('.shift-sel').forEach(sel => {
    if (sel.value) {
      entries.push({
        date:       sel.dataset.date,
        staff_name: sel.dataset.name,
        location:   rStore,
        shift_code: sel.value,
      });
    }
  });

  if (!entries.length) {
    showMsg('尚未填入任何班別', false); return;
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  const res  = await fetch('/api/roster/batch', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ entries })
  });
  const data = await res.json();
  btn.disabled = false;

  if (data.success) {
    showMsg(`儲存成功，共 ${data.updated} 筆`, true);
    load();
  } else {
    showMsg(data.message || '儲存失敗', false);
  }
}

function showMsg(msg, ok) {
  const el = document.getElementById('msgEl');
  el.textContent = msg;
  el.className = ok ? 'msg-ok' : 'msg-err';
  setTimeout(() => { el.textContent = ''; }, 4000);
}

initSelectors();
onAppReady(user => { load(); });
</script>
{% endblock %}
