{% extends "base.html" %}
{% block title %}客戶查詢 — COSH ERP{% endblock %}
{% block page_title %}客戶查詢{% endblock %}

{% block styles %}
<style>
.cs-layout { display: flex; flex-direction: column; gap: 20px; }

/* ── 搜尋列 ── */
.search-bar {
  background: #fff;
  border: 1px solid rgba(107,95,82,.14);
  border-radius: 14px;
  padding: 16px 20px;
  display: flex; gap: 12px; align-items: center;
}
.search-input {
  flex: 1;
  padding: 10px 16px;
  border: 1px solid rgba(107,95,82,.22);
  border-radius: 10px;
  font-size: .9rem;
  font-family: var(--font-serif);
  font-weight: 300;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border .15s;
}
.search-input:focus { border-color: var(--accent); }
.search-btn {
  padding: 10px 22px;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  font-size: .82rem;
  font-family: var(--font-serif);
  font-weight: 300;
  letter-spacing: .08em;
  cursor: pointer;
}
.search-hint { font-size: .75rem; color: var(--text-sub); letter-spacing: .04em; }

/* ── 結果列表 ── */
.card {
  background: #fff;
  border: 1px solid rgba(107,95,82,.14);
  border-radius: 16px;
  overflow: hidden;
}
.card-title {
  font-size: .72rem; color: var(--text-sub); letter-spacing: .12em; text-transform: uppercase;
  padding: 14px 20px; border-bottom: 1px solid rgba(107,95,82,.1);
}
.cust-table { width: 100%; border-collapse: collapse; font-size: .84rem; }
.cust-table th {
  text-align: left; padding: 10px 16px;
  font-weight: 300; color: var(--text-sub); font-size: .74rem; letter-spacing: .06em;
  background: #faf7f2;
}
.cust-table td { padding: 11px 16px; color: var(--text); border-top: 1px solid rgba(107,95,82,.06); }
.cust-table tr:hover td { background: rgba(107,95,82,.03); cursor: pointer; }
.cust-id { font-family: var(--font-en); font-size: .85rem; color: var(--text-sub); }
.total-hint { font-size: .75rem; color: var(--text-sub); padding: 10px 16px; }
.pg-btn {
  padding: 3px 9px; margin: 0 2px;
  border: 1px solid rgba(107,95,82,.25); border-radius: 6px;
  background: var(--bg); font-size: .78rem; cursor: pointer; color: var(--accent);
  font-family: var(--font-serif);
}
.pg-btn:hover { background: #ede9e0; }
.pg-cur { background: var(--text) !important; color: var(--bg) !important; border-color: var(--text) !important; }

/* ── 客戶詳情面板 ── */
.detail-panel {
  background: #fff;
  border: 1px solid rgba(107,95,82,.14);
  border-radius: 16px;
  overflow: hidden;
  display: none;
}
.detail-panel.open { display: block; }
.detail-head {
  background: var(--text);
  padding: 16px 22px;
  display: flex; align-items: center; justify-content: space-between;
}
.detail-name { font-size: 1rem; color: var(--bg); letter-spacing: .06em; font-weight: 300; }
.detail-id { font-size: .78rem; color: var(--text-sub); font-family: var(--font-en); }
.close-btn {
  background: none; border: 1px solid rgba(255,255,255,.2); color: var(--text-sub);
  border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: .78rem;
}

.detail-body { padding: 20px; }
.info-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px; margin-bottom: 22px;
}
.info-item { background: var(--bg); border-radius: 10px; padding: 12px 16px; }
.info-lbl { font-size: .7rem; color: var(--text-sub); letter-spacing: .06em; margin-bottom: 4px; }
.info-val { font-size: .88rem; color: var(--text); }

.stat-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; margin-bottom: 20px;
}
.stat-box { background: var(--text); border-radius: 10px; padding: 14px 16px; text-align: center; }
.stat-val { font-family: var(--font-en); font-size: 1.3rem; color: var(--bg); font-weight: 300; }
.stat-lbl { font-size: .68rem; color: var(--text-sub); margin-top: 3px; letter-spacing: .04em; }

.sec-title { font-size: .72rem; color: var(--text-sub); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
.sales-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
.sales-table th {
  text-align: left; padding: 8px 10px;
  font-weight: 300; color: var(--text-sub); font-size: .72rem;
  border-bottom: 1px solid rgba(107,95,82,.1);
}
.sales-table td { padding: 8px 10px; color: var(--text); border-bottom: 1px solid rgba(107,95,82,.05); }
.sales-table tr:last-child td { border-bottom: none; }
.num { font-family: var(--font-en); font-size: .88rem; }

/* skeleton */
.skel {
  background: linear-gradient(90deg, rgba(107,95,82,.07) 25%, rgba(107,95,82,.14) 50%, rgba(107,95,82,.07) 75%);
  background-size: 200% 100%; animation: skel-shine 1.4s infinite;
  border-radius: 6px; height: 18px; margin: 6px 0;
}
@keyframes skel-shine { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
#resultBody, #detailBody { overflow-x: auto; }
</style>
{% endblock %}

{% block content %}
<div class="cs-layout">

  <!-- 搜尋列 -->
  <div class="search-bar">
    <input class="search-input" id="searchInput" type="text"
           placeholder="輸入客戶名稱、電話、統編、客戶代碼…" autocomplete="off">
    <button class="search-btn" onclick="doSearch()">搜尋</button>
    <span class="search-hint" id="searchHint">按 Enter 搜尋</span>
  </div>

  <!-- 搜尋結果 -->
  <div class="card" id="resultCard" style="display:none">
    <div class="card-title">搜尋結果</div>
    <div id="resultBody"></div>
  </div>

  <!-- 客戶詳情 -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-head">
      <div>
        <div class="detail-name" id="detailName">—</div>
        <div class="detail-id" id="detailId">—</div>
      </div>
      <button class="close-btn" onclick="closeDetail()">關閉</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
const fmt = n => n ? 'NT$\u00a0' + Math.round(n).toLocaleString('zh-TW') : 'NT$\u00a00';

let curPage = 1;
let curQ    = '';

function onAppReady(user) { doSearch(1); }

/* ── 搜尋 ── */
async function doSearch(page) {
  curPage = page || 1;
  curQ    = document.getElementById('searchInput').value.trim();
  document.getElementById('searchHint').textContent = '搜尋中…';
  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('resultBody').innerHTML = '<div class="skel" style="margin:16px"></div>';

  const res  = await fetch(`/api/customer/search?q=${encodeURIComponent(curQ)}&page=${curPage}`);
  const data = await res.json();
  const total = data.total || 0;
  const per   = data.per || 50;

  document.getElementById('searchHint').textContent = `共 ${total} 筆`;

  if (!data.customers || data.customers.length === 0) {
    document.getElementById('resultBody').innerHTML =
      '<div style="padding:20px;color:var(--text-sub);font-size:.84rem">查無資料</div>';
    return;
  }

  const totalPages = Math.ceil(total / per);
  let html = `<table class="cust-table">
    <thead><tr>
      <th>客戶代碼</th><th>名稱</th><th>電話</th><th>統編</th><th>付款方式</th>
    </tr></thead><tbody>`;
  data.customers.forEach(c => {
    html += `<tr onclick="loadDetail('${c.customer_id}')">
      <td><span class="cust-id">${c.customer_id}</span></td>
      <td><strong>${c.short_name || '—'}</strong></td>
      <td>${c.phone1 || c.mobile || '—'}</td>
      <td>${c.tax_id || '—'}</td>
      <td>${c.payment_type || '—'}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  if (totalPages > 1) {
    html += `<div class="total-hint" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      第 ${curPage} / ${totalPages} 頁，共 ${total} 筆
      ${renderPager(curPage, totalPages)}
    </div>`;
  }
  document.getElementById('resultBody').innerHTML = html;
}

function renderPager(cur, total) {
  let btns = '';
  if (cur > 1) btns += `<button onclick="doSearch(${cur-1})" class="pg-btn">上頁</button>`;
  for (let p = Math.max(1, cur-2); p <= Math.min(total, cur+2); p++) {
    btns += `<button onclick="doSearch(${p})" class="pg-btn${p===cur?' pg-cur':''}">${p}</button>`;
  }
  if (cur < total) btns += `<button onclick="doSearch(${cur+1})" class="pg-btn">下頁</button>`;
  return btns;
}

/* ── 詳情 ── */
async function loadDetail(customerId) {
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('detailName').textContent = '載入中…';
  document.getElementById('detailId').textContent = customerId;
  document.getElementById('detailBody').innerHTML =
    '<div class="skel"></div><div class="skel" style="width:60%"></div>';

  // 捲動到詳情
  document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });

  const res = await fetch('/api/customer/detail/' + encodeURIComponent(customerId));
  const data = await res.json();
  if (!data.success) return;

  const c = data.customer;
  const s = data.stats || {};
  document.getElementById('detailName').textContent = c.short_name || c.full_name || '—';
  document.getElementById('detailId').textContent = c.customer_id;

  // 基本資料
  const info = `
    <div class="info-grid">
      <div class="info-item"><div class="info-lbl">電話</div><div class="info-val">${c.phone1 || '—'}</div></div>
      <div class="info-item"><div class="info-lbl">手機</div><div class="info-val">${c.mobile || '—'}</div></div>
      <div class="info-item"><div class="info-lbl">統一編號</div><div class="info-val">${c.tax_id || '—'}</div></div>
      <div class="info-item"><div class="info-lbl">付款方式</div><div class="info-val">${c.payment_type || '—'}</div></div>
      <div class="info-item" style="grid-column:1/-1"><div class="info-lbl">地址</div><div class="info-val">${c.company_address || c.delivery_address || '—'}</div></div>
    </div>`;

  // 統計
  const stats = `
    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-val">${s.order_count || 0}</div>
        <div class="stat-lbl">歷史訂單</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${fmt(s.total_amount)}</div>
        <div class="stat-lbl">累計消費</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${s.last_purchase ? s.last_purchase.slice(0,10) : '—'}</div>
        <div class="stat-lbl">最後消費</div>
      </div>
    </div>`;

  // 購買紀錄
  let salesHtml = '<div class="sec-title">最近購買紀錄</div>';
  if (data.sales && data.sales.length > 0) {
    salesHtml += `<table class="sales-table">
      <thead><tr><th>日期</th><th>產品</th><th>數量</th><th>金額</th><th>業務員</th></tr></thead>
      <tbody>`;
    data.sales.forEach(r => {
      salesHtml += `<tr>
        <td>${r.date}</td>
        <td>${r.product_name || r.product_code || '—'}</td>
        <td class="num">${r.quantity}</td>
        <td class="num">${fmt(r.amount)}</td>
        <td>${r.salesperson || '—'}</td>
      </tr>`;
    });
    salesHtml += '</tbody></table>';
  } else {
    salesHtml += '<div style="color:var(--text-sub);font-size:.82rem">暫無購買紀錄</div>';
  }

  document.getElementById('detailBody').innerHTML = info + stats + salesHtml;
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

/* Enter 搜尋 */
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch(1);
});
</script>
{% endblock %}
