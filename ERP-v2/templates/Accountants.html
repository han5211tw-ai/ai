{% extends "base.html" %}
{% block title %}會計 — COSH ERP{% endblock %}
{% block page_title %}會計{% endblock %}

{% block styles %}
<style>
.acc-layout { display: flex; flex-direction: column; gap: 20px; }

/* ── 控制列 ── */
.ctrl-bar {
  background: #fff;
  border: 1px solid rgba(107,95,82,.14);
  border-radius: 14px;
  padding: 14px 20px;
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.ctrl-label { font-size: .78rem; color: var(--text-sub); letter-spacing: .04em; }
.ctrl-sep { width: 1px; height: 20px; background: rgba(107,95,82,.18); }
.status-pills { display: flex; border: 1px solid rgba(107,95,82,.2); border-radius: 8px; overflow: hidden; }
.pill-btn {
  padding: 7px 14px; font-size: .8rem; background: none; border: none;
  color: var(--accent); cursor: pointer; font-family: var(--font-serif);
  font-weight: 300; letter-spacing: .04em;
}
.pill-btn + .pill-btn { border-left: 1px solid rgba(107,95,82,.2); }
.pill-btn.active { background: var(--text); color: var(--bg); }
.dept-sel {
  padding: 7px 12px;
  border: 1px solid rgba(107,95,82,.22); border-radius: 8px;
  font-size: .82rem; font-family: var(--font-serif);
  color: var(--text); background: var(--bg);
}

/* ── 統計卡 ── */
.stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
}
.stat-card {
  background: #fff;
  border: 1px solid rgba(107,95,82,.14);
  border-radius: 14px; padding: 16px 20px;
}
.stat-val {
  font-family: var(--font-en);
  font-size: 1.5rem; font-weight: 300; color: var(--text);
}
.stat-lbl { font-size: .7rem; color: var(--text-sub); margin-top: 4px; letter-spacing: .05em; }

/* ── 需求表 ── */
.card {
  background: #fff;
  border: 1px solid rgba(107,95,82,.14);
  border-radius: 16px; overflow: hidden;
}
.card-title {
  font-size: .72rem; color: var(--text-sub); letter-spacing: .12em; text-transform: uppercase;
  padding: 13px 20px; border-bottom: 1px solid rgba(107,95,82,.08);
}

.needs-table { width: 100%; border-collapse: collapse; font-size: .83rem; }
.needs-table th {
  text-align: left; padding: 9px 14px;
  font-weight: 300; color: var(--text-sub); font-size: .73rem; letter-spacing: .06em;
  background: var(--bg-card); border-bottom: 1px solid rgba(107,95,82,.1);
}
.needs-table td { padding: 10px 14px; color: var(--text); border-bottom: 1px solid rgba(107,95,82,.05); }
.needs-table tr:last-child td { border-bottom: none; }

.type-badge {
  font-size: .7rem; padding: 2px 8px; border-radius: 4px; display: inline-block;
}
.tb-調撥 { background: rgba(80,110,155,.15); color: #3a5a8a; }
.tb-請購 { background: rgba(250,191,19,.18); color: #7a5500; }

.status-badge {
  font-size: .7rem; padding: 2px 8px; border-radius: 4px; display: inline-block;
}
.sb-待處理 { background: rgba(250,191,19,.18); color: #7a5500; }
.sb-已採購 { background: rgba(80,110,155,.15); color: #3a5a8a; }
.sb-已調撥 { background: #e8f4e8; color: #3d7a3d; }
.sb-已到貨 { background: #e8f4e8; color: #3d7a3d; }
.sb-已完成 { background: #e8e2d8; color: #6b5f52; }
.sb-已取消 { background: rgba(107,95,82,.08); color: #9a9188; }

.action-btns { display: flex; gap: 6px; }
.act-btn {
  padding: 4px 10px; border-radius: 5px; font-size: .72rem;
  border: 1px solid rgba(107,95,82,.25); background: none;
  color: var(--accent); cursor: pointer; font-family: var(--font-serif);
}
.act-btn.transfer { border-color: #3a5a8a; color: #3a5a8a; }
.act-btn.complete  { border-color: var(--accent); background: var(--text); color: var(--bg); }
.act-btn:hover { opacity: .8; }

/* skeleton */
.skel {
  background: linear-gradient(90deg, rgba(107,95,82,.07) 25%, rgba(107,95,82,.14) 50%, rgba(107,95,82,.07) 75%);
  background-size: 200% 100%; animation: skel-shine 1.4s infinite;
  border-radius: 6px; height: 18px; margin: 6px 0;
}
@keyframes skel-shine { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
#tableWrap { overflow-x: auto; }

/* ── 班表區塊 ── */
.roster-header {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.roster-nav-btn {
  width: 30px; height: 30px; border: 1px solid rgba(107,95,82,.2);
  border-radius: 7px; background: none; cursor: pointer;
  font-size: .9rem; color: var(--accent); display: flex; align-items: center; justify-content: center;
}
.roster-nav-btn:hover { background: rgba(107,95,82,.06); }
.roster-month-label {
  font-family: var(--font-en);
  font-size: 1.05rem; color: var(--text); min-width: 90px; text-align: center;
}
.roster-location-label {
  padding: 7px 18px; background: var(--bg-card);
  font-size: .7rem; color: var(--text-sub); letter-spacing: .1em;
  border-bottom: 1px solid rgba(107,95,82,.08);
}
.roster-table { width: 100%; border-collapse: collapse; font-size: .78rem; }
.roster-table th {
  padding: 7px 5px; text-align: center;
  font-weight: 300; color: var(--text-sub); font-size: .7rem;
  background: var(--bg-card); white-space: nowrap; min-width: 28px;
}
.roster-table th:first-child { text-align: left; padding-left: 16px; min-width: 72px; position: sticky; left: 0; background: var(--bg-card); z-index: 1; }
.roster-table td {
  padding: 6px 4px; text-align: center;
  border-top: 1px solid rgba(107,95,82,.05); white-space: nowrap;
}
.roster-table td:first-child {
  text-align: left; padding-left: 16px; font-size: .82rem; color: var(--text); font-weight: 400;
  position: sticky; left: 0; background: #fff; z-index: 1;
}
.roster-table tr:hover td { background: rgba(107,95,82,.025); }
.roster-table tr:hover td:first-child { background: rgba(107,95,82,.04); }

/* 班別色票 */
.sc { display: inline-block; width: 22px; height: 22px; line-height: 22px;
      border-radius: 5px; font-size: .72rem; font-weight: 500; }
.sc-值 { background: rgba(58,90,138,.14); color: #3a5a8a; }
.sc-早 { background: rgba(220,140,30,.16); color: #8a5200; }
.sc-晚 { background: rgba(80,50,130,.13); color: #503282; }
.sc-全 { background: rgba(46,125,70,.14); color: #2e7d46; }
.sc-休 { background: rgba(107,95,82,.09); color: #9a9188; }
.sc-特 { background: rgba(185,64,64,.12); color: #b94040; }
.sc-空 { color: #d8d0c8; font-size: .65rem; }
/* 週末欄位淡底 */
.roster-table th.weekend { color: #b94040; }
.roster-table td.weekend { background: rgba(185,64,64,.03); }
/* today 欄 */
.roster-table th.today-col { background: rgba(250,191,19,.15); color: #7a5500; }
.roster-table td.today-col { background: rgba(250,191,19,.06); }

/* ── 異常警示卡 ── */
.anomaly-card {
  background: #fff8f0;
  border: 1.5px solid rgba(184,100,50,.25);
  border-radius: 14px;
  overflow: hidden;
}
.anomaly-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 20px;
  border-bottom: 1px solid rgba(184,100,50,.15);
  flex-wrap: wrap; gap: 8px;
}
.anomaly-card-title {
  font-size: .72rem; color: #8a3a10; letter-spacing: .1em; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.anomaly-badge {
  display: inline-block; padding: 2px 10px; border-radius: 999px;
  font-size: .75rem; font-family: var(--font-serif);
  background: rgba(184,100,50,.12); color: #b86432;
}
.anomaly-badge.ok { background: rgba(107,138,92,.12); color: #6b8a5c; }
.anomaly-btn-refresh {
  padding: 5px 12px; background: none; border: 1px solid rgba(184,100,50,.3);
  border-radius: 7px; font-size: .78rem; color: #8a3a10; cursor: pointer;
}
.anomaly-btn-refresh:hover { background: rgba(184,100,50,.07); }
.anomaly-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
.anomaly-table th {
  text-align: left; padding: 8px 14px; font-weight: 300;
  color: #9a7a68; font-size: .72rem; letter-spacing: .06em;
  background: #fff3e8; border-bottom: 1px solid rgba(184,100,50,.12);
  white-space: nowrap;
}
.anomaly-table td {
  padding: 9px 14px; border-bottom: 1px solid rgba(184,100,50,.06);
  vertical-align: middle; color: var(--text);
}
.anomaly-table tr:last-child td { border-bottom: none; }
.anomaly-table tr:hover td { background: rgba(255,235,218,.4); }
.anomaly-amount { font-weight: 500; color: #b86432; }
.anomaly-code { font-family: var(--font-mono); font-size: .8rem; color: #b86432; }
.ack-btn {
  padding: 2px 10px; font-size: .75rem; border-radius: 4px; cursor: pointer;
  border: 1px solid #6b8a5c; background: #f0f7ec; color: #3a5a30;
  white-space: nowrap;
}
.ack-btn:hover { background: #6b8a5c; color: #fff; }
.ack-btn:disabled { opacity: .5; cursor: not-allowed; }
</style>
{% endblock %}

{% block content %}
<div class="acc-layout">

  <!-- 控制列 -->
  <div class="ctrl-bar">
    <span class="ctrl-label">狀態</span>
    <div class="status-pills" id="statusPills">
      <button class="pill-btn active" data-s="待處理">待調撥</button>
      <button class="pill-btn" data-s="已調撥">已調撥</button>
      <button class="pill-btn" data-s="已完成">已完成</button>
      <button class="pill-btn" data-s="all">全部</button>
    </div>
    <div class="ctrl-sep"></div>
    <span class="ctrl-label">門市</span>
    <select class="dept-sel" id="deptSel">
      <option value="">全部門市</option>
      <option value="豐原門市">豐原門市</option>
      <option value="潭子門市">潭子門市</option>
      <option value="大雅門市">大雅門市</option>
      <option value="業務部">業務部</option>
    </select>
  </div>

  <!-- 統計卡 -->
  <div class="stat-row" id="statRow">
    <div class="stat-card"><div class="skel"></div></div>
    <div class="stat-card"><div class="skel"></div></div>
  </div>

  <!-- 需求列表 -->
  <div class="card">
    <div class="card-title">調撥需求列表</div>
    <div id="tableWrap">
      <div class="skel" style="margin:16px"></div>
    </div>
  </div>

  <!-- 當月班表 -->
  <div class="card">
    <div class="card-title">
      <div class="roster-header">
        <span>全員班表</span>
        <button class="roster-nav-btn" onclick="changeMonth(-1)">上月</button>
        <span class="roster-month-label" id="rosterMonthLabel">—</span>
        <button class="roster-nav-btn" onclick="changeMonth(1)">下月</button>
      </div>
    </div>
    <div id="rosterWrap" style="overflow-x:auto">
      <div class="skel" style="margin:16px"></div>
    </div>
  </div>

  <!-- 異常警示：銷貨異常 -->
  <div class="anomaly-card">
    <div class="anomaly-card-header">
      <div class="anomaly-card-title">
        ⚠ 銷貨異常警示
        <span class="anomaly-badge" id="anomalyBadge">載入中</span>
      </div>
      <button class="anomaly-btn-refresh" onclick="loadAnomalies()">重新整理</button>
    </div>
    <div id="anomalyWrap" style="overflow-x:auto">
      <div class="skel" style="margin:16px"></div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
let curStatus = '待處理';
let curDept   = '';

/* ── 控制元件 ── */
document.getElementById('statusPills').addEventListener('click', e => {
  const btn = e.target.closest('.pill-btn'); if (!btn) return;
  document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curStatus = btn.dataset.s;
  load();
});
document.getElementById('deptSel').addEventListener('change', e => {
  curDept = e.target.value; load();
});

/* ── 載入 ── */
async function load() {
  const qs = `status=${encodeURIComponent(curStatus)}${curDept ? '&department=' + encodeURIComponent(curDept) : ''}`;
  const res  = await fetch('/api/needs/transfers?' + qs);
  const data = await res.json();
  if (!data.success) return;

  const needs = data.needs || [];

  // 統計
  const pending     = needs.filter(n => n.status === '待處理').length;
  const transferred = needs.filter(n => n.status === '已調撥').length;
  const completed   = needs.filter(n => n.status === '已完成').length;
  document.getElementById('statRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${pending}</div>
      <div class="stat-lbl">待調撥</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${transferred}</div>
      <div class="stat-lbl">已調撥</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${completed}</div>
      <div class="stat-lbl">已完成</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${needs.length}</div>
      <div class="stat-lbl">本次顯示</div>
    </div>
  `;

  if (needs.length === 0) {
    document.getElementById('tableWrap').innerHTML =
      '<div style="padding:20px;color:var(--text-sub);font-size:.83rem">查無資料</div>';
    return;
  }

  let html = `<table class="needs-table">
    <thead><tr>
      <th>日期</th><th>類型</th><th>產品</th><th>數量</th>
      <th>門市</th><th>申請人</th><th>調撥來源</th><th>狀態</th><th>操作</th>
    </tr></thead><tbody>`;

  needs.forEach(n => {
    const actions = buildActions(n);
    html += `<tr id="nr-${n.id}">
      <td>${n.date || n.created_at?.slice(0,10) || '—'}</td>
      <td><span class="type-badge tb-${n.request_type || '調撥'}">${n.request_type || '調撥'}</span></td>
      <td>
        <div>${n.item_name || '—'}</div>
        <div style="font-size:.72rem;color:var(--text-sub)">${n.product_code || ''}</div>
      </td>
      <td>${n.quantity || '—'}</td>
      <td>${n.department || '—'}</td>
      <td>${n.requester || '—'}</td>
      <td style="font-size:.78rem;color:var(--text-sub)">${n.transfer_from || '—'}</td>
      <td><span class="status-badge sb-${n.status || '待處理'}" id="st-${n.id}">${n.status || '待處理'}</span></td>
      <td><div class="action-btns">${actions}</div></td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

function buildActions(n) {
  if (n.status === '待處理') {
    return `<button class="act-btn transfer" onclick="doTransfer(${n.id})">調撥</button>`;
  }
  return '<span style="color:var(--text-sub);font-size:.74rem">—</span>';
}

async function doTransfer(id) {
  const res = await fetch('/api/needs/' + id + '/transfer', { method: 'POST' });
  const d   = await res.json();
  if (d.success) {
    document.getElementById('st-' + id).textContent = '已調撥';
    document.getElementById('st-' + id).className = 'status-badge sb-已調撥';
    const row = document.getElementById('nr-' + id);
    row.querySelector('.action-btns').innerHTML = '<span style="color:var(--text-sub);font-size:.74rem">—</span>';
  } else {
    alert(d.message || '操作失敗');
  }
}

function onAppReady(user) {
  load();
  loadRoster();
  loadAnomalies();
}

/* ══════════════════════════════════════
   銷貨異常警示
   ══════════════════════════════════════ */
async function loadAnomalies() {
  const wrap  = document.getElementById('anomalyWrap');
  const badge = document.getElementById('anomalyBadge');
  wrap.innerHTML = '<div style="padding:16px;color:#9a9188;font-size:.83rem">載入中…</div>';
  try {
    const res  = await fetch('/api/sales/anomalies?days=30&threshold=5000');
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    renderAnomalies(json.rows, badge, wrap);
  } catch (e) {
    wrap.innerHTML = `<div style="padding:16px;color:#b86432;font-size:.83rem">載入失敗：${e.message}</div>`;
  }
}

async function ackAnomaly(rowId, btn) {
  btn.disabled = true;
  btn.textContent = '處理中…';
  try {
    const res = await fetch(`/api/sales/anomaly-ack/${rowId}`, { method: 'PUT' });
    const json = await res.json();
    if (!json.success) throw new Error(json.message);
    const tr = btn.closest('tr');
    tr.style.transition = 'opacity .3s';
    tr.style.opacity = '0';
    setTimeout(() => {
      tr.remove();
      const wrap  = document.getElementById('anomalyWrap');
      const badge = document.getElementById('anomalyBadge');
      const tbody = wrap.querySelector('tbody');
      if (!tbody || tbody.rows.length === 0) {
        badge.textContent = '無異常';
        badge.className = 'anomaly-badge ok';
        wrap.innerHTML = '<div style="padding:16px;color:#6b8a5c;font-size:.83rem">近 30 日無銷貨異常紀錄 ✓</div>';
      } else {
        badge.textContent = `${tbody.rows.length} 筆`;
      }
    }, 300);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '確認';
    alert('確認失敗：' + e.message);
  }
}

function renderAnomalies(rows, badge, wrap) {
  if (!rows || !rows.length) {
    badge.textContent = '無異常';
    badge.className = 'anomaly-badge ok';
    wrap.innerHTML = '<div style="padding:16px;color:#6b8a5c;font-size:.83rem">近 30 日無銷貨異常紀錄 ✓</div>';
    return;
  }
  badge.textContent = `${rows.length} 筆`;
  badge.className = 'anomaly-badge';
  const esc = s => { const d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML; };
  const trs = rows.map(r => `<tr>
    <td>${esc(r.date)}</td>
    <td><span class="anomaly-code">${esc(r.product_code)}</span></td>
    <td>${esc(r.product_name)}</td>
    <td style="text-align:center">${r.quantity ?? '—'}</td>
    <td class="anomaly-amount" style="text-align:right">NT$ ${(r.amount||0).toLocaleString()}</td>
    <td>${esc(r.salesperson)}</td>
    <td>${esc(r.customer_name)}</td>
    <td><button class="ack-btn" onclick="ackAnomaly(${r.id}, this)">確認</button></td>
  </tr>`).join('');
  wrap.innerHTML = `<table class="anomaly-table">
    <thead><tr>
      <th>日期</th><th>品號</th><th>品名</th>
      <th style="text-align:center">數量</th>
      <th style="text-align:right">金額</th>
      <th>業務</th><th>客戶</th><th></th>
    </tr></thead>
    <tbody>${trs}</tbody>
  </table>`;
}

/* ══════════════════════════════════════
   當月班表
   ══════════════════════════════════════ */
let rosterYear  = new Date().getFullYear();
let rosterMonth = new Date().getMonth() + 1;

const WEEKDAY_ZH = ['日','一','二','三','四','五','六'];

function changeMonth(delta) {
  rosterMonth += delta;
  if (rosterMonth > 12) { rosterMonth = 1;  rosterYear++; }
  if (rosterMonth < 1)  { rosterMonth = 12; rosterYear--; }
  loadRoster();
}

async function loadRoster() {
  const wrap = document.getElementById('rosterWrap');
  const label = document.getElementById('rosterMonthLabel');
  wrap.innerHTML = '<div class="skel" style="margin:16px"></div>';
  label.textContent = `${rosterYear} 年 ${rosterMonth} 月`;

  const res  = await fetch(`/api/roster/monthly?year=${rosterYear}&month=${rosterMonth}`);
  const json = await res.json();
  if (!json.success) { wrap.innerHTML = '<div style="padding:20px;color:var(--text-sub)">載入失敗</div>'; return; }

  const roster    = json.roster || {};     // { "2026-04-01": [{staff_name, location, shift_code}] }
  const today     = new Date();
  const todayStr  = today.toISOString().slice(0,10);

  // 計算本月天數
  const daysInMonth = new Date(rosterYear, rosterMonth, 0).getDate();

  // 整理成 { staff_name: { location, shifts: {1: 'sc', 2: 'sc', ...} } }
  const staffMap = {};
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${rosterYear}-${String(rosterMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entries = roster[dateStr] || [];
    entries.forEach(e => {
      if (!staffMap[e.staff_name]) staffMap[e.staff_name] = { location: e.location, shifts: {} };
      staffMap[e.staff_name].shifts[d] = e.shift_code;
    });
  }

  if (!Object.keys(staffMap).length) {
    wrap.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-sub);font-size:.85rem">本月尚無班表資料</div>';
    return;
  }

  // 依門市分組
  const byLocation = {};
  Object.entries(staffMap).forEach(([name, data]) => {
    const loc = data.location || '未指定';
    if (!byLocation[loc]) byLocation[loc] = [];
    byLocation[loc].push({ name, shifts: data.shifts });
  });

  // 建立欄標頭（日 + 星期）
  const dayHeaders = Array.from({length: daysInMonth}, (_, i) => {
    const d = i + 1;
    const dow = new Date(rosterYear, rosterMonth - 1, d).getDay();
    const isWeekend = dow === 0 || dow === 6;
    const isToday   = `${rosterYear}-${String(rosterMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}` === todayStr;
    const cls = isToday ? 'today-col' : (isWeekend ? 'weekend' : '');
    return { d, dow, cls };
  });

  const thCols = dayHeaders.map(h =>
    `<th class="${h.cls}">${h.d}<br><span style="font-size:.62rem">${WEEKDAY_ZH[h.dow]}</span></th>`
  ).join('');

  let html = '';
  Object.entries(byLocation).sort(([a],[b]) => a.localeCompare(b, 'zh-TW')).forEach(([loc, staff]) => {
    html += `<div class="roster-location-label">${loc}</div>
    <table class="roster-table">
      <thead><tr>
        <th>姓名</th>${thCols}
      </tr></thead><tbody>`;

    staff.forEach(s => {
      const cells = dayHeaders.map(h => {
        const sc = s.shifts[h.d] || '';
        const cellCls = h.cls;
        const inner = sc
          ? `<span class="sc sc-${sc}">${sc}</span>`
          : `<span class="sc sc-空">·</span>`;
        return `<td class="${cellCls}">${inner}</td>`;
      }).join('');
      html += `<tr><td>${s.name}</td>${cells}</tr>`;
    });

    html += '</tbody></table>';
  });

  wrap.innerHTML = html;
}
</script>
{% endblock %}
