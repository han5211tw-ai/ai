{% extends "base.html" %}
{% block title %}獎金報表 — COSH ERP{% endblock %}
{% block page_title %}獎金報表{% endblock %}

{% block styles %}
<style>
.bp-layout { display:flex; flex-direction:column; gap:20px; }
.card { background:#fff; border:1px solid rgba(107,95,82,.14); border-radius:16px; overflow:hidden; }
.card-head { padding:12px 20px; border-bottom:1px solid rgba(107,95,82,.08); display:flex; align-items:center; gap:12px; }
.card-title { font-size:.72rem; color:var(--text-sub); letter-spacing:.12em; flex:1; }

/* 計算控制列 */
.calc-bar {
  display:flex; gap:12px; align-items:flex-end; padding:16px 20px;
  border-bottom:1px solid rgba(107,95,82,.08); flex-wrap:wrap;
}
.field-label { font-size:.74rem; color:var(--text-sub); letter-spacing:.04em; margin-bottom:4px; }
.f-input {
  padding:8px 12px; border:1px solid rgba(107,95,82,.22); border-radius:8px;
  font-size:.84rem; font-family:var(--font-serif); font-weight:300;
  color:var(--text); background:var(--bg); outline:none;
}
.f-input:focus { border-color:var(--accent); }
/* 開始日期(奇)暖米色 */
#cStart { background: #f5f0e8; }
.calc-btn {
  padding:9px 20px; background:var(--text); color:var(--bg);
  border:none; border-radius:8px; font-size:.82rem;
  font-family:var(--font-serif); cursor:pointer;
}
.calc-btn:disabled { opacity:.5; cursor:default; }
.msg-ok  { font-size:.8rem; color:#4a7c59; }
.msg-err { font-size:.8rem; color:#8b3a3a; }

/* 統計卡 */
.summary-bar {
  display:flex; gap:14px; padding:14px 20px; flex-wrap:wrap;
  border-bottom:1px solid rgba(107,95,82,.06);
}
.sum-chip { background:#faf7f2; border-radius:10px; padding:10px 16px; }
.sum-chip .n { font-size:1.2rem; color:var(--text); }
.sum-chip .l { font-size:.72rem; color:var(--text-sub); margin-top:2px; }

/* 結果表格 */
.result-table { width:100%; border-collapse:collapse; font-size:.83rem; }
.result-table th {
  text-align:left; padding:9px 12px; font-weight:300; color:var(--text-sub);
  font-size:.7rem; letter-spacing:.06em; background:#faf7f2;
  border-bottom:1px solid rgba(107,95,82,.1);
}
.result-table td { padding:9px 12px; color:var(--text); border-bottom:1px solid rgba(107,95,82,.05); }
.result-table tr:last-child td { border-bottom:none; }
.result-table .amount { text-align:right; }

/* 人員匯總 */
.person-card {
  background:#faf7f2; border-radius:10px; padding:12px 16px;
  display:flex; justify-content:space-between; align-items:center; margin:0 20px 10px;
}
.person-name { font-size:.92rem; color:var(--text); }
.person-total { font-size:1.1rem; color:var(--text); font-weight:300; }
.person-label { font-size:.72rem; color:var(--text-sub); }
</style>
{% endblock %}

{% block content %}
<div class="bp-layout">

  <!-- 計算控制 -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">獎金計算</span>
      <span id="msgEl"></span>
    </div>
    <div class="calc-bar">
      <div>
        <div class="field-label">開始日期</div>
        <input class="f-input" type="date" id="cStart">
      </div>
      <div>
        <div class="field-label">結束日期</div>
        <input class="f-input" type="date" id="cEnd">
      </div>
      <button class="calc-btn" id="calcBtn" onclick="calculate()">計算獎金</button>
    </div>
  </div>

  <!-- 人員匯總（計算後顯示） -->
  <div class="card" id="summaryCard" style="display:none">
    <div class="card-head">
      <span class="card-title">人員獎金匯總</span>
    </div>
    <div id="personCards" style="padding:14px 0 4px"></div>
  </div>

  <!-- 明細 -->
  <div class="card" id="detailCard" style="display:none">
    <div class="card-head">
      <span class="card-title">獎金明細</span>
    </div>
    <div style="overflow-x:auto">
      <table class="result-table">
        <thead>
          <tr>
            <th>業務員</th>
            <th>規則名稱</th>
            <th>商品</th>
            <th style="text-align:right">銷售件數</th>
            <th style="text-align:right">銷售金額</th>
            <th style="text-align:right">獎金金額</th>
            <th>相關發票</th>
          </tr>
        </thead>
        <tbody id="resultBody">
        </tbody>
      </table>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
// 預設當月
const now = new Date();
const y = now.getFullYear();
const m = String(now.getMonth()+1).padStart(2,'0');
const lastDay = new Date(y, now.getMonth()+1, 0).getDate();
document.getElementById('cStart').value = `${y}-${m}-01`;
document.getElementById('cEnd').value   = `${y}-${m}-${lastDay}`;

async function calculate() {
  const start = document.getElementById('cStart').value;
  const end   = document.getElementById('cEnd').value;
  if (!start || !end) { showMsg('請選擇日期範圍', false); return; }

  const btn = document.getElementById('calcBtn');
  btn.disabled = true;

  const res  = await fetch('/api/bonus-calculate', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ date_start: start, date_end: end })
  });
  const data = await res.json();
  btn.disabled = false;

  if (!data.success) { showMsg(data.message||'計算失敗', false); return; }

  const results = data.results || [];
  if (!results.length) {
    showMsg(`${start} ～ ${end} 期間無符合條件的獎金紀錄`, false);
    document.getElementById('summaryCard').style.display = 'none';
    document.getElementById('detailCard').style.display  = 'none';
    return;
  }

  showMsg(`計算完成，共 ${results.length} 筆`, true);

  // 人員匯總
  const byPerson = {};
  results.forEach(r => {
    if (!byPerson[r.salesperson]) byPerson[r.salesperson] = 0;
    byPerson[r.salesperson] += r.bonus_amount;
  });

  const personHtml = Object.entries(byPerson)
    .sort((a,b) => b[1]-a[1])
    .map(([name, total]) => `
      <div class="person-card">
        <div>
          <div class="person-name">${name}</div>
          <div class="person-label">獎金合計</div>
        </div>
        <div>
          <div class="person-total">${total.toLocaleString()} <span style="font-size:.78rem;color:var(--text-sub)">元</span></div>
        </div>
      </div>`).join('');

  document.getElementById('personCards').innerHTML = personHtml;
  document.getElementById('summaryCard').style.display = '';

  // 明細
  document.getElementById('resultBody').innerHTML = results.map(r => `
    <tr>
      <td><strong>${r.salesperson}</strong></td>
      <td>${r.rule_name}</td>
      <td>
        <div style="font-size:.84rem">${r.product_name}</div>
        <div style="font-size:.72rem;color:var(--text-sub)">${r.product_code}</div>
      </td>
      <td class="amount">${r.sales_quantity} 件</td>
      <td class="amount">${(r.sales_amount||0).toLocaleString()}</td>
      <td class="amount"><strong>${(r.bonus_amount||0).toLocaleString()}</strong></td>
      <td style="font-size:.74rem;color:var(--text-sub);max-width:160px;word-break:break-all">${r.invoice_nos||'—'}</td>
    </tr>`).join('');
  document.getElementById('detailCard').style.display = '';
}

function showMsg(msg, ok) {
  const el = document.getElementById('msgEl');
  el.textContent = msg; el.className = ok ? 'msg-ok' : 'msg-err';
  setTimeout(() => { el.textContent = ''; }, 6000);
}

function onAppReady(user) {}
</script>
{% endblock %}
