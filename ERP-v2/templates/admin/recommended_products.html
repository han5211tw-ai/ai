{% extends "base.html" %}
{% block title %}推薦備貨管理 — COSH ERP{% endblock %}
{% block page_title %}推薦備貨管理{% endblock %}

{% block styles %}
<style>
.rp-layout { display:flex; flex-direction:column; gap:20px; }
.card { background:#fff; border:1px solid rgba(107,95,82,.14); border-radius:16px; overflow:hidden; }
.card-head { padding:12px 20px; border-bottom:1px solid rgba(107,95,82,.08); display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.card-title { font-size:.72rem; color:#9a9188; letter-spacing:.12em; flex:1; }

/* 欄位 */
.field-label { font-size:.74rem; color:#9a9188; letter-spacing:.04em; margin-bottom:4px; }
.f-input, .f-select {
  width:100%; padding:8px 11px; border:1px solid rgba(107,95,82,.22); border-radius:8px;
  font-size:.84rem; font-family:'Noto Serif TC',serif; font-weight:300;
  color:#2c2720; background:#f5f0e8; box-sizing:border-box; outline:none;
}
.f-input:focus, .f-select:focus { border-color:#6b5f52; }
.f-small { padding:6px 9px; font-size:.8rem; }

/* 新增分類 */
.cat-add-bar { display:flex; gap:8px; padding:14px 20px; border-bottom:1px solid rgba(107,95,82,.06); align-items:flex-end; }

/* 分類 tabs */
.cat-tabs { display:flex; gap:8px; padding:12px 20px; flex-wrap:wrap; border-bottom:1px solid rgba(107,95,82,.06); }
.cat-tab {
  padding:6px 14px; border-radius:20px; font-size:.78rem; cursor:pointer;
  border:1px solid rgba(107,95,82,.2); color:#6b5f52; background:none;
  font-family:'Noto Serif TC',serif; position:relative;
}
.cat-tab.active { background:#2c2720; color:#f5f0e8; border-color:#2c2720; }
.cat-tab .del-cat {
  margin-left:6px; color:rgba(255,255,255,.5); font-size:.7rem; cursor:pointer;
}
.cat-tab:not(.active) .del-cat { color:#9a9188; }

/* 品項表單 */
.prod-form { padding:16px 20px; border-bottom:1px solid rgba(107,95,82,.06); }
.form-row-5 { display:grid; grid-template-columns:2fr 1fr 0.8fr 2fr 1fr; gap:10px; align-items:flex-end; }

/* 品項列表 */
.prod-table { width:100%; border-collapse:collapse; font-size:.82rem; }
.prod-table th {
  text-align:left; padding:8px 12px; font-weight:300; color:#9a9188;
  font-size:.7rem; letter-spacing:.06em; background:#faf7f2; border-bottom:1px solid rgba(107,95,82,.1);
}
.prod-table td { padding:8px 12px; color:#2c2720; border-bottom:1px solid rgba(107,95,82,.05); vertical-align:middle; }
.prod-table tr:last-child td { border-bottom:none; }

/* 按鈕 */
.add-btn {
  padding:8px 16px; background:#2c2720; color:#f5f0e8;
  border:none; border-radius:8px; font-size:.8rem;
  font-family:'Noto Serif TC',serif; cursor:pointer; white-space:nowrap;
}
.action-btn {
  padding:3px 9px; border-radius:5px; font-size:.74rem;
  border:1px solid rgba(107,95,82,.25); background:none; cursor:pointer; color:#6b5f52;
  font-family:'Noto Serif TC',serif; margin-right:4px;
}
.action-btn.del { border-color:rgba(139,58,58,.25); color:#8b3a3a; }
.action-btn:hover { background:#f5f0e8; }

.active-chip { display:inline-block; padding:2px 8px; border-radius:20px; font-size:.7rem; }
.active-1 { background:#e8f4e8; color:#3d7a3d; }
.active-0 { background:#eee; color:#999; }

.msg-ok  { font-size:.8rem; color:#4a7c59; }
.msg-err { font-size:.8rem; color:#8b3a3a; }
</style>
{% endblock %}

{% block content %}
<div class="rp-layout">
  <div class="card">
    <div class="card-head">
      <span class="card-title">推薦備貨清單</span>
      <span id="msgEl"></span>
    </div>

    <!-- 新增分類 -->
    <div class="cat-add-bar">
      <div style="flex:1">
        <div class="field-label">新增分類</div>
        <input class="f-input" id="newCatName" placeholder="例：記憶體" style="max-width:200px">
      </div>
      <button class="add-btn" onclick="addCategory()">新增分類</button>
    </div>

    <!-- 分類 Tabs -->
    <div class="cat-tabs" id="catTabs">載入中…</div>

    <!-- 新增品項表單 -->
    <div class="prod-form" id="prodForm" style="display:none">
      <div class="field-label" style="margin-bottom:10px">新增品項</div>
      <div class="form-row-5">
        <div>
          <div class="field-label">品項名稱</div>
          <input class="f-input f-small" id="pName" placeholder="品名">
        </div>
        <div>
          <div class="field-label">商品編號</div>
          <input class="f-input f-small" id="pCode" placeholder="選填">
        </div>
        <div>
          <div class="field-label">建議數量</div>
          <input class="f-input f-small" id="pQty" type="number" value="1" min="1">
        </div>
        <div>
          <div class="field-label">備註說明</div>
          <input class="f-input f-small" id="pDesc" placeholder="選填">
        </div>
        <div style="padding-bottom:0">
          <button class="add-btn" onclick="addProduct()">新增</button>
        </div>
      </div>
    </div>

    <!-- 品項列表 -->
    <div id="prodListWrap" style="overflow-x:auto;display:none">
      <table class="prod-table">
        <thead>
          <tr>
            <th style="min-width:180px">品項名稱</th>
            <th>商品編號</th>
            <th style="text-align:center">建議數量</th>
            <th>備註說明</th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="prodBody">
        </tbody>
      </table>
    </div>

    <div id="noCatMsg" style="padding:24px 20px;color:#9a9188;font-size:.84rem;display:none">
      請先選擇左方分類
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let categories = [];
let selectedCatId = null;

async function loadCategories() {
  const res  = await fetch('/api/recommended-categories');
  categories = await res.json();
  renderCatTabs();
  if (categories.length) selectCat(categories[0].id);
  else {
    document.getElementById('prodForm').style.display     = 'none';
    document.getElementById('prodListWrap').style.display = 'none';
    document.getElementById('noCatMsg').style.display     = '';
  }
}

function renderCatTabs() {
  const el = document.getElementById('catTabs');
  if (!categories.length) { el.innerHTML = '<span style="color:#9a9188;font-size:.8rem">暫無分類，請新增</span>'; return; }
  el.innerHTML = categories.map(c => `
    <button class="cat-tab ${c.id===selectedCatId?'active':''}" onclick="selectCat(${c.id})">
      ${c.name}
      <span class="del-cat" onclick="event.stopPropagation();deleteCat(${c.id},'${c.name}')">✕</span>
    </button>`).join('');
}

function selectCat(id) {
  selectedCatId = id;
  renderCatTabs();
  loadProducts();
}

async function addCategory() {
  const name = document.getElementById('newCatName').value.trim();
  if (!name) { showMsg('請輸入分類名稱', false); return; }
  const res  = await fetch('/api/recommended-categories', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name })
  });
  const data = await res.json();
  if (data.success) {
    document.getElementById('newCatName').value = '';
    showMsg('分類已新增', true);
    loadCategories();
  } else showMsg(data.message||'失敗', false);
}

async function deleteCat(id, name) {
  if (!confirm(`確定刪除分類「${name}」及其所有品項？`)) return;
  const res  = await fetch(`/api/recommended-categories/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.success) { selectedCatId = null; loadCategories(); }
}

async function loadProducts() {
  if (!selectedCatId) return;
  document.getElementById('prodForm').style.display     = '';
  document.getElementById('prodListWrap').style.display = '';
  document.getElementById('noCatMsg').style.display     = 'none';

  const res  = await fetch(`/api/recommended-products?category_id=${selectedCatId}`);
  const list = await res.json();

  const tbody = document.getElementById('prodBody');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#9a9188;padding:16px">暫無品項</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(p => `
    <tr>
      <td><strong>${p.item_name}</strong></td>
      <td style="font-size:.78rem;color:#6b5f52">${p.product_code||'—'}</td>
      <td style="text-align:center">${p.quantity}</td>
      <td style="font-size:.8rem;color:#9a9188">${p.description||'—'}</td>
      <td><span class="active-chip active-${p.is_active}">${p.is_active?'顯示':'隱藏'}</span></td>
      <td style="white-space:nowrap">
        <button class="action-btn" onclick="toggleProd(${p.id},${p.is_active})">${p.is_active?'隱藏':'顯示'}</button>
        <button class="action-btn del" onclick="deleteProd(${p.id})">刪除</button>
      </td>
    </tr>`).join('');
}

async function addProduct() {
  const name = document.getElementById('pName').value.trim();
  if (!name) { showMsg('請輸入品項名稱', false); return; }
  const res  = await fetch('/api/recommended-products', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      category_id: selectedCatId,
      item_name:   name,
      product_code: document.getElementById('pCode').value.trim(),
      quantity:    parseInt(document.getElementById('pQty').value)||1,
      description: document.getElementById('pDesc').value.trim(),
    })
  });
  const data = await res.json();
  if (data.success) {
    ['pName','pCode','pDesc'].forEach(id => document.getElementById(id).value='');
    document.getElementById('pQty').value = '1';
    showMsg('品項已新增', true);
    loadProducts();
  } else showMsg(data.message||'失敗', false);
}

async function toggleProd(id, current) {
  await fetch(`/api/recommended-products/${id}`, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ is_active: current ? 0 : 1 })
  });
  loadProducts();
}

async function deleteProd(id) {
  if (!confirm('確定刪除此品項？')) return;
  const res  = await fetch(`/api/recommended-products/${id}`, { method: 'DELETE' });
  const data = await res.json();
  if (data.success) loadProducts();
}

function showMsg(msg, ok) {
  const el = document.getElementById('msgEl');
  el.textContent = msg; el.className = ok ? 'msg-ok' : 'msg-err';
  setTimeout(() => { el.textContent = ''; }, 4000);
}

onAppReady(user => { loadCategories(); });
</script>
{% endblock %}
