{% extends "base.html" %}
{% block title %}我的獎金 — COSH ERP{% endblock %}
{% block page_title %}我的獎金{% endblock %}

{% block styles %}
<style>
.bp-layout { display:flex; flex-direction:column; gap:20px; }

.card { background:#fff; border:1px solid rgba(107,95,82,.14); border-radius:16px; overflow:hidden; }
.card-head { padding:12px 20px; border-bottom:1px solid rgba(107,95,82,.08); display:flex; align-items:center; gap:12px; }
.card-title { font-size:.72rem; color:#9a9188; letter-spacing:.12em; flex:1; }

/* 日期篩選列 */
.filter-bar {
  display:flex; gap:12px; align-items:flex-end; padding:16px 20px;
  border-bottom:1px solid rgba(107,95,82,.08); flex-wrap:wrap;
}
.field-label { font-size:.74rem; color:#9a9188; letter-spacing:.04em; margin-bottom:4px; }
.f-input, .f-select {
  padding:8px 12px; border:1px solid rgba(107,95,82,.22); border-radius:8px;
  font-size:.84rem; font-family:var(--font-serif); font-weight:300;
  color:#2c2720; background:#f5f0e8; outline:none;
}
.f-input:focus { border-color:#6b5f52; }
.f-select:focus { border-color:#6b5f52; }
/* 開始日期(奇)暖米色，結束日期(偶)維持淺色 */
#fStart { background: #f5f0e8; }

/* 快速月份按鈕 */
.month-pills { display:flex; gap:6px; flex-wrap:wrap; }
.month-pill {
  padding:5px 12px; border-radius:20px; font-size:.76rem; cursor:pointer;
  border:1px solid rgba(107,95,82,.2); color:#6b5f52; background:none;
  font-family:var(--font-serif);
}
.month-pill.active { background:#2c2720; color:#f5f0e8; border-color:#2c2720; }

.query-btn {
  padding:9px 20px; background:#2c2720; color:#f5f0e8;
  border:none; border-radius:8px; font-size:.82rem;
  font-family:var(--font-serif); cursor:pointer;
}
.query-btn:disabled { opacity:.5; }

/* 總計橫幅 */
.total-banner {
  margin:16px 20px 0; background:#faf7f2; border-radius:12px;
  padding:18px 24px; display:flex; gap:32px; flex-wrap:wrap;
}
.total-item .n {
  font-family:var(--font-en); font-size:2.2rem;
  font-weight:300; color:#2c2720; letter-spacing:.04em;
}
.total-item .l { font-size:.72rem; color:#9a9188; text-transform:uppercase; letter-spacing:.08em; margin-top:4px; }

/* 月份分組 */
.month-group { padding:0 20px 16px; }
.month-group-title {
  font-size:.78rem; color:#9a9188; letter-spacing:.08em;
  padding:10px 0 6px; border-bottom:1px solid rgba(107,95,82,.08);
  margin-bottom:8px;
}
.month-total {
  float:right; font-size:.84rem; color:#2c2720;
}

/* 明細表格 */
.detail-table { width:100%; border-collapse:collapse; font-size:.83rem; }
.detail-table th {
  text-align:left; padding:8px 10px; font-weight:300; color:#9a9188;
  font-size:.7rem; letter-spacing:.06em; background:#faf7f2;
  border-bottom:1px solid rgba(107,95,82,.1);
}
.detail-table td {
  padding:8px 10px; color:#2c2720;
  border-bottom:1px solid rgba(107,95,82,.05);
}
.detail-table tr:last-child td { border-bottom:none; }
.amount-col { text-align:right; }

.msg-ok  { font-size:.8rem; color:#4a7c59; }
.msg-err { font-size:.8rem; color:#8b3a3a; }
.empty-msg { text-align:center; color:#9a9188; padding:32px; font-size:.84rem; }
</style>
{% endblock %}

{% block content %}
<div class="bp-layout">

  <!-- 篩選卡 -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">個人獎金查詢</span>
      <span id="msgEl"></span>
    </div>
    <div class="filter-bar">
      <div>
        <div class="field-label">開始日期</div>
        <input class="f-input" type="date" id="fStart">
      </div>
      <div>
        <div class="field-label">結束日期</div>
        <input class="f-input" type="date" id="fEnd">
      </div>
      <div>
        <div class="field-label">快速選擇</div>
        <div class="month-pills" id="monthPills"></div>
      </div>
      <button class="query-btn" id="queryBtn" onclick="query()">查詢</button>
    </div>
  </div>

  <!-- 結果卡 -->
  <div class="card" id="resultCard" style="display:none">
    <div class="card-head">
      <span class="card-title" id="resultTitle">查詢結果</span>
    </div>

    <!-- 總計 -->
    <div class="total-banner" id="totalBanner"></div>

    <!-- 明細（按月分組） -->
    <div id="detailEl" style="margin-top:8px"></div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
let _user = null;

// ── 月份快速按鈕 ─────────────────────────────
function initMonthPills() {
  const now  = new Date();
  const pills = document.getElementById('monthPills');
  for (let i = 0; i < 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const lastDay = new Date(y, d.getMonth() + 1, 0).getDate();
    const btn = document.createElement('button');
    btn.className = 'month-pill' + (i === 0 ? ' active' : '');
    btn.textContent = `${y}/${m}`;
    btn.dataset.start = `${y}-${m}-01`;
    btn.dataset.end   = `${y}-${m}-${lastDay}`;
    btn.onclick = () => {
      document.querySelectorAll('.month-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('fStart').value = btn.dataset.start;
      document.getElementById('fEnd').value   = btn.dataset.end;
      query();
    };
    pills.appendChild(btn);
  }
  // 預設本月
  const firstPill = pills.querySelector('.month-pill');
  if (firstPill) {
    document.getElementById('fStart').value = firstPill.dataset.start;
    document.getElementById('fEnd').value   = firstPill.dataset.end;
  }
}

// ── 查詢 ──────────────────────────────────────
async function query() {
  if (!_user) return;
  const start = document.getElementById('fStart').value;
  const end   = document.getElementById('fEnd').value;
  if (!start || !end) { showMsg('請選擇日期範圍', false); return; }

  const btn = document.getElementById('queryBtn');
  btn.disabled = true;

  const params = new URLSearchParams({
    salesperson: _user.name,
    date_start: start,
    date_end: end
  });

  const res  = await fetch(`/api/bonus-personal?${params}`);
  const data = await res.json();
  btn.disabled = false;

  if (!data.success) { showMsg(data.message || '查詢失敗', false); return; }

  renderResult(data, start, end);
}

function renderResult(data, start, end) {
  document.getElementById('resultTitle').textContent =
    `${start} ～ ${end}`;
  document.getElementById('resultCard').style.display = '';

  // 總計橫幅
  document.getElementById('totalBanner').innerHTML = `
    <div class="total-item">
      <div class="n">${(data.total_bonus || 0).toLocaleString()}</div>
      <div class="l">總獎金（元）</div>
    </div>
    <div class="total-item">
      <div class="n">${data.count}</div>
      <div class="l">獎勵筆數</div>
    </div>
  `;

  if (!data.rows.length) {
    document.getElementById('detailEl').innerHTML =
      '<div class="empty-msg">此期間無獎金記錄</div>';
    return;
  }

  // 按月份分組
  const groups = {};
  data.rows.forEach(r => {
    const month = (r.sale_date || '').slice(0, 7);
    if (!groups[month]) groups[month] = [];
    groups[month].push(r);
  });

  const months = Object.keys(groups).sort().reverse();
  const html = months.map(month => {
    const items = groups[month];
    const monthTotal = items.reduce((s, r) => s + (r.bonus_amount || 0), 0);
    const rows = items.map(r => `
      <tr>
        <td style="font-size:.78rem;color:#6b5f52">${r.sale_date || '—'}</td>
        <td>${r.rule_name || '—'}</td>
        <td>
          <div style="font-size:.84rem">${r.product_name || '—'}</div>
          <div style="font-size:.72rem;color:#9a9188">${r.product_code || ''}</div>
        </td>
        <td class="amount-col">${r.sales_quantity || 0} 件</td>
        <td class="amount-col">${(r.sales_amount || 0).toLocaleString()}</td>
        <td class="amount-col"><strong>${(r.bonus_amount || 0).toLocaleString()}</strong></td>
        <td style="font-size:.72rem;color:#9a9188;max-width:120px;word-break:break-all">
          ${r.invoice_no || '—'}
        </td>
      </tr>`).join('');

    return `
      <div class="month-group">
        <div class="month-group-title">
          ${month}
          <span class="month-total">${monthTotal.toLocaleString()} 元</span>
        </div>
        <div style="overflow-x:auto">
          <table class="detail-table">
            <thead>
              <tr>
                <th>銷售日期</th>
                <th>規則名稱</th>
                <th>商品</th>
                <th style="text-align:right">銷售件數</th>
                <th style="text-align:right">銷售金額</th>
                <th style="text-align:right">獎金</th>
                <th>發票號碼</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');

  document.getElementById('detailEl').innerHTML = html;
}

function showMsg(msg, ok) {
  const el = document.getElementById('msgEl');
  el.textContent = msg; el.className = ok ? 'msg-ok' : 'msg-err';
  setTimeout(() => { el.textContent = ''; }, 4000);
}

function onAppReady(user) {
  _user = user;
  initMonthPills();
  query();
}
</script>
{% endblock %}
