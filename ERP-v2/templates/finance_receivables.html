{% extends "base.html" %}
{% block title %}應收帳款 — COSH ERP{% endblock %}
{% block page_title %}應收帳款{% endblock %}

{% block styles %}
<style>
.controls { display:flex; gap:.8rem; align-items:center; margin-bottom:1.2rem; flex-wrap:wrap; }
.controls select, .controls input { padding:.4rem .6rem; border:1px solid var(--border); border-radius:4px; font-size:.88rem; }
.btn-sm { padding:.4rem .8rem; border:1px solid var(--border); border-radius:4px; background:var(--bg-card); cursor:pointer; font-size:.82rem; }
.btn-sm:hover { background:#eee; }
.btn-primary-sm { padding:.4rem .8rem; border:none; border-radius:4px; background:#2c2720; color:#fff; cursor:pointer; font-size:.82rem; }
.btn-primary-sm:hover { background:#444; }
.data-table { width:100%; border-collapse:collapse; font-size:.88rem; }
.data-table th, .data-table td { padding:.55rem .6rem; border-bottom:1px solid var(--border); text-align:left; }
.data-table th { font-weight:400; color:#888; font-size:.8rem; }
.status-paid { color:#27ae60; }
.status-unpaid { color:#c0392b; }
.overdue { background:#fff5f5; }
.summary-bar { display:flex; gap:1.5rem; margin-bottom:1.5rem; flex-wrap:wrap; }
.summary-item { font-size:.88rem; }
.summary-item span { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:300; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:999; justify-content:center; align-items:center; }
.modal-overlay.show { display:flex; }
.modal-box { background:#fff; border-radius:8px; padding:1.5rem; width:90%; max-width:420px; }
.modal-box h3 { margin:0 0 1rem; font-size:1rem; font-weight:400; }
.modal-box .field { margin-bottom:.8rem; }
.modal-box .field label { display:block; font-size:.82rem; color:#666; margin-bottom:.3rem; }
.modal-box .field input { width:100%; padding:.45rem .6rem; border:1px solid var(--border); border-radius:4px; font-size:.9rem; box-sizing:border-box; }
.modal-actions { display:flex; gap:.6rem; justify-content:flex-end; margin-top:1rem; }
.empty-msg { text-align:center; color:#999; padding:2rem; }

/* 頁籤 */
.tab-bar { display:flex; gap:0; margin-bottom:1.2rem; border-bottom:2px solid rgba(107,95,82,.12); }
.tab-btn {
  padding:.55rem 1.2rem; border:none; background:none; cursor:pointer;
  font-size:.88rem; font-family:'Noto Serif TC',serif; font-weight:300;
  color:#9a9188; border-bottom:2px solid transparent; margin-bottom:-2px;
}
.tab-btn.active { color:#2c2720; border-bottom-color:#FABF13; font-weight:400; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* 整批沖帳卡片 */
.batch-card {
  background:#fff; border:1px solid rgba(107,95,82,.14); border-radius:10px;
  padding:14px 18px; margin-bottom:12px;
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;
}
.batch-card.overdue { border-left:3px solid #c0392b; }
.batch-info { flex:1; min-width:200px; }
.batch-customer { font-weight:500; font-size:.92rem; color:#2c2720; }
.batch-meta { font-size:.8rem; color:#9a9188; margin-top:3px; }
.batch-amount { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:300; color:#2c2720; white-space:nowrap; }
.btn-batch-confirm {
  padding:6px 16px; border:none; border-radius:6px;
  background:#2c2720; color:#f5f0e8; font-size:.82rem; cursor:pointer;
  font-family:'Noto Serif TC',serif; white-space:nowrap;
}
.btn-batch-confirm:hover { background:#444; }
.batch-paid-label { font-size:.82rem; color:#27ae60; }
</style>
{% endblock %}

{% block content %}
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('summary')">月結摘要</button>
  <button class="tab-btn" onclick="switchTab('detail')">逐筆明細</button>
</div>

<!-- ═══ 月結摘要頁籤 ═══ -->
<div class="tab-panel active" id="panel-summary">
  <div class="controls">
    <select id="summaryStatus" onchange="loadSummary()">
      <option value="unpaid" selected>未收款</option><option value="paid">已收款</option><option value="">全部</option>
    </select>
  </div>
  <div class="summary-bar" id="summaryBarS"></div>
  <div id="summaryList"><div class="empty-msg">載入中…</div></div>
</div>

<!-- ═══ 逐筆明細頁籤 ═══ -->
<div class="tab-panel" id="panel-detail">
  <div class="controls">
    <select id="filterStatus" onchange="loadData()">
      <option value="">全部狀態</option><option value="unpaid" selected>未收款</option><option value="paid">已收款</option>
    </select>
    <button class="btn-primary-sm" onclick="openAdd()">+ 新增應收</button>
  </div>
  <div class="summary-bar" id="summaryBar"></div>
  <table class="data-table">
    <thead><tr><th>客戶</th><th>發票/單號</th><th>金額</th><th>到期日</th><th>帳期</th><th>狀態</th><th>操作</th></tr></thead>
    <tbody id="dataBody"><tr><td colspan="7" class="empty-msg">載入中…</td></tr></tbody>
  </table>
</div>

<!-- 新增 Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <h3>新增應收帳款</h3>
    <div class="field"><label>客戶名稱 *</label><input id="addCustomer"></div>
    <div class="field"><label>客戶編號</label><input id="addCustId"></div>
    <div class="field"><label>發票/單號</label><input id="addInvoice"></div>
    <div class="field"><label>金額 *</label><input type="number" id="addAmount" min="1"></div>
    <div class="field"><label>到期日</label><input type="date" id="addDue"></div>
    <div class="field"><label>備註</label><input id="addNote"></div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeAdd()">取消</button>
      <button class="btn-primary-sm" onclick="submitAdd()">新增</button>
    </div>
  </div>
</div>

<script>
function onAppReady(user) {
  if (!['老闆','會計'].includes(user.title)) { window.location.href = '/'; return; }
  loadSummary();
}

/* ── 頁籤切換 ── */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'summary' && i === 0) || (tab === 'detail' && i === 1));
  });
  document.getElementById('panel-summary').classList.toggle('active', tab === 'summary');
  document.getElementById('panel-detail').classList.toggle('active', tab === 'detail');
  if (tab === 'summary') loadSummary();
  else loadData();
}

/* ══════════════════════════════════════
   月結摘要（按客戶 × 帳期彙總）
   ══════════════════════════════════════ */
async function loadSummary() {
  const status = document.getElementById('summaryStatus').value;
  const params = new URLSearchParams();
  if (status) params.set('status', status);
  const res = await fetch('/api/finance/receivables/summary?' + params);
  const j = await res.json();
  const list = document.getElementById('summaryList');
  if (!j.success || !j.data.length) {
    list.innerHTML = '<div class="empty-msg">尚無月結帳款</div>';
    document.getElementById('summaryBarS').innerHTML = '';
    return;
  }

  const today = new Date().toISOString().slice(0, 10);
  let totalUnpaid = 0, totalPaid = 0, groups = 0;
  j.data.forEach(r => {
    if (r.due_date && r.total_amount) {
      // note format: "帳期 2026-04"
      groups++;
      totalUnpaid += r.total_amount;
    }
  });

  // 統計
  let unpaidSum = 0, paidSum = 0;
  j.data.forEach(r => { unpaidSum += r.total_amount || 0; });
  document.getElementById('summaryBarS').innerHTML = `
    <div class="summary-item">共 <span>${j.data.length}</span> 組</div>
    <div class="summary-item">合計 <span style="color:${status === 'paid' ? '#27ae60' : '#c0392b'}">$${Math.round(unpaidSum).toLocaleString()}</span></div>
  `;

  list.innerHTML = j.data.map(r => {
    const overdue = status !== 'paid' && r.due_date && r.due_date < today;
    const period = (r.note || '').replace('帳期 ', '');
    const isPaid = status === 'paid';
    return `<div class="batch-card${overdue ? ' overdue' : ''}">
      <div class="batch-info">
        <div class="batch-customer">${esc(r.customer_name)}</div>
        <div class="batch-meta">帳期 ${esc(period)} · ${r.invoice_count} 張發票 · 到期 ${r.due_date || '—'}${overdue ? ' ⚠️ 已逾期' : ''}</div>
      </div>
      <div class="batch-amount">$${Math.round(r.total_amount).toLocaleString()}</div>
      ${isPaid
        ? '<div class="batch-paid-label">已收款</div>'
        : `<button class="btn-batch-confirm" onclick="batchConfirm('${esc(r.customer_id)}','${esc(period)}','${esc(r.customer_name)}',${Math.round(r.total_amount)})">整批沖帳</button>`
      }
    </div>`;
  }).join('');
}

async function batchConfirm(customerId, period, customerName, amount) {
  if (!confirm(`確認沖帳？\n\n客戶：${customerName}\n帳期：${period}\n金額：$${amount.toLocaleString()}\n\n將一次沖銷該客戶此帳期所有未收款項。`)) return;
  const res = await fetch('/api/finance/receivables/batch-confirm', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ customer_id: customerId, billing_period: period })
  });
  const j = await res.json();
  if (!j.success) { alert(j.message || '沖帳失敗'); return; }
  alert(`已沖銷 ${j.data.updated} 筆應收帳款`);
  loadSummary();
}

/* ══════════════════════════════════════
   逐筆明細（原有功能）
   ══════════════════════════════════════ */
async function loadData() {
  const status = document.getElementById('filterStatus').value;
  const params = new URLSearchParams();
  if (status) params.set('status', status);
  const res = await fetch('/api/finance/receivables?' + params);
  const j = await res.json();
  const body = document.getElementById('dataBody');
  if (!j.success || !j.data.length) { body.innerHTML = '<tr><td colspan="7" class="empty-msg">尚無資料</td></tr>'; document.getElementById('summaryBar').innerHTML=''; return; }

  const today = new Date().toISOString().slice(0,10);
  let totalUnpaid = 0, totalPaid = 0;
  j.data.forEach(r => { if (r.status === 'unpaid') totalUnpaid += r.amount; else totalPaid += r.amount; });

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-item">未收款 <span style="color:#c0392b">$${Math.round(totalUnpaid).toLocaleString()}</span></div>
    <div class="summary-item">已收款 <span style="color:#27ae60">$${Math.round(totalPaid).toLocaleString()}</span></div>
    <div class="summary-item">共 <span>${j.data.length}</span> 筆</div>
  `;

  body.innerHTML = j.data.map(r => {
    const overdue = r.status === 'unpaid' && r.due_date && r.due_date < today;
    return `<tr class="${overdue ? 'overdue' : ''}">
      <td>${esc(r.customer_name)}</td>
      <td>${esc(r.invoice_no || '')}</td>
      <td>$${Math.round(r.amount).toLocaleString()}</td>
      <td>${r.due_date || ''}${overdue ? ' ⚠️' : ''}</td>
      <td>${esc(r.note || '')}</td>
      <td class="status-${r.status}">${r.status === 'paid' ? '已收款' : '未收款'}</td>
      <td>${r.status === 'unpaid' ? `<button class="btn-sm" onclick="confirmPaid(${r.id})">標記已收</button>` : (r.paid_at||'').slice(0,10)}</td>
    </tr>`;
  }).join('');
}

async function confirmPaid(id) {
  if (!confirm('確認標記此筆為已收款？')) return;
  const res = await fetch('/api/finance/receivables/confirm', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id})
  });
  const j = await res.json();
  if (!j.success) { alert(j.message); return; }
  loadData();
}

function openAdd() { document.getElementById('addModal').classList.add('show'); }
function closeAdd() { document.getElementById('addModal').classList.remove('show'); }
async function submitAdd() {
  const data = {
    customer_name: document.getElementById('addCustomer').value.trim(),
    customer_id: document.getElementById('addCustId').value.trim(),
    invoice_no: document.getElementById('addInvoice').value.trim(),
    amount: parseFloat(document.getElementById('addAmount').value),
    due_date: document.getElementById('addDue').value,
    note: document.getElementById('addNote').value.trim(),
  };
  if (!data.customer_name || !data.amount) { alert('客戶名稱和金額為必填'); return; }
  const res = await fetch('/api/finance/receivables', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)
  });
  const j = await res.json();
  if (!j.success) { alert(j.message); return; }
  closeAdd(); loadData();
  ['addCustomer','addCustId','addInvoice','addAmount','addDue','addNote'].forEach(id => document.getElementById(id).value = '');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>
{% endblock %}
