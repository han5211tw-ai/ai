{% extends "base.html" %}
{% block title %}業績目標管理 — COSH ERP{% endblock %}
{% block page_title %}業績目標管理{% endblock %}

{% block styles %}
<style>
.ti-layout { display: flex; flex-direction: column; gap: 20px; }

/* ── 控制列 ── */
.ctrl-bar {
  background: #fff;
  border: 1px solid rgba(107,95,82,.14);
  border-radius: 14px; padding: 14px 20px;
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.ctrl-label { font-size: .78rem; color: #9a9188; letter-spacing: .04em; }
.ctl-sel {
  padding: 7px 12px; border: 1px solid rgba(107,95,82,.22); border-radius: 8px;
  font-size: .82rem; font-family: 'Noto Serif TC', serif; font-weight: 300;
  color: #2c2720; background: #f5f0e8;
}
.save-btn {
  padding: 9px 22px; background: #2c2720; color: #f5f0e8;
  border: none; border-radius: 8px; font-size: .82rem;
  font-family: 'Noto Serif TC', serif; letter-spacing: .06em; cursor: pointer;
  margin-left: auto;
}
.save-btn:disabled { opacity: .5; cursor: default; }
.msg-ok  { font-size: .82rem; color: #4a7c59; }
.msg-err { font-size: .82rem; color: #8b3a3a; }

/* ── 卡片 ── */
.card {
  background: #fff;
  border: 1px solid rgba(107,95,82,.14);
  border-radius: 16px; overflow: hidden;
}
.card-head {
  padding: 12px 20px; border-bottom: 1px solid rgba(107,95,82,.08);
  display: flex; justify-content: space-between; align-items: center;
}
.card-title { font-size: .72rem; color: #9a9188; letter-spacing: .12em; text-transform: uppercase; }

/* ── 目標表格 ── */
.target-table-wrap { overflow-x: auto; }
.target-table { width: 100%; border-collapse: collapse; }
.target-table th {
  padding: 10px 14px; font-size: .72rem; font-weight: 300; color: #9a9188;
  letter-spacing: .06em; border-bottom: 1px solid rgba(107,95,82,.1);
  background: #faf7f2; text-align: left;
}
.target-table td {
  padding: 8px 14px; color: #2c2720;
  border-bottom: 1px solid rgba(107,95,82,.05);
  vertical-align: middle;
}
.target-table tr:last-child td { border-bottom: none; }
.subject-name { font-size: .88rem; color: #2c2720; }
.subject-cat  { font-size: .72rem; color: #9a9188; margin-top: 2px; }

/* 目標輸入 */
.target-input {
  width: 140px; padding: 7px 10px;
  border: 1px solid rgba(107,95,82,.22); border-radius: 8px;
  font-size: .86rem; font-family: 'Noto Serif TC', serif; font-weight: 300;
  color: #2c2720; background: #f5f0e8; text-align: right;
}
.target-input:focus { outline: none; border-color: #6b5f52; }

/* 群組標題列 */
.group-row td {
  padding: 8px 14px 4px;
  font-size: .7rem; color: #9a9188; letter-spacing: .1em;
  background: #faf7f2; font-weight: 300;
  border-bottom: 1px solid rgba(107,95,82,.06);
}
</style>
{% endblock %}

{% block content %}
<div class="ti-layout">

  <!-- 控制列 -->
  <div class="ctrl-bar">
    <span class="ctrl-label">月份</span>
    <select class="ctl-sel" id="yearSel"></select>
    <select class="ctl-sel" id="monthSel"></select>
    <span id="msgEl"></span>
    <button class="save-btn" id="saveBtn" onclick="saveTargets()">儲存目標</button>
  </div>

  <!-- 門市部 -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">門市部目標</span>
    </div>
    <div class="target-table-wrap"><table class="target-table">
      <thead>
        <tr>
          <th style="width:50%">對象</th>
          <th>月度目標（元）</th>
        </tr>
      </thead>
      <tbody id="storeBody"></tbody>
    </table></div>
  </div>

  <!-- 業務部 -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">業務部目標</span>
    </div>
    <div class="target-table-wrap"><table class="target-table">
      <thead>
        <tr>
          <th style="width:50%">對象</th>
          <th>月度目標（元）</th>
        </tr>
      </thead>
      <tbody id="bizBody"></tbody>
    </table></div>
  </div>

  <!-- 部門 + 公司 -->
  <div class="card">
    <div class="card-head">
      <span class="card-title">部門 / 公司目標</span>
    </div>
    <div class="target-table-wrap"><table class="target-table">
      <thead>
        <tr>
          <th style="width:50%">對象</th>
          <th>月度目標（元）</th>
        </tr>
      </thead>
      <tbody id="deptBody"></tbody>
    </table></div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
// 所有需要設定目標的對象
const STORE_STAFF   = ['林榮祺', '林峙文', '劉育仕', '林煜捷', '張永承', '張家碩'];
const BIZ_STAFF     = ['鄭宇晉', '梁仁佑'];
const STORES        = ['豐原', '潭子', '大雅'];
const DEPARTMENTS   = ['門市部', '業務部'];

const now = new Date();
let tYear  = now.getFullYear();
let tMonth = now.getMonth() + 1;

// 存放所有輸入欄位的 map: key = `${category}__${subject_name}`
const inputMap = {};

/* ── 選擇器 ── */
function initSelectors() {
  const yS = document.getElementById('yearSel');
  const mS = document.getElementById('monthSel');
  for (let y = now.getFullYear() + 1; y >= 2024; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + '年';
    if (y === tYear) o.selected = true;
    yS.appendChild(o);
  }
  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option');
    o.value = m; o.textContent = m + '月';
    if (m === tMonth) o.selected = true;
    mS.appendChild(o);
  }
  yS.addEventListener('change', () => { tYear = +yS.value; load(); });
  mS.addEventListener('change', () => { tMonth = +mS.value; load(); });
}

/* ── 建立表格 ── */
function buildTables() {
  // 門市部：門市個人 + 門市
  let storeHtml = '';
  storeHtml += `<tr class="group-row"><td colspan="2">門市人員</td></tr>`;
  STORE_STAFF.forEach(name => {
    storeHtml += rowHtml('個人', name);
  });
  storeHtml += `<tr class="group-row"><td colspan="2">各門市</td></tr>`;
  STORES.forEach(s => {
    storeHtml += rowHtml('門市', s);
  });
  document.getElementById('storeBody').innerHTML = storeHtml;

  // 業務部
  let bizHtml = '';
  bizHtml += `<tr class="group-row"><td colspan="2">業務人員</td></tr>`;
  BIZ_STAFF.forEach(name => {
    bizHtml += rowHtml('個人', name);
  });
  document.getElementById('bizBody').innerHTML = bizHtml;

  // 部門 + 公司
  let deptHtml = '';
  deptHtml += `<tr class="group-row"><td colspan="2">部門</td></tr>`;
  DEPARTMENTS.forEach(d => {
    deptHtml += rowHtml('部門', d);
  });
  deptHtml += `<tr class="group-row"><td colspan="2">公司</td></tr>`;
  deptHtml += rowHtml('公司', '公司');
  document.getElementById('deptBody').innerHTML = deptHtml;

  // 建立 inputMap
  Object.keys(inputMap).length && Object.keys(inputMap).forEach(k => delete inputMap[k]);
  document.querySelectorAll('.target-input').forEach(el => {
    inputMap[el.dataset.key] = el;
  });
}

function rowHtml(category, name) {
  const key = `${category}__${name}`;
  const catLabel = { '個人': '個人', '門市': '門市', '部門': '部門', '公司': '公司' }[category];
  return `
    <tr>
      <td>
        <div class="subject-name">${name}</div>
        <div class="subject-cat">${catLabel}</div>
      </td>
      <td>
        <input class="target-input" type="number" min="0" step="1000"
               data-key="${key}" data-category="${category}" data-name="${name}"
               placeholder="0">
      </td>
    </tr>`;
}

/* ── 載入已有目標 ── */
async function load() {
  const res  = await fetch(`/api/targets?year=${tYear}&month=${tMonth}`);
  const data = await res.json();
  if (!data.success) return;

  // 先清空所有輸入
  Object.values(inputMap).forEach(el => { el.value = ''; });

  // 填入現有值
  (data.targets || []).forEach(t => {
    const key = `${t.category}__${t.subject_name}`;
    if (inputMap[key] && t.target_amount) {
      inputMap[key].value = t.target_amount;
    }
  });
}

/* ── 儲存 ── */
async function saveTargets() {
  const targets = [];
  document.querySelectorAll('.target-input').forEach(el => {
    const val = parseFloat(el.value);
    if (!isNaN(val) && val >= 0) {
      targets.push({
        category:    el.dataset.category,
        subject_name: el.dataset.name,
        target_amount: val,
        year:  tYear,
        month: tMonth,
      });
    }
  });

  if (!targets.length) {
    showMsg('請至少填寫一個目標金額', false); return;
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  const res  = await fetch('/api/targets/save', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ targets })
  });
  const data = await res.json();
  btn.disabled = false;

  if (data.success) {
    showMsg(`已儲存 ${data.saved} 筆目標`, true);
    load();
  } else {
    showMsg(data.message || '儲存失敗', false);
  }
}

function showMsg(msg, ok) {
  const el = document.getElementById('msgEl');
  el.textContent = msg;
  el.className = ok ? 'msg-ok' : 'msg-err';
  setTimeout(() => { el.textContent = ''; }, 4000);
}

initSelectors();
buildTables();
function onAppReady(user) { load(); }
</script>
{% endblock %}
