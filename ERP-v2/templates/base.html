<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>{% block title %}COSH ERP{% endblock %}</title>

  <!-- Google Fonts（連外網失敗時 fallback 到系統字體） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}?v=20260404">
  {% block styles %}{% endblock %}
</head>
<body>

<!-- ═══════════════════════════════════════════
     登入遮罩（驗證未通過時覆蓋整個頁面）
     ═══════════════════════════════════════════ -->
<div id="loginOverlay" class="login-overlay" style="display:none">
  <div class="login-card">
    <div class="login-brand">
      <span class="login-brand-en">COSH</span>
      <span class="login-brand-sub">內部營運系統</span>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="loginPassword" placeholder="請輸入個人密碼" autocomplete="current-password" required autofocus>
      </div>
      <div id="loginError" class="login-error" style="display:none"></div>
      <button type="submit" class="btn-primary btn-full" id="loginBtn">登入</button>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     App Shell
     ═══════════════════════════════════════════ -->
<div class="app-shell" id="appShell" style="display:none">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">

    <!-- Logo -->
    <div class="sidebar-header">
      <a href="/" class="logo">
        <span class="logo-en">COSH</span>
        <span class="logo-label">ERP</span>
      </a>
    </div>

    <!-- 使用者資訊 -->
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="sidebarUserName">—</div>
      <div class="sidebar-user-role" id="sidebarUserRole">—</div>
      <div class="sidebar-user-actions">
        <a href="/" class="sidebar-action-btn">首頁</a>
        <button onclick="logout()" class="sidebar-action-btn sidebar-action-logout">登出</button>
      </div>
    </div>

    <!-- 導航 -->
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- JS 動態生成 -->
    </nav>
  </aside>

  <!-- 手機版遮罩 -->
  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

  <!-- ── Main ── -->
  <main class="main-content">
    <header class="top-bar">
      <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">☰</button>
      <h1 class="page-title">{% block page_title %}首頁{% endblock %}</h1>
      {% block top_bar_extra %}{% endblock %}
    </header>

    <div class="content-area" id="contentArea">
      {% block content %}{% endblock %}
    </div>
  </main>
</div><!-- /.app-shell -->

<!-- ═══════════════════════════════════════════
     手機版底部導覽列
     ═══════════════════════════════════════════ -->
<div class="bottom-nav" id="bottomNav">

<!-- ═══════════════════════════════════════════
     認證與選單邏輯
     ═══════════════════════════════════════════ -->
<script>
// ── 認證 ──────────────────────────────────────
const AUTH_KEY  = 'erp_v2_user';
const AUTH_EXP  = 'erp_v2_exp';

function getUser() {
  try {
    const raw = localStorage.getItem(AUTH_KEY);
    if (!raw) return null;
    const exp = localStorage.getItem(AUTH_EXP);
    if (exp && Date.now() > parseInt(exp)) {
      localStorage.removeItem(AUTH_KEY);
      localStorage.removeItem(AUTH_EXP);
      return null;
    }
    return JSON.parse(raw);
  } catch { return null; }
}

function saveUser(user) {
  // 每天 21:00 過期
  const now   = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 21, 0, 0);
  const exp   = today <= now ? today.getTime() + 86400000 : today.getTime();
  localStorage.setItem(AUTH_KEY, JSON.stringify(user));
  localStorage.setItem(AUTH_EXP, exp.toString());
}

function logout() {
  localStorage.removeItem(AUTH_KEY);
  localStorage.removeItem(AUTH_EXP);
  location.reload();
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '登入中…';

  const password = document.getElementById('loginPassword').value.trim();

  try {
    const res  = await fetch('/api/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const data = await res.json();
    if (data.success) {
      saveUser(data.user);
      initApp(data.user);
    } else {
      errEl.textContent = data.message || '登入失敗';
      errEl.style.display = 'block';
    }
  } catch {
    errEl.textContent = '連線失敗，請重試';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '登入';
  }
}

// ── 選單渲染 ─────────────────────────────────
function hasRole(roles, userRole) {
  if (!userRole) return false;
  if (userRole === '老闆' || userRole === '會計') return true;
  return roles.includes(userRole);
}

function currentPath() {
  return location.pathname.replace(/\.html$/, '');
}

function renderMenu(userRole) {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';

  // 獨立項目
  MENU_STANDALONE.forEach(item => {
    if (!hasRole(item.roles, userRole)) return;
    const a = document.createElement('a');
    a.href = item.route;
    a.className = 'nav-standalone' + (currentPath() === item.route ? ' active' : '');
    a.innerHTML = `<span class="nav-icon">${item.icon}</span><span>${item.label}</span>`;
    nav.appendChild(a);
  });

  // 群組
  MENU_GROUPS.forEach(group => {
    const visible = group.items.filter(i => hasRole(i.roles, userRole));
    if (visible.length === 0) return;

    const isGroupActive = visible.some(i => currentPath() === i.route);

    const div = document.createElement('div');
    div.className = 'nav-group' + (isGroupActive ? ' expanded' : '');
    div.innerHTML = `
      <div class="nav-group-header" onclick="toggleGroup(this)">
        <span class="nav-group-title">${group.title}</span>
        <span class="nav-group-arrow">›</span>
      </div>
      <div class="nav-group-items"></div>
    `;
    const itemsEl = div.querySelector('.nav-group-items');
    visible.forEach(item => {
      const a = document.createElement('a');
      a.href = item.route;
      a.className = 'nav-item' + (currentPath() === item.route ? ' active' : '');
      a.innerHTML = `<span class="nav-item-dot">${item.icon}</span><span>${item.label}</span>`;
      itemsEl.appendChild(a);
    });
    nav.appendChild(div);
  });
}

function toggleGroup(header) {
  header.closest('.nav-group').classList.toggle('expanded');
}

// ── 初始化 ───────────────────────────────────
// ── 底部導覽列（手機版）──────────────────────
const _BNAV_ROUTES = {
  home:      ['/', '/index'],
  needs:     ['/needs_input'],
  inventory: ['/inventory_query'],
  pending:   ['/pending_needs'],
};

function _highlightBottomNav() {
  const path = currentPath();
  document.querySelectorAll('.bnav-item').forEach(el => {
    const key = el.dataset.bnav;
    if (!key || key === 'more') return;
    const routes = _BNAV_ROUTES[key] || [];
    el.classList.toggle('active', routes.includes(path));
  });
}

function toggleMorePanel() {
  const overlay = document.getElementById('moreOverlay');
  overlay.classList.toggle('open');
}

function closeMorePanel(e) {
  if (e.target === document.getElementById('moreOverlay')) {
    document.getElementById('moreOverlay').classList.remove('open');
  }
}

// 已完成手機版優化的路由（不含底部導覽列已有的首頁/需求/庫存/班表）
const _MOBILE_ROUTES = new Set([
  '/roster',
  '/inventory_count',
  '/service_record',
  '/supervision_score',
  '/pending_purchase',
  '/pending_transfer',
]);

function renderMoreMenu(userRole) {
  const container = document.getElementById('moreMenuContent');
  if (!container) return;
  const path = currentPath();
  const isMobile = window.innerWidth < 768;
  let html = '';

  const standaloneVisible = MENU_STANDALONE.filter(i => {
    if (!hasRole(i.roles, userRole)) return false;
    if (isMobile && !_MOBILE_ROUTES.has(i.route)) return false;
    return true;
  });
  if (standaloneVisible.length) {
    standaloneVisible.forEach(item => {
      const act = path === item.route ? ' active' : '';
      html += `<a class="more-link${act}" href="${item.route}">
        <span class="more-dot"></span>${item.label}</a>`;
    });
  }

  MENU_GROUPS.forEach(group => {
    const visible = group.items.filter(i => {
      if (!hasRole(i.roles, userRole)) return false;
      if (isMobile && !_MOBILE_ROUTES.has(i.route)) return false;
      return true;
    });
    if (!visible.length) return;
    if (isMobile) {
      // 手機版不分群組，直接列出
      visible.forEach(item => {
        const act = path === item.route ? ' active' : '';
        html += `<a class="more-link${act}" href="${item.route}">
          <span class="more-dot"></span>${item.label}</a>`;
      });
    } else {
      html += `<div class="more-group-title">${group.title}</div>`;
      visible.forEach(item => {
        const act = path === item.route ? ' active' : '';
        html += `<a class="more-link${act}" href="${item.route}">
          <span class="more-dot"></span>${item.label}</a>`;
      });
    }
  });

  container.innerHTML = html;
}

function _initBottomNav(user) {
  const nameEl = document.getElementById('moreUserName');
  const roleEl = document.getElementById('moreUserRole');
  if (nameEl) nameEl.textContent = user.name;
  if (roleEl) roleEl.textContent = user.title;
  renderMoreMenu(user.title);
  _highlightBottomNav();
}

function initApp(user) {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';

  document.getElementById('sidebarUserName').textContent = user.name;
  document.getElementById('sidebarUserRole').textContent = user.title;

  renderMenu(user.title);
  _initBottomNav(user);

  // 觸發頁面自訂初始化
  if (typeof onAppReady === 'function') onAppReady(user);
}

// ── 啟動 ────────────────────────────────────
(function () {
  const user = getUser();
  if (user) {
    // 先把 UI 架構顯示出來（不需要等 scripts）
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('appShell').style.display = 'flex';
    document.getElementById('sidebarUserName').textContent = user.name;
    document.getElementById('sidebarUserRole').textContent = user.title;
    renderMenu(user.title);
    _initBottomNav(user);
    // onAppReady 定義在頁面底部的 scripts block（比此段晚載入），
    // 必須等所有 scripts 跑完才能呼叫
    window.addEventListener('load', function () {
      if (typeof onAppReady === 'function') onAppReady(user);
    });
  } else {
    document.getElementById('loginOverlay').style.display = 'flex';
  }
})();

// ── Sidebar RWD ──────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarBackdrop').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('show');
}
</script>

<style>

}

/* ── 對話視窗 ── */

/* header — 暖白底、細線分隔 */
.ai-header {

.ai-messages::-webkit-scrollbar-thumb {

}

/* 訊息列 — flex row 放頭像 + 氣泡 */
.ai-msg-row {

}

/* 頭像 */
.ai-avatar {

}

.ai-avatar-user {

  background:var(--bg-card, #faf8f4);

}

/* 氣泡 */
.ai-msg {
  max-width:82%; padding:10px 14px; border-radius:12px;
  font-size:.82rem; line-height:1.65; word-break:break-word;
  white-space:pre-wrap;
}
.ai-msg.user {

/* 思考中 */
.ai-typing-row {

}
.ai-typing {

.ai-typing::after {

  animation:aiDots 1.2s steps(4,end) infinite;
}
@keyframes aiDots {
  0%   { content:''; }
  25%  { content:'.'; }
  50%  { content:'..'; }
  75%  { content:'...'; }
}

/* 輸入區 */
.ai-input-bar {
  display:flex; gap:8px; padding:12px 14px;

.ai-input:focus {

.ai-send {

  cursor:pointer; white-space:nowrap;
  transition:background .15s, border-color .15s;

.ai-send:hover {
  background:rgba(250,191,19,.10);
  border-color:rgba(250,191,19,.7);
}
.ai-send:disabled { opacity:.35; cursor:wait; }

/* 手機版 */
@media(max-width:640px){
  #aiChat { width:calc(100vw - 16px); right:8px; bottom:8px; max-height:80vh; border-radius:14px; }
  #aiFab  { bottom:16px; right:16px; width:46px; height:46px; }
  #aiFab .ai-mountain-icon { width:24px; height:24px; }
}

<!-- 山丘 SVG 定義（隱藏，供引用） -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="iconMountain" viewBox="0 0 100 100">
    <!-- 遠山（淺色） -->
    <path d="M10 78 Q25 42, 42 60 Q50 50, 58 58 Q72 38, 90 78 Z"
          fill="rgba(107,95,82,.12)" stroke="none"/>
    <!-- 近山（深色） -->
    <path d="M5 82 Q22 50, 38 65 Q50 45, 62 62 Q78 44, 95 82 Z"
          fill="rgba(107,95,82,.25)" stroke="none"/>
    <!-- 山頂煙嵐 -->
    <circle cx="50" cy="40" r="6" fill="rgba(250,191,19,.18)"/>
    <circle cx="44" cy="43" r="4" fill="rgba(250,191,19,.10)"/>
  </symbol>
</svg>

<button id="aiFab" onclick="aiToggle()" title="AI 幫手" style="display:none">
  <svg class="ai-mountain-icon"><use href="#iconMountain"/></svg>
</button>

<div id="aiChat">
  <div class="ai-header">
    <div class="ai-avatar" style="width:32px;height:32px;">
      <svg class="ai-mountain-icon" style="width:20px;height:20px;"><use href="#iconMountain"/></svg>
    </div>
    <div class="ai-header-info">
      <div class="ai-header-title">電腦舖 AI</div>
      <div class="ai-header-sub">ERP 資料即時查詢</div>
    </div>
    <button class="ai-close" onclick="aiToggle()">✕</button>
  </div>
  <div class="ai-messages" id="aiMessages">
    <div class="ai-msg system">有什麼可以幫你的？可以問銷貨、庫存、客戶、財務等問題。</div>
  </div>
  <div class="ai-input-bar">
    <textarea class="ai-input" id="aiInput" placeholder="輸入問題…" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();aiSend()}"></textarea>
    <button class="ai-send" id="aiSendBtn" onclick="aiSend()">發送</button>
  </div>
</div>

<script>
// ── AI Chat ──
const _aiHistory = [];
let _aiOpen = false;
let _aiBusy = false;

/* 山丘 avatar HTML */
const _aiAvatarHTML = '<div class="ai-avatar"><svg class="ai-mountain-icon" style="width:18px;height:18px"><use href="#iconMountain"/></svg></div>';
const _userAvatarHTML = '<div class="ai-avatar-user">我</div>';

function aiToggle(){
  _aiOpen = !_aiOpen;
  const chat = document.getElementById('aiChat');
  const fab  = document.getElementById('aiFab');
  if(_aiOpen){
    chat.style.display = 'flex';
    fab.classList.add('open');
    requestAnimationFrame(()=> chat.classList.add('open'));
    document.getElementById('aiInput').focus();
  } else {
    chat.classList.remove('open');
    fab.classList.remove('open');
    setTimeout(()=>{ chat.style.display='none'; }, 250);
  }
}

function aiAppend(role, text){
  const box = document.getElementById('aiMessages');

  if(role === 'system'){
    const div = document.createElement('div');
    div.className = 'ai-msg system';
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    return div;
  }

  const row = document.createElement('div');
  row.className = 'ai-msg-row ' + role;

  const avatar = document.createElement('div');
  avatar.innerHTML = role === 'assistant' ? _aiAvatarHTML : _userAvatarHTML;
  row.appendChild(avatar.firstElementChild);

  const bubble = document.createElement('div');
  bubble.className = 'ai-msg ' + role;
  bubble.textContent = text;
  row.appendChild(bubble);

  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
  return bubble;
}

async function aiSend(){
  if(_aiBusy) return;
  const input = document.getElementById('aiInput');
  const msg = input.value.trim();
  if(!msg) return;

  input.value = '';
  input.style.height = 'auto';
  aiAppend('user', msg);
  _aiHistory.push({role:'user', content:msg});

  // typing indicator（帶頭像）
  const box = document.getElementById('aiMessages');
  const typingRow = document.createElement('div');
  typingRow.className = 'ai-typing-row';
  typingRow.innerHTML = _aiAvatarHTML + '<div class="ai-typing">思考中</div>';
  box.appendChild(typingRow);
  box.scrollTop = box.scrollHeight;

  _aiBusy = true;
  document.getElementById('aiSendBtn').disabled = true;

  try {
    const user = getUser();
    const res = await fetch('/api/ai/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        message: msg,
        history: _aiHistory.slice(-20),
        user_name: user?.name || '同事',
      })
    });
    typingRow.remove();

    const ct = res.headers.get('content-type') || '';
    if(!ct.includes('application/json')){
      aiAppend('system', '⚠ 伺服器回傳非 JSON（可能需要重啟 Gunicorn）');
      return;
    }
    const json = await res.json();

    if(json.success){
      const reply = json.response || '（無回應）';
      aiAppend('assistant', reply);
      _aiHistory.push({role:'assistant', content:reply});
      // 保留最近 40 條（20 輪對話 = user+assistant 各 20）
      if (_aiHistory.length > 40) _aiHistory.splice(0, _aiHistory.length - 40);
    } else {
      aiAppend('system', '⚠ ' + (json.message || '發生錯誤'));
    }
  } catch(e){
    typingRow.remove();
    aiAppend('system', '⚠ 無法連線：' + e.message);
  } finally {
    _aiBusy = false;
    document.getElementById('aiSendBtn').disabled = false;
  }
}

// 自動調整輸入框高度
document.getElementById('aiInput')?.addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

// 登入後才顯示 AI 按鈕 + 自動載入今日摘要
async function _aiLoadDailySummary(user) {
  try {
    const params = new URLSearchParams({
      name: user.name || '',
      title: user.title || '',
      department: user.department || '',
    });
    const res = await fetch('/api/ai/daily-summary?' + params);
    const json = await res.json();
    if (json.success && json.summary) {
      // 自動展開對話框並顯示摘要
      const chat = document.getElementById('aiChat');
      const fab  = document.getElementById('aiFab');
      _aiOpen = true;
      chat.style.display = 'flex';
      fab.classList.add('open');
      requestAnimationFrame(() => chat.classList.add('open'));
      // 清空預設歡迎訊息，替換為摘要
      const box = document.getElementById('aiMessages');
      box.innerHTML = '';
      aiAppend('assistant', json.summary);
    }
  } catch (e) {
    // 摘要失敗不阻塞，靜默忽略
  }
}

(function(){
  const _origInitApp = window.initApp;
  if(typeof _origInitApp === 'function'){
    window.initApp = function(user){
      _origInitApp(user);
      document.getElementById('aiFab').style.display = 'flex';
      _aiStartIdle();
      _aiLoadDailySummary(user);
    };
  }
  const _check = setInterval(()=>{
    if(document.getElementById('appShell')?.style.display === 'flex'){
      document.getElementById('aiFab').style.display = 'flex';
      _aiStartIdle();
      const u = getUser();
      if(u) _aiLoadDailySummary(u);
      clearInterval(_check);
    }
  }, 500);
  setTimeout(()=>clearInterval(_check), 10000);
})();

// ── AI 浮動按鈕：隨機生命感 ──
let _aiIdleTimer = null;
const _aiFabHome = { bottom:24, right:24 };  // 原點

/* sidebar 寬度（避開左側作業區） */
function _aiSidebarW(){
  const sb = document.getElementById('sidebar');
  return sb ? sb.offsetWidth : 240;
}

/* 安全漂移範圍：右側 & 底部邊緣，不進入主要作業區中央 */
function _aiRandomPos(){
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const sbw = _aiSidebarW();
  const fab = document.getElementById('aiFab');
  const size = fab ? fab.offsetWidth : 54;
  const margin = 16;

  // 只在右邊 300px 範圍 & 下方 300px 範圍內漂移
  const maxRight = 300;
  const maxBottom = 300;

  // 隨機選一個邊：0=底邊, 1=右邊
  const edge = Math.random() < 0.5 ? 0 : 1;
  let b, r;

  if(edge === 0){
    // 底邊：bottom 固定在 20~60px, right 在 20~maxRight
    b = 20 + Math.random() * 40;
    r = 20 + Math.random() * (maxRight - 20);
  } else {
    // 右邊：right 固定在 20~60px, bottom 在 20~maxBottom
    r = 20 + Math.random() * 40;
    b = 20 + Math.random() * (maxBottom - 20);
  }

  // 確保不超出螢幕
  r = Math.min(r, vw - sbw - size - margin);
  b = Math.min(b, vh - size - margin - 60); // 60 = topbar 高度

  return { bottom: Math.max(16, b), right: Math.max(16, r) };
}

/* 隨機播一個動畫 */
function _aiPlayAnim(){
  const fab = document.getElementById('aiFab');
  if(!fab || _aiOpen) return;

  const roll = Math.random();

  if(roll < 0.35){
    // 呼吸光暈
    fab.style.animation = 'aiBreathe 2s ease-in-out 1';
  } else if(roll < 0.65){
    // 輕晃
    fab.style.animation = 'aiNudge .6s ease-in-out 1';
  } else if(roll < 0.85){
    // 小跳
    fab.style.animation = 'aiBounce .5s ease 1';
  } else {
    // 漂移到新位置
    const pos = _aiRandomPos();
    fab.style.bottom = pos.bottom + 'px';
    fab.style.right  = pos.right + 'px';
  }

  // 動畫結束後清掉 animation 屬性，為下次做準備
  setTimeout(()=>{ if(fab) fab.style.animation = ''; }, 2200);
}

/* 排程下一次動作（8~20 秒隨機間隔） */
function _aiScheduleNext(){
  const delay = 8000 + Math.random() * 12000;
  _aiIdleTimer = setTimeout(()=>{
    _aiPlayAnim();
    _aiScheduleNext();
  }, delay);
}

/* 啟動 */
function _aiStartIdle(){
  if(_aiIdleTimer) return; // 已啟動
  // 首次延遲 3~6 秒
  setTimeout(()=> _aiScheduleNext(), 3000 + Math.random() * 3000);
}

/* 打開對話時回歸原點 & 停止漂移 */
const _origAiToggle = aiToggle;
aiToggle = function(){
  _origAiToggle();
  const fab = document.getElementById('aiFab');
  if(_aiOpen){
    // 回歸原點
    fab.style.bottom = _aiFabHome.bottom + 'px';
    fab.style.right  = _aiFabHome.right + 'px';
    fab.style.animation = '';
  }
};
</script>

</body>
</html>
