{% extends "base.html" %}
{% block title %}報價作業 — COSH ERP{% endblock %}
{% block page_title %}報價作業{% endblock %}

{% block styles %}
<style>
.q-layout { display: flex; flex-direction: column; gap: 20px; }

/* ── 卡片 ── */
.q-card {
  background: #fff;
  border: 1px solid rgba(107,95,82,.14);
  border-radius: 16px; overflow: hidden;
}
.q-card-hd {
  font-size: .72rem; color: var(--text-sub); letter-spacing: .12em; text-transform: uppercase;
  padding: 13px 20px; border-bottom: 1px solid rgba(107,95,82,.08);
  display: flex; align-items: center; justify-content: space-between;
}
.q-card-body { padding: 20px; }

/* ── 表單行 ── */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
}
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-field label { font-size: .72rem; color: var(--text-sub); letter-spacing: .04em; }
.form-input {
  padding: 9px 12px;
  border: 1px solid rgba(107,95,82,.22); border-radius: 8px;
  font-size: .84rem; font-family: var(--font-serif);
  color: var(--text); background: var(--bg);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.form-input:focus {
  border-color: rgba(250,191,19,.6);
  box-shadow: 0 0 0 3px rgba(250,191,19,.12);
}
/* 奇數欄（報價單號 / 客戶名稱）維持暖米色，偶數欄（日期 / 有效期限）由全局規則給淺色 */
.form-input[readonly] { color: var(--text-sub); background: var(--bg); cursor: default; }
.cust-ac-wrap .form-input { background: var(--bg); }

/* ── 客戶 autocomplete ── */
.cust-ac-wrap { position: relative; }
.cust-ac-list {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 30;
  background: #fff; border: 1px solid rgba(107,95,82,.2); border-radius: 10px;
  margin-top: 4px; max-height: 240px; overflow-y: auto;
  box-shadow: 0 4px 20px rgba(44,39,32,.1); display: none;
}
.cust-ac-item {
  padding: 10px 14px; cursor: pointer; font-size: .84rem; color: var(--text);
  display: flex; justify-content: space-between; align-items: center;
}
.cust-ac-item:hover { background: var(--bg); }
.cust-ac-item .cust-sub { font-size: .72rem; color: var(--text-sub); }
.cust-selected-info { font-size: .74rem; color: #6b8a5c; margin-top: 4px; }

/* ── 明細表格 ── */
.items-wrap { overflow-x: auto; }
.items-table { width: 100%; border-collapse: collapse; font-size: .83rem; min-width: 740px; }
.items-table th {
  text-align: left; padding: 8px 12px;
  font-weight: 300; color: var(--text-sub); font-size: .72rem; letter-spacing: .06em;
  background: var(--bg-card); border-bottom: 1px solid rgba(107,95,82,.1);
}
.items-table td { padding: 7px 8px; border-bottom: 1px solid rgba(107,95,82,.06); }
.items-table tr:last-child td { border-bottom: none; }
.td-input {
  width: 100%; padding: 5px 7px;
  border: 1px solid var(--border); border-radius: 6px;
  font-size: .82rem; font-family: var(--font-serif); font-weight: 300;
  color: var(--text); background: var(--bg); outline: none; box-sizing: border-box;
}
.td-input:focus { border-color: var(--accent); }
.td-sub {
  font-family: var(--font-en); font-size: 1rem;
  font-weight: 300; color: var(--text); text-align: right; padding-right: 12px;
  white-space: nowrap;
}
.del-btn {
  padding: 4px 9px; border-radius: 5px; font-size: .72rem;
  border: 1px solid rgba(139,58,58,.3); background: none;
  color: #8b3a3a; cursor: pointer; white-space: nowrap;
}
.del-btn:hover { background: rgba(139,58,58,.06); }

/* ── 產品搜尋下拉 ── */
.prod-wrap { position: relative; }
.prod-list {
  position: absolute; top: 100%; left: 0; min-width: 280px; z-index: 20;
  background: #fff; border: 1px solid rgba(107,95,82,.2); border-radius: 8px;
  margin-top: 2px; max-height: 200px; overflow-y: auto;
  box-shadow: 0 4px 16px rgba(44,39,32,.12); display: none;
}
.prod-item { padding: 8px 12px; cursor: pointer; font-size: .82rem; }
.prod-item:hover { background: var(--bg); }
.prod-item .pid { font-size: .72rem; color: var(--text-sub); }
.scan-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
  font-size: .88rem; color: var(--text-sub); background: var(--bg);
  border: 1px solid var(--border); flex-shrink: 0;
  transition: background .2s, color .2s;
  user-select: none; -webkit-user-select: none;
}
.scan-btn:hover { background: var(--bg-alt); color: var(--text); }

/* ── 新增列按鈕 ── */
.add-row-btn {
  margin-top: 12px;
  padding: 7px 16px; border-radius: 7px; font-size: .8rem;
  border: 1px dashed rgba(107,95,82,.3); background: none;
  color: var(--accent); cursor: pointer; font-family: var(--font-serif);
  transition: background .15s;
}
.add-row-btn:hover { background: rgba(107,95,82,.05); }

/* ── 合計列 ── */
.total-row {
  display: flex; justify-content: flex-end; align-items: baseline;
  gap: 8px; padding: 14px 20px;
  border-top: 1px solid rgba(107,95,82,.1);
  background: var(--bg-card);
}
.total-lbl { font-size: .75rem; color: var(--text-sub); letter-spacing: .06em; }
.total-val {
  font-family: var(--font-en);
  font-size: 1.9rem; font-weight: 300; color: var(--text);
}
.total-currency { font-size: .85rem; color: var(--accent); margin-right: 2px; }

/* 按鈕樣式已定義在 main.css */

/* ── 報價單列表 ── */
.quote-row {
  display: grid;
  grid-template-columns: 140px 1fr auto auto;
  align-items: center; gap: 14px;
  padding: 12px 20px;
  border-bottom: 1px solid rgba(107,95,82,.06);
  font-size: .83rem;
}
.quote-row:last-child { border-bottom: none; }
.quote-no { font-family: var(--font-en); font-size: 1rem; font-weight: 300; color: var(--text); }
.quote-meta { color: var(--accent); font-size: .8rem; }
.quote-amt {
  font-family: var(--font-en); font-size: 1.15rem;
  font-weight: 300; color: var(--text); text-align: right; white-space: nowrap;
}
.quote-action { display: flex; gap: 6px; }
.status-tag {
  font-size: .68rem; padding: 2px 7px; border-radius: 4px; display: inline-block;
  background: rgba(250,191,19,.15); color: #7a5500;
}
.status-tag.converted { background: #e8e2d8; color: var(--accent); }

/* ── Modal ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(44,39,32,.45); z-index: 900;
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-box {
  background: #fff; border-radius: 16px;
  border: 1px solid rgba(107,95,82,.18);
  padding: 28px; width: 420px; max-width: 92vw;
  box-shadow: 0 8px 40px rgba(44,39,32,.12);
}
.modal-title { font-size: .88rem; color: var(--text); margin-bottom: 18px; font-weight: 300; letter-spacing: .04em; }
.modal-info { font-size: .8rem; color: var(--accent); margin-bottom: 18px; line-height: 1.8; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* skeleton */
.skel {
  background: linear-gradient(90deg,rgba(107,95,82,.07)25%,rgba(107,95,82,.14)50%,rgba(107,95,82,.07)75%);
  background-size:200% 100%; animation:skel-shine 1.4s infinite;
  border-radius:6px; height:18px; margin:6px 0;
}
@keyframes skel-shine{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
{% endblock %}

{% block content %}
<div class="q-layout">

  <!-- ── 新增報價單 ── -->
  <div class="q-card">
    <div class="q-card-hd">
      <span>新增報價單</span>
      <span id="quoteNoDisplay" style="font-family:var(--font-en);font-size:1rem;color:var(--text);letter-spacing:.06em">產生中…</span>
    </div>
    <div class="q-card-body">

      <!-- 基本資訊 -->
      <div class="form-grid" style="margin-bottom:18px">
        <div class="form-field">
          <label>報價單號</label>
          <input class="form-input" id="quoteNo" readonly>
        </div>
        <div class="form-field">
          <label>日期</label>
          <input class="form-input" type="date" id="quoteDate">
        </div>
        <div class="form-field cust-ac-wrap" style="grid-column: span 2; min-width: 0;">
          <label>客戶名稱</label>
          <input class="form-input" id="customerName" placeholder="輸入客戶名稱或手機搜尋…" autocomplete="off"
                 oninput="onCustSearch(this.value)">
          <div class="cust-ac-list" id="custAcList"></div>
          <input type="hidden" id="custId">
          <div class="cust-selected-info" id="custInfo" style="display:none"></div>
        </div>
        <div class="form-field">
          <label>有效期限</label>
          <input class="form-input" type="date" id="validUntil">
        </div>
        <div class="form-field" style="grid-column:1/-1">
          <label>備註</label>
          <input class="form-input" id="quoteNote" placeholder="選填">
        </div>
      </div>

      <!-- 產品明細 -->
      <div class="items-wrap">
        <table class="items-table">
          <thead>
            <tr>
              <th style="min-width:110px">產品編號</th>
              <th style="min-width:180px">產品名稱</th>
              <th style="width:70px">數量</th>
              <th style="width:100px">單價</th>
              <th style="width:100px">小計</th>
              <th style="min-width:100px">備註</th>
              <th style="width:50px"></th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
      </div>
      <button class="add-row-btn" onclick="addRow()">＋ 新增產品列</button>

    </div>

    <!-- 合計 + 送出 -->
    <div class="total-row">
      <span class="total-lbl">合計</span>
      <span class="total-currency">NT$</span>
      <span class="total-val" id="totalVal">0</span>
    </div>
    <div style="padding:14px 20px;display:flex;justify-content:flex-end">
      <button class="btn-primary" onclick="submitQuote()">儲存報價單</button>
    </div>
  </div>

  <!-- ── 報價單列表 ── -->
  <div class="q-card">
    <div class="q-card-hd">
      <span>報價單列表</span>
      <input class="form-input" id="searchQ" style="width:180px;padding:5px 10px;font-size:.78rem" placeholder="搜尋單號或客戶…" oninput="searchDebounce()">
    </div>
    <div id="listWrap">
      <div style="padding:14px 20px"><div class="skel"></div><div class="skel" style="width:70%"></div></div>
    </div>
  </div>

</div>

<!-- ── 轉訂單 Modal ── -->
<div class="modal-bg" id="convertModal">
  <div class="modal-box">
    <div class="modal-title">轉換為訂單</div>
    <div class="modal-info" id="modalInfo"></div>
    <div class="form-field">
      <label>訂金金額（選填）</label>
      <input class="form-input" type="number" id="depositAmt" min="0" placeholder="0">
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="confirmConvert()">確認轉換</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let _user = null;
let _convertDocNo = null;
let _searchTimer = null;

// ── 初始化 ──────────────────────────────────
function onAppReady(user) {
  _user = user;
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('quoteDate').value = today;
  // 有效期限預設 +7 天
  const exp = new Date(); exp.setDate(exp.getDate() + 7);
  document.getElementById('validUntil').value = exp.toISOString().slice(0,10);

  genQuoteNo(today.replace(/-/g,''));
  addRow(); addRow(); addRow();
  loadList();
}

// ── 單號 ──────────────────────────────────
async function genQuoteNo(dateStr) {
  const res = await fetch('/api/quote/next-no?date=' + dateStr);
  const d   = await res.json();
  if (d.success) {
    document.getElementById('quoteNo').value = d.quote_no;
    document.getElementById('quoteNoDisplay').textContent = d.quote_no;
  }
}

document.getElementById('quoteDate').addEventListener('change', e => {
  genQuoteNo(e.target.value.replace(/-/g,''));
});

// ── 客戶即時搜尋 ─────────────────────────────────
let _custTimer = null;
function onCustSearch(val) {
  clearTimeout(_custTimer);
  const q = val.trim();
  // 中文 >= 2 字 或 數字 >= 3 碼才觸發搜尋
  const isNum = /^\d+$/.test(q);
  if ((!isNum && q.length < 2) || (isNum && q.length < 3)) {
    document.getElementById('custAcList').style.display = 'none';
    return;
  }
  _custTimer = setTimeout(() => doCustSearch(q), 200);
}

async function doCustSearch(q) {
  try {
    const res  = await fetch('/api/customers/search?q=' + encodeURIComponent(q));
    const json = await res.json();
    const list = json.customers || json.data || json || [];
    const el   = document.getElementById('custAcList');
    if (!list.length) {
      el.innerHTML = '<div style="padding:12px;font-size:.78rem;color:var(--text-sub)">查無結果</div>';
      el.style.display = 'block';
      return;
    }
    el.innerHTML = list.map(c => {
      const name  = c.short_name || c.customer_id;
      const mob   = [c.mobile, c.phone1].find(p => p && /^09/.test(p)) || c.mobile || c.phone1 || '';
      const sub   = [c.customer_id, mob].filter(Boolean).join(' · ');
      return `<div class="cust-ac-item" onclick="pickCust('${(c.customer_id||'').replace(/'/g,"\\'")}','${(name).replace(/'/g,"\\'")}','${mob.replace(/'/g,"\\'")}')">
        <span>${name}</span><span class="cust-sub">${sub}</span>
      </div>`;
    }).join('');
    el.style.display = 'block';
  } catch(e) { console.error(e); }
}

function pickCust(id, name, mobile) {
  document.getElementById('customerName').value = name;
  document.getElementById('custId').value = id;
  document.getElementById('custAcList').style.display = 'none';
  const info = document.getElementById('custInfo');
  info.textContent = [id, mobile].filter(Boolean).join(' · ');
  info.style.display = info.textContent ? '' : 'none';
}

// 點擊外部關閉
document.addEventListener('click', e => {
  if (!e.target.closest('.cust-ac-wrap')) {
    document.getElementById('custAcList').style.display = 'none';
  }
});

// ── 明細列 ─────────────────────────────────
let _rowSeq = 0;
let prodTimers = {};
let nameTimers = {};

function addRow() {
  const id  = ++_rowSeq;
  const tr  = document.createElement('tr');
  tr.id = 'row-' + id;
  tr.innerHTML = `
    <td>
      <div class="prod-wrap" style="display:flex;gap:4px;align-items:center;">
        <input class="td-input" id="pcode-${id}" placeholder="產品編號"
               oninput="searchProdByCode(${id})" autocomplete="off" style="width:110px;flex:1">
        <span class="scan-btn" onclick="scanForRow(${id})" title="掃描條碼">⌗</span>
        <div class="prod-list" id="clist-${id}"></div>
      </div>
    </td>
    <td>
      <div class="prod-wrap">
        <input class="td-input" id="pname-${id}" placeholder="產品名稱"
               oninput="searchProdByName(${id})" autocomplete="off">
        <div class="prod-list" id="nlist-${id}"></div>
      </div>
    </td>
    <td><input class="td-input" id="qty-${id}" type="number" min="1" value="1"
      style="width:70px" oninput="calcRow(${id})"></td>
    <td><input class="td-input" id="price-${id}" type="number" min="0" placeholder="0"
      oninput="calcRow(${id})"></td>
    <td class="td-sub" id="sub-${id}">0</td>
    <td><input class="td-input" id="note-${id}" placeholder="備註（選填）"></td>
    <td><button class="del-btn" onclick="delRow(${id})">刪除</button></td>
  `;
  document.getElementById('itemsBody').appendChild(tr);
}

function selectProd(id, code, name, cost) {
  document.getElementById('pcode-' + id).value = code;
  document.getElementById('pname-' + id).value = name;
  // 單價自動帶入：成本 × 1.2（四捨五入取整）
  if (cost > 0) {
    const priceEl = document.getElementById('price-' + id);
    if (priceEl && (!priceEl.value || priceEl.value === '0')) {
      priceEl.value = Math.round(cost * 1.2);
      calcRow(id);
    }
  }
  closeProdLists(id);
}

function closeProdLists(id) {
  const cl = document.getElementById('clist-' + id);
  const nl = document.getElementById('nlist-' + id);
  if (cl) cl.style.display = 'none';
  if (nl) nl.style.display = 'none';
}

function renderProdDropdown(el, list, id) {
  if (!list.length) { el.style.display = 'none'; return; }
  el.innerHTML = list.slice(0, 20).map(p =>
    `<div class="prod-item" onclick="selectProd(${id},'${(p.product_code||'').replace(/'/g,"\\'")}','${(p.product_name||p.item_spec||'').replace(/'/g,"\\'")}',${p.unit_cost||0})">
      <div>${p.product_name || p.item_spec || ''}</div>
      <div class="pid">${p.product_code || ''}${p.total_qty ? ' · 庫存 ' + p.total_qty : ''}</div>
    </div>`
  ).join('');
  el.style.display = 'block';
}

async function searchProdByCode(id) {
  const q = (document.getElementById('pcode-' + id)?.value || '').trim();
  if (q.length < 2) { closeProdLists(id); return; }
  clearTimeout(prodTimers[id]);
  prodTimers[id] = setTimeout(async () => {
    const res  = await fetch('/api/products/search?q=' + encodeURIComponent(q));
    const list = await res.json();
    renderProdDropdown(document.getElementById('clist-' + id), Array.isArray(list) ? list : [], id);
  }, 250);
}

async function searchProdByName(id) {
  const q = (document.getElementById('pname-' + id)?.value || '').trim();
  if (q.length < 2) { closeProdLists(id); return; }
  clearTimeout(nameTimers[id]);
  nameTimers[id] = setTimeout(async () => {
    const res  = await fetch('/api/products/search?q=' + encodeURIComponent(q));
    const list = await res.json();
    renderProdDropdown(document.getElementById('nlist-' + id), Array.isArray(list) ? list : [], id);
  }, 250);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.prod-wrap')) {
    document.querySelectorAll('.prod-list').forEach(el => { el.style.display = 'none'; });
  }
});

/* ── 條碼掃描帶入 ── */
function scanForRow(id) {
  startBarcodeScan(function(code) {
    const el = document.getElementById(`pcode-${id}`);
    if (el) { el.value = code; searchProdByCode(id); }
  });
}

function delRow(id) {
  const tr = document.getElementById('row-' + id);
  if (tr) tr.remove();
  calcTotal();
}

function calcRow(id) {
  const qty   = parseInt(document.getElementById('qty-' + id)?.value)   || 0;
  const price = parseInt(document.getElementById('price-' + id)?.value) || 0;
  const sub   = qty * price;
  const el    = document.getElementById('sub-' + id);
  if (el) el.textContent = sub.toLocaleString();
  calcTotal();
}

function calcTotal() {
  let total = 0;
  document.querySelectorAll('[id^="sub-"]').forEach(el => {
    total += parseInt(el.textContent.replace(/,/g,'')) || 0;
  });
  document.getElementById('totalVal').textContent = total.toLocaleString();
}

// ── 儲存 ─────────────────────────────────
async function submitQuote() {
  const items = [];
  document.querySelectorAll('#itemsBody tr').forEach(tr => {
    const rowId = tr.id.replace('row-','');
    const pcode = document.getElementById('pcode-' + rowId)?.value.trim() || '';
    const pname = document.getElementById('pname-' + rowId)?.value.trim() || '';
    const qty   = parseInt(document.getElementById('qty-' + rowId)?.value)   || 0;
    const price = parseInt(document.getElementById('price-' + rowId)?.value) || 0;
    const note  = document.getElementById('note-' + rowId)?.value.trim() || '';
    if (pname && qty > 0) {
      items.push({ product_code: pcode, product_name: pname, qty, unit_price: price, subtotal: qty * price, note });
    }
  });

  if (!document.getElementById('customerName').value.trim()) {
    alert('請填寫客戶名稱'); return;
  }
  if (items.length === 0) {
    alert('請至少新增一筆產品'); return;
  }

  const total = items.reduce((s,i) => s + i.subtotal, 0);
  const payload = {
    doc_no:       document.getElementById('quoteNo').value,
    doc_type:     'QUOTE',
    target_id:    document.getElementById('custId').value.trim(),
    target_name:  document.getElementById('customerName').value.trim(),
    total_amount: total,
    note:         document.getElementById('quoteNote').value.trim(),
    valid_until:  document.getElementById('validUntil').value,
    created_by:   _user?.name || '',
    items,
  };

  const btn = document.querySelector('.btn-primary');
  btn.textContent = '儲存中…'; btn.disabled = true;
  try {
    const res = await fetch('/api/sales-doc/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const d = await res.json();
    if (d.success) {
      resetForm();
      loadList();
    } else {
      alert('儲存失敗：' + (d.message || ''));
    }
  } catch(e) {
    alert('儲存失敗：' + e.message);
  } finally {
    btn.textContent = '儲存報價單'; btn.disabled = false;
  }
}

function resetForm() {
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('customerName').value = '';
  document.getElementById('custId').value       = '';
  document.getElementById('custInfo').style.display = 'none';
  document.getElementById('custInfo').textContent   = '';
  document.getElementById('quoteNote').value    = '';
  document.getElementById('quoteDate').value    = today;
  document.getElementById('itemsBody').innerHTML = '';
  _rowSeq = 0;
  genQuoteNo(today.replace(/-/g,''));
  addRow(); addRow(); addRow();
}

// ── 列表 ─────────────────────────────────
async function loadList(q) {
  const qs  = q ? `&q=${encodeURIComponent(q)}` : '';
  const res = await fetch('/api/sales-doc/list?type=QUOTE&limit=30' + qs);
  const d   = await res.json();
  const wrap = document.getElementById('listWrap');
  if (!d.success || !d.documents.length) {
    wrap.innerHTML = '<div style="padding:24px 20px;color:var(--text-sub);font-size:.83rem">暫無報價單</div>';
    return;
  }
  wrap.innerHTML = d.documents.map(doc => {
    const tag = doc.status === 'CONVERTED'
      ? '<span class="status-tag converted">已轉訂單</span>'
      : '<span class="status-tag">草稿</span>';
    const validStr = doc.valid_until ? `有效至 ${doc.valid_until}` : '';
    const itemCount = (doc.items||[]).length;
    const convertBtn = doc.status !== 'CONVERTED'
      ? `<button class="btn-secondary" style="font-size:.75rem;padding:5px 12px"
           onclick='openConvert(${JSON.stringify(doc)})'>轉訂單</button>`
      : '';
    const pdfBtn = `<button class="btn-secondary" style="font-size:.75rem;padding:5px 12px"
           onclick="window.open('/print/quote/' + encodeURIComponent('${doc.doc_no}'))">列印</button>`;
    return `
      <div class="quote-row">
        <div>
          <div class="quote-no">${doc.doc_no}</div>
          <div style="font-size:.7rem;color:var(--text-sub);margin-top:2px">${doc.created_at?.slice(0,10) || ''}</div>
        </div>
        <div>
          <div style="color:var(--text);font-size:.84rem">${doc.target_name || '—'}</div>
          <div class="quote-meta">${itemCount} 項${validStr ? '・' + validStr : ''}${doc.note ? '・' + doc.note : ''}</div>
        </div>
        <div>${tag}</div>
        <div class="quote-action" style="display:flex;gap:6px">
          ${pdfBtn}
          ${convertBtn}
        </div>
      </div>`;
  }).join('');
}

function searchDebounce() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    loadList(document.getElementById('searchQ').value.trim());
  }, 350);
}

// ── 轉訂單 ─────────────────────────────────
function openConvert(doc) {
  _convertDocNo = doc.doc_no;
  document.getElementById('depositAmt').value = '';
  document.getElementById('modalInfo').innerHTML =
    `報價單號：<strong>${doc.doc_no}</strong><br>` +
    `客戶：${doc.target_name || '—'}<br>` +
    `總金額：NT$ ${(doc.total_amount||0).toLocaleString()}`;
  document.getElementById('convertModal').classList.add('open');
}

function closeModal() {
  document.getElementById('convertModal').classList.remove('open');
  _convertDocNo = null;
}

async function confirmConvert() {
  if (!_convertDocNo) return;
  const deposit = parseInt(document.getElementById('depositAmt').value) || 0;
  const res = await fetch('/api/sales-doc/convert', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ source_doc_no: _convertDocNo, target_type: 'ORDER', deposit_amount: deposit, created_by: _user?.name || '' }),
  });
  const d = await res.json();
  if (d.success) {
    closeModal();
    loadList();
    alert(`已轉換為訂單 ${d.new_doc_no}`);
  } else {
    alert('轉換失敗：' + (d.message || ''));
  }
}
</script>
{% endblock %}
