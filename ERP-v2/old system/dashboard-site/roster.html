{% extends "base.html" %}

{% block title %}班表查詢 - 電腦舖營運系統{% endblock %}
{% block page_title %}📅 班表查詢{% endblock %}

{% block styles %}
<style>
    .roster-container {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 30px;
        margin-bottom: 30px;
    }

    .week-selector {
        display: flex;
        gap: 15px;
        margin-bottom: 25px;
        align-items: center;
        flex-wrap: wrap;
    }

    .week-selector label {
        color: #8892b0;
        font-size: 0.95em;
    }

    .week-selector input[type="date"] {
        padding: 10px 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        font-size: 0.95em;
    }

    .week-selector button {
        padding: 10px 20px;
        background: linear-gradient(135deg, #FABF13 0%, #e6a800 100%);
        border: none;
        border-radius: 8px;
        color: #231815;
        cursor: pointer;
        font-size: 0.95em;
        transition: transform 0.2s;
    }

    .week-selector button:hover {
        transform: translateY(-2px);
    }

    .btn-edit-roster {
        padding: 10px 20px;
        background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 0.95em;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        transition: transform 0.2s;
        display: inline-block;
    }

    .btn-edit-roster:hover {
        transform: translateY(-2px);
        color: #fff;
    }

    .roster-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95em;
    }

    .roster-table th {
        background: rgba(250, 191, 19, 0.1);
        color: #FABF13;
        padding: 12px 10px;
        text-align: center;
        border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        font-weight: 500;
    }

    .roster-table td {
        padding: 12px 10px;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        color: #e2e8f0;
        vertical-align: middle;
    }

    .roster-table tr:hover td {
        background: rgba(255, 255, 255, 0.03);
    }

    .staff-name {
        font-weight: 500;
        color: #fff;
        cursor: pointer;
        transition: color 0.2s;
    }

    .staff-name:hover {
        color: #FABF13;
        text-decoration: underline;
    }

    .location-tag {
        font-size: 0.8em;
        color: #8892b0;
    }

    .shift-早 {
        background: rgba(76, 175, 80, 0.15);
        color: #4caf50;
        font-weight: 600;
        border-radius: 4px;
        padding: 4px 8px;
    }

    .shift-晚 {
        background: rgba(250, 191, 19, 0.15);
        color: #FABF13;
        font-weight: 600;
        border-radius: 4px;
        padding: 4px 8px;
    }

    .shift-全 {
        background: rgba(255, 152, 0, 0.15);
        color: #ff9800;
        font-weight: 600;
        border-radius: 4px;
        padding: 4px 8px;
    }

    .shift-休 {
        background: rgba(100, 116, 139, 0.1);
        color: #64748b;
        border-radius: 4px;
        padding: 4px 8px;
    }

    .shift-值 {
        background: rgba(156, 39, 176, 0.15);
        color: #9c27b0;
        font-weight: 600;
        border-radius: 4px;
        padding: 4px 8px;
    }

    .shift-特 {
        background: rgba(250, 191, 19, 0.15);
        color: #FABF13;
        font-weight: 600;
        border-radius: 4px;
        padding: 4px 8px;
    }

    .loading {
        text-align: center;
        padding: 60px 20px;
        color: #64748b;
    }

    .error-msg {
        text-align: center;
        padding: 40px 20px;
        color: #f44336;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #64748b;
    }

    /* 每日門市摘要 */
    .daily-summary {
        margin-bottom: 25px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
    }

    .summary-title {
        color: #FABF13;
        font-size: 1.1em;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 15px;
    }

    .summary-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 15px;
    }

    .summary-card h4 {
        color: #FABF13;
        font-size: 1em;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .summary-staff-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .summary-staff {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 4px;
        font-size: 0.9em;
    }

    .summary-staff .staff-name {
        color: #e2e8f0;
    }

    .summary-staff .shift-badge {
        font-size: 0.85em;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 3px;
    }

    /* 彈窗樣式 */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    .modal-overlay.active {
        display: flex;
    }

    .modal {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 30px;
        width: 95%;
        max-width: 1400px;
        max-height: 90vh;
        overflow-y: auto;
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-title {
        color: #FABF13;
        font-size: 1.3em;
    }

    .modal-close {
        background: rgba(244, 67, 54, 0.2);
        border: 1px solid rgba(244, 67, 54, 0.5);
        color: #f44336;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.9em;
    }

    .modal-close:hover {
        background: rgba(244, 67, 54, 0.3);
    }

    .monthly-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8em;
    }

    .monthly-table th {
        background: rgba(250, 191, 19, 0.1);
        color: #FABF13;
        padding: 8px 4px;
        text-align: center;
        border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        font-weight: 500;
        min-width: 28px;
    }

    .monthly-table td {
        padding: 8px 4px;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        color: #e2e8f0;
        vertical-align: middle;
        min-width: 28px;
    }

    .monthly-table tr:hover td {
        background: rgba(255, 255, 255, 0.03);
    }

    .monthly-table td:first-child,
    .monthly-table th:first-child {
        min-width: 80px;
        background: rgba(250, 191, 19, 0.05);
        font-weight: 500;
    }

    @media (max-width: 768px) {
        .roster-table {
            font-size: 0.85em;
        }

        .roster-table th,
        .roster-table td {
            padding: 8px 5px;
        }

        .summary-grid {
            grid-template-columns: 1fr;
        }

        .modal {
            width: 95%;
            padding: 20px;
        }

        .monthly-table {
            font-size: 0.75em;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="roster-container">
    <div class="week-selector">
        <label>選擇日期：</label>
        <input type="date" id="datePicker">
        <button onclick="loadRoster()">查詢班表</button>
        <a href="/roster_input.html" class="btn-edit-roster">編輯排班</a>
    </div>

    <!-- 各門市當天人員摘要 -->
    <div id="dailySummary" class="daily-summary">
        <!-- 動態生成 -->
    </div>

    <div id="rosterContent">
        <div class="loading">載入中...</div>
    </div>
</div>

<!-- 當月班表彈窗 -->
<div class="modal-overlay" id="monthlyModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">📅 當月班表</div>
            <button class="modal-close" onclick="closeModal()">✕ 關閉</button>
        </div>
        <div id="modalContent">
            <!-- 動態生成 -->
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('datePicker').value = today;
        loadRoster();
    });

    // 載入班表
    async function loadRoster() {
        const dateInput = document.getElementById('datePicker').value;
        const contentDiv = document.getElementById('rosterContent');

        contentDiv.innerHTML = '<div class="loading">載入中...</div>';

        try {
            const response = await fetch('/api/roster/weekly?date=' + encodeURIComponent(dateInput));
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || '載入失敗');
            }

            renderRoster(data, dateInput);
        } catch (error) {
            console.error('載入班表失敗:', error);
            contentDiv.innerHTML = '<div class="error-msg">載入失敗：' + error.message + '</div>';
        }
    }

    // 渲染班表
    function renderRoster(data, selectedDate) {
        const contentDiv = document.getElementById('rosterContent');
        const summaryDiv = document.getElementById('dailySummary');

        if (!data || Object.keys(data).length === 0) {
            contentDiv.innerHTML = '<div class="empty-state">暫無班表資料</div>';
            summaryDiv.innerHTML = '';
            return;
        }

        // 計算週的日期範圍（從週日到週六）
        const date = new Date(selectedDate + 'T00:00:00');
        const dayOfWeek = date.getDay();
        const weekStart = new Date(date);
        weekStart.setDate(date.getDate() - dayOfWeek);

        const weekDays = [];
        const dayNames = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
        for (let i = 0; i < 7; i++) {
            const d = new Date(weekStart);
            d.setDate(weekStart.getDate() + i);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            weekDays.push({
                date: `${year}-${month}-${day}`,
                name: dayNames[i]
            });
        }

        // 渲染每日門市摘要
        renderDailySummary(data, weekDays, selectedDate);

        // 定義門市排序順序
        const locationOrder = { '豐原': 1, '潭子': 2, '大雅': 3 };

        // 排序人員資料
        const sortedEntries = Object.entries(data).sort((a, b) => {
            const locA = a[1].location || '';
            const locB = b[1].location || '';
            const orderA = locationOrder[locA] || 999;
            const orderB = locationOrder[locB] || 999;
            if (orderA !== orderB) return orderA - orderB;
            return a[0].localeCompare(b[0]);
        });

        // 建構表格
        let html = '<table class="roster-table">';
        html += '<thead><tr><th>人員</th><th>門市別</th>';
        weekDays.forEach(day => {
            html += `<th>${day.name}<br><small>${day.date.slice(5)}</small></th>`;
        });
        html += '</tr></thead><tbody>';

        sortedEntries.forEach(([name, info]) => {
            html += '<tr>';
            html += `<td class="staff-name" onclick="showMonthlyRoster('${escapeHtml(name)}')">${escapeHtml(name)}</td>`;
            html += `<td><span class="location-tag">${escapeHtml(info.location || '-')}</span></td>`;

            weekDays.forEach(day => {
                const shift = info.shifts && info.shifts[day.date] ? info.shifts[day.date] : '-';
                const shiftClass = getShiftClass(shift);
                html += `<td class="${shiftClass}">${escapeHtml(shift)}</td>`;
            });

            html += '</tr>';
        });

        html += '</tbody></table>';
        contentDiv.innerHTML = html;
    }

    // 渲染每日門市摘要
    function renderDailySummary(data, weekDays, selectedDate) {
        const summaryDiv = document.getElementById('dailySummary');
        const locationOrder = { '豐原': 1, '潭子': 2, '大雅': 3 };

        const selectedIndex = weekDays.findIndex(d => d.date === selectedDate);
        const displayIndex = selectedIndex >= 0 ? selectedIndex : 0;
        const displayDate = weekDays[displayIndex];

        const locationStats = {};
        Object.entries(data).forEach(([name, info]) => {
            const location = info.location || '未分類';
            if (!locationStats[location]) {
                locationStats[location] = [];
            }
            const shift = info.shifts && info.shifts[displayDate.date] ? info.shifts[displayDate.date] : '-';
            locationStats[location].push({ name, shift });
        });

        const sortedLocations = Object.entries(locationStats).sort((a, b) => {
            const orderA = locationOrder[a[0]] || 999;
            const orderB = locationOrder[b[0]] || 999;
            return orderA - orderB;
        });

        let html = `<div class="summary-title">📅 ${displayDate.date}（${displayDate.name}）各門市人員</div>`;
        html += '<div class="summary-grid">';

        sortedLocations.forEach(([location, staffList]) => {
            html += `<div class="summary-card">`;
            html += `<h4>${escapeHtml(location)} (${staffList.length}人)</h4>`;
            html += '<div class="summary-staff-list">';

            staffList.forEach(({ name, shift }) => {
                const shiftStyle = getShiftStyle(shift);
                html += `<span class="summary-staff" style="${shiftStyle}">`;
                html += `<span class="staff-name">${escapeHtml(name)}</span>`;
                html += `<span class="shift-badge">${escapeHtml(shift)}</span>`;
                html += `</span>`;
            });

            html += '</div></div>';
        });

        html += '</div>';
        summaryDiv.innerHTML = html;
    }

    // 顯示當月班表彈窗
    async function showMonthlyRoster(staffName) {
        const modal = document.getElementById('monthlyModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');

        modalTitle.textContent = `📅 ${staffName} - 當月班表`;
        modalContent.innerHTML = '<div class="loading">載入中...</div>';
        modal.classList.add('active');

        try {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const daysInMonth = new Date(year, month, 0).getDate();

            const startDate = `${year}-${String(month).padStart(2, '0')}-01`;
            const endDate = `${year}-${String(month).padStart(2, '0')}-${daysInMonth}`;

            // 取得該員工所在門市
            const dateInput = document.getElementById('datePicker').value;
            const weekResponse = await fetch('/api/roster/weekly?date=' + encodeURIComponent(dateInput));
            const weekData = await weekResponse.json();
            const staffInfo = weekData[staffName];
            const store = staffInfo ? staffInfo.location : '';

            if (!store) {
                modalContent.innerHTML = '<div class="empty-state">無法取得門市資訊</div>';
                return;
            }

            const response = await fetch(`/api/roster/range?store=${encodeURIComponent(store)}&start=${startDate}&end=${endDate}`);
            const data = await response.json();

            if (!data.success || !data.roster) {
                modalContent.innerHTML = '<div class="empty-state">暫無班表資料</div>';
                return;
            }

            // 篩選該員工的班表
            const staffShifts = {};
            data.roster.forEach(record => {
                if (record.staff_name === staffName) {
                    staffShifts[record.date] = record.shift_code;
                }
            });

            // 建構橫向當月班表表格
            let html = '';
            
            if (daysInMonth > 16) {
                // 天數太多，分成上下兩個表格
                
                // 上半月表格
                html += '<table class="monthly-table" style="margin-bottom:20px;">';
                html += '<thead><tr><th colspan="16" style="background:rgba(250,191,19,0.15);text-align:left;padding:10px;font-size:1.1em;">📅 上半月（1-15日）</th></tr>';
                html += '<tr><th>項目</th>';
                for (let day = 1; day <= 15; day++) {
                    const weekday = new Date(year, month - 1, day).getDay();
                    const isWeekend = weekday === 0 || weekday === 6;
                    const bgStyle = isWeekend ? 'background:rgba(244,67,54,0.15);' : '';
                    html += `<th style="${bgStyle}">${day}</th>`;
                }
                html += '</tr></thead><tbody>';
                
                // 上半月星期
                html += '<tr><td><strong>星期</strong></td>';
                for (let day = 1; day <= 15; day++) {
                    const weekday = new Date(year, month - 1, day).getDay();
                    const weekdayName = ['日', '一', '二', '三', '四', '五', '六'][weekday];
                    const isWeekend = weekday === 0 || weekday === 6;
                    const bgStyle = isWeekend ? 'background:rgba(244,67,54,0.1);' : '';
                    const colorStyle = isWeekend ? 'color:#f44336;font-weight:600;' : '';
                    html += `<td style="${bgStyle}${colorStyle}">${weekdayName}</td>`;
                }
                html += '</tr>';
                
                // 上半月班別
                html += '<tr><td><strong>班別</strong></td>';
                for (let day = 1; day <= 15; day++) {
                    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const weekday = new Date(year, month - 1, day).getDay();
                    const shift = staffShifts[dateStr] || '-';
                    const shiftClass = getShiftClass(shift);
                    const isWeekend = weekday === 0 || weekday === 6;
                    const bgStyle = isWeekend ? 'background:rgba(244,67,54,0.05);' : '';
                    html += `<td style="${bgStyle}"><span class="${shiftClass}">${escapeHtml(shift)}</span></td>`;
                }
                html += '</tr>';
                html += '</tbody></table>';
                
                // 下半月表格
                const remainingDays = daysInMonth - 15;
                html += '<table class="monthly-table">';
                html += '<thead><tr><th colspan="' + (remainingDays + 1) + '" style="background:rgba(250,191,19,0.15);text-align:left;padding:10px;font-size:1.1em;">📅 下半月（16-' + daysInMonth + '日）</th></tr>';
                html += '<tr><th>項目</th>';
                for (let day = 16; day <= daysInMonth; day++) {
                    const weekday = new Date(year, month - 1, day).getDay();
                    const isWeekend = weekday === 0 || weekday === 6;
                    const bgStyle = isWeekend ? 'background:rgba(244,67,54,0.15);' : '';
                    html += `<th style="${bgStyle}">${day}</th>`;
                }
                html += '</tr></thead><tbody>';
                
                // 下半月星期
                html += '<tr><td><strong>星期</strong></td>';
                for (let day = 16; day <= daysInMonth; day++) {
                    const weekday = new Date(year, month - 1, day).getDay();
                    const weekdayName = ['日', '一', '二', '三', '四', '五', '六'][weekday];
                    const isWeekend = weekday === 0 || weekday === 6;
                    const bgStyle = isWeekend ? 'background:rgba(244,67,54,0.1);' : '';
                    const colorStyle = isWeekend ? 'color:#f44336;font-weight:600;' : '';
                    html += `<td style="${bgStyle}${colorStyle}">${weekdayName}</td>`;
                }
                html += '</tr>';
                
                // 下半月班別
                html += '<tr><td><strong>班別</strong></td>';
                for (let day = 16; day <= daysInMonth; day++) {
                    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const weekday = new Date(year, month - 1, day).getDay();
                    const shift = staffShifts[dateStr] || '-';
                    const shiftClass = getShiftClass(shift);
                    const isWeekend = weekday === 0 || weekday === 6;
                    const bgStyle = isWeekend ? 'background:rgba(244,67,54,0.05);' : '';
                    html += `<td style="${bgStyle}"><span class="${shiftClass}">${escapeHtml(shift)}</span></td>`;
                }
                html += '</tr>';
                html += '</tbody></table>';
            } else {
                // 天數較少，直接一個表格呈現
                html += '<table class="monthly-table">';
                html += '<thead><tr><th>項目</th>';
                for (let day = 1; day <= daysInMonth; day++) {
                    const weekday = new Date(year, month - 1, day).getDay();
                    const isWeekend = weekday === 0 || weekday === 6;
                    const bgStyle = isWeekend ? 'background:rgba(244,67,54,0.1);' : '';
                    html += `<th style="${bgStyle}">${day}</th>`;
                }
                html += '</tr></thead><tbody>';
                
                html += '<tr><td><strong>星期</strong></td>';
                for (let day = 1; day <= daysInMonth; day++) {
                    const weekday = new Date(year, month - 1, day).getDay();
                    const weekdayName = ['日', '一', '二', '三', '四', '五', '六'][weekday];
                    const isWeekend = weekday === 0 || weekday === 6;
                    const bgStyle = isWeekend ? 'background:rgba(244,67,54,0.1);' : '';
                    const colorStyle = isWeekend ? 'color:#f44336;font-weight:600;' : '';
                    html += `<td style="${bgStyle}${colorStyle}">${weekdayName}</td>`;
                }
                html += '</tr>';
                
                html += '<tr><td><strong>班別</strong></td>';
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const weekday = new Date(year, month - 1, day).getDay();
                    const shift = staffShifts[dateStr] || '-';
                    const shiftClass = getShiftClass(shift);
                    const isWeekend = weekday === 0 || weekday === 6;
                    const bgStyle = isWeekend ? 'background:rgba(244,67,54,0.05);' : '';
                    html += `<td style="${bgStyle}"><span class="${shiftClass}">${escapeHtml(shift)}</span></td>`;
                }
                html += '</tr>';
                html += '</tbody></table>';
            }
            
            modalContent.innerHTML = html;

        } catch (error) {
            console.error('載入當月班表失敗:', error);
            modalContent.innerHTML = '<div class="error-msg">載入失敗：' + error.message + '</div>';
        }
    }

    // 關閉彈窗
    function closeModal() {
        document.getElementById('monthlyModal').classList.remove('active');
    }

    // 點擊彈窗外部關閉
    document.getElementById('monthlyModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });

    // 取得班別樣式類別
    function getShiftClass(shift) {
        if (!shift || shift === '-') return '';
        const classMap = {
            '早': 'shift-早',
            '晚': 'shift-晚',
            '全': 'shift-全',
            '休': 'shift-休',
            '值': 'shift-值',
            '特': 'shift-特'
        };
        return classMap[shift] || '';
    }

    // 取得班別樣式（inline style）
    function getShiftStyle(shift) {
        if (!shift || shift === '-') return '';
        const styleMap = {
            '早': 'background: rgba(76, 175, 80, 0.15); color: #4caf50; font-weight: 600; border-radius: 4px; padding: 4px 8px;',
            '晚': 'background: rgba(250, 191, 19, 0.15); color: #FABF13; font-weight: 600; border-radius: 4px; padding: 4px 8px;',
            '全': 'background: rgba(255, 152, 0, 0.15); color: #ff9800; font-weight: 600; border-radius: 4px; padding: 4px 8px;',
            '休': 'background: rgba(100, 116, 139, 0.1); color: #64748b; border-radius: 4px; padding: 4px 8px;',
            '值': 'background: rgba(156, 39, 176, 0.15); color: #9c27b0; font-weight: 600; border-radius: 4px; padding: 4px 8px;',
            '特': 'background: rgba(250, 191, 19, 0.15); color: #FABF13; font-weight: 600; border-radius: 4px; padding: 4px 8px;'
        };
        return styleMap[shift] || '';
    }

    // HTML 轉義
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
{% endblock %}
