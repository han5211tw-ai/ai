<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>請購調撥需求表 - 電腦舖</title>
    <script>window.version='20250301-0200';</script>
    <link rel="stylesheet" href="version-component.css">
    <link rel="stylesheet" href="shared/auth_ui.css">
    <script src="shared/auth_ui.js?v=20250303-1402"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html,body{overflow-x:hidden}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft JhengHei',sans-serif;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#16213e 100%);min-height:100vh;color:#fff;padding:20px}
        .container{max-width:1400px;margin:0 auto}
        h1{text-align:center;font-size:2em;margin-bottom:20px;background:linear-gradient(90deg,#00d4ff,#7b2cbf);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .login-section,.form-section{display:none}
        .login-section.active{display:flex;justify-content:center;align-items:center;min-height:100vh}
        .form-section.active{display:block}
        .login-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:40px;max-width:400px;width:100%;text-align:center}
        .login-box h2{color:#00d4ff;margin-bottom:30px}
        .form-group{margin-bottom:15px;text-align:left}
        .form-group label{display:block;margin-bottom:6px;color:#8892b0;font-size:0.95em}
        .form-group input,.form-group select{width:100%;max-width:100%;padding:10px 12px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;background:rgba(255,255,255,0.05);color:#fff;font-size:0.95em}
        .form-group input:focus,.form-group select:focus{outline:none;border-color:#00d4ff}
        select option{background:#1a1a2e;color:#fff}
        .btn{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;font-size:1em;cursor:pointer;transition:transform 0.2s}
        .btn:hover{transform:translateY(-2px)}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .error-msg{color:#f44336;margin-top:10px;font-size:0.95em}
        .user-info{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 15px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;font-size:0.95em;gap:10px}.user-info>div:first-child{flex:1}
        .user-info span{color:#00d4ff;font-weight:bold}
        .btn-logout{padding:3px 8px;font-size:0.8em;background:rgba(244,67,54,0.2);border:1px solid rgba(244,67,54,0.5);color:#f44336;border-radius:4px;cursor:pointer;white-space:nowrap;flex-shrink:0;width:auto;height:auto}
        .header-section{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin-bottom:20px}
        .header-title{color:#00d4ff;font-size:1.1em;margin-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:10px}
        .form-row{display:flex;gap:15px;margin-bottom:12px;flex-wrap:wrap}
        .form-field{flex:1;min-width:200px}
        .form-field label{display:block;margin-bottom:5px;color:#8892b0;font-size:0.9em}
        .form-field input,.form-field select{width:100%;padding:10px 12px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;background:rgba(255,255,255,0.05);color:#fff;font-size:0.95em}
        .form-field input:focus,.form-field select:focus{outline:none;border-color:#00d4ff}
        .customer-section{background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.2);border-radius:8px;padding:15px;margin-top:10px;display:none}
        .customer-section.active{display:block}
        .customer-search-wrapper{position:relative}
        .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#1a1a2e;border:1px solid rgba(255,255,255,0.2);border-radius:6px;max-height:200px;overflow-y:auto;z-index:100;display:none}
        .autocomplete-list.active{display:block}
        .autocomplete-item{padding:10px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.1)}
        .autocomplete-item:hover{background:rgba(0,212,255,0.1)}
        .customer-selected{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);border-radius:6px;padding:10px;margin-top:8px;display:none}
        .customer-selected.active{display:flex;justify-content:space-between;align-items:center}
        .products-section{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin-bottom:20px}
        .products-table{width:100%;border-collapse:collapse}
        .products-table th{text-align:left;padding:12px 10px;color:#8892b0;border-bottom:2px solid rgba(255,255,255,0.2);font-size:0.9em;font-weight:500}
        .products-table td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);vertical-align:top;height:60px;box-sizing:border-box}
        .products-table tr{height:60px}
        .product-row input{width:100%;padding:8px 10px;border:1px solid rgba(255,255,255,0.2);border-radius:4px;background:rgba(255,255,255,0.05);color:#fff;font-size:0.9em;box-sizing:border-box}
        .product-row input:focus{outline:none;border-color:#00d4ff}
        .product-row input.error{border-color:#f44336;background:rgba(244,67,54,0.1)}
        .product-autocomplete{position:absolute;top:100%;left:0;right:0;background:#1a1a2e;border:1px solid rgba(255,255,255,0.2);border-radius:4px;max-height:150px;overflow-y:auto;z-index:50;display:none}
        .product-autocomplete.active{display:block}
        .product-search-wrapper{position:relative}
        .btn-add{margin-top:15px;padding:10px 20px;background:rgba(0,212,255,0.2);border:1px solid #00d4ff;color:#00d4ff;border-radius:6px;cursor:pointer;font-size:0.95em;transition:all 0.2s}
        .btn-add:hover{background:rgba(0,212,255,0.3)}
        .btn-delete{padding:6px 12px;background:rgba(244,67,54,0.2);border:1px solid #f44336;color:#f44336;border-radius:4px;cursor:pointer;font-size:0.85em;transition:all 0.2s}
        .btn-delete:hover{background:rgba(244,67,54,0.3)}
        .field-error{color:#f44336;font-size:0.85em;margin-top:4px;display:none}
        .field-error.show{display:block}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;color:#fff;font-size:0.95em;z-index:1000;opacity:0;transition:opacity 0.3s}
        .toast.show{opacity:1}
        .toast.success{background:rgba(76,175,80,0.9)}
        .toast.error{background:rgba(244,67,54,0.9)}
        .toast-center{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px 40px;border-radius:12px;color:#fff;font-size:1.2em;z-index:2000;opacity:0;transition:opacity 0.3s;background:rgba(0,0,0,0.85);border:2px solid #00d4ff;box-shadow:0 0 20px rgba(0,212,255,0.3);text-align:center;min-width:300px}
        .toast-center.show{opacity:1}
        .toast-center.info{background:rgba(0,212,255,0.9)}
        .recent-section{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin-top:20px}
        .recent-section h3{color:#00d4ff;margin-bottom:15px;font-size:1.1em}
        .recent-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .recent-item .info{flex:1;min-width:200px;font-size:0.9em;line-height:1.5}
        .recent-item .status{display:inline-block;padding:4px 10px;border-radius:4px;font-size:0.85em;margin-right:10px}
        .status-pending{background:rgba(255,152,0,0.2);color:#ff9800}
        .status-cancelled{background:rgba(244,67,54,0.2);color:#f44336}
        .btn-cancel{padding:6px 12px;font-size:0.85em;background:rgba(244,67,54,0.2);border:1px solid rgba(244,67,54,0.5);color:#f44336;border-radius:4px;cursor:pointer}
        .btn-cancel:hover{background:rgba(244,67,54,0.3)}
        @media(max-width:768px){.form-row{flex-direction:column}.form-field{min-width:100%}.products-table{font-size:0.85em}.products-table th,.products-table td{padding:8px 5px}.recent-item{flex-direction:column;align-items:flex-start}}
    </style>
</head>
<body>
    <div class="container">
        <!-- 表單區 -->
        <div class="form-section" id="formSection" style="display:none;">
            <!-- 使用者資訊 - 完全複製 V1 -->
            <div class="user-info">
                <div>
                    填表人：<span id="userName">-</span>｜
                    單位：<span id="userDept">-</span>
                    <span id="storeSelectorContainer" style="display:none; margin-left: 15px; white-space: nowrap;">
                        代送門市：
                        <select id="supervisorStoreSelect" style="padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; font-size: 0.9em; width: auto;">
                            <option value="豐原門市">豐原門市</option>
                            <option value="潭子門市">潭子門市</option>
                            <option value="大雅門市">大雅門市</option>
                        </select>
                    </span>
                </div>
                <button class="btn btn-logout" onclick="logout()">登出</button>
            </div>

            <!-- 單據頭 -->
            <div class="header-section">
                <div class="header-title">📋 表單資訊</div>
                <div class="form-row">
                    <div class="form-field" style="flex:0.5">
                        <label>日期 *</label>
                        <input type="date" id="requestDate">
                    </div>
                    <div class="form-field" style="flex:0.5">
                        <label>需求類型 *</label>
                        <select id="requestType" onchange="onRequestTypeChange()">
                            <option value="請購">請購</option>
                            <option value="調撥">調撥</option>
                        </select>
                    </div>
                    <div class="form-field" style="flex:0.5">
                        <label>需求用途 *</label>
                        <select id="purpose" onchange="onPurposeChange()">
                            <option value="備貨">備貨</option>
                            <option value="客戶">客戶</option>
                        </select>
                    </div>
                </div>
                <div id="transferSection" style="display:none">
                    <div class="form-row">
                        <div class="form-field">
                            <label>調撥來源 *</label>
                            <select id="transferFrom">
                                <option value="">選擇來源門市</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div id="customerSection" class="customer-section">
                    <div class="form-row">
                        <div class="form-field" style="flex:2">
                            <label>客戶 *</label>
                            <div class="customer-search-wrapper" style="position:relative">
                                <input type="text" id="customerSearch" placeholder="輸入姓名或手機搜尋..." oninput="searchCustomer()">
                                <div id="customerAutocomplete" class="autocomplete-list"></div>
                                <input type="hidden" id="customerCode">
                                <input type="hidden" id="customerName">
                                <input type="hidden" id="customerMobile">
                                <div id="customerSelected" class="customer-selected">
                                    <div>
                                        <span style="color:#00d4ff">編號:</span> <span id="displayCustomerCode"></span>
                                        <span style="color:#00d4ff;margin-left:15px">姓名:</span> <span id="displayCustomerName"></span>
                                    </div>
                                    <button type="button" class="btn" onclick="clearCustomer()" style="background:rgba(255,255,255,0.1);padding:6px 12px;font-size:0.85em">清除</button>
                                </div>
                            </div>
                        </div>
                        <div class="form-field" style="flex:1">
                            <label>&nbsp;</label>
                            <button type="button" class="btn" onclick="showNewCustomerDialog()" style="width:100%;background:rgba(0,212,255,0.2)">+ 新客戶</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 產品明細 -->
            <div class="products-section">
                <div class="header-title">📦 產品明細（可多列）<span style="color:#8892b0;font-size:0.8em">預設5行，點+新增</span></div>
                <table class="products-table">
                    <thead>
                        <tr>
                            <th style="width:25%">產品編號 <span style="font-size:0.75em;color:#666">(英數+-)</span></th>
                            <th style="width:30%">產品品名 *</th>
                            <th style="width:12%">數量 *</th>
                            <th style="width:18%">備註</th>
                            <th style="width:8%">新品</th>
                            <th style="width:7%"></th>
                        </tr>
                    </thead>
                    <tbody id="productsBody"></tbody>
                </table>
                <button type="button" class="btn-add" onclick="addProductRow()">+ 新增產品列</button>
            </div>

            <div style="text-align:center;padding:20px">
                <button id="submitBtn" class="btn" onclick="submitForm()" style="padding:14px 50px;font-size:1.1em">提交送出</button>
            </div>

            <!-- 最近提交區塊（30分鐘內可取消） -->
            <div class="recent-section" id="recentSection" style="display:none;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin-top:20px;">
                <h3 id="recentTitle" style="color:#00d4ff;margin-bottom:15px;font-size:1.1em">📝 最近提交（30分鐘內可取消）</h3>
                <div id="recentList"></div>
            </div>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script>
    // 全局變數
    let currentUser=null;
    const allStores=['豐原門市','潭子門市','大雅門市','業務部','總公司倉庫'];
    let productRowCount=0;
    let customerSearchTimer=null;
    let productSearchTimers={};
    let isSubmitting=false; // 防重複提交旗標

    // 初始化
    document.addEventListener('DOMContentLoaded',function(){
        // 使用本地時間（台灣 UTC+8），避免 UTC 轉換導致日期錯誤
        const now=new Date();
        const year=now.getFullYear();
        const month=String(now.getMonth()+1).padStart(2,'0');
        const day=String(now.getDate()).padStart(2,'0');
        const today=`${year}-${month}-${day}`;
        document.getElementById('requestDate').value=today;
        for(let i=0;i<5;i++)addProductRow();
    });

    // 初始化 - 使用共用登入元件
    document.addEventListener('DOMContentLoaded',async function(){
        console.log('[NeedsInput] Initializing with shared auth...');
        
        try{
            // 使用共用登入元件
            const user=await requireLogin({
                minRole:'staff',
                title:'🛒 請購調撥需求表',
                subtitle:'身分證後四碼驗證'
            });
            
            console.log('[NeedsInput] Login success:',user);
            currentUser=user;
            
            // 顯示表單
            document.getElementById('formSection').style.display='block';
            document.getElementById('userName').textContent=user.name;
            document.getElementById('userDept').textContent=user.department;
            
            // 莊圍迪特殊處理
            if(user.name==='莊圍迪'){
                document.getElementById('storeSelectorContainer').style.display='inline';
                document.getElementById('supervisorStoreSelect').value='豐原門市';
            }else{
                document.getElementById('storeSelectorContainer').style.display='none';
            }
            
            // 初始化表單
            const today=new Date().toISOString().split('T')[0];
            document.getElementById('requestDate').value=today;
            for(let i=0;i<5;i++)addProductRow();
            initTransferSelect();
            loadRecentSubmissions();
        }catch(e){
            console.error('[NeedsInput] Login failed:',e);
        }
    });

    // 登出 - 使用共用元件
    function logout(){
        authLogout();
    }

    // 檢查是否為頁面重新載入（從其他頁面返回時自動登出）- 完全複製 V1
    window.onpageshow=function(event){
        if(event.persisted){
            logout();
        }
    };

    // 初始化調撥選單
    function initTransferSelect(){
        const select=document.getElementById('transferFrom');
        if(!select||!currentUser)return;
        select.innerHTML='<option value="">選擇來源門市</option>';
        allStores.filter(s=>s!==currentUser.department).forEach(store=>{
            const option=document.createElement('option');
            option.value=store;
            option.textContent=store;
            select.appendChild(option);
        });
        // 莊圍迪切換門市時重新載入最近提交
        const supervisorSelect=document.getElementById('supervisorStoreSelect');
        if(supervisorSelect){
            supervisorSelect.addEventListener('change',function(){
                if(currentUser&&currentUser.name==='莊圍迪'){
                    loadRecentSubmissions();
                }
            });
        }
    }

    // 用途變更
    function onPurposeChange(){
        const purpose=document.getElementById('purpose').value;
        const customerSection=document.getElementById('customerSection');
        if(purpose==='客戶'){customerSection.classList.add('active');}
        else{customerSection.classList.remove('active');clearCustomer();}
    }

    // 類型變更
    function onRequestTypeChange(){
        const type=document.getElementById('requestType').value;
        document.getElementById('transferSection').style.display=type==='調撥'?'block':'none';
    }

    // 客戶搜尋
    async function searchCustomer(){
        const searchInput=document.getElementById('customerSearch');
        const autocompleteList=document.getElementById('customerAutocomplete');
        const keyword=searchInput.value.trim();
        if(customerSearchTimer)clearTimeout(customerSearchTimer);
        autocompleteList.classList.remove('active');
        if(!keyword||keyword.length<2)return;
        if(/^\d+$/.test(keyword)&&keyword.length<3)return;
        customerSearchTimer=setTimeout(async()=>{
            try{
                const response=await fetch('/api/customers/search?keyword='+encodeURIComponent(keyword));
                const data=await response.json();
                if(!data.success||data.items.length===0){
                    autocompleteList.innerHTML='<div class="autocomplete-item" onclick="showNewCustomerDialog()" style="color:#f44336"><strong>🆕新客戶</strong>-點選填寫新客戶</div>';
                    autocompleteList.classList.add('active');return;
                }
                autocompleteList.innerHTML=data.items.map(item=>
                    '<div class="autocomplete-item" onclick="selectCustomer(\''+item.customer_id+'\',\''+item.short_name+'\',\''+(item.mobile||'')+'\')">'+
                    '<div style="font-weight:bold">'+item.short_name+'</div>'+
                    '<div style="font-size:0.85em;color:#8892b0">'+(item.mobile||'無電話')+'|'+item.customer_id+'</div>'+
                    '</div>'
                ).join('');
                autocompleteList.classList.add('active');
            }catch(error){console.error('搜尋失敗:',error);}
        },300);
    }

    // 選擇客戶
    function selectCustomer(code,name,mobile){
        document.getElementById('customerCode').value=code;
        document.getElementById('customerName').value=name;
        document.getElementById('customerMobile').value=mobile;
        document.getElementById('customerSearch').style.display='none';
        document.getElementById('customerAutocomplete').classList.remove('active');
        document.getElementById('displayCustomerCode').textContent=code;
        document.getElementById('displayCustomerName').textContent=name;
        document.getElementById('customerSelected').classList.add('active');
    }

    // 清除客戶
    function clearCustomer(){
        document.getElementById('customerCode').value='';
        document.getElementById('customerName').value='';
        document.getElementById('customerMobile').value='';
        document.getElementById('customerSearch').value='';
        document.getElementById('customerSearch').style.display='block';
        document.getElementById('customerSelected').classList.remove('active');
    }

    // 新客戶對話框
    function showNewCustomerDialog(){
        document.getElementById('customerAutocomplete').classList.remove('active');
        const name=prompt('請輸入新客戶姓名：');
        if(!name||!name.trim())return;
        const mobileInput=prompt('請輸入手機號碼（09開頭10碼）：');
        if(!mobileInput)return;
        // 正規化手機號碼
        const cleanMobile=normalizeMobile(mobileInput);
        // 登入格式
        if(!validateMobileFormat(cleanMobile)){
            showToast('手機格式錯誤，需09開頭10碼（輸入：'+mobileInput+'，正規化：'+cleanMobile+'）','error');
            return;
        }
        const tempId=generateTempCustomerId(cleanMobile);
        document.getElementById('customerCode').value=tempId;
        document.getElementById('customerName').value=name.trim();
        document.getElementById('customerMobile').value=cleanMobile;
        document.getElementById('customerSearch').style.display='none';
        document.getElementById('displayCustomerCode').textContent=tempId;
        document.getElementById('displayCustomerName').textContent=name.trim()+'(新客戶)';
        document.getElementById('customerSelected').classList.add('active');
        showToast('新客戶資料已暫存（手機：'+cleanMobile+'）','success');
    }

    // 手機號碼正規化
    function normalizeMobile(input){
        if(!input)return'';
        // 去除所有非數字字元
        let cleaned=input.replace(/[^0-9]/g,'');
        // 處理 +886 或 886 前綴
        if(cleaned.startsWith('886')&&cleaned.length>=10){
            cleaned='0'+cleaned.substring(3);
        }else if(cleaned.startsWith('09')&&cleaned.length===10){
            // 已經是 09 開頭，保持不變
        }else if(!cleaned.startsWith('0')&&cleaned.length===9){
            // 9 開頭且長度 9，補 0
            cleaned='0'+cleaned;
        }
        return cleaned;
    }

    // 登入手機格式
    function validateMobileFormat(mobile){
        return/^09\d{8}$/.test(mobile);
    }

    // 產生臨時客戶ID
    function generateTempCustomerId(mobile){
        let hash=0;
        for(let i=0;i<mobile.length;i++){
            hash=((hash<<5)-hash)+mobile.charCodeAt(i);
            hash=hash&0xFFFFFFFF;
        }
        return'TEMP-C-'+Math.abs(hash).toString(16).toUpperCase().padStart(8,'0');
    }

    // 產生臨時產品ID
    function generateTempProductId(){
        const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let uuid='';
        for(let i=0;i<8;i++)uuid+=chars.charAt(Math.floor(Math.random()*chars.length));
        return'TEMP-P-'+uuid;
    }

    // 登入產品編號
    function validateProductCode(code){
        if(!code)return true;
        return/^[A-Za-z0-9\-]+$/.test(code);
    }

    // 產品編號輸入處理
    function onProductCodeInput(rowId){
        const input=document.getElementById('prodCode'+rowId);
        const errorDiv=document.getElementById('codeError'+rowId);
        if(!validateProductCode(input.value)){
            input.classList.add('error');
            errorDiv.classList.add('show');
        }else{
            input.classList.remove('error');
            errorDiv.classList.remove('show');
        }
    }

    // 添加產品行
    function addProductRow(){
        productRowCount++;
        const tbody=document.getElementById('productsBody');
        const row=document.createElement('tr');
        row.className='product-row';
        row.id='productRow'+productRowCount;
        row.innerHTML=
            '<td><div class="product-search-wrapper" style="position:relative">'+
            '<input type="text" id="prodCode'+productRowCount+'" placeholder="編號(英數+-)" oninput="onProductCodeInput('+productRowCount+');searchProduct('+productRowCount+')">'+
            '<div id="codeError'+productRowCount+'" class="field-error">只能輸入英文、數字、-</div>'+
            '<div id="prodAutocomplete'+productRowCount+'" class="product-autocomplete"></div>'+
            '<div id="prodStock'+productRowCount+'" style="display:none;margin-top:4px;"></div></div></td>'+
            '<td><input type="text" id="prodName'+productRowCount+'" placeholder="輸入品名搜尋..." oninput="searchProduct('+productRowCount+',true)"></td>'+
            '<td><input type="number" id="prodQty'+productRowCount+'" min="1" value="1" style="text-align:center"></td>'+
            '<td><input type="text" id="prodRemark'+productRowCount+'" placeholder="選填"></td>'+
            '<td style="text-align:center"><input type="checkbox" id="prodNew'+productRowCount+'" onchange="onNewProductChange('+productRowCount+')"></td>'+
            '<td><button type="button" class="btn-delete" onclick="deleteProductRow('+productRowCount+')">刪除</button></td>';
        tbody.appendChild(row);
    }

    // 刪除產品行
    function deleteProductRow(rowId){
        const row=document.getElementById('productRow'+rowId);
        if(row)row.remove();
    }

    // 產品搜尋
    async function searchProduct(rowId,byName){
        const inputId=byName?'prodName'+rowId:'prodCode'+rowId;
        const input=document.getElementById(inputId);
        const autocomplete=document.getElementById('prodAutocomplete'+rowId);
        const keyword=input.value.trim();
        if(productSearchTimers[rowId])clearTimeout(productSearchTimers[rowId]);
        autocomplete.classList.remove('active');
        if(!keyword||keyword.length<2)return;
        productSearchTimers[rowId]=setTimeout(async()=>{
            try{
                const response=await fetch('/api/products/search?keyword='+encodeURIComponent(keyword));
                const data=await response.json();
                if(!data.success||!data.items||data.items.length===0)return;
                autocomplete.innerHTML=data.items.slice(0,5).map(item=>
                    '<div class="autocomplete-item" onclick="selectProduct('+rowId+',\''+item.product_code+'\',\''+item.item_name+'\')">'+
                    '<strong>'+item.product_code+'</strong>-'+item.item_name+
                    '</div>'
                ).join('');
                autocomplete.classList.add('active');
            }catch(error){console.error('產品搜尋失敗:',error);}
        },300);
    }

    // 選擇產品
    function selectProduct(rowId,code,name){
        document.getElementById('prodCode'+rowId).value=code;
        document.getElementById('prodName'+rowId).value=name;
        document.getElementById('prodAutocomplete'+rowId).classList.remove('active');
        document.getElementById('prodNew'+rowId).checked=false;
        onProductCodeInput(rowId);
        // 查詢並顯示庫存
        queryProductStock(rowId,code);
    }

    // 查詢產品庫存
    async function queryProductStock(rowId,productCode){
        const stockDiv=document.getElementById('prodStock'+rowId);
        if(!stockDiv)return;
        try{
            const response=await fetch('/api/product/info?code='+encodeURIComponent(productCode));
            const data=await response.json();
            if(data.found&&data.stock&&data.stock.length>0){
                const totalStock=data.stock.reduce((sum,item)=>sum+item.qty,0);
                if(totalStock===0){
                    // 庫存為0顯示紅字
                    stockDiv.innerHTML='<div style="color:#f44336;font-size:0.85em;margin-top:4px">庫存: 0（無庫存）</div>';
                }else{
                    const stockDetails=data.stock.map(s=>s.warehouse+':'+s.qty).join(' / ');
                    stockDiv.innerHTML='<div style="color:#00d4ff;font-size:0.8em;margin-top:4px;line-height:1.4"><div>總庫存: '+totalStock+'</div><div style="color:#8892b0;font-size:0.9em;">'+stockDetails+'</div></div>';
                }
                stockDiv.style.display='block';
            }else{
                // 無庫存資料也顯示紅字
                stockDiv.innerHTML='<div style="color:#f44336;font-size:0.85em;margin-top:4px">庫存: 0（無庫存）</div>';
                stockDiv.style.display='block';
            }
        }catch(error){
            console.error('庫存查詢失敗:',error);
            stockDiv.style.display='none';
        }
    }

    // 新品變更
    function onNewProductChange(rowId){
        const isNew=document.getElementById('prodNew'+rowId).checked;
        const codeInput=document.getElementById('prodCode'+rowId);
        const stockDiv=document.getElementById('prodStock'+rowId);
        if(isNew){
            codeInput.value=generateTempProductId();
            codeInput.readOnly=true;
            codeInput.style.background='rgba(0,212,255,0.1)';
            // 新品不顯示庫存
            if(stockDiv)stockDiv.style.display='none';
        }else{
            codeInput.value='';
            codeInput.readOnly=false;
            codeInput.style.background='';
            if(stockDiv)stockDiv.style.display='none';
        }
    }

    // 表單提交
    async function submitForm(){
        // 防重複提交檢查
        if(isSubmitting){
            showToast('已送出處理中，請稍候','warning');
            return;
        }
        isSubmitting=true;
        const submitBtn=document.getElementById('submitBtn');
        submitBtn.disabled=true;
        submitBtn.textContent='送出中…';

        try{
            const date=document.getElementById('requestDate').value;
            const requestType=document.getElementById('requestType').value;
            const purpose=document.getElementById('purpose').value;
            if(!date){showToast('請選擇日期','error');return;}
            let customerCode='',customerName='',customerMobile='';
            let isNewCustomer=false,customerStagingId=null;
            if(purpose==='客戶'){
                customerCode=document.getElementById('customerCode').value;
                customerName=document.getElementById('customerName').value;
                // 正規化手機號碼
                const rawMobile=document.getElementById('customerMobile').value;
                customerMobile=normalizeMobile(rawMobile);
                // 登入手機格式
                if(customerMobile&&!validateMobileFormat(customerMobile)){
                    showToast('客戶手機格式錯誤（正規化後：'+customerMobile+'）','error');
                    return;
                }
                if(!customerCode){showToast('請選擇或填寫客戶資料','error');return;}
                isNewCustomer=customerCode.startsWith('TEMP-');
                if(isNewCustomer)customerStagingId=customerCode;
            }
            let transferFrom='';
            if(requestType==='調撥'){
                transferFrom=document.getElementById('transferFrom').value;
                if(!transferFrom){showToast('請選擇調撥來源門市','error');return;}
            }
            const items=[];
            let hasNewProduct=false;
            const rows=document.querySelectorAll('.product-row');
            for(let i=0;i<rows.length;i++){
                const rowId=rows[i].id.replace('productRow','');
                const codeInput=document.getElementById('prodCode'+rowId);
                const code=codeInput.value.trim();
                const name=document.getElementById('prodName'+rowId).value.trim();
                const qty=parseInt(document.getElementById('prodQty'+rowId).value);
                const remark=document.getElementById('prodRemark'+rowId).value.trim();
                const isNew=document.getElementById('prodNew'+rowId).checked;
                if(!name&&!code)continue;
                if(!name){showToast('第'+(i+1)+'列品名不可為空','error');return;}
                if(!qty||qty<1){showToast('第'+(i+1)+'列數量必須大於0','error');return;}
                if(code&&!validateProductCode(code)){showToast('第'+(i+1)+'列產品編號只能輸入英數及-','error');codeInput.focus();return;}
                let productStagingId=null;
                let isNewProductFlag=false;
                let finalProductCode=code;
                // 方案B：強制勾選 - 無編號時必須勾選新品
                if(!code&&name&&!isNew){
                    showToast('第'+(i+1)+'列：無產品編號時，請勾選「新品」或輸入產品編號','error');
                    return;
                }
                // 判斷是否為新品：必須勾選 checkbox
                if(isNew){
                    isNewProductFlag=true;
                    hasNewProduct=true;
                    productStagingId=generateTempProductId();
                    finalProductCode=productStagingId; // 新品使用 TEMP-P-XXX 作為編號
                }
                items.push({product_code:finalProductCode,product_name:name,quantity:qty,remark:remark,is_new_product:isNewProductFlag,product_staging_id:productStagingId});
            }
            if(items.length===0){showToast('請至少填寫一筆產品','error');return;}

            // 新客戶與新品提示 - 同時顯示在畫面中央
            const hasNewCustomer=isNewCustomer;
            const newProductCount=items.filter(i=>i.is_new_product).length;

            if(hasNewCustomer||hasNewProduct){
                let promptMessage='';
                if(hasNewCustomer){
                    promptMessage+='👤 新客戶將進入待建檔中心\n';
                }
                if(hasNewProduct){
                    promptMessage+='📦 新品將進入待建檔中心（'+newProductCount+'筆）';
                }
                showToastCenter(promptMessage.trim(),'info',3500);
                // 等待 2 秒讓用戶看到提示
                await new Promise(resolve=>setTimeout(resolve,2000));
            }

            // 將 header 資料合併到每個 item（符合 /api/needs/batch 格式）
            const fullItems=items.map(item=>({
                ...item,
                date:date,
                request_type:requestType,
                purpose:purpose,
                department:currentUser.department,
                requester:currentUser.name,
                transfer_from:transferFrom,
                customer_code:customerCode,
                customer_name:customerName,
                customer_mobile:customerMobile,
                is_new_customer:isNewCustomer,
                customer_staging_id:customerStagingId
            }));
            console.log('[DEBUG] Sending API request with items:',fullItems.length,fullItems);
            const response=await fetch('/api/needs/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:fullItems})});
            console.log('[DEBUG] API response status:',response.status);
            const data=await response.json();
            console.log('[DEBUG] API response data:',data);
            if(data.success){
                // 構建成功訊息
                let successMsg='成功提交 '+data.count+' 筆需求';
                if(data.customer_staging_id){
                    successMsg+='\n客戶 staging: '+data.customer_staging_id;
                }
                if(data.product_staging_count&&data.product_staging_count>0){
                    successMsg+='\n新品待建檔: '+data.product_staging_count+' 筆';
                }
                showToast(successMsg,'success');
                resetForm();
            }else{showToast(data.message||'提交失敗','error');}
        }catch(error){
            console.error('[DEBUG] API error:',error);
            showToast('提交失敗，請稍後再試','error');
        }finally{
            isSubmitting=false;
            submitBtn.disabled=false;
            submitBtn.textContent='提交送出';
        }
    }

    // 重置表單
    function resetForm(){
        document.getElementById('purpose').value='備貨';
        document.getElementById('requestType').value='請購';
        onPurposeChange();
        onRequestTypeChange();
        clearCustomer();
        document.getElementById('productsBody').innerHTML='';
        productRowCount=0;
        for(let i=0;i<5;i++)addProductRow();
        loadRecentSubmissions();
    }

    // 載入最近提交的單據（30分鐘內可取消）
    async function loadRecentSubmissions(){
        if(!currentUser)return;
        const submitDepartment=(currentUser.name==='莊圍迪'?document.getElementById('supervisorStoreSelect').value:currentUser.department);
        try{
            const response=await fetch('/api/needs/recent?department='+encodeURIComponent(submitDepartment)+'&current_user='+encodeURIComponent(currentUser.name)+'&_='+Date.now());
            const data=await response.json();
            if(data.items&&data.items.length>0){
                document.getElementById('recentSection').style.display='block';
                const listHtml=data.items.map(item=>{
                    const isNewProduct=item.is_new_product===1||item.is_new_product==='1';
                    const isNewCustomer=item.is_new_customer===1||item.is_new_customer==='1';
                    let productDisplay=item.product_code;
                    if(isNewProduct){
                        if(item.product_status==='pending'){
                            productDisplay='<span style="color:#f44336;font-weight:bold;">'+item.product_code+' (新品待建檔)</span>';
                        }else if(item.product_status==='approved'){
                            productDisplay=item.product_code+' <span style="color:#4caf50;">✓ 已建檔</span>';
                        }
                    }
                    let customerDisplay=item.customer_code||'-';
                    if(isNewCustomer&&item.purpose==='客戶'){
                        if(item.customer_status==='pending'){
                            customerDisplay='<span style="color:#f44336;font-weight:bold;">'+item.customer_code+' (新客戶待建檔)</span>';
                        }else if(item.customer_status==='approved'){
                            customerDisplay=item.customer_code+' <span style="color:#4caf50;">✓ 已建檔</span>';
                        }
                    }
                    return '<div class="recent-item">'+
                        '<div class="info">'+
                            '<strong>'+item.date+'</strong> | 填表人: '+item.requester+' | 產品: '+productDisplay+' | 數量: '+item.quantity+
                            ' | 類型: '+(item.request_type||'請購')+(item.transfer_from?'(來源:'+item.transfer_from+')':'')+
                            ' | 用途: '+(item.purpose==='客戶'?'客戶-'+customerDisplay:'備貨')+
                            (item.remark?' | 備註: '+item.remark:'')+
                        '</div>'+
                        '<div>'+
                            '<span class="status '+(item.status==='待處理'?'status-pending':'status-cancelled')+'">'+item.status+'</span>'+
                            (item.can_cancel?'<button class="btn-cancel" onclick="cancelItem('+item.id+')">取消</button>':'')+
                        '</div>'+
                    '</div>';
                }).join('');
                document.getElementById('recentList').innerHTML=listHtml;
            }else{
                document.getElementById('recentSection').style.display='none';
            }
        }catch(error){
            console.error('載入最近提交失敗:',error);
        }
    }

    // 取消項目
    async function cancelItem(id){
        if(!confirm('確定要取消這筆需求嗎？'))return;
        try{
            const response=await fetch('/api/needs/cancel',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({id:id,current_user:currentUser.name})
            });
            const data=await response.json();
            if(data.success){
                showToast('已取消','success');
                loadRecentSubmissions();
            }else{
                showToast(data.message||'取消失敗','error');
            }
        }catch(error){
            showToast('取消失敗','error');
        }
    }

    // 顯示提示（延長時間並支援點擊關閉）
    function showToast(message,type,duration){
        const toast=document.getElementById('toast');
        toast.textContent=message;
        toast.className='toast '+type+' show';
        // 預設時間：error/warning 5秒，success/info 8秒（含新品/新客戶資訊時較長）
        const displayDuration=duration||(type==='success'||type==='info'?8000:5000);

        // 清除之前的計時器
        if(toast.hideTimer)clearTimeout(toast.hideTimer);

        // 設定自動隱藏
        toast.hideTimer=setTimeout(()=>{toast.classList.remove('show');},displayDuration);

        // 點擊即可關閉
        toast.onclick=function(){toast.classList.remove('show');};
    }

    // 顯示置中提示（用於重要訊息如新品提示）
    function showToastCenter(message,type,duration){
        // 創建或取得置中 toast 元素
        let centerToast=document.getElementById('toastCenter');
        if(!centerToast){
            centerToast=document.createElement('div');
            centerToast.id='toastCenter';
            centerToast.className='toast-center';
            document.body.appendChild(centerToast);
        }
        centerToast.textContent=message;
        centerToast.className='toast-center '+type+' show';

        const displayDuration=duration||3000;

        // 清除之前的計時器
        if(centerToast.hideTimer)clearTimeout(centerToast.hideTimer);

        // 設定自動隱藏
        centerToast.hideTimer=setTimeout(()=>{centerToast.classList.remove('show');},displayDuration);

        // 點擊即可關閉
        centerToast.onclick=function(){centerToast.classList.remove('show');};
    }
    </script>
