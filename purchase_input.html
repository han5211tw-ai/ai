{% extends "base.html" %}

{% block title %}進貨輸入 - 電腦舖營運系統{% endblock %}

{% block page_title %}進貨輸入{% endblock %}

{% block styles %}
<style>
.container { 
    width: 100%; 
    margin: 0; 
    padding: 0; 
}
        .card {
            background: var(--color-bg-elevated);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-lg);
            padding: 30px;
            margin-bottom: 20px;
        }
        .card h2 {
            color: var(--color-accent-cyan);
            font-size: 1.1em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: var(--radius-sm);
            color: var(--color-text-secondary);
            font-size: 0.9em;
        }
        .form-group label .required {
            color: var(--color-status-error);
            margin-left: 4px;
        }
        .form-control {
            width: 100%;
            padding: var(--radius-md) var(--radius-lg);
            border: 1px solid var(--color-border-hover);
            border-radius: var(--radius-sm);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 1em;
            transition: all var(--transition-normal);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--color-accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        .form-control:read-only {
            background: var(--color-bg-hover);
            color: var(--color-text-secondary);
            cursor: not-allowed;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .suggestions {
            position: absolute;
            background: rgba(30, 30, 50, 0.95);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: var(--radius-sm);
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            width: 100%;
            margin-top: 5px;
        }
        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid var(--color-border-default);
        }
        .suggestion-item:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        .search-wrapper {
            position: relative;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: var(--radius-md);
            text-align: left;
            border: 1px solid var(--color-border-default);
        }
        th {
            background: rgba(0, 212, 255, 0.1);
            color: var(--color-accent-cyan);
            font-weight: 600;
        }
        td {
            color: var(--color-text-primary);
        }
        .btn-add {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            color: var(--color-accent-cyan);
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9em;
            margin-top: 15px;
            transition: all var(--transition-normal);
        }
        .btn-add:hover {
            background: rgba(0, 212, 255, 0.3);
        }
        .btn-delete {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.5);
            color: var(--color-status-error);
            padding: 6px var(--radius-md);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.8em;
        }
        .btn-delete:hover {
            background: rgba(244, 67, 54, 0.3);
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--color-accent-cyan), #7b2cbf);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all var(--transition-normal);
            margin-top: 20px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
        }
        .btn-continue {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.5);
            color: var(--color-status-warning);
            padding: 15px 40px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all var(--transition-normal);
            margin-top: 20px;
            margin-left: 10px;
        }
        .btn-continue:hover {
            background: rgba(255, 215, 0, 0.3);
        }
        .amount-display {
            color: var(--color-accent-cyan);
        }

        /* 資料列表樣式 */
        .data-section {
            background: var(--color-bg-elevated);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-top: 20px;
        }
        .data-section h3 {
            color: var(--color-accent-cyan);
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        .data-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .data-filters input {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 1px solid var(--color-border-hover);
            border-radius: var(--radius-sm);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 0.95em;
        }
        .data-filters input:focus {
            outline: none;
            border-color: var(--color-accent-cyan);
        }
        .data-filters button {
            padding: 10px 20px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            color: var(--color-accent-cyan);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9em;
            transition: all var(--transition-normal);
        }
        .data-filters button:hover {
            background: rgba(0, 212, 255, 0.3);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        .data-table th {
            background: rgba(0, 212, 255, 0.1);
            color: var(--color-accent-cyan);
            padding: var(--radius-md);
            text-align: left;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
        }
        .data-table td {
            padding: var(--radius-md);
            border-bottom: 1px solid var(--color-border-default);
            color: var(--color-text-primary);
        }
        .data-table tr:hover {
            background: var(--color-bg-elevated);
            cursor: pointer;
        }
        .data-pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            align-items: center;
        }
        .data-pagination button {
            padding: var(--radius-sm) var(--radius-lg);
            background: var(--color-border-default);
            border: 1px solid var(--color-border-hover);
            color: #fff;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.9em;
        }
        .data-pagination button:hover:not(:disabled) {
            background: var(--color-border-hover);
        }
        .data-pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .data-pagination span {
            color: var(--color-text-secondary);
            font-size: 0.9em;
        }

        /* 彈窗樣式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: linear-gradient(135deg, var(--color-bg-secondary) 0%, var(--color-bg-elevated) 100%);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-lg);
            padding: 30px;
            width: 90%;
            
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h3 {
            color: var(--color-accent-cyan);
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        .items-list {
            background: var(--color-bg-elevated);
            border-radius: var(--radius-sm);
            padding: 15px;
            margin-top: 15px;
        }
        .items-list h4 {
            color: var(--color-accent-cyan);
            margin-bottom: 10px;
            font-size: 1em;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            padding: var(--radius-sm) 0;
            border-bottom: 1px solid var(--color-border-default);
            font-size: 0.9em;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            justify-content: flex-end;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--color-accent-cyan), #7b2cbf);
            color: #fff;
            border: none;
            padding: var(--radius-md) 24px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.95em;
        }
        .btn-secondary {
            background: var(--color-border-default);
            border: 1px solid var(--color-border-hover);
            color: #fff;
            padding: var(--radius-md) 24px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.95em;
        }
            font-weight: 600;
        }
        .total-section {
            text-align: right;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: var(--radius-sm);
        }
        .total-amount {
            font-size: 1.5em;
            color: var(--color-accent-cyan);
            font-weight: bold;
        }
</style>
{% endblock %}

{% block content %}
<div class="container">
<script>
        let currentUser = null;
        let canEdit = false;
        let currentPage = 1;
        let totalPages = 1;
        let currentPurchase = null;

        // 頁面載入時檢查權限（只有老闆跟會計可以進入）
        window.onLoginSuccess = async function(user) {
            console.log('[Purchase] Login success:', user);
            // 檢查是否為老闆或會計
            const userTitle = user.title || '';
            if (userTitle !== '老闆' && !userTitle.includes('會計')) {
                alert('⚠️ 只有老闆跟會計可以進入進貨頁面');
                window.location.href = '/';
                return;
            }
            // 儲存使用者資訊並顯示
            currentUser = user;
            canEdit = true;
            // 填入操作人員編號（從 staff_passwords 表取得）
            await loadOperatorCode(user.name);
            // 載入進貨單列表
            loadPurchaseList();
        };
        
        // 如果已經登入，直接載入
        console.log('[Purchase] Checking localStorage for currentUser...');
        const storedUser = localStorage.getItem('currentUser');
        console.log('[Purchase] storedUser:', storedUser);
        if (storedUser) {
            try {
                const user = JSON.parse(storedUser);
                console.log('[Purchase] User found, calling onLoginSuccess:', user);
                window.onLoginSuccess(user);
            } catch (e) {
                console.error('[Purchase] Failed to parse user:', e);
            }
        } else {
            console.log('[Purchase] No user in localStorage, waiting for login...');
        }
    </script>

    <div class="container">
        <!-- 單據資訊 -->
        <div class="card">
            
            <div class="form-row">
                <div class="form-group">
                    <label>單號</label>
                    <input type="text" id="orderNo" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label>日期 <span class="required">*</span></label>
                    <input type="date" id="orderDate" class="form-control">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>廠商編號</label>
                    <input type="text" id="supplierId" class="form-control" readonly placeholder="自動帶出">
                </div>
                <div class="form-group search-wrapper">
                    <label>廠商名稱 <span class="required">*</span></label>
                    <input type="text" id="supplierSearch" class="form-control" placeholder="輸入廠商名稱搜尋..." autocomplete="off">
                    <div id="supplierSuggestions" class="suggestions" style="display: none;"></div>
                    <input type="hidden" id="supplierName">
                </div>
                <div class="form-group">
                    <label>倉庫 <span class="required">*</span></label>
                    <select id="warehouse" class="form-control">
                        <option value="">請選擇倉庫</option>
                        <option value="FY">FY - 豐原門市</option>
                        <option value="TZ">TZ - 潭子門市</option>
                        <option value="DY">DY - 大雅門市</option>
                        <option value="OW">OW - 業務部</option>
                        <option value="HQ">HQ - 總倉庫</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>發票號碼</label>
                    <input type="text" id="invoiceNumber" class="form-control" placeholder="選填">
                </div>
                <div class="form-group">
                    <label>操作人員編號</label>
                    <input type="text" id="operatorCode" class="form-control" readonly>
                </div>
            </div>
        </div>

        <!-- 產品明細 -->
        <div class="card">
            
            <table id="itemsTable">
                <thead>
                    <tr>
                        <th style="width: 15%;">產品編號 <span class="required">*</span></th>
                        <th style="width: 35%;">產品名稱</th>
                        <th style="width: 12%;">數量 <span class="required">*</span></th>
                        <th style="width: 15%;">單價 <span class="required">*</span></th>
                        <th style="width: 15%;">金額</th>
                        <th style="width: 8%;">操作</th>
                    </tr>
                </thead>
                <tbody id="itemsBody">
                    <!-- 預設三列 -->
                </tbody>
            </table>
            <div style="display: flex; gap: 10px; margin-top: 15px; align-items: center;">
                <button class="btn-add" onclick="addItemRow()">+ 新增明細</button>
                <a href="product_create.html" target="_blank" class="btn-add" style="background: rgba(255, 215, 0, 0.2); border-color: rgba(255, 215, 0, 0.5); color: var(--color-status-warning); text-decoration: none; display: inline-flex; align-items: center;">+ 新品建檔</a>
            </div>
            
            <div class="total-section">
                <div style="display: flex; flex-direction: column; gap: var(--radius-sm);">
                    <div>未稅總計：<span class="total-amount" id="subtotalAmount">0</span> 元</div>
                    <div style="color: var(--color-text-secondary);">稅額（5%）：<span id="taxAmount">0</span> 元</div>
                    <div style="font-size: 1.2em; color: var(--color-status-warning); font-weight: bold;">總計：<span id="totalAmount">0</span> 元</div>
                </div>
            </div>
        </div>

        <!-- 提交按鈕 -->
        <div style="text-align: center;">
            <button class="btn-submit" onclick="submitOrder(false)">💾 儲存進貨單</button>
            <button class="btn-continue" onclick="submitOrder(true)">➡️ 儲存並繼續下一張</button>
        </div>

        <!-- 資料列表區塊 -->
        <div class="data-section">
            
            <div class="data-filters">
                <input type="text" id="searchInput" placeholder="搜尋單號、廠商名稱..." onkeyup="if(event.key==='Enter')searchPurchases()">
                <button onclick="searchPurchases()">🔍 搜尋</button>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>單號</th>
                        <th>日期</th>
                        <th>廠商</th>
                        <th>倉庫</th>
                        <th>品項數</th>
                        <th>總金額</th>
                    </tr>
                </thead>
                <tbody id="purchaseTableBody">
                    <tr><td colspan="6" style="text-align:center;color:var(--color-text-secondary);padding:30px;">載入中...</td></tr>
                </tbody>
            </table>
            <div class="data-pagination">
                <button onclick="changePage(-1)" id="prevBtn">← 上一頁</button>
                <span id="pageInfo">第 1 頁</span>
                <button onclick="changePage(1)" id="nextBtn">下一頁 →</button>
            </div>
        </div>
    </div>

    <!-- 檢視彈窗 -->
    <div class="modal-overlay" id="viewModal">
        <div class="modal">
            
            <div id="modalContent"></div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal()">關閉</button>
            </div>
        </div>
    </div>

    <script>
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initOrderNo();
            initDate();
            initDefaultRows();
            setupSupplierSearch();
        });

        // 產生單號
        async function initOrderNo() {
            try {
                const response = await fetch('/api/purchase/next-order-no');
                const data = await response.json();
                if (data.success) {
                    document.getElementById('orderNo').value = data.order_no;
                }
            } catch (error) {
                console.error('取得單號失敗:', error);
            }
        }

        // 設定日期預設值
        function initDate() {
            document.getElementById('orderDate').valueAsDate = new Date();
        }

        // 預設三列明細
        function initDefaultRows() {
            for (let i = 0; i < 3; i++) {
                addItemRow();
            }
        }

        // 廠商搜尋
        function setupSupplierSearch() {
            const input = document.getElementById('supplierSearch');
            const suggestions = document.getElementById('supplierSuggestions');
            
            input.addEventListener('input', async function() {
                const keyword = this.value.trim();
                if (keyword.length < 1) {
                    suggestions.style.display = 'none';
                    return;
                }
                
                try {
                    const response = await fetch(`/api/suppliers/search?keyword=${encodeURIComponent(keyword)}`);
                    const data = await response.json();
                    
                    if (data.success && data.suppliers.length > 0) {
                        suggestions.innerHTML = data.suppliers.map(s => 
                            `<div class="suggestion-item" onclick="selectSupplier('${s.supplier_name}')">${s.supplier_name}</div>`
                        ).join('');
                        suggestions.style.display = 'block';
                    } else {
                        suggestions.style.display = 'none';
                    }
                } catch (error) {
                    console.error('搜尋廠商失敗:', error);
                }
            });
            
            // 點擊外部關閉建議
            document.addEventListener('click', function(e) {
                if (!input.contains(e.target) && !suggestions.contains(e.target)) {
                    suggestions.style.display = 'none';
                }
            });
        }

        // 選擇廠商
        async function selectSupplier(name) {
            document.getElementById('supplierSearch').value = name;
            document.getElementById('supplierName').value = name;
            document.getElementById('supplierSuggestions').style.display = 'none';
            
            // 查詢廠商編號
            try {
                const response = await fetch(`/api/supplier/info?name=${encodeURIComponent(name)}`);
                const data = await response.json();
                if (data.success && data.supplier) {
                    document.getElementById('supplierId').value = data.supplier.supplier_id || '';
                }
            } catch (error) {
                console.error('取得廠商編號失敗:', error);
            }
        }

        // 新增明細列
        function addItemRow() {
            const tbody = document.getElementById('itemsBody');
            const row = document.createElement('tr');
            const rowIndex = tbody.children.length;
            
            row.innerHTML = `
                <td>
                    <input type="text" class="form-control product-code-display" readonly placeholder="自動帶出">
                </td>
                <td>
                    <div class="search-wrapper">
                        <input type="text" class="form-control product-search" placeholder="輸入產品名稱搜尋..." autocomplete="off" oninput="searchProducts(this, ${rowIndex})">
                        <div class="suggestions product-suggestions" id="productSuggestions${rowIndex}" style="display: none;"></div>
                        <input type="hidden" class="product-code">
                        <input type="hidden" class="product-name">
                    </div>
                </td>
                <td>
                    <input type="number" class="form-control quantity" placeholder="0" min="1" onchange="calculateRowAmount(this)">
                </td>
                <td>
                    <input type="number" class="form-control price" placeholder="0" min="0" onchange="calculateRowAmount(this)">
                </td>
                <td class="amount-display row-amount">0</td>
                <td>
                    <button class="btn-delete" onclick="deleteRow(this)">刪除</button>
                </td>
            `;
            
            tbody.appendChild(row);
        }

        // 搜尋產品
        async function searchProducts(input, rowIndex) {
            const keyword = input.value.trim();
            const suggestions = document.getElementById(`productSuggestions${rowIndex}`);

            if (keyword.length < 1) {
                suggestions.style.display = 'none';
                return;
            }

            try {
                const response = await fetch(`/api/products/search?keyword=${encodeURIComponent(keyword)}`);
                const data = await response.json();

                if (data.success && data.items && data.items.length > 0) {
                    suggestions.innerHTML = data.items.map(p =>
                        `<div class="suggestion-item" onclick="selectProduct(${rowIndex}, '${p.product_code}', '${p.item_name.replace(/'/g, "\'")}')">${p.item_name} (${p.product_code})</div>`
                    ).join('');
                    suggestions.style.display = 'block';
                } else {
                    suggestions.style.display = 'none';
                }
            } catch (error) {
                console.error('搜尋產品失敗:', error);
            }
        }

        // 選擇產品
        function selectProduct(rowIndex, code, name) {
            const row = document.getElementById('itemsBody').children[rowIndex];
            row.querySelector('.product-search').value = name;
            row.querySelector('.product-code').value = code;
            row.querySelector('.product-name').value = name;
            row.querySelector('.product-code-display').value = code;
            document.getElementById(`productSuggestions${rowIndex}`).style.display = 'none';
        }

        // 計算列金額
        function calculateRowAmount(input) {
            const row = input.closest('tr');
            const quantity = parseInt(row.querySelector('.quantity').value) || 0;
            const price = parseInt(row.querySelector('.price').value) || 0;
            const amount = quantity * price;
            row.querySelector('.row-amount').textContent = amount.toLocaleString();
            calculateTotal();
        }

        // 載入操作人員編號
        async function loadOperatorCode(userName) {
            if (!userName) return;
            try {
                const response = await fetch(`/api/staff/code?name=${encodeURIComponent(userName)}`);
                const data = await response.json();
                if (data.success && data.code) {
                    document.getElementById('operatorCode').value = data.code;
                }
            } catch (error) {
                console.error('載入操作人員編號失敗:', error);
            }
        }

        // 計算總金額
        function calculateTotal() {
            let subtotal = 0;
            document.querySelectorAll('.row-amount').forEach(el => {
                subtotal += parseInt(el.textContent.replace(/,/g, '')) || 0;
            });
            
            // 計算稅額（有發票號碼才計算 5%）
            const invoiceNumber = document.getElementById('invoiceNumber').value.trim();
            let tax = 0;
            if (invoiceNumber) {
                tax = Math.round(subtotal * 0.05);
            }
            
            const total = subtotal + tax;
            
            document.getElementById('subtotalAmount').textContent = subtotal.toLocaleString();
            document.getElementById('taxAmount').textContent = tax.toLocaleString();
            document.getElementById('totalAmount').textContent = total.toLocaleString();
        }
        
        // 監聽發票號碼變化，重新計算稅額
        document.getElementById('invoiceNumber').addEventListener('input', calculateTotal);

        // 刪除列
        function deleteRow(btn) {
            const tbody = document.getElementById('itemsBody');
            if (tbody.children.length > 1) {
                btn.closest('tr').remove();
                calculateTotal();
            } else {
                alert('至少需要保留一筆明細');
            }
        }

        // 提交單據
        async function submitOrder(continueNext) {
            // 驗證必填欄位
            const orderNo = document.getElementById('orderNo').value;
            const orderDate = document.getElementById('orderDate').value;
            const supplierName = document.getElementById('supplierName').value || document.getElementById('supplierSearch').value;
            const warehouse = document.getElementById('warehouse').value;
            
            if (!orderDate || !supplierName || !warehouse) {
                alert('請填寫必填欄位（日期、廠商、倉庫）');
                return;
            }
            
            // 收集明細
            const items = [];
            let hasError = false;
            
            document.querySelectorAll('#itemsBody tr').forEach((row, index) => {
                const productCode = row.querySelector('.product-code').value;
                const productName = row.querySelector('.product-name').value || row.querySelector('.product-search').value;
                const quantity = parseInt(row.querySelector('.quantity').value) || 0;
                const price = parseInt(row.querySelector('.price').value) || 0;
                
                if (productName && quantity > 0 && price >= 0) {
                    items.push({
                        product_code: productCode,
                        product_name: productName,
                        quantity: quantity,
                        price: price,
                        amount: quantity * price
                    });
                } else if (productName || quantity > 0 || price > 0) {
                    hasError = true;
                }
            });
            
            if (hasError) {
                alert('請完整填寫所有明細（產品名稱、數量、單價）');
                return;
            }
            
            if (items.length === 0) {
                alert('請至少輸入一筆產品明細');
                return;
            }
            
            // 提交資料
            const payload = {
                order_no: orderNo,
                date: orderDate,
                supplier_name: supplierName,
                warehouse: warehouse,
                invoice_number: document.getElementById('invoiceNumber').value || null,
                items: items,
                total_amount: parseInt(document.getElementById('totalAmount').textContent.replace(/,/g, '')),
                created_by: document.getElementById('operatorCode').value
            };
            
            try {
                const response = await fetch('/api/purchase/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`進貨單 ${orderNo} 儲存成功！`);
                    
                    if (continueNext) {
                        // 繼續下一張：保留日期、廠商、倉庫，清空明細和發票號碼
                        document.getElementById('invoiceNumber').value = '';
                        document.getElementById('itemsBody').innerHTML = '';
                        initDefaultRows();
                        calculateTotal();
                        initOrderNo(); // 重新產生單號
                    } else {
                        // 儲存：清空所有
                        location.reload();
                    }
                } else {
                    alert('儲存失敗：' + data.message);
                }
            } catch (error) {
                console.error('提交失敗:', error);
                alert('儲存失敗，請檢查網路連線');
            }
        }

        // 載入進貨單列表
        async function loadPurchaseList(page = 1, search = '') {
            console.log('[Purchase] loadPurchaseList called, page:', page);
            currentPage = page;
            try {
                const url = `/api/purchases/list?page=${page}&limit=50&search=${encodeURIComponent(search)}`;
                console.log('[Purchase] Fetching URL:', url);
                const response = await fetch(url);
                console.log('[Purchase] Response status:', response.status);
                const data = await response.json();
                console.log('[Purchase] Response data:', data);

                if (data.success) {
                    console.log('[Purchase] Rendering', data.purchases.length, 'purchases');
                    renderPurchaseTable(data.purchases);
                    totalPages = data.total_pages;
                    updatePagination(data.page, data.total_pages, data.total);
                } else {
                    console.error('[Purchase] API returned error:', data);
                    document.getElementById('purchaseTableBody').innerHTML = 
                        '<tr><td colspan="6" style="text-align:center;color:var(--color-status-error);padding:30px;">載入失敗: ' + (data.message || '未知錯誤') + '</td></tr>';
                }
            } catch (error) {
                console.error('[Purchase] 載入進貨單列表失敗:', error);
                document.getElementById('purchaseTableBody').innerHTML = 
                    '<tr><td colspan="6" style="text-align:center;color:var(--color-status-error);padding:30px;">載入失敗</td></tr>';
            }
        }

        // 渲染表格
        function renderPurchaseTable(purchases) {
            const tbody = document.getElementById('purchaseTableBody');
            if (purchases.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--color-text-secondary);padding:30px;">暫無資料</td></tr>';
                return;
            }

            tbody.innerHTML = purchases.map(p => `
                <tr onclick="viewPurchase('${p.order_no}')">
                    <td>${p.order_no}</td>
                    <td>${p.date}</td>
                    <td>${p.supplier_name}</td>
                    <td>${p.warehouse}</td>
                    <td>${p.item_count} 項</td>
                    <td>${p.total_amount.toLocaleString()} 元</td>
                </tr>
            `).join('');
        }

        // 更新分頁
        function updatePagination(page, totalPages, total) {
            document.getElementById('pageInfo').textContent = `第 ${page} / ${totalPages} 頁 (共 ${total} 筆)`;
            document.getElementById('prevBtn').disabled = page <= 1;
            document.getElementById('nextBtn').disabled = page >= totalPages;
        }

        // 切換頁面
        function changePage(direction) {
            const newPage = currentPage + direction;
            if (newPage >= 1 && newPage <= totalPages) {
                const search = document.getElementById('searchInput').value.trim();
                loadPurchaseList(newPage, search);
            }
        }

        // 搜尋
        function searchPurchases() {
            const search = document.getElementById('searchInput').value.trim();
            loadPurchaseList(1, search);
        }

        // 檢視進貨單詳情
        async function viewPurchase(orderNo) {
            try {
                const response = await fetch(`/api/purchases/list?search=${encodeURIComponent(orderNo)}`);
                const data = await response.json();
                if (data.success && data.purchases.length > 0) {
                    currentPurchase = data.purchases[0];
                    showModal(currentPurchase);
                }
            } catch (error) {
                console.error('載入進貨單詳情失敗:', error);
            }
        }

        // 顯示彈窗
        function showModal(purchase) {
            const itemsHtml = purchase.items.map(item => `
                <div class="item-row">
                    <span>${item.product_name} ${item.product_code ? '(' + item.product_code + ')' : ''}</span>
                    <span>${item.quantity} x ${item.price.toLocaleString()} = ${item.amount.toLocaleString()} 元</span>
                </div>
            `).join('');

            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <div class="form-row">
                    <div class="form-group">
                        <label>單號</label>
                        <input type="text" class="form-control" value="${purchase.order_no}" readonly>
                    </div>
                    <div class="form-group">
                        <label>日期</label>
                        <input type="text" class="form-control" value="${purchase.date}" readonly>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>廠商</label>
                        <input type="text" class="form-control" value="${purchase.supplier_name}" readonly>
                    </div>
                    <div class="form-group">
                        <label>倉庫</label>
                        <input type="text" class="form-control" value="${purchase.warehouse}" readonly>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>發票號碼</label>
                        <input type="text" class="form-control" value="${purchase.invoice_number || '-'}" readonly>
                    </div>
                    <div class="form-group">
                        <label>操作人員</label>
                        <input type="text" class="form-control" value="${purchase.created_by || '-'}" readonly>
                    </div>
                </div>
                <div class="items-list">
                    
                    ${itemsHtml}
                    <div class="item-row" style="margin-top: 10px; padding-top: 10px; border-top: 2px solid rgba(0, 212, 255, 0.3); font-weight: bold;">
                        <span>總計</span>
                        <span style="color: var(--color-accent-cyan);">${purchase.total_amount.toLocaleString()} 元</span>
                    </div>
                </div>
            `;

            document.getElementById('viewModal').classList.add('active');
        }

        // 關閉彈窗
        function closeModal() {
            document.getElementById('viewModal').classList.remove('active');
            currentPurchase = null;
        }
        function closeModal() {
            document.getElementById('viewModal').classList.remove('active');
            currentPurchase = null;
        }
    </script>
{% endblock %}
