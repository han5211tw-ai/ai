<!DOCTYPE html>
<!--
  File: staging_center_v2.html
  Version: 20250303-1512
  ChangeLog:
    - 20250303-1512: 修正 updateStats：卡片統計不再隨視圖改變，始終顯示正確的待處理/已解析數量
    - 20250303-1509: 修正 renderTable 狀態判斷：改用 staging.status 而非 needs.code 前綴
    - 20250303-1400: 新增 view 篩選（pending/resolved/all）
    - 20250303-1400: 修正狀態顯示邏輯（依 staging.status）
    - 20250303-1400: 更新 auth_ui.js 版本號支援自動過期
-->
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待建檔中心 - 電腦舖營運系統</title>
    <link rel="stylesheet" href="shared/global-background.css">
    <script src="shared/global-background.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card h3 { color: #8892b0; font-size: 0.85em; margin-bottom: 10px; }
        .stat-card .number { font-size: 2em; font-weight: bold; color: #00d4ff; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: #8892b0;
        }
        .tab.active { color: #00d4ff; border-bottom-color: #00d4ff; }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filters select, .filters button {
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        .filters select option {
            background: #1a1a2e;
            color: #fff;
        }
        .filters button {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th { background: rgba(0,212,255,0.1); color: #00d4ff; }
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        .status-pending { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-resolved { background: rgba(76,175,80,0.2); color: #4caf50; }
        .status-review { background: rgba(255,152,0,0.2); color: #ff9800; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            margin-right: 5px;
        }
        .btn-resolve { background: rgba(76,175,80,0.2); color: #4caf50; }
        .btn-view { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .modal h2 { color: #00d4ff; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #8892b0; margin-bottom: 8px; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        .info-row {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-label { color: #8892b0; font-size: 0.9em; }
        .info-value { color: #fff; font-weight: 500; }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: #fff;
            display: none;
        }
        .toast.show { display: block; }
        .toast.success { background: rgba(76,175,80,0.9); }
        .toast.error { background: rgba(244,67,54,0.9); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 待建檔中心</h1>
        <p class="subtitle">客戶自動對照 | 商品人工處理 | ERP 唯一主檔來源</p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>👤 客戶待處理</h3>
                <div class="number" id="customerPending">-</div>
            </div>
            <div class="stat-card">
                <h3>📦 商品待處理</h3>
                <div class="number" id="productPending">-</div>
            </div>
            <div class="stat-card">
                <h3>✅ 今日已解析</h3>
                <div class="number" id="todayResolved">-</div>
            </div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('all')">全部</div>
            <div class="tab" onclick="switchTab('customer')">👤 客戶</div>
            <div class="tab" onclick="switchTab('product')">📦 商品</div>
        </div>
        
        <div class="filters">
            <select id="viewFilter" onchange="loadData()">
                <option value="pending">⏳ 待處理（TEMP 編號）</option>
                <option value="resolved">✅ 已解析（正式編號）</option>
                <option value="all">📋 全部顯示</option>
            </select>
            <button onclick="runAutoReconcile()">🤖 執行客戶自動對照</button>
            <button onclick="loadData()">🔄 重新整理</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>類型</th>
                    <th>原始輸入</th>
                    <th>來源</th>
                    <th>申請人</th>
                    <th>申請時間</th>
                    <th>狀態</th>
                    <th>解析結果</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    
    <!-- 解析 Modal -->
    <div class="modal-overlay" id="resolveModal">
        <div class="modal">
            <h2>🔍 人工解析</h2>
            <div id="modalContent"></div>
            <div class="form-group">
                <label>正式編號 <span id="codeLabel"></span></label>
                <input type="text" id="resolvedCode" placeholder="請輸入 ERP 編號">
            </div>
            <div class="form-group">
                <label>正式名稱（選填）</label>
                <input type="text" id="resolvedName" placeholder="可修正為標準名稱">
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn" onclick="closeModal()" style="background: rgba(255,255,255,0.1);">取消</button>
                <button class="btn btn-resolve" onclick="confirmResolve()">確認解析</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        let currentTab = 'all';
        let currentData = [];
        let currentRecord = null;
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadData();
        }
        
        async function loadData() {
            const view = document.getElementById('viewFilter').value;
            
            try {
                const res = await fetch(`/api/staging/records?type=${currentTab}&view=${view}`);
                const data = await res.json();
                
                if (data.success) {
                    currentData = data.records;
                    renderTable(data.records);
                    updateStats(data.stats);
                }
            } catch (e) {
                showToast('載入失敗', 'error');
            }
        }
        
        function renderTable(records) {
            const tbody = document.getElementById('tableBody');
            
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#8892b0;padding:40px;">沒有符合條件的記錄</td></tr>';
                return;
            }
            
            tbody.innerHTML = records.map(r => {
                const typeIcon = r.type === 'customer' ? '👤' : '📦';
                
                // 根據 staging_records.status 判斷狀態（與後端篩選一致）
                const isResolved = r.status === 'resolved';
                
                const statusClass = isResolved ? 'status-resolved' : 'status-pending';
                const statusText = isResolved ? '已解析' : '待處理';
                
                // 顯示解析結果：優先顯示 resolved_code，若無則顯示 customer_code/product_code
                const displayCode = r.resolved_code || r.customer_code || r.product_code || '-';
                const resolvedDisplay = isResolved ? 
                    `<div style="color:#4caf50;">${displayCode}</div>` : 
                    '-';
                
                return `<tr>
                    <td>${typeIcon} ${r.type === 'customer' ? '客戶' : '商品'}</td>
                    <td>
                        <div style="font-weight:500;">${r.raw_input}</div>
                        ${r.raw_code ? `<div style="color:#8892b0;font-size:0.85em;">編號: ${r.raw_code}</div>` : ''}
                        ${r.raw_mobile ? `<div style="color:#8892b0;font-size:0.85em;">手機: ${r.raw_mobile}</div>` : ''}
                    </td>
                    <td>${r.source_type} #${r.source_id}</td>
                    <td>${r.requester}</td>
                    <td>${new Date(r.created_at).toLocaleString()}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>${resolvedDisplay}</td>
                    <td>
                        ${!isResolved ? `<button class="btn btn-resolve" onclick="openResolve(${r.id})">解析</button>` : ''}
                        <button class="btn btn-view" onclick="viewDetail(${r.id})">查看</button>
                    </td>
                </tr>`;
            }).join('');
        }
        
        function updateStats(stats) {
            // 卡片始終顯示固定統計數據（不依賴當前視圖）
            // 確保標籤與數值一致：
            // - 客戶待處理：customer_pending
            // - 商品待處理：product_pending
            // - 今日已解析：customer_resolved + product_resolved
            document.getElementById('customerPending').textContent = stats.customer_pending || 0;
            document.getElementById('productPending').textContent = stats.product_pending || 0;
            const totalResolved = (stats.customer_resolved || 0) + (stats.product_resolved || 0);
            document.getElementById('todayResolved').textContent = totalResolved;
        }
        
        function openResolve(id) {
            const record = currentData.find(r => r.id === id);
            if (!record) return;
            
            currentRecord = record;
            document.getElementById('codeLabel').textContent = record.type === 'customer' ? '(客戶編號)' : '(產品編號)';
            
            document.getElementById('modalContent').innerHTML = `
                <div class="info-row">
                    <div class="info-label">原始輸入</div>
                    <div class="info-value">${record.raw_input}</div>
                </div>
                ${record.raw_code ? `<div class="info-row"><div class="info-label">原始編號</div><div class="info-value">${record.raw_code}</div></div>` : ''}
                ${record.raw_mobile ? `<div class="info-row"><div class="info-label">手機號碼</div><div class="info-value">${record.raw_mobile}</div></div>` : ''}
            `;
            
            document.getElementById('resolvedCode').value = record.resolved_code || '';
            document.getElementById('resolvedName').value = record.resolved_name || '';
            document.getElementById('resolveModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('resolveModal').classList.remove('active');
            currentRecord = null;
        }
        
        async function confirmResolve() {
            if (!currentRecord) return;
            
            const code = document.getElementById('resolvedCode').value.trim();
            const name = document.getElementById('resolvedName').value.trim();
            
            if (!code) {
                showToast('請輸入正式編號', 'error');
                return;
            }
            
            try {
                const res = await fetch(`/api/staging/resolve/${currentRecord.id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resolved_code: code, resolved_name: name })
                });
                
                const data = await res.json();
                if (data.success) {
                    showToast('解析成功', 'success');
                    closeModal();
                    loadData();
                } else {
                    showToast(data.error || '解析失敗', 'error');
                }
            } catch (e) {
                showToast('解析失敗', 'error');
            }
        }
        
        async function runAutoReconcile() {
            if (!confirm('確定要執行客戶自動對照嗎？這會比對所有 pending 客戶的 mobile 號碼。')) return;
            
            try {
                const res = await fetch('/api/staging/reconcile', { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    showToast(`自動對照完成：${data.stats.auto_resolved} 筆自動回填`, 'success');
                    loadData();
                }
            } catch (e) {
                showToast('自動對照失敗', 'error');
            }
        }
        
        function viewDetail(id) {
            const record = currentData.find(r => r.id === id);
            if (!record) return;
            // 可擴展顯示詳細資訊
        }
        
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        loadData();
    </script>
</html>
