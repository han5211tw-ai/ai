<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班表 - 電腦舖營運看板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav a:hover, .nav a.active {
            color: #00d4ff;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .card h2 {
            color: #00d4ff;
            font-size: 1.3em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }
        .stat-box h3 {
            color: #8892b0;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .stat-box .number {
            font-size: 2em;
            color: #00d4ff;
            font-weight: bold;
        }
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .store-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
        }
        .store-card h3 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        .staff-list {
            list-style: none;
        }
        .staff-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .staff-list li:last-child { border-bottom: none; }
        .staff-name { color: #ccd6f6; }
        .shift-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .shift-zao { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.3); }
        .shift-wan { background: rgba(156, 39, 176, 0.2); color: #9c27b0; border: 1px solid rgba(156, 39, 176, 0.3); }
        .shift-quan { background: rgba(0, 212, 255, 0.2); color: #00d4ff; border: 1px solid rgba(0, 212, 255, 0.3); }
        .shift-zhi { background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid rgba(76, 175, 80, 0.3); }
        .shift-off { background: rgba(136, 146, 176, 0.2); color: #8892b0; border: 1px solid rgba(136, 146, 176, 0.3); }
        .shift-zao-bg { background: rgba(255, 193, 7, 0.1); color: #ffc107; font-weight: 600; }
        .shift-wan-bg { background: rgba(156, 39, 176, 0.1); color: #9c27b0; font-weight: 600; }
        .shift-quan-bg { background: rgba(0, 212, 255, 0.1); color: #00d4ff; font-weight: 600; }
        .shift-zhi-bg { background: rgba(76, 175, 80, 0.1); color: #4caf50; font-weight: 600; }
        .shift-off-bg { background: rgba(136, 146, 176, 0.1); color: #8892b0; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        th {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-weight: 600;
        }
        td { color: #ccd6f6; }
        .loading {
            color: #8892b0;
            text-align: center;
            padding: 40px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00d4ff;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 班表</h1>
        
        <div class="nav">
            <a href="index.html">🏠 首頁</a>
            <a href="department.html">🏢 部門</a>
            <a href="store.html">🏬 門市</a>
            <a href="business.html">💼 業務</a>
            <a href="personal.html">🧑‍💼 個人</a>
            <a href="roster.html" class="active">📅 班表</a>
            <a href="customer_search.html">🔍 客戶</a>
        </div>

        <div class="card">
            <h2>🏢 各門市人員配置（今日）</h2>
            <div class="store-grid" id="todayRoster">
                <div class="loading">載入中...</div>
            </div>
        </div>

        <div class="card">
            <h2>📅 當周班表（週日開始：<span id="weekRange"></span>）</h2>
            <div id="weeklyRoster">
                <div class="loading">載入中...</div>
            </div>
            <p style="margin-top: 20px; color: #8892b0; font-size: 0.9em;">
                📝 班次說明：<span style="color: #ffc107;">早</span> = 早班｜<span style="color: #9c27b0;">晚</span> = 晚班｜<span style="color: #00d4ff;">全</span> = 全班｜<span style="color: #4caf50;">值</span> = 值班｜<span style="color: #8892b0;">休</span> = 休假
            </p>
        </div>

        <a href="index.html" class="back-link">← 返回首頁</a>
    </div>

    <script>
        // 班次樣式映射
        const shiftClassMap = {
            '早': 'shift-zao-bg',
            '晚': 'shift-wan-bg',
            '全': 'shift-quan-bg',
            '值': 'shift-zhi-bg',
            '休': 'shift-off-bg'
        };

        const shiftBadgeMap = {
            '早': 'shift-zao',
            '晚': 'shift-wan',
            '全': 'shift-quan',
            '值': 'shift-zhi',
            '休': 'shift-off'
        };

        // 動態計算本週日期（週日為第一天）
        function getWeekDates() {
            const today = new Date();
            const sunday = new Date(today);
            sunday.setDate(today.getDate() - today.getDay()); // 本週日
            
            const weekDates = [];
            const weekdays = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
            
            for (let i = 0; i < 7; i++) {
                const date = new Date(sunday);
                date.setDate(sunday.getDate() + i);
                const month = date.getMonth() + 1;
                const day = date.getDate();
                const dateStr = `${date.getFullYear()}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                weekDates.push({
                    date: dateStr,
                    display: `${month}/${day}<br>${weekdays[i]}`
                });
            }
            return weekDates;
        }
        
        const weekDates = getWeekDates();

        // 載入班表資料
        async function loadRosterData() {
            try {
                // 載入今日班表
                const todayResponse = await fetch('/api/roster/today');
                const todayData = await todayResponse.json();
                
                // 載入當周班表
                const weeklyResponse = await fetch('/api/roster/weekly');
                const weeklyData = await weeklyResponse.json();
                
                // 按門市分組今日班表
                const byLocation = {};
                todayData.forEach(staff => {
                    if (!byLocation[staff.location]) byLocation[staff.location] = [];
                    byLocation[staff.location].push(staff);
                });
                
                // 取得今天日期顯示
                const today = new Date();
                const todayMonth = today.getMonth() + 1;
                const todayDay = today.getDate();
                const todayWeekday = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'][today.getDay()];
                const todayDisplay = `${todayMonth}/${todayDay} ${todayWeekday}`;
                
                // 更新標題
                const sundayDisplay = `${weekDates[0].date.slice(5,7)}/${weekDates[0].date.slice(8,10)}`;
                const saturdayDisplay = `${weekDates[6].date.slice(5,7)}/${weekDates[6].date.slice(8,10)}`;
                document.getElementById('weekRange').textContent = `${sundayDisplay} 週日 ~ ${saturdayDisplay} 週六`;
                
                // 依門市排序：豐原、潭子、大雅
                const storeOrder = { '豐原': 1, '潭子': 2, '大雅': 3 };
                const sortedLocations = Object.entries(byLocation).sort((a, b) => {
                    return (storeOrder[a[0]] || 99) - (storeOrder[b[0]] || 99);
                });
                
                // 填充今日班表
                let todayHtml = '';
                sortedLocations.forEach(([location, staffList]) => {
                    todayHtml += '<div class="store-card">';
                    todayHtml += '<h3>🏪 ' + location + '（' + todayDisplay + '）</h3>';
                    todayHtml += '<ul class="staff-list">';
                    staffList.forEach(staff => {
                        const badgeClass = shiftBadgeMap[staff.shift] || 'shift-off';
                        todayHtml += '<li><span class="staff-name">' + staff.name + '</span>';
                        todayHtml += '<span class="shift-badge ' + badgeClass + '">' + staff.shift + '</span></li>';
                    });
                    todayHtml += '</ul></div>';
                });
                document.getElementById('todayRoster').innerHTML = todayHtml;
                
                // 依門市排序當周班表
                const weeklyArray = Object.entries(weeklyData);
                weeklyArray.sort((a, b) => {
                    const orderA = storeOrder[a[1].location] || 99;
                    const orderB = storeOrder[b[1].location] || 99;
                    if (orderA !== orderB) return orderA - orderB;
                    return a[0].localeCompare(b[0]);
                });
                
                // 填充當周班表
                let weeklyHtml = '<table><thead><tr><th>人員</th><th>門市</th>';
                weekDates.forEach(d => {
                    weeklyHtml += '<th>' + d.display + '</th>';
                });
                weeklyHtml += '</tr></thead><tbody>';
                
                weeklyArray.forEach(([name, data]) => {
                    weeklyHtml += '<tr><td>' + name + '</td><td>' + data.location + '</td>';
                    weekDates.forEach(d => {
                        const shift = data.shifts[d.date] || '';
                        const shiftClass = shift ? (shiftClassMap[shift] || 'shift-off-bg') : '';
                        weeklyHtml += '<td class="' + shiftClass + '">' + shift + '</td>';
                    });
                    weeklyHtml += '</tr>';
                });
                weeklyHtml += '</tbody></table>';
                
                document.getElementById('weeklyRoster').innerHTML = weeklyHtml;
                
            } catch (error) {
                console.error('載入班表失敗:', error);
                document.getElementById('todayRoster').innerHTML = '<div class="loading">載入失敗</div>';
                document.getElementById('weeklyRoster').innerHTML = '<div class="loading">載入失敗</div>';
            }
        }

        loadRosterData();
    </script>
</body>
</html>
