<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>業務業績分析 - 電腦舖營運看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav a:hover, .nav a.active {
            color: #00d4ff;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .card h2 {
            color: #00d4ff;
            font-size: 1.3em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        th {
            color: #00d4ff;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        td { color: #ccd6f6; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .number { font-family: 'Courier New', monospace; }
        .highlight { color: #00d4ff; font-weight: bold; }
        /* 達成率顏色 */
        .ach-excellent { color: #4caf50; font-weight: bold; }
        .ach-good { color: #ffc107; font-weight: bold; }
        .ach-warning { color: #ff9800; font-weight: bold; }
        .ach-danger { color: #f44336; font-weight: bold; }
        .chart-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
        }
        .chart-container {
            position: relative;
            height: 300px;
        }
        .loading {
            color: #8892b0;
            text-align: center;
            padding: 40px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00d4ff;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
        .section-title {
            color: #00d4ff;
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .btn-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px 15px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .btn-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00d4ff;
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.2);
        }
        .btn-icon { font-size: 2em; margin-bottom: 10px; }
        .btn-title { font-size: 1em; font-weight: 600; margin-bottom: 5px; color: #fff; }
        .btn-desc { font-size: 0.85em; color: #8892b0; }
        .service-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .service-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .service-box.blue { border-color: rgba(0, 212, 255, 0.3); }
        .service-box.green { border-color: rgba(76, 175, 80, 0.3); }
        .service-name {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .service-name.blue { color: #00d4ff; }
        .service-name.green { color: #4caf50; }
        .service-count {
            font-size: 2em;
            font-weight: bold;
            color: #fff;
        }
        .service-label {
            font-size: 0.85em;
            color: #8892b0;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💼 業務業績分析</h1>
        
        <div class="nav">
            <a href="index.html">🏠 首頁</a>
            <a href="department.html">🏢 部門</a>
            <a href="store.html">🏬 門市</a>
            <a href="business.html" class="active">💼 業務</a>
            <a href="personal.html">🧑‍💼 個人</a>
            <a href="roster.html">📅 班表</a>
            <a href="customer_search.html">🔍 客戶</a>
        </div>

        <div class="section-title">☁️ 雲端文件連結</div>
        <div class="btn-grid">
            <a href="https://1drv.ms/x/c/6480de932f72b94e/IQCkj3S96-sYTIqQHVkgED0_AR9Cy0UMZSeoCQ0JQnKp2Ig?e=FF8mds" class="btn-card" target="_blank">
                <div class="btn-icon">📋</div>
                <div class="btn-title">服務紀錄</div>
                <div class="btn-desc">業務服務記錄追蹤</div>
            </a>
        </div>

        <div class="card">
            <h2>📊 業務業績表</h2>
            <div id="businessTable">
                <div class="loading">載入中...</div>
            </div>
        </div>

        <!-- 服務記錄統計 -->
        <div class="card">
            <h2>📋 出勤服務紀錄統計（本季）</h2>
            
            <!-- 業務員總覽 -->
            <div class="service-summary" id="serviceSummary">
                <div class="loading">載入中...</div>
            </div>
            
            <!-- 服務分類圓餅圖 -->
            <div class="chart-row" style="margin-top: 30px;">
                <div style="flex: 1;">
                    <h3 style="color: #00d4ff; font-size: 1.1em; margin-bottom: 15px;">📊 服務分類統計</h3>
                    <div class="chart-container" style="height: 250px;">
                        <canvas id="serviceTypeChart"></canvas>
                    </div>
                </div>
                <div style="flex: 1;">
                    <h3 style="color: #00d4ff; font-size: 1.1em; margin-bottom: 15px;">🎯 客戶來源分析</h3>
                    <div class="chart-container" style="height: 250px;">
                        <canvas id="customerSourceChart"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- 最近7天趨勢 -->
            <div style="margin-top: 30px;">
                <h3 style="color: #00d4ff; font-size: 1.1em; margin-bottom: 15px;">📈 最近7天服務趨勢</h3>
                <div class="chart-container" style="height: 250px;">
                    <canvas id="serviceTrendChart"></canvas>
                </div>
            </div>
        </div>

        <div class="chart-row">
            <div class="card">
                <h2>📈 業務達成率</h2>
                <div class="chart-container">
                    <canvas id="achievementChart"></canvas>
                </div>
            </div>
            <div class="card">
                <h2>💰 業務毛利率</h2>
                <div class="chart-container">
                    <canvas id="marginChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🤖 AI 分析</h2>
            <div id="analysis" style="white-space: pre-line; line-height: 1.8; color: #ccd6f6;">
                <div class="loading">載入分析中...</div>
            </div>
            <p style="margin-top: 15px; color: #8892b0; font-size: 0.85em;">
                最後更新：<span id="analysisTime">--</span>
            </p>
        </div>

        <a href="index.html" class="back-link">← 返回首頁</a>
    </div>

    <script>
        // 格式化金額
        function formatMoney(value) {
            return 'NT$ ' + value.toLocaleString();
        }

        // 載入業務資料
        async function loadBusinessData() {
            try {
                // 載入業務員績效（業務部人員 = 不在門市班表的人員）
                const perfResponse = await fetch('/api/performance/business');
                const perfData = await perfResponse.json();
                
                // 填充表格
                const tableHtml = `
                    <table>
                        <thead>
                            <tr>
                                <th>業務員</th>
                                <th>目標業績</th>
                                <th>實際業績</th>
                                <th>達成率</th>
                                <th>毛利率</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${perfData.map(row => {
                                const ach = row.achievement_rate * 100;
                                let achClass = 'ach-danger';
                                if (ach >= 80) achClass = 'ach-excellent';
                                else if (ach >= 60) achClass = 'ach-good';
                                else if (ach >= 40) achClass = 'ach-warning';
                                
                                // 根據業務員名稱設定顏色
                                let nameColor = '#ffc107';
                                if (row.name.includes('鄭宇晉')) nameColor = '#e6ac00';
                                if (row.name.includes('梁仁佑')) nameColor = '#4caf50';
                                
                                return `
                                <tr>
                                    <td style="color: ${nameColor}; font-weight: bold;">${row.name}</td>
                                    <td class="number">${formatMoney(row.target)}</td>
                                    <td class="number">${formatMoney(row.revenue)}</td>
                                    <td class="number ${achClass}">${ach.toFixed(2)}%</td>
                                    <td class="number">${(row.margin_rate * 100).toFixed(2)}%</td>
                                </tr>
                            `}).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('businessTable').innerHTML = tableHtml;
                
                // 繪製達成率圖表
                const ctx1 = document.getElementById('achievementChart').getContext('2d');
                new Chart(ctx1, {
                    type: 'bar',
                    data: {
                        labels: perfData.map(d => d.name),
                        datasets: [{
                            label: '達成率 (%)',
                            data: perfData.map(d => d.achievement_rate * 100),
                            backgroundColor: perfData.map(d => {
                                if (d.name.includes('鄭宇晉')) return '#e6ac00';
                                if (d.name.includes('梁仁佑')) return '#4caf50';
                                return '#ffc107';
                            }),
                            borderRadius: 8,
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 100,
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                ticks: { color: '#8892b0' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#ccd6f6' }
                            }
                        }
                    }
                });

                // 繪製毛利率圖表
                const ctx2 = document.getElementById('marginChart').getContext('2d');
                new Chart(ctx2, {
                    type: 'bar',
                    data: {
                        labels: perfData.map(d => d.name),
                        datasets: [{
                            label: '毛利率 (%)',
                            data: perfData.map(d => d.margin_rate * 100),
                            backgroundColor: perfData.map(d => {
                                if (d.name.includes('鄭宇晉')) return '#e6ac00';
                                if (d.name.includes('梁仁佑')) return '#4caf50';
                                return '#ffc107';
                            }),
                            borderRadius: 8,
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                ticks: { color: '#8892b0' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#ccd6f6' }
                            }
                        }
                    }
                });

                // 載入 AI 分析
                const analysisResponse = await fetch('/api/analysis/business');
                const analysisData = await analysisResponse.json();
                document.getElementById('analysis').textContent = analysisData.content || '暫無分析資料';
                document.getElementById('analysisTime').textContent = analysisData.last_update || '--';

            } catch (error) {
                console.error('載入業務資料失敗:', error);
                document.getElementById('businessTable').innerHTML = '<div class="loading">載入失敗</div>';
            }
        }

        // 載入服務記錄詳細統計
        async function loadServiceStats() {
            try {
                const response = await fetch('/api/service-records/detail');
                const data = await response.json();
                
                // 業務員總覽統計
                const summaryHtml = `
                    <table>
                        <thead>
                            <tr>
                                <th>業務員</th>
                                <th>總筆數</th>
                                <th>服務客戶數</th>
                                <th>合約客戶數</th>
                                <th>合約比例</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.salesperson_summary.map(s => {
                                const contractRate = s.total_count > 0 ? (s.contract_count / s.total_count * 100).toFixed(1) : 0;
                                const nameColor = s.salesperson.includes('鄭宇晉') ? '#e6ac00' : (s.salesperson.includes('梁仁佑') ? '#4caf50' : '#ffc107');
                                return `
                                <tr>
                                    <td style="color: ${nameColor}; font-weight: bold;">${s.salesperson}</td>
                                    <td class="number">${s.total_count}</td>
                                    <td class="number">${s.unique_customers}</td>
                                    <td class="number">${s.contract_count}</td>
                                    <td class="number">${contractRate}%</td>
                                </tr>
                            `}).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('serviceSummary').innerHTML = summaryHtml;
                
                // 服務分類圓餅圖
                const typeColors = ['#00d4ff', '#4caf50', '#ffc107', '#ff9800', '#9c27b0', '#f44336'];
                new Chart(document.getElementById('serviceTypeChart'), {
                    type: 'pie',
                    data: {
                        labels: data.service_types.map(t => t.type),
                        datasets: [{
                            data: data.service_types.map(t => t.count),
                            backgroundColor: typeColors.slice(0, data.service_types.length),
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: { color: '#ccd6f6' }
                            }
                        }
                    }
                });
                
                // 客戶來源圓餅圖
                const sourceColors = ['#00d4ff', '#4caf50', '#ffc107', '#ff9800', '#9c27b0'];
                new Chart(document.getElementById('customerSourceChart'), {
                    type: 'doughnut',
                    data: {
                        labels: data.customer_sources.map(s => s.source),
                        datasets: [{
                            data: data.customer_sources.map(s => s.count),
                            backgroundColor: sourceColors.slice(0, data.customer_sources.length),
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: { color: '#ccd6f6' }
                            }
                        }
                    }
                });
                
                // 最近7天趨勢圖
                const last7Days = data.daily_stats.slice(0, 14); // 取最近14筆（2人 x 7天）
                const dates = [...new Set(last7Days.map(d => d.date))].slice(0, 7).reverse();
                const zhenData = dates.map(date => {
                    const record = last7Days.find(d => d.date === date && d.salesperson.includes('鄭宇晉'));
                    return record ? record.count : 0;
                });
                const liangData = dates.map(date => {
                    const record = last7Days.find(d => d.date === date && d.salesperson.includes('梁仁佑'));
                    return record ? record.count : 0;
                });
                
                new Chart(document.getElementById('serviceTrendChart'), {
                    type: 'line',
                    data: {
                        labels: dates.map(d => d.slice(5)), // 顯示 MM-DD
                        datasets: [
                            {
                                label: '鄭宇晉',
                                data: zhenData,
                                borderColor: '#e6ac00',
                                backgroundColor: 'rgba(230, 172, 0, 0.1)',
                                fill: true,
                                tension: 0.4
                            },
                            {
                                label: '梁仁佑',
                                data: liangData,
                                borderColor: '#4caf50',
                                backgroundColor: 'rgba(76, 175, 80, 0.1)',
                                fill: true,
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: { color: '#ccd6f6' }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                ticks: { color: '#8892b0' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#ccd6f6' }
                            }
                        }
                    }
                });
                
            } catch (error) {
                console.error('載入服務記錄統計失敗:', error);
                document.getElementById('serviceSummary').innerHTML = '<div class="loading">載入失敗</div>';
            }
        }

        loadBusinessData();
        loadServiceStats();
    </script>
</body>
</html>
