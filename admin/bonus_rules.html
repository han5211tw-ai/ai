{% extends "base.html" %}

{% block title %}銷售獎金規則管理 - 電腦舖營運系統{% endblock %}
{% block page_title %}💰 銷售獎金規則管理{% endblock %}

{% block content %}
<!-- 說明區塊 -->
<div style="background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 8px; padding: 10px 14px; margin-bottom: 24px;">
    <p style="color: #94a3b8; margin: 0;">
        💡 設定特定商品在特定時間銷售的額外獎金規則。門市/業務達成條件後，系統自動計算獎金。
    </p>
</div>

<!-- 規則列表 -->
<div style="background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 8px; padding: 24px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
        <h3 style="color: #FABF13;">📋 獎金規則清單</h3>
        <div style="display: flex; gap: 10px;">
            <label style="display: flex; align-items: center; gap: 6px; color: #94a3b8; cursor: pointer;">
                <input type="checkbox" id="showInactive" onchange="loadRules()">
                <span>顯示已停用</span>
            </label>
            <button onclick="showRuleModal()" style="padding: 10px 20px; background: linear-gradient(135deg, #FABF13 0%, #e6a800 100%); color: #231815; border: none; border-radius: 8px; cursor: pointer;">+ 新增規則</button>
        </div>
    </div>
    
    <div id="rulesList">
        <div style="text-align: center; padding: 40px; color: #64748b;">載入中...</div>
    </div>
</div>

<!-- 規則 Modal -->
<div id="ruleModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 20px;">
    <div style="background: rgba(30, 41, 59, 0.98); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 8px; padding: 24px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
        <h3 style="color: #FABF13; margin-bottom: 20px;" id="ruleModalTitle">新增獎金規則</h3>
        <input type="hidden" id="ruleId">
        
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9em;">規則名稱 *</label>
            <input type="text" id="ruleName" placeholder="例如：3月電競月活動" style="width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 16px; position: relative;">
            <label style="display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9em;">產品名稱（可搜尋帶入或手動輸入）</label>
            <input type="text" id="productSearch" placeholder="輸入產品名稱搜尋..." oninput="searchProductRealtime(this)" style="width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box;">
            <div id="productSuggestions" style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: rgba(30, 30, 50, 0.98); border: 1px solid rgba(250, 191, 19, 0.3); border-radius: 8px; max-height: 280px; overflow-y: auto; z-index: 1000; margin-top: 5px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);"></div>
        </div>
        
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9em;">產品編號</label>
            <input type="text" id="productCode" readonly style="width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(0,0,0,0.5); color: #64748b; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9em;">產品名稱關鍵字（模糊匹配用）</label>
            <input type="text" id="productName" placeholder="例如：電競滑鼠" style="width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box;">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
            <div>
                <label style="display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9em;">開始日期 *</label>
                <input type="date" id="startDate" style="width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9em;">結束日期 *</label>
                <input type="date" id="endDate" style="width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box;">
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
            <div>
                <label style="display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9em;">獎金類型 *</label>
                <select id="bonusType" onchange="updateBonusUnit()" style="width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box;">
                    <option value="fixed">固定金額</option>
                    <option value="percent">銷售額百分比</option>
                </select>
            </div>
            <div>
                <label style="display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9em;">獎金數值 * <span id="bonusUnit">（元/件）</span></label>
                <input type="number" id="bonusValue" min="0" step="0.01" placeholder="100" style="width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box;">
            </div>
        </div>
        
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9em;">最小數量門檻</label>
            <input type="number" id="minQuantity" min="1" value="1" style="width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 16px;">
            <label style="display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9em;">適用範圍</label>
            <select id="targetScope" onchange="updateTargetCodes()" style="width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box;">
                <option value="all">全部人員</option>
                <option value="staff">特定人員</option>
            </select>
        </div>
        
        <div style="margin-bottom: 16px;" id="targetCodesDiv" style="display: none;">
            <label style="display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9em;">特定人員編號（逗號分隔）</label>
            <input type="text" id="targetCodes" placeholder="例如：0218,0628" style="width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: flex; align-items: center; gap: 8px; color: #94a3b8; cursor: pointer;">
                <input type="checkbox" id="ruleActive" checked>
                <span>啟用中</span>
            </label>
        </div>
        
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button onclick="closeRuleModal()" style="padding: 10px 20px; background: rgba(148, 163, 184, 0.2); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 8px; cursor: pointer;">取消</button>
            <button onclick="saveRule()" style="padding: 10px 20px; background: linear-gradient(135deg, #FABF13 0%, #e6a800 100%); color: #231815; border: none; border-radius: 8px; cursor: pointer;">儲存</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let rules = [];

// 頁面初始化
document.addEventListener('DOMContentLoaded', function() {
    loadRules();
});

// 載入規則列表
async function loadRules() {
    const showInactive = document.getElementById('showInactive').checked;
    try {
        const response = await fetch(`/api/bonus-rules?show_inactive=${showInactive ? 1 : 0}`);
        const data = await response.json();
        if (data.success) {
            rules = data.rules;
            renderRules();
        }
    } catch (e) {
        console.error('載入規則失敗:', e);
    }
}

// 渲染規則列表
function renderRules() {
    const container = document.getElementById('rulesList');
    if (rules.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 40px; color: #64748b;">尚無獎金規則</div>';
        return;
    }
    
    container.innerHTML = `
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr>
                    <th style="text-align: left; padding: 12px; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.1);">規則名稱</th>
                    <th style="text-align: left; padding: 12px; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.1);">商品</th>
                    <th style="text-align: left; padding: 12px; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.1);">時間區間</th>
                    <th style="text-align: left; padding: 12px; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.1);">獎金</th>
                    <th style="text-align: left; padding: 12px; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.1);">狀態</th>
                    <th style="text-align: left; padding: 12px; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.1);">操作</th>
                </tr>
            </thead>
            <tbody>
                ${rules.map(r => `
                    <tr>
                        <td style="padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <div style="font-weight: 500; color: #fff;">${r.rule_name}</div>
                        </td>
                        <td style="padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <div style="color: #94a3b8;">${r.product_name || r.product_code || '全部商品'}</div>
                        </td>
                        <td style="padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <div style="color: #94a3b8; font-size: 0.9em;">${r.start_date} ~ ${r.end_date}</div>
                        </td>
                        <td style="padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <div style="color: #fbbf24;">
                                ${r.bonus_type === 'fixed' ? `NT$ ${r.bonus_value}/件` : `${r.bonus_value}%`}
                            </div>
                        </td>
                        <td style="padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                            ${r.is_active ? 
                                '<span style="color: #22c55e; font-size: 0.85em;">● 啟用</span>' : 
                                '<span style="color: #64748b; font-size: 0.85em;">○ 停用</span>'}
                        </td>
                        <td style="padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <div style="display: flex; gap: 8px;">
                                <button onclick="editRule(${r.id})" style="padding: 5px 12px; background: rgba(250, 191, 19, 0.2); color: #FABF13; border: 1px solid rgba(250, 191, 19, 0.4); border-radius: 4px; cursor: pointer; font-size: 13px;">編輯</button>
                                <button onclick="deleteRule(${r.id})" style="padding: 5px 12px; background: rgba(248, 113, 113, 0.2); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.4); border-radius: 4px; cursor: pointer; font-size: 13px;">刪除</button>
                            </div>
                        </td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

// 顯示規則 Modal
function showRuleModal(ruleId = null) {
    document.getElementById('ruleId').value = ruleId || '';
    document.getElementById('ruleModalTitle').textContent = ruleId ? '編輯獎金規則' : '新增獎金規則';
    
    if (ruleId) {
        const rule = rules.find(r => r.id === ruleId);
        if (rule) {
            document.getElementById('ruleName').value = rule.rule_name;
            document.getElementById('productSearch').value = rule.product_name || '';
            document.getElementById('productCode').value = rule.product_code || '';
            document.getElementById('productName').value = rule.product_name || '';
            document.getElementById('startDate').value = rule.start_date;
            document.getElementById('endDate').value = rule.end_date;
            document.getElementById('bonusType').value = rule.bonus_type;
            document.getElementById('bonusValue').value = rule.bonus_value;
            document.getElementById('minQuantity').value = rule.min_quantity;
            document.getElementById('targetScope').value = rule.target_scope;
            document.getElementById('targetCodes').value = rule.target_codes || '';
            document.getElementById('ruleActive').checked = rule.is_active === 1;
            updateBonusUnit();
            updateTargetCodes();
        }
    } else {
        document.getElementById('ruleName').value = '';
        document.getElementById('productSearch').value = '';
        document.getElementById('productCode').value = '';
        document.getElementById('productName').value = '';
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        document.getElementById('bonusType').value = 'fixed';
        document.getElementById('bonusValue').value = '';
        document.getElementById('minQuantity').value = 1;
        document.getElementById('targetScope').value = 'all';
        document.getElementById('targetCodes').value = '';
        document.getElementById('ruleActive').checked = true;
        updateBonusUnit();
        updateTargetCodes();
    }
    
    document.getElementById('ruleModal').style.display = 'flex';
}

// 關閉規則 Modal
function closeRuleModal() {
    document.getElementById('ruleModal').style.display = 'none';
}

// 更新獎金單位顯示
function updateBonusUnit() {
    const bonusType = document.getElementById('bonusType').value;
    document.getElementById('bonusUnit').textContent = bonusType === 'fixed' ? '（元/件）' : '（%）';
}

// 更新特定對象顯示
function updateTargetCodes() {
    const targetScope = document.getElementById('targetScope').value;
    const targetCodesDiv = document.getElementById('targetCodesDiv');
    targetCodesDiv.style.display = targetScope === 'staff' ? 'block' : 'none';
}

// 儲存規則
async function saveRule() {
    const id = document.getElementById('ruleId').value;
    const ruleName = document.getElementById('ruleName').value.trim();
    const productCode = document.getElementById('productCode').value.trim();
    const productName = document.getElementById('productName').value.trim();
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    const bonusType = document.getElementById('bonusType').value;
    const bonusValue = parseFloat(document.getElementById('bonusValue').value) || 0;
    const minQuantity = parseInt(document.getElementById('minQuantity').value) || 1;
    const targetScope = document.getElementById('targetScope').value;
    const targetCodes = document.getElementById('targetCodes').value.trim();
    const isActive = document.getElementById('ruleActive').checked ? 1 : 0;
    
    if (!ruleName || !startDate || !endDate) {
        alert('請填寫規則名稱、開始日期、結束日期');
        return;
    }
    
    if (bonusValue <= 0) {
        alert('獎金數值必須大於0');
        return;
    }
    
    try {
        const url = id ? `/api/bonus-rules/${id}` : '/api/bonus-rules';
        const method = id ? 'PUT' : 'POST';
        
        const response = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                rule_name: ruleName,
                product_code: productCode,
                product_name: productName,
                start_date: startDate,
                end_date: endDate,
                bonus_type: bonusType,
                bonus_value: bonusValue,
                min_quantity: minQuantity,
                target_scope: targetScope,
                target_codes: targetCodes,
                is_active: isActive
            })
        });
        
        const data = await response.json();
        if (data.success) {
            closeRuleModal();
            loadRules();
        } else {
            alert(data.message || '儲存失敗');
        }
    } catch (e) {
        console.error('儲存規則失敗:', e);
        alert('儲存失敗');
    }
}

// 編輯規則
function editRule(id) {
    showRuleModal(id);
}

// 刪除規則
async function deleteRule(id) {
    if (!confirm('確定要刪除此獎金規則嗎？')) return;
    
    try {
        const response = await fetch(`/api/bonus-rules/${id}`, { method: 'DELETE' });
        const data = await response.json();
        if (data.success) {
            loadRules();
        } else {
            alert(data.message || '刪除失敗');
        }
    } catch (e) {
        console.error('刪除規則失敗:', e);
        alert('刪除失敗');
    }
}

// 即時搜尋產品
async function searchProductRealtime(input) {
    const keyword = input.value.trim();
    const suggestions = document.getElementById('productSuggestions');

    if (keyword.length < 2) {
        suggestions.style.display = 'none';
        return;
    }

    try {
        const response = await fetch('/api/product-master/search?keyword=' + encodeURIComponent(keyword));
        const data = await response.json();

        if (data.items && data.items.length > 0) {
            suggestions.innerHTML = data.items.map(p => {
                return `<div onclick="selectProduct('${p.product_code.replace(/'/g, "\\'")}', '${p.product_name.replace(/'/g, "\\'")}')" style="padding: 10px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.08);">
                    <div style="font-weight:500; color: #fff;">${p.product_name}</div>
                    <div style="font-size:0.85em; color: #64748b; margin-top: 2px;">${p.product_code}</div>
                </div>`;
            }).join('');
            suggestions.style.display = 'block';
        } else {
            suggestions.style.display = 'none';
        }
    } catch (error) {
        console.error('搜尋產品失敗:', error);
    }
}

// 選擇產品
function selectProduct(productCode, productName) {
    document.getElementById('productSearch').value = productName;
    document.getElementById('productCode').value = productCode;
    document.getElementById('productName').value = productName;
    document.getElementById('productSuggestions').style.display = 'none';
}

// 點擊外部關閉產品建議下拉選單
document.addEventListener('click', function(e) {
    if (!e.target.closest('#productSearch') && !e.target.closest('#productSuggestions')) {
        document.getElementById('productSuggestions').style.display = 'none';
    }
});

// 點擊 Modal 外部關閉
document.getElementById('ruleModal').addEventListener('click', function(e) {
    if (e.target === this) closeRuleModal();
});
</script>
{% endblock %}
