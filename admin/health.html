<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統健康檢查 - 管理員專用</title>
    <link rel="stylesheet" href="../shared/global-background.css">
    <script src="../shared/global-background.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            min-height: 100vh;
            color: #fff;
            padding: 20px 40px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: left;
            font-size: 1.2em;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            text-align: left;
            color: #8892b0;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        
        .nav {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .nav a:hover {
            color: #00d4ff;
            border-color: #00d4ff;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .status-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .status-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .status-card.green {
            border-color: #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }
        
        .status-card.yellow {
            border-color: #eab308;
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.2);
        }
        
        .status-card.red {
            border-color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }
        
        .status-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .status-card.green .status-icon {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .status-card.yellow .status-icon {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }
        
        .status-card.red .status-icon {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .status-label {
            font-size: 0.9em;
            color: #8892b0;
            margin-bottom: 5px;
        }
        
        .status-name {
            font-size: 1.1em;
            font-weight: 600;
        }
        
        .overall-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(123, 44, 191, 0.1));
            border-width: 3px;
        }
        
        .overall-card .status-icon {
            width: 80px;
            height: 80px;
            font-size: 2em;
        }
        
        .details-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
            display: none;
        }
        
        .details-panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .details-title {
            font-size: 1.2em;
            color: #00d4ff;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .detail-item:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            color: #8892b0;
        }
        
        .detail-value {
            color: #fff;
            font-weight: 500;
        }
        
        .detail-value.green { color: #22c55e; }
        .detail-value.yellow { color: #eab308; }
        .detail-value.red { color: #ef4444; }
        .detail-value.non-workday { color: #eab308; font-style: italic; }
        
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 600;
            margin-left: 8px;
        }
        .status-badge.ok {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        .status-badge.warning {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }
        .status-badge.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .status-badge.non-workday {
            background: rgba(136, 146, 176, 0.2);
            color: #8892b0;
        }
        
        .business-message {
            font-size: 0.9em;
            color: #8892b0;
            margin-top: 4px;
            font-style: italic;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #00d4ff;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #ef4444;
        }
        
        .update-time {
            text-align: center;
            color: #8892b0;
            margin-top: 30px;
            font-size: 0.85em;
        }
        
        .nav-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #00d4ff;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .nav-link:hover {
            background: rgba(0, 212, 255, 0.1);
        }
        
        .run-btn {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(22, 163, 74, 0.1));
            border-color: rgba(34, 197, 94, 0.3);
        }
        
        .run-btn .status-icon {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .run-btn:hover {
            border-color: #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }
        
        .run-btn.running {
            border-color: #eab308;
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.2);
        }
        
        .run-btn.running .status-icon {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }
        
        .script-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .script-item:last-child {
            border-bottom: none;
        }
        
        .script-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .script-status {
            font-size: 0.85em;
            padding: 4px 10px;
            border-radius: 4px;
        }
        
        .script-status.pending {
            background: rgba(255, 255, 255, 0.1);
            color: #8892b0;
        }
        
        .script-status.running {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }
        
        .script-status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .script-status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .run-all-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .run-all-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }
        
        .run-all-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .run-script-btn {
            padding: 4px 12px;
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            border-radius: 4px;
            color: #22c55e;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 8px;
        }
        
        .run-script-btn:hover {
            background: rgba(34, 197, 94, 0.3);
        }
        
        .run-script-btn:disabled {
            background: rgba(102, 102, 102, 0.2);
            border-color: #666;
            color: #666;
            cursor: not-allowed;
        }
        
        .run-script-btn.running {
            background: rgba(234, 179, 8, 0.2);
            border-color: #eab308;
            color: #eab308;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 系統健康檢查</h1>
        <p class="subtitle">管理員專用 | 商業語境健康檢查 | 工作日判定</p>
        
        <div class="nav">
            <a href="/">🏠 首頁</a>
            <a href="/admin.html">⚙️ 系統管理中心</a>
        </div>
        
        <div id="loading" class="loading">載入中...</div>
        
        <div id="content" style="display: none;">
            <div class="status-grid">
                <!-- System -->
                <div class="status-card" id="system-card" onclick="toggleDetails('system')">
                    <div class="status-icon">💻</div>
                    <div class="status-label">System</div>
                    <div class="status-name">系統</div>
                </div>
                
                <!-- Database -->
                <div class="status-card" id="database-card" onclick="toggleDetails('database')">
                    <div class="status-icon">🗄️</div>
                    <div class="status-label">Database</div>
                    <div class="status-name">資料庫</div>
                </div>
                
                <!-- Import -->
                <div class="status-card" id="import-card" onclick="toggleDetails('import')">
                    <div class="status-icon">📥</div>
                    <div class="status-label">Import</div>
                    <div class="status-name">匯入任務</div>
                </div>
                
                <!-- Data -->
                <div class="status-card" id="data-card" onclick="toggleDetails('data')">
                    <div class="status-icon">📊</div>
                    <div class="status-label">Data</div>
                    <div class="status-name">資料新鮮度</div>
                </div>
                
                <!-- API -->
                <div class="status-card" id="api-card" onclick="toggleDetails('api')">
                    <div class="status-icon">🔌</div>
                    <div class="status-label">API</div>
                    <div class="status-name">API 狀態</div>
                </div>
                
                <!-- Run Scripts -->
                <div class="status-card run-btn" id="run-card" onclick="toggleDetails('run')">
                    <div class="status-icon">▶️</div>
                    <div class="status-label">Run</div>
                    <div class="status-name">手動執行腳本</div>
                </div>
                
                <!-- Overall -->
                <div class="status-card overall-card" id="overall-card" onclick="toggleDetails('overall')">
                    <div class="status-icon">✓</div>
                    <div class="status-label">Overall Status</div>
                    <div class="status-name">整體狀態</div>
                </div>
            </div>
            
            <!-- Details Panels -->
            <div id="details-container"></div>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div class="update-time" id="update-time"></div>
    </div>

    <script>
        let healthData = null;
        let currentOpenPanel = null;
        
        async function loadHealthData() {
            try {
                const response = await fetch('/api/v1/admin/health');
                if (!response.ok) {
                    throw new Error('API 回傳錯誤: ' + response.status);
                }
                
                healthData = await response.json();
                renderHealthData();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('update-time').textContent = 
                    '最後更新：' + new Date().toLocaleString('zh-TW');
            } catch (error) {
                console.error('載入失敗:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = '載入失敗: ' + error.message;
            }
        }
        
        function renderHealthData() {
            // 更新各燈號卡片
            updateStatusCard('system-card', healthData.system.status);
            updateStatusCard('database-card', healthData.database.status);
            updateStatusCard('import-card', healthData.import_status.status);
            updateStatusCard('data-card', healthData.data_freshness.status);
            updateStatusCard('api-card', healthData.api.status);
            updateStatusCard('overall-card', healthData.overall_status);
            
            // 建立詳細資訊面板
            createDetailsPanels();
        }
        
        function updateStatusCard(cardId, status) {
            const card = document.getElementById(cardId);
            card.classList.remove('green', 'yellow', 'red');
            card.classList.add(status);
            
            // 更新圖示
            const icon = card.querySelector('.status-icon');
            if (status === 'green') {
                icon.textContent = '✓';
            } else if (status === 'yellow') {
                icon.textContent = '!';
            } else {
                icon.textContent = '✕';
            }
        }
        
        function createDetailsPanels() {
            const container = document.getElementById('details-container');
            
            // System 詳細資訊
            const systemPanel = createPanel('system', '系統狀態', [
                { label: '記憶體使用率', value: healthData.system.memory_usage_percent + '%', status: healthData.system.memory_usage_percent > 80 ? 'red' : 'green' },
                { label: '磁碟使用率', value: healthData.system.disk_usage_percent + '%', status: healthData.system.disk_usage_percent > 80 ? 'red' : 'green' },
                { label: '運行時間', value: formatUptime(healthData.system.uptime_seconds) }
            ]);
            
            // Database 詳細資訊（含資料庫監控）
            const dbStats = healthData.db_stats || {};
            const slowQueries = healthData.slow_queries || [];
            
            // 構建資料庫面板項目
            const dbPanelItems = [
                { label: '連線狀態', value: healthData.database.connection_ok ? '正常' : '失敗', status: healthData.database.connection_ok ? 'green' : 'red' },
                { label: 'Journal Mode', value: healthData.database.journal_mode },
                { label: '資料庫大小', value: healthData.database.db_size_mb + ' MB' },
                { label: 'WAL 大小', value: healthData.database.wal_size_mb + ' MB', status: healthData.database.wal_size_mb > 200 ? 'yellow' : 'green' },
                { label: '📊 表成長監控', value: '' },
                { label: '  needs', value: (dbStats.needs?.total || 0).toLocaleString() + ' 筆（今日 +' + (dbStats.needs?.today_added || 0) + '）' },
                { label: '  staging_records', value: (dbStats.staging_records?.total || 0).toLocaleString() + ' 筆（今日 +' + (dbStats.staging_records?.today_added || 0) + '）' },
                { label: '  audit_log', value: (dbStats.admin_audit_log?.total || 0).toLocaleString() + ' 筆（今日 +' + (dbStats.admin_audit_log?.today_added || 0) + '）' }
            ];
            
            // 添加慢查詢資訊
            if (slowQueries.length > 0) {
                dbPanelItems.push({ label: '🕒 慢查詢（>200ms）', value: '' });
                slowQueries.slice(0, 5).forEach(q => {
                    const status = q.duration_ms > 500 ? 'red' : 'yellow';
                    dbPanelItems.push({ 
                        label: '  ' + q.endpoint, 
                        value: q.duration_ms + 'ms',
                        status: status
                    });
                });
            } else {
                dbPanelItems.push({ label: '🕒 慢查詢（>200ms）', value: '無', status: 'green' });
            }
            
            const dbPanel = createPanel('database', '資料庫狀態與監控', dbPanelItems);
            
            // Import 詳細資訊 v2
            const importChecks = healthData.import_status.checks || {};
            const importItems = [
                { label: '檢查日期', value: healthData.import_status.weekday_name + ' (' + healthData.import_status.expected_data_date + ')' },
                { label: '整體狀態', value: getStatusText(healthData.import_status.status), status: healthData.import_status.status }
            ];
            
            // 各類型詳細狀態
            if (importChecks.sales) {
                importItems.push({
                    label: '銷貨資料',
                    value: importChecks.sales.count + ' 筆',
                    status: importChecks.sales.status === 'ok' ? 'green' : (importChecks.sales.status === 'error' ? 'red' : 'yellow'),
                    message: importChecks.sales.message
                });
            }
            if (importChecks.purchase) {
                importItems.push({
                    label: '進貨資料',
                    value: importChecks.purchase.count + ' 筆',
                    status: importChecks.purchase.status === 'ok' ? 'green' : (importChecks.purchase.status === 'error' ? 'red' : 'yellow'),
                    message: importChecks.purchase.message
                });
            }
            if (importChecks.customer) {
                importItems.push({
                    label: '客戶資料',
                    value: importChecks.customer.count + ' 筆',
                    status: importChecks.customer.status === 'ok' ? 'green' : (importChecks.customer.status === 'error' ? 'red' : 'yellow'),
                    message: importChecks.customer.message
                });
            }
            
            importItems.push({ label: '綜合訊息', value: healthData.import_status.message });
            
            const importPanel = createPanelV2('import', '匯入任務狀態 (v2)', importItems);
            
            // Data 詳細資訊 v2
            const freshnessChecks = healthData.data_freshness.checks || {};
            const dataItems = [
                { label: '檢查日期', value: healthData.data_freshness.weekday_name + ' (' + healthData.data_freshness.today + ')' },
                { label: '預期資料日期', value: healthData.data_freshness.expected_data_date },
                { label: '整體狀態', value: getStatusText(healthData.data_freshness.status), status: healthData.data_freshness.status }
            ];
            
            // 各類型詳細狀態
            if (freshnessChecks.sales) {
                dataItems.push({
                    label: '銷貨資料',
                    value: healthData.data_freshness.latest_sales_date,
                    status: freshnessChecks.sales.status === 'ok' ? 'green' : (freshnessChecks.sales.status === 'error' ? 'red' : 'yellow'),
                    message: freshnessChecks.sales.message
                });
            }
            if (freshnessChecks.purchase) {
                dataItems.push({
                    label: '進貨資料',
                    value: healthData.data_freshness.latest_purchase_date,
                    status: freshnessChecks.purchase.status === 'ok' ? 'green' : (freshnessChecks.purchase.status === 'error' ? 'red' : 'yellow'),
                    message: freshnessChecks.purchase.message
                });
            }
            if (freshnessChecks.customer) {
                dataItems.push({
                    label: '客戶資料',
                    value: healthData.data_freshness.latest_customer_date,
                    status: freshnessChecks.customer.status === 'ok' ? 'green' : (freshnessChecks.customer.status === 'error' ? 'red' : 'yellow'),
                    message: freshnessChecks.customer.message
                });
            }
            
            dataItems.push(
                { label: '最新庫存日期', value: healthData.data_freshness.latest_inventory_date },
                { label: '綜合訊息', value: healthData.data_freshness.message }
            );
            
            const dataPanel = createPanelV2('data', '資料新鮮度 (v2)', dataItems);
            
            // API 詳細資訊
            const apiPanel = createPanel('api', 'API 狀態', [
                { label: '平均響應時間', value: healthData.api.avg_response_time_ms_1h + ' ms' },
                { label: '錯誤率', value: healthData.api.error_rate_percent_1h + '%', 
                  status: healthData.api.error_rate_percent_1h > 3 ? 'red' : 
                          (healthData.api.error_rate_percent_1h > 1 ? 'yellow' : 'green') }
            ]);
            
            // Run Scripts 詳細資訊
            const scriptsList = [
                { name: '庫存模組', time: '10:30' },
                { name: '進貨模組', time: '10:35' },
                { name: '銷貨模組', time: '10:40' },
                { name: '客戶模組', time: '10:45' },
                { name: '評論模組', time: '10:50' },
                { name: '班表模組', time: '10:55' },
                { name: '績效模組', time: '11:00' },
                { name: '業績計算', time: '11:05' },
                { name: '督導評分表', time: '11:10' },
                { name: 'AI 業績分析', time: '20:00' },
                { name: '數據備份', time: '04:00' }
            ];
            
            const runPanel = createScriptsPanel('run', '排程腳本列表', scriptsList);
            
            // Overall 詳細資訊
            const overallPanel = createPanel('overall', '整體狀態摘要', [
                { label: '整體燈號', value: healthData.overall_status === 'green' ? '正常' : 
                                          (healthData.overall_status === 'yellow' ? '警告' : '異常'),
                  status: healthData.overall_status }
            ]);
            
            container.innerHTML = systemPanel + dbPanel + importPanel + dataPanel + apiPanel + runPanel + overallPanel;
        }
        
        function createPanel(id, title, items) {
            const itemsHtml = items.map(item => {
                const statusClass = item.status ? `class="detail-value ${item.status}"` : 'class="detail-value"';
                return `
                    <div class="detail-item">
                        <span class="detail-label">${item.label}</span>
                        <span ${statusClass}>${item.value}</span>
                    </div>
                `;
            }).join('');
            
            return `
                <div class="details-panel" id="${id}-details">
                    <div class="details-title">${title}</div>
                    ${itemsHtml}
                </div>
            `;
        }
        
        function getStatusText(status) {
            const statusMap = {
                'green': '✓ 正常',
                'yellow': '! 提醒',
                'red': '✕ 異常',
                'ok': '✓ 正常',
                'non_workday': '⊘ 非工作日',
                'error': '✕ 異常'
            };
            return statusMap[status] || status;
        }
        
        function getStatusBadge(status) {
            const badgeClass = status === 'ok' ? 'ok' : 
                              (status === 'error' ? 'error' : 
                               (status === 'non_workday' ? 'non-workday' : 'warning'));
            const badgeText = status === 'ok' ? '正常' : 
                             (status === 'error' ? '異常' : 
                              (status === 'non_workday' ? '非工作日' : '提醒'));
            return `<span class="status-badge ${badgeClass}">${badgeText}</span>`;
        }
        
        function createPanelV2(id, title, items) {
            const itemsHtml = items.map(item => {
                let valueHtml = item.value;
                
                // 如果有狀態，添加狀態標籤
                if (item.status) {
                    const statusClass = item.status === 'ok' || item.status === 'green' ? 'green' : 
                                       (item.status === 'error' || item.status === 'red' ? 'red' : 'yellow');
                    const statusText = getStatusText(item.status);
                    valueHtml = `<span class="detail-value ${statusClass}">${item.value}</span> ${getStatusBadge(item.status)}`;
                } else {
                    valueHtml = `<span class="detail-value">${item.value}</span>`;
                }
                
                // 如果有商業語境訊息，添加註解
                const messageHtml = item.message ? `<div class="business-message">💡 ${item.message}</div>` : '';
                
                return `
                    <div class="detail-item">
                        <div>
                            <span class="detail-label">${item.label}</span>
                            <div>${valueHtml}</div>
                            ${messageHtml}
                        </div>
                    </div>
                `;
            }).join('');
            
            // 添加版本標記
            const versionBadge = healthData.version ? 
                `<span style="float: right; font-size: 0.7em; background: rgba(0,212,255,0.2); color: #00d4ff; padding: 2px 8px; border-radius: 4px;">v${healthData.version}</span>` : '';
            
            return `
                <div class="details-panel" id="${id}-details">
                    <div class="details-title">${title}${versionBadge}</div>
                    ${itemsHtml}
                </div>
            `;
        }
        
        function createScriptsPanel(id, title, scripts) {
            const scriptsHtml = scripts.map((script, index) => `
                <div class="script-item" id="script-${index}">
                    <div class="script-name">
                        <span>📄</span>
                        <span>${script.name}</span>
                        <span style="color: #8892b0; font-size: 0.85em;">(${script.time})</span>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span class="script-status pending" id="status-${index}">等待中</span>
                        <button class="run-script-btn" id="btn-${index}" onclick="runSingleScript(${index}, '${script.name}')">▶</button>
                    </div>
                </div>
            `).join('');
            
            return `
                <div class="details-panel" id="${id}-details">
                    <div class="details-title">${title}</div>
                    ${scriptsHtml}
                    <button class="run-all-btn" id="runAllBtn" onclick="runAllScripts()">▶️ 全部執行</button>
                </div>
            `;
        }
        
        function toggleDetails(id) {
            const panel = document.getElementById(id + '-details');
            
            // 如果點擊的是已開啟的面板，則關閉
            if (currentOpenPanel === id) {
                panel.classList.remove('active');
                currentOpenPanel = null;
                return;
            }
            
            // 關閉所有面板
            document.querySelectorAll('.details-panel').forEach(p => {
                p.classList.remove('active');
            });
            
            // 開啟點擊的面板
            panel.classList.add('active');
            currentOpenPanel = id;
            
            // 滾動到面板位置
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function formatUptime(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            
            if (days > 0) return `${days}天 ${hours}小時`;
            if (hours > 0) return `${hours}小時 ${minutes}分鐘`;
            return `${minutes}分鐘`;
        }
        
        function formatMinutes(minutes) {
            if (minutes === 999999) return '未知';
            if (minutes > 1440) return Math.floor(minutes / 1440) + '天';
            if (minutes > 60) return Math.floor(minutes / 60) + '小時';
            return minutes + '分鐘';
        }
        
        // 頁面載入時獲取資料
        loadHealthData();
        
        // 每 60 秒自動重新整理
        setInterval(loadHealthData, 60000);
        
        // 執行單個腳本
        async function runSingleScript(index, scriptName) {
            const btn = document.getElementById(`btn-${index}`);
            const statusEl = document.getElementById(`status-${index}`);
            const runCard = document.getElementById('run-card');
            
            btn.disabled = true;
            btn.classList.add('running');
            btn.textContent = '⏳';
            statusEl.className = 'script-status running';
            statusEl.textContent = '執行中';
            runCard.classList.add('running');
            
            try {
                const response = await fetch('/api/v1/admin/run-script', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ script_name: scriptName })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    statusEl.className = `script-status ${data.result.status}`;
                    statusEl.textContent = data.result.status === 'success' ? '✓ 成功' : '✕ 失敗';
                } else {
                    statusEl.className = 'script-status error';
                    statusEl.textContent = '✕ 失敗';
                }
            } catch (error) {
                console.error('執行失敗:', error);
                statusEl.className = 'script-status error';
                statusEl.textContent = '✕ 錯誤';
            } finally {
                btn.disabled = false;
                btn.classList.remove('running');
                btn.textContent = '▶';
                runCard.classList.remove('running');
            }
        }

        // 手動執行所有排程腳本
        async function runAllScripts() {
            const btn = document.getElementById('runAllBtn');
            const runCard = document.getElementById('run-card');
            
            btn.disabled = true;
            btn.textContent = '⏳ 執行中...';
            runCard.classList.add('running');
            
            // 重置所有狀態為「等待中」
            document.querySelectorAll('.script-status').forEach(el => {
                el.className = 'script-status pending';
                el.textContent = '等待中';
            });
            
            // 禁用所有單個執行按鈕
            document.querySelectorAll('.run-script-btn').forEach(el => {
                el.disabled = true;
            });
            
            const scripts = [
                '庫存模組', '進貨模組', '銷貨模組', '客戶模組', '評論模組',
                '班表模組', '績效模組', '業績計算', '督導評分表', '出勤服務記錄',
                '需求表模組', 'AI 業績分析', '數據備份'
            ];
            
            try {
                const response = await fetch('/api/v1/admin/run-scripts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    data.results.forEach((r, index) => {
                        const statusEl = document.getElementById(`status-${index}`);
                        if (statusEl) {
                            statusEl.className = `script-status ${r.status}`;
                            statusEl.textContent = r.status === 'success' ? '✓ 成功' : '✕ 失敗';
                        }
                    });
                    
                    // 更新卡片狀態
                    const hasError = data.results.some(r => r.status === 'error');
                    runCard.classList.remove('running');
                    runCard.classList.remove('green', 'yellow', 'red');
                    runCard.classList.add(hasError ? 'yellow' : 'green');
                    
                    // 更新圖示
                    const icon = runCard.querySelector('.status-icon');
                    icon.textContent = hasError ? '!' : '✓';
                }
            } catch (error) {
                console.error('執行失敗:', error);
                runCard.classList.remove('running');
                runCard.classList.add('red');
                const icon = runCard.querySelector('.status-icon');
                icon.textContent = '✕';
            } finally {
                btn.disabled = false;
                btn.textContent = '▶️ 再次執行';
                // 啟用所有單個執行按鈕
                document.querySelectorAll('.run-script-btn').forEach(el => {
                    el.disabled = false;
                });
            }
        }
    </script>
</html>
