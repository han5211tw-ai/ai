<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>{% block title %}電腦舖營運系統{% endblock %}</title>
    
    <!-- 全域樣式 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='shared/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='shared/auth_ui.css') }}">
    
    <!-- Sidebar 摺疊選單樣式 -->
    <style>
        /* 搜尋框樣式 */
        .menu-search-wrapper {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .menu-search-input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .menu-search-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        
        .menu-search-input::placeholder {
            color: #64748b;
        }
        
        /* 選單群組樣式 */
        .menu-group {
            margin-bottom: 4px;
        }
        
        .menu-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        
        .menu-group-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .menu-group-header.active {
            background: rgba(0, 212, 255, 0.1);
            border-left-color: #00d4ff;
        }
        
        .menu-group-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #8892b0;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .menu-group-icon {
            font-size: 16px;
        }
        
        .menu-group-arrow {
            font-size: 12px;
            color: #64748b;
            transition: transform 0.3s ease;
        }
        
        .menu-group.expanded .menu-group-arrow {
            transform: rotate(90deg);
        }
        
        /* 子選單樣式 */
        .menu-group-items {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .menu-group.expanded .menu-group-items {
            max-height: 500px;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px 10px 48px;
            color: #8892b0;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid transparent;
            font-size: 14px;
        }
        
        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        
        .menu-item.active {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border-left-color: #00d4ff;
        }
        
        .menu-item-icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }
        
        /* 隱藏的項目 */
        .menu-item.hidden,
        .menu-group.hidden {
            display: none !important;
        }
        
        /* 無結果提示 */
        .menu-no-results {
            padding: 20px;
            text-align: center;
            color: #64748b;
            font-size: 14px;
            display: none;
        }
        
        .menu-no-results.show {
            display: block;
        }
        
        /* 規則 1: 最外層全域容器 (App Wrapper) */
        .app-shell {
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
            width: 100vw;
        }
        
        /* 規則 2: 左側導覽列 (Sidebar) */
        .sidebar {
            width: 250px;
            flex-shrink: 0;
            height: 100%;
            overflow-y: auto;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            height: 60px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }
        
        .sidebar-footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .user-name {
            font-weight: 500;
            color: #fff;
        }
        
        .user-role {
            font-size: 0.85rem;
            color: #64748b;
        }
        
        /* 規則 3: 右側主工作區 (Main Content) */
        .main-content {
            flex-grow: 1;
            height: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .top-header {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }
        
        .page-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #fff;
            margin: 0;
        }
        
        /* 內容區：寬螢幕＋兩側留白 */
        .content-workspace {
            flex: 1;
            overflow-y: auto;
            width: 100%;
            padding: 24px 5%;
            box-sizing: border-box;
        }
    </style>
    
    {% block styles %}{% endblock %}
</head>
<body>
    <!-- App Shell -->
    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span>🖥️</span>
                    <span>電腦舖</span>
                </div>
            </div>
            
            <!-- 搜尋框 -->
            <div class="menu-search-wrapper">
                <input type="text" 
                       class="menu-search-input" 
                       id="menuSearchInput"
                       placeholder="🔍 搜尋選單..."
                       autocomplete="off">
            </div>
            
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- 選單群組將由 JavaScript 動態生成 -->
            </nav>
            
            <div class="menu-no-results" id="menuNoResults">
                沒有符合的選單項目
            </div>
            
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">👤</div>
                    <div>
                        <div class="user-name" id="userName">使用者</div>
                        <div class="user-role" id="userRole">角色</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title" id="pageTitle">{% block page_title %}首頁{% endblock %}</h1>
            </header>
            <div class="content-workspace" id="contentWorkspace">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- 選單資料與邏輯 -->
    <script>
        // 選單群組定義
        const menuGroups = [
            {
                id: 'business',
                title: '進銷存作業',
                icon: '📦',
                items: [
                    { id: 'quote', icon: '📄', label: '報價作業', route: '/quote_input', roles: ['all'] },
                    { id: 'sales', icon: '💰', label: '銷貨輸入', route: '/sales_input', roles: ['all'] },
                    { id: 'purchase', icon: '📥', label: '進貨輸入', route: '/purchase_input', roles: ['admin', '老闆', '會計'] },
                    { id: 'inventory', icon: '📦', label: '庫存查詢', route: '/inventory_query', roles: ['all'] }
                ]
            },
            {
                id: 'documents',
                title: '單據與需求',
                icon: '📑',
                items: [
                    { id: 'documents', icon: '📑', label: '單據查詢', route: '/query', roles: ['all'] },
                    { id: 'needs', icon: '📋', label: '需求作業', route: '/needs_input', roles: ['all'] }
                ]
            },
            {
                id: 'customers',
                title: '客戶與廠商',
                icon: '👤',
                items: [
                    { id: 'customers', icon: '👤', label: '客戶建檔', route: '/customer_create', roles: ['all'] },
                    { id: 'customer-search', icon: '🔍', label: '客戶查詢', route: '/customer_search', roles: ['all'] },
                    { id: 'products', icon: '📦', label: '產品建檔', route: '/product_create', roles: ['admin', '老闆', '會計'] },
                    { id: 'suppliers', icon: '🏭', label: '廠商建檔', route: '/supplier_create', roles: ['admin', '老闆', '會計'] }
                ]
            },
            {
                id: 'pending',
                title: '待辦清單',
                icon: '📋',
                items: [
                    { id: 'pending-needs', icon: '📋', label: '待請購清單', route: '/boss', roles: ['老闆'] },
                    { id: 'pending-transfer', icon: '🚚', label: '待調撥清單', route: '/Accountants', roles: ['老闆', '會計'] }
                ]
            },
            {
                id: 'reports',
                title: '財務報表',
                icon: '📊',
                items: [
                    { id: 'report-dept', icon: '📈', label: '部門業績', route: '/department', roles: ['老闆', '會計', '門市部主管', '業務部主管'] },
                    { id: 'report-sales', icon: '📉', label: '業務業績', route: '/business', roles: ['老闆', '會計', '業務人員', '業務部主管'] },
                    { id: 'report-store', icon: '🏪', label: '門市業績', route: '/store', roles: ['老闆', '會計', '工程師', '門市部主管'] },
                    { id: 'report-personal', icon: '🎯', label: '個人業績', route: '/personal', roles: ['all'] }
                ]
            },
            {
                id: 'system',
                title: '系統管理',
                icon: '⚙️',
                items: [
                    { id: 'admin', icon: '⚙️', label: '系統設定', route: '/staff_admin', roles: ['老闆'] }
                ]
            }
        ];

        // 當前使用者角色（由後端傳入）
        const currentUserRole = '{{ current_user.title if current_user else "老闆" }}';
        
        // 檢查權限
        function hasPermission(itemRoles) {
            if (itemRoles.includes('all')) return true;
            if (itemRoles.includes(currentUserRole)) return true;
            if (currentUserRole === '老闆') return true; // 老闆全權限
            return false;
        }
        
        // 渲染選單
        function renderMenu() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '';
            
            menuGroups.forEach((group, index) => {
                // 過濾有權限的項目
                const visibleItems = group.items.filter(item => hasPermission(item.roles));
                
                // 如果群組內沒有可見項目，整個群組隱藏
                if (visibleItems.length === 0) return;
                
                // 建立群組元素
                const groupEl = document.createElement('div');
                groupEl.className = 'menu-group' + (index === 0 ? ' expanded' : '');
                groupEl.dataset.groupId = group.id;
                
                groupEl.innerHTML = `
                    <div class="menu-group-header" onclick="toggleGroup('${group.id}')">
                        <div class="menu-group-title">
                            <span class="menu-group-icon">${group.icon}</span>
                            <span>${group.title}</span>
                        </div>
                        <span class="menu-group-arrow">▶</span>
                    </div>
                    <div class="menu-group-items">
                        ${visibleItems.map(item => `
                            <a href="${item.route}" class="menu-item" data-route="${item.id}" data-label="${item.label}">
                                <span class="menu-item-icon">${item.icon}</span>
                                <span>${item.label}</span>
                            </a>
                        `).join('')}
                    </div>
                `;
                
                nav.appendChild(groupEl);
            });
        }
        
        // 摺疊/展開群組
        function toggleGroup(groupId) {
            const group = document.querySelector(`[data-group-id="${groupId}"]`);
            if (group) {
                group.classList.toggle('expanded');
            }
        }
        
        // 搜尋過濾功能
        function filterMenu(keyword) {
            const groups = document.querySelectorAll('.menu-group');
            const noResults = document.getElementById('menuNoResults');
            let hasVisibleItem = false;
            
            const lowerKeyword = keyword.toLowerCase();
            
            groups.forEach(group => {
                const items = group.querySelectorAll('.menu-item');
                let groupHasMatch = false;
                
                items.forEach(item => {
                    const label = item.dataset.label.toLowerCase();
                    const route = item.dataset.route.toLowerCase();
                    
                    if (label.includes(lowerKeyword) || route.includes(lowerKeyword)) {
                        item.classList.remove('hidden');
                        groupHasMatch = true;
                        hasVisibleItem = true;
                    } else {
                        item.classList.add('hidden');
                    }
                });
                
                // 如果有匹配項目，展開群組並顯示
                if (groupHasMatch) {
                    group.classList.add('expanded');
                    group.classList.remove('hidden');
                } else if (keyword) {
                    // 有搜尋關鍵字但沒匹配，隱藏群組
                    group.classList.add('hidden');
                } else {
                    // 沒有搜尋，恢復預設
                    group.classList.remove('hidden', 'expanded');
                }
            });
            
            // 顯示/隱藏「無結果」提示
            if (keyword && !hasVisibleItem) {
                noResults.classList.add('show');
            } else {
                noResults.classList.remove('show');
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderMenu();
            
            // 綁定搜尋事件
            const searchInput = document.getElementById('menuSearchInput');
            searchInput.addEventListener('input', function(e) {
                filterMenu(e.target.value);
            });
        });
    </script>

    <!-- Load Components -->
    <script src="{{ url_for('static', filename='shared/auth_ui.js') }}"></script>
    <script src="{{ url_for('static', filename='shared/split-view.js') }}"></script>
    <script src="{{ url_for('static', filename='shared/modal-system.js') }}"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
