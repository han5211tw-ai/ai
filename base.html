<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- 全域樣式 (加入版本號避免快取) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='shared/global.css') }}?v=20260309c">
    <link rel="stylesheet" href="{{ url_for('static', filename='shared/auth_ui.css') }}?v=20260309c">
    
    <!-- Sidebar 摺疊選單樣式 -->
    <style>
        /* 選單群組樣式 */
        .menu-group {
            margin-bottom: 4px;
        }
        
        .menu-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 28px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        
        .menu-group-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .menu-group-header.active {
            background: rgba(250, 191, 19, 0.10);
            border-left-color: #FABF13;
        }
        
        .menu-group-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #8892b0;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .menu-group-icon {
            font-size: 16px;
        }
        
        .menu-group-arrow {
            font-size: 14px;
            color: #64748b;
            transition: transform 0.3s ease;
        }
        
        .menu-group.expanded .menu-group-arrow {
            transform: rotate(90deg);
        }
        
        /* 子選單樣式 */
        .menu-group-items {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .menu-group.expanded .menu-group-items {
            max-height: none;
            overflow: visible;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px 10px 48px;
            color: #8892b0;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid transparent;
            font-size: 16px;
        }
        
        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        
        .menu-item.active {
            background: rgba(250, 191, 19, 0.10);
            color: #FABF13;
            border-left-color: #FABF13;
        }
        
        .menu-item-icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }
        
        /* 隱藏的項目 */
        .menu-item.hidden,
        .menu-group.hidden {
            display: none !important;
        }
        
        /* 規則 1: 最外層全域容器 (App Wrapper) */
        .app-shell {
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
            width: 100vw;
        }
        
        /* 規則 2: 左側導覽列 (Sidebar) - 強制高度鎖定 */
        .sidebar {
            width: 250px;
            flex-shrink: 0;
            height: 100vh !important;
            overflow: visible !important;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex !important;
            flex-direction: column !important;
        }
        
        /* 頂部 Logo 區 - 鎖死高度 */
        .sidebar-header {
            height: 60px;
            min-height: 60px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #FABF13, #e6a800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* 中間選單區 - 強制高度鎖定 */
        .sidebar-nav {
            flex: 1 1 0% !important;
            min-height: 0 !important;
            overflow-y: auto !important;
            padding: 16px 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        
        .sidebar-nav::-webkit-scrollbar {
            width: 6px;
        }
        
        .sidebar-nav::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .sidebar-nav::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
        
        /* 使用者資訊區（移到最上面） */
        .sidebar-user-section {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0 !important;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.2);
        }

        .sidebar-user-section .user-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .sidebar-user-section .btn-home,
        .sidebar-user-section .btn-logout {
            flex: 1;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-size: 1em;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .sidebar-user-section .btn-home {
            background: rgba(250, 191, 19, 0.10);
            border: 1px solid rgba(250, 191, 19, 0.30);
            color: #FABF13;
        }

        .sidebar-user-section .btn-home:hover {
            background: rgba(250, 191, 19, 0.20);
        }

        .sidebar-user-section .btn-logout {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
        }

        .sidebar-user-section .btn-logout:hover {
            background: rgba(244, 67, 54, 0.2);
        }
        
        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 60px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FABF13, #e6a800);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .user-name {
            font-weight: 500;
            color: #fff;
            line-height: 1.4;
        }

        .user-role {
            font-size: 0.85rem;
            color: #64748b;
            line-height: 1.4;
            margin-top: 2px;
        }
        
        /* 規則 3: 右側主工作區 (Main Content) */
        .main-content {
            flex-grow: 1;
            height: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .top-header {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #fff;
            margin: 0;
        }

        /* === RWD: 漢堡選單按鈕 (手機版) === */
        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .hamburger-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* === RWD: 遮罩層 (Backdrop) === */
        .sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1040;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sidebar-backdrop.show {
            display: block;
            opacity: 1;
        }

        /* === RWD: 手機版樣式 (螢幕寬度 < 768px) === */
        @media screen and (max-width: 768px) {
            /* 顯示漢堡按鈕 */
            .hamburger-btn {
                display: block;
            }

            /* Sidebar 改為 Off-Canvas 抽屜 */
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh !important;
                width: 280px;
                z-index: 1050;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                box-shadow: 2px 0 10px rgba(0, 0, 0, 0.3);
            }

            /* Sidebar 滑出狀態 */
            .sidebar.show-sidebar {
                transform: translateX(0);
            }

            /* 主內容區在手機版佔滿全寬 */
            .main-content {
                width: 100vw;
            }

            /* 內容區在手機版減少內距 */
            .content-workspace {
                padding: 16px;
            }

            /* 手機版 sidebar-footer 調整 */
            .sidebar-footer {
                padding-bottom: 20px;
            }
        }
        
        /* 內容區：寬螢幕＋兩側留白 */
        .content-workspace {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden; /* 防止水平跑版 */
            width: 100%;
            max-width: 100%;
            padding: 24px 5%;
            box-sizing: border-box;
        }

        /* 全域防跑版保護 */
        .main-content {
            max-width: 100%;
            overflow-x: hidden;
        }

        /* 手機版 RWD：表格可橫向滑動 */
        @media screen and (max-width: 768px) {
            .table-responsive {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            table {
                min-width: 600px; /* 確保表格不會擠壓 */
            }

            /* 表單欄位在手機版全寬 */
            .form-field {
                min-width: 100% !important;
            }

            /* 修正固定寬度元素 */
            input, select, textarea {
                max-width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
    
    {% block styles %}{% endblock %}
    
    <!-- 自定義游標樣式 -->
    <style>
        /* 隱藏預設游標 */
        * {
            cursor: none !important;
        }
        
        /* 游標核心點 */
        .cursor-dot {
            position: fixed;
            top: 0;
            left: 0;
            width: 8px;
            height: 8px;
            background: #FFFFFF;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background 0.2s;
            box-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.5), 0 0 30px rgba(255,255,255,0.3);
        }

        /* 游標外圈 */
        .cursor-ring {
            position: fixed;
            top: 0;
            left: 0;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, border-color 0.3s, border-width 0.3s;
        }

        /* 懸停可點擊元素時 */
        .cursor-hover .cursor-dot {
            width: 12px;
            height: 12px;
            background: #00d4ff;
            box-shadow: 0 0 15px #00d4ff, 0 0 30px rgba(0,212,255,0.6), 0 0 45px rgba(0,212,255,0.3);
        }

        .cursor-hover .cursor-ring {
            width: 60px;
            height: 60px;
            border-color: rgba(0, 212, 255, 0.6);
            border-width: 3px;
        }

        /* 點擊動畫 */
        .cursor-click .cursor-dot {
            transform: translate(-50%, -50%) scale(0.8);
        }

        .cursor-click .cursor-ring {
            transform: translate(-50%, -50%) scale(0.9);
        }

        /* 輸入文字時 */
        .cursor-text .cursor-dot {
            width: 2px;
            height: 20px;
            border-radius: 0;
            background: #FFFFFF;
        }
        
        .cursor-text .cursor-ring {
            opacity: 0;
        }
        
        /* 禁用狀態 */
        .cursor-disabled .cursor-dot {
            background: #f44336;
            box-shadow: 0 0 10px #f44336;
        }
        
        .cursor-disabled .cursor-ring {
            border-color: rgba(244, 67, 54, 0.5);
            width: 30px;
            height: 30px;
        }
        
        /* 手機版禁用自定義游標 */
        @media (pointer: coarse) {
            * {
                cursor: auto !important;
            }
            .cursor-dot, .cursor-ring {
                display: none !important;
            }
        }
        
        /* 全域動態背景 - 光點 */
        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: rgba(250, 191, 19, 0.5);
            border-radius: 50%;
            opacity: 0.3;
            box-shadow: 0 0 6px rgba(250, 191, 19, 0.4);
            animation: float-particle 20s infinite ease-in-out;
        }
        
        @keyframes float-particle {
            0%, 100% { transform: translate(0, 0) scale(0.6); opacity: 0.15; }
            25% { transform: translate(20px, -80px) scale(1); opacity: 0.4; }
            50% { transform: translate(-15px, -160px) scale(0.8); opacity: 0.25; }
            75% { transform: translate(25px, -120px) scale(0.9); opacity: 0.35; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

        // 當前使用者角色（優先從 localStorage 取得登入資訊，其次後端模板）
        function getCurrentUserRole() {
            // 如果已經有全域設定的角色（登入後設定）
            if (window.currentUserRole) {
                return window.currentUserRole;
            }
            // 先嘗試從 localStorage 取得登入使用者資訊
            const storedUser = localStorage.getItem('currentUser');
            if (storedUser) {
                try {
                    const user = JSON.parse(storedUser);
                    if (user && user.title) {
                        return user.title;
                    }
                } catch (e) {
                    console.error('[Base] Failed to parse currentUser:', e);
                }
            }
            //  fallback 到後端模板變數
            const backendRole = '{{ current_user.title if current_user else "" }}';
            if (backendRole && backendRole !== 'None') {
                return backendRole;
            }
            // 最後 fallback，但預設應該要等登入
            return null;
        }

        // 使用函數取得角色，而不是固定值
        var currentUserRole = getCurrentUserRole();

        // 檢查權限
        function hasPermission(itemRoles) {
            const role = getCurrentUserRole();
            // 如果沒有設定角色，只顯示基本項目
            if (!role || role === 'None') {
                return itemRoles.includes('all');
            }
            if (itemRoles.includes('all')) return true;
            if (itemRoles.includes(role)) return true;
            if (role === '老闆') return true; // 老闆全權限
            if (role === '會計') return true; // 會計全權限
            return false;
        }
        
        // 渲染選單
        function renderMenu() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '';

            // 先渲染獨立選單項目（放在最上面）
            standaloneItems.forEach(item => {
                if (hasPermission(item.roles)) {
                    const itemEl = document.createElement('a');
                    itemEl.href = item.route;
                    itemEl.className = 'menu-item';
                    itemEl.dataset.route = item.id;
                    itemEl.dataset.label = item.label;
                    itemEl.innerHTML = `
                        <span class="menu-item-icon">${item.icon}</span>
                        <span>${item.label}</span>
                    `;
                    nav.appendChild(itemEl);
                }
            });

            menuGroups.forEach((group, index) => {
                // 過濾有權限的項目
                const visibleItems = group.items.filter(item => hasPermission(item.roles));
                
                // 如果群組內沒有可見項目，整個群組隱藏
                if (visibleItems.length === 0) return;
                
                // 建立群組元素
                const groupEl = document.createElement('div');
                groupEl.className = 'menu-group' + (index === 0 ? ' expanded' : '');
                groupEl.dataset.groupId = group.id;
                
                groupEl.innerHTML = `
                    <div class="menu-group-header" onclick="toggleGroup('${group.id}')">
                        <div class="menu-group-title">
                            <span class="menu-group-icon">${group.icon}</span>
                            <span>${group.title}</span>
                        </div>
                        <span class="menu-group-arrow">▶</span>
                    </div>
                    <div class="menu-group-items">
                        ${visibleItems.map(item => `
                            <a href="${item.route}" class="menu-item" data-route="${item.id}" data-label="${item.label}">
                                <span class="menu-item-icon">${item.icon}</span>
                                <span>${item.label}</span>
                            </a>
                        `).join('')}
                    </div>
                `;
                
                nav.appendChild(groupEl);
            });
        }
        
        // 摺疊/展開群組
        function toggleGroup(groupId) {
            const group = document.querySelector(`[data-group-id="${groupId}"]`);
            if (group) {
                group.classList.toggle('expanded');
            }
        }
        
        // === RWD: Sidebar 切換邏輯 ===
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');

            sidebar.classList.toggle('show-sidebar');
            backdrop.classList.toggle('show');

            // 防止背景捲動
            if (sidebar.classList.contains('show-sidebar')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        }

        function closeSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');

            sidebar.classList.remove('show-sidebar');
            backdrop.classList.remove('show');
            document.body.style.overflow = '';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderMenu();

            // RWD: 視窗大小改變時自動關閉 Sidebar
            window.addEventListener('resize', function() {
                if (window.innerWidth > 768) {
                    closeSidebar();
                }
            });

            // RWD: ESC 鍵關閉 Sidebar
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeSidebar();
                }
            });
        });
    </script>

    <!-- 全域登入驗證 -->
    <script>
        // 頁面載入時自動檢查登入
        document.addEventListener('DOMContentLoaded', function() {
            console.log('[Base] DOMContentLoaded, requireLogin exists:', !!window.requireLogin);
            if (window.requireLogin) {
                window.requireLogin({
                    minRole: 'staff',
                    title: '🔐 請輸入密碼',
                    subtitle: '身分證後四碼驗證'
                }).then(function(user) {
                    console.log('[Base] Login success:', user);
                    // 更新使用者資訊顯示
                    const userNameEl = document.getElementById('userName');
                    const userRoleEl = document.getElementById('userRole');
                    if (userNameEl) userNameEl.textContent = user.name || '使用者';
                    // 顯示格式：單位 + 職稱（例如：豐原門市 門市工程師）
                    let roleText = '';
                    console.log('[Base] User data:', user); // 除錯訊息
                    if (user.department && user.title) {
                        roleText = user.department + ' ' + user.title;
                    } else if (user.title) {
                        roleText = user.title;
                    } else if (user.department) {
                        roleText = user.department;
                    } else {
                        roleText = '角色';
                    }
                    console.log('[Base] Role text:', roleText); // 除錯訊息
                    if (userRoleEl) {
                        userRoleEl.textContent = roleText;
                        console.log('[Base] Updated userRoleEl'); // 除錯訊息
                    } else {
                        console.error('[Base] userRoleEl not found!'); // 除錯訊息
                    }

                    // 登入成功後重新渲染選單（套用正確權限）
                    if (user && user.title) {
                        window.currentUserRole = user.title;
                        console.log('[Base] Re-rendering menu with role:', user.title);
                        renderMenu();
                    }

                    // 觸發頁面特定的登入成功事件
                    if (window.onLoginSuccess) {
                        window.onLoginSuccess(user);
                    }
                    
                    // 只有「剛登入」且不在首頁時，才轉跳至首頁
                    if (user._justLoggedIn && window.location.pathname !== '/' && window.location.pathname !== '/index.html') {
                        console.log('[Base] Redirecting to home page (just logged in)');
                        window.location.href = '/';
                    }
                }).catch(function(err) {
                    console.error('[Base] Login failed:', err);
                });
            }
        });
        
        // 登出函數
        function logout() {
            if (window.authLogout) {
                window.authLogout();
            } else {
                // 清除登入資訊並重新整理
                localStorage.removeItem('currentUser');
                sessionStorage.removeItem('currentUser');
                location.reload();
            }
        }
    </script>

    <script>

        (function() {

                container.appendChild(particle);
            }
        })();

    <!-- 自定義游標 JavaScript -->
    <script>
        // 自定義游標邏輯
        (function() {
            // 檢查是否為觸控裝置
            if (window.matchMedia('(pointer: coarse)').matches) {
                return; // 手機/平板不啟用
            }
            
            const dot = document.getElementById('cursorDot');
            const ring = document.getElementById('cursorRing');
            
            if (!dot || !ring) return;
            
            let mouseX = 0, mouseY = 0;
            let ringX = 0, ringY = 0;
            
            // 滑鼠移動
            document.addEventListener('mousemove', function(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                
                // 核心點立即跟隨
                dot.style.left = mouseX + 'px';
                dot.style.top = mouseY + 'px';
            }, { passive: true });
            
            // 外圈延遲跟隨（平滑效果）
            function animateRing() {
                ringX += (mouseX - ringX) * 0.15;
                ringY += (mouseY - ringY) * 0.15;
                
                ring.style.left = ringX + 'px';
                ring.style.top = ringY + 'px';
                
                requestAnimationFrame(animateRing);
            }
            animateRing();
            
            // 懸停可點擊元素
            const clickables = 'a, button, [role="button"], input, select, textarea, .btn, .btn-card, .clickable';
            document.querySelectorAll(clickables).forEach(function(el) {
                el.addEventListener('mouseenter', function() {
                    document.body.classList.add('cursor-hover');
                });
                el.addEventListener('mouseleave', function() {
                    document.body.classList.remove('cursor-hover');
                });
            });
            
            // 懸停文字輸入框
            document.querySelectorAll('input[type="text"], input[type="number"], textarea').forEach(function(el) {
                el.addEventListener('mouseenter', function() {
                    document.body.classList.add('cursor-text');
                });
                el.addEventListener('mouseleave', function() {
                    document.body.classList.remove('cursor-text');
                });
            });
            
            // 懸停禁用元素
            document.querySelectorAll('[disabled], .disabled').forEach(function(el) {
                el.addEventListener('mouseenter', function() {
                    document.body.classList.add('cursor-disabled');
                });
                el.addEventListener('mouseleave', function() {
                    document.body.classList.remove('cursor-disabled');
                });
            });
            
            // 點擊效果
            document.addEventListener('mousedown', function() {
                document.body.classList.add('cursor-click');
            });
            document.addEventListener('mouseup', function() {
                document.body.classList.remove('cursor-click');
            });
            
            // 動態新增的元素監聽（使用事件委派）
            document.addEventListener('mouseover', function(e) {
                if (e.target.matches && e.target.matches(clickables)) {
                    document.body.classList.add('cursor-hover');
                }
            });
            document.addEventListener('mouseout', function(e) {
                if (e.target.matches && e.target.matches(clickables)) {
                    document.body.classList.remove('cursor-hover');
                }
            });
        })();
    </script>
