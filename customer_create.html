<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶建檔 - 電腦舖營運系統</title>
    <link rel="stylesheet" href="shared/auth_ui.css">
    <script src="shared/auth_ui.js"></script>
    <link rel="stylesheet" href="shared/global-background.css">
    <script src="shared/global-background.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px 40px; }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        h1 {
            font-size: 1.2em;
            margin-bottom: 0;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-name {
            color: #00d4ff;
            font-size: 0.95em;
        }
        .btn-logout {
            padding: 6px 12px;
            background: rgba(244,67,54,0.2);
            border: 1px solid rgba(244,67,54,0.5);
            color: #f44336;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .subtitle {
            text-align: left;
            color: #8892b0;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .nav {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav a:hover {
            color: #00d4ff;
            border-color: #00d4ff;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
        }
        .card h2 {
            color: #00d4ff;
            font-size: 1.1em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #8892b0;
            font-size: 0.9em;
        }
        .form-group label .required {
            color: #f44336;
            margin-left: 4px;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 1em;
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        .form-control:read-only {
            background: rgba(255, 255, 255, 0.05);
            color: #8892b0;
            cursor: not-allowed;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .check-result {
            margin-top: 8px;
            font-size: 0.85em;
            min-height: 20px;
        }
        .check-result.success {
            color: #4caf50;
        }
        .check-result.error {
            color: #f44336;
        }
        .check-result.loading {
            color: #00d4ff;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
        }
        .btn-submit:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: #4caf50; }
        .toast.error { background: #f44336; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <h1>📝 客戶建檔</h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="userDisplay" style="color: #00d4ff; font-size: 0.95em;"></span>
                <button onclick="window.authLogout && window.authLogout()" style="padding: 6px 12px; background: rgba(244,67,54,0.2); border: 1px solid rgba(244,67,54,0.5); color: #f44336; border-radius: 4px; cursor: pointer; font-size: 0.85em;">登出</button>
            </div>
        </div>
        <p class="subtitle">Customer Registration</p>

        <div class="nav">
            <a href="index.html">🏠 首頁</a>
            <a href="customer_search.html" target="_blank">🔍 客戶查詢</a>
        </div>

        <div class="card">
            <h2>📋 基本資訊</h2>
            
            <div class="form-row">
                <div class="form-group">
                    <label>建檔人員</label>
                    <input type="text" id="createdBy" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label>客戶編號</label>
                    <input type="text" id="customerId" class="form-control" readonly>
                </div>
            </div>

            <div class="form-group">
                <label>客戶名稱 <span class="required">*</span></label>
                <input type="text" id="shortName" class="form-control" placeholder="請輸入客戶姓名或公司全名">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>手機號碼 <span class="required">*</span></label>
                    <input type="text" id="mobile" class="form-control" placeholder="例如：0912345678" maxlength="10">
                    <div id="mobileCheck" class="check-result"></div>
                </div>
                <div class="form-group">
                    <label>電話號碼</label>
                    <input type="text" id="phone1" class="form-control" placeholder="例如：04-12345678">
                    <div id="phoneCheck" class="check-result"></div>
                </div>
            </div>

            <div class="form-group">
                <label>聯絡人</label>
                <input type="text" id="contact" class="form-control" placeholder="請輸入聯絡人姓名">
            </div>

            <div class="form-group">
                <label>統一編號</label>
                <input type="text" id="taxId" class="form-control" placeholder="請輸入統一編號（8碼）" maxlength="8">
            </div>

            <div class="form-group">
                <label>地址</label>
                <input type="text" id="companyAddress" class="form-control" placeholder="請輸入地址">
            </div>

            <div class="form-group">
                <label>送貨地址</label>
                <input type="text" id="deliveryAddress" class="form-control" placeholder="請輸入送貨地址">
            </div>

            <div class="form-group">
                <label>付款方式</label>
                <select id="paymentType" class="form-control">
                    <option value="">請選擇付款方式</option>
                    <option value="現金">現金</option>
                    <option value="支票">支票</option>
                    <option value="匯款">匯款</option>
                    <option value="月結">月結</option>
                </select>
            </div>

            <button id="submitBtn" class="btn-submit" onclick="submitForm()">✓ 建立客戶資料</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let prefix = '';
        let isMobileValid = false;
        let isPhoneValid = true;

        // 取得當前使用者資訊
        function getCurrentUser() {
            const data = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
            return data ? JSON.parse(data) : null;
        }

        // 顯示登入人姓名
        function displayUserName() {
            const user = getCurrentUser();
            if (user && user.name) {
                document.getElementById('userDisplay').textContent = '👤 ' + user.name;
            }
        }

        // 取得門市前綴
        function getPrefix(department) {
            const prefixMap = {
                '豐原門市': 'FY',
                '潭子門市': 'TZ',
                '大雅門市': 'DY',
                '業務部': 'SA',
                '總公司': 'HQ'
            };
            return prefixMap[department] || 'SA';
        }

        // 產生客戶編號
        async function generateCustomerId() {
            try {
                const response = await fetch('/api/customer/next-id?prefix=' + encodeURIComponent(prefix));
                const data = await response.json();
                if (data.success) {
                    document.getElementById('customerId').value = data.customer_id;
                }
            } catch (error) {
                console.error('產生編號失敗:', error);
            }
        }

        // 檢查手機號碼
        async function checkMobile() {
            const mobile = document.getElementById('mobile').value.trim();
            const checkDiv = document.getElementById('mobileCheck');
            
            if (!mobile) {
                checkDiv.textContent = '';
                isMobileValid = false;
                updateSubmitButton();
                return;
            }

            checkDiv.textContent = '檢查中...';
            checkDiv.className = 'check-result loading';

            try {
                const response = await fetch('/api/customer/check?mobile=' + encodeURIComponent(mobile));
                const data = await response.json();
                
                if (data.exists) {
                    checkDiv.textContent = '⚠️ 此手機已存在客戶：' + data.customer_id + ' ' + data.short_name;
                    checkDiv.className = 'check-result error';
                    isMobileValid = false;
                } else {
                    checkDiv.textContent = '✓ 此手機號碼可使用';
                    checkDiv.className = 'check-result success';
                    isMobileValid = true;
                }
            } catch (error) {
                checkDiv.textContent = '';
                isMobileValid = false;
            }
            updateSubmitButton();
        }

        // 檢查電話號碼
        async function checkPhone() {
            const phone = document.getElementById('phone1').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const checkDiv = document.getElementById('phoneCheck');
            
            // 若有手機號碼，不檢查電話
            if (mobile) {
                checkDiv.textContent = '';
                isPhoneValid = true;
                updateSubmitButton();
                return;
            }

            if (!phone) {
                checkDiv.textContent = '';
                isPhoneValid = true;
                updateSubmitButton();
                return;
            }

            checkDiv.textContent = '檢查中...';
            checkDiv.className = 'check-result loading';

            try {
                const response = await fetch('/api/customer/check?phone=' + encodeURIComponent(phone));
                const data = await response.json();
                
                if (data.exists) {
                    checkDiv.textContent = '⚠️ 此電話已存在客戶：' + data.customer_id + ' ' + data.short_name;
                    checkDiv.className = 'check-result error';
                    isPhoneValid = false;
                } else {
                    checkDiv.textContent = '✓ 此電話號碼可使用';
                    checkDiv.className = 'check-result success';
                    isPhoneValid = true;
                }
            } catch (error) {
                checkDiv.textContent = '';
                isPhoneValid = true;
            }
            updateSubmitButton();
        }

        // 更新提交按鈕狀態
        function updateSubmitButton() {
            const shortName = document.getElementById('shortName').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const btn = document.getElementById('submitBtn');
            
            btn.disabled = !shortName || !mobile || !isMobileValid || !isPhoneValid;
        }

        // 提交表單
        async function submitForm() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '處理中...';

            const payload = {
                customer_id: document.getElementById('customerId').value,
                short_name: document.getElementById('shortName').value.trim(),
                mobile: document.getElementById('mobile').value.trim(),
                phone1: document.getElementById('phone1').value.trim(),
                contact: document.getElementById('contact').value.trim(),
                tax_id: document.getElementById('taxId').value.trim(),
                company_address: document.getElementById('companyAddress').value.trim(),
                delivery_address: document.getElementById('deliveryAddress').value.trim(),
                payment_type: document.getElementById('paymentType').value,
                created_by: currentUser.name
            };

            try {
                const response = await fetch('/api/customer/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                if (data.success) {
                    showToast('客戶建立成功：' + payload.customer_id, 'success');
                    setTimeout(() => {
                        location.reload();
                    }, 1500);
                } else {
                    showToast(data.message || '建立失敗', 'error');
                    btn.disabled = false;
                    btn.textContent = '✓ 建立客戶資料';
                }
            } catch (error) {
                showToast('系統錯誤，請稍後再試', 'error');
                btn.disabled = false;
                btn.textContent = '✓ 建立客戶資料';
            }
        }

        // 顯示提示訊息
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 頁面載入
        document.addEventListener('DOMContentLoaded', function() {
            currentUser = getCurrentUser();
            if (!currentUser) {
                alert('請先登入');
                window.location.href = 'index.html';
                return;
            }

            displayUserName();
            document.getElementById('createdBy').value = currentUser.name;
            
            prefix = getPrefix(currentUser.department);
            generateCustomerId();

            // 綁定事件
            document.getElementById('mobile').addEventListener('blur', checkMobile);
            document.getElementById('phone1').addEventListener('blur', checkPhone);
            document.getElementById('shortName').addEventListener('input', updateSubmitButton);
            document.getElementById('mobile').addEventListener('input', updateSubmitButton);
        });
    </script>
</body>
</html>
