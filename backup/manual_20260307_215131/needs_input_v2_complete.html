    <script>
        // ========== 全局變數 ==========
        let currentUser = null;
        const allStores = ['豐原門市', '潭子門市', '大雅門市', '業務部', '總公司倉庫'];
        let productRowCount = 0;
        let customerSearchTimer = null;
        let productSearchTimers = {};
        
        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', function() {
            // 預設日期為今天
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('requestDate').value = today;
            
            // 初始化調撥來源選單
            initTransferSelect();
            
            // 添加第一筆產品行
            addProductRow();
        });
        
        // ========== 登入功能 ==========
        async function verifyPassword() {
            const password = document.getElementById('passwordInput').value.trim();
            const errorDiv = document.getElementById('loginError');
            
            if (password.length !== 4) {
                errorDiv.textContent = '請輸入 4 碼數字';
                return;
            }
            
            try {
                const response = await fetch('/api/staff/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentUser = data.staff;
                    document.getElementById('loginSection').classList.remove('active');
                    document.getElementById('formSection').classList.add('active');
                } else {
                    errorDiv.textContent = '驗證失敗，請確認後四碼是否正確';
                }
            } catch (error) {
                errorDiv.textContent = '系統錯誤，請稍後再試';
            }
        }
        
        // ========== 初始化調撥選單 ==========
        function initTransferSelect() {
            const select = document.getElementById('transferFrom');
            if (!select || !currentUser) return;
            
            const otherStores = allStores.filter(store => store !== currentUser.department);
            otherStores.forEach(store => {
                const option = document.createElement('option');
                option.value = store;
                option.textContent = store;
                select.appendChild(option);
            });
        }
        
        // ========== 用途變更處理 ==========
        function onPurposeChange() {
            const purpose = document.getElementById('purpose').value;
            const customerSection = document.getElementById('customerSection');
            
            if (purpose === '客戶') {
                customerSection.classList.add('active');
            } else {
                customerSection.classList.remove('active');
                clearCustomer();
            }
        }
        
        // ========== 類型變更處理 ==========
        function onRequestTypeChange() {
            const type = document.getElementById('requestType').value;
            const transferSection = document.getElementById('transferSection');
            
            if (type === '調撥') {
                transferSection.style.display = 'block';
                if (!document.getElementById('transferFrom').options.length > 1) {
                    initTransferSelect();
                }
            } else {
                transferSection.style.display = 'none';
            }
        }
        
        // ========== 客戶搜尋 ==========
        async function searchCustomer() {
            const searchInput = document.getElementById('customerSearch');
            const autocompleteList = document.getElementById('customerAutocomplete');
            const keyword = searchInput.value.trim();
            
            if (customerSearchTimer) {
                clearTimeout(customerSearchTimer);
            }
            
            autocompleteList.classList.remove('active');
            
            if (!keyword || keyword.length < 2) return;
            
            // 純數字至少 3 碼
            if (/^\d+$/.test(keyword) && keyword.length < 3) return;
            
            customerSearchTimer = setTimeout(async () => {
                try {
                    const response = await fetch(`/api/customers/search?keyword=${encodeURIComponent(keyword)}`);
                    const data = await response.json();
                    
                    if (!data.success || data.items.length === 0) {
                        // 顯示新客戶選項
                        autocompleteList.innerHTML = `
                            <div class="autocomplete-item" onclick="showNewCustomerDialog()" style="color: #f44336;">
                                <strong>🆕 新客戶</strong> - 點選填寫新客戶資料
                            </div>
                        `;
                        autocompleteList.classList.add('active');
                        return;
                    }
                    
                    autocompleteList.innerHTML = data.items.map(item => `
                        <div class="autocomplete-item" onclick="selectCustomer('${item.customer_id}', '${item.short_name}', '${item.mobile || ''}')">
                            <div style="font-weight: bold;">${item.short_name}</div>
                            <div style="font-size: 0.85em; color: #8892b0;">${item.mobile || '無電話'} | ${item.customer_id}</div>
                        </div>
                    `).join('');
                    
                    autocompleteList.classList.add('active');
                } catch (error) {
                    console.error('搜尋失敗:', error);
                }
            }, 300);
        }
        
        // ========== 選擇客戶 ==========
        function selectCustomer(code, name, mobile) {
            document.getElementById('customerCode').value = code;
            document.getElementById('customerName').value = name;
            document.getElementById('customerMobile').value = mobile;
            
            document.getElementById('customerSearch').style.display = 'none';
            document.getElementById('customerAutocomplete').classList.remove('active');
            
            document.getElementById('displayCustomerCode').textContent = code;
            document.getElementById('displayCustomerName').textContent = name;
            document.getElementById('customerSelected').classList.add('active');
        }
        
        // ========== 清除客戶 ==========
        function clearCustomer() {
            document.getElementById('customerCode').value = '';
            document.getElementById('customerName').value = '';
            document.getElementById('customerMobile').value = '';
            document.getElementById('customerSearch').value = '';
            document.getElementById('customerSearch').style.display = 'block';
            document.getElementById('customerSelected').classList.remove('active');
        }
        
        // ========== 新客戶對話框 ==========
        function showNewCustomerDialog() {
            const name = prompt('請輸入新客戶姓名：');
            if (!name || !name.trim()) return;
            
            const mobile = prompt('請輸入新客戶手機號碼（09 開頭 10 碼）：');
            if (!mobile) return;
            
            // 驗證手機格式
            const cleanMobile = mobile.replace(/[^0-9]/g, '');
            if (!/^09\d{8}$/.test(cleanMobile)) {
                showToast('手機格式錯誤，必須為 09 開頭的 10 碼數字', 'error');
                return;
            }
            
            // 產生臨時客戶編號
            const tempId = generateTempCustomerId(cleanMobile);
            
            document.getElementById('customerCode').value = tempId;
            document.getElementById('customerName').value = name.trim();
            document.getElementById('customerMobile').value = cleanMobile;
            
            document.getElementById('customerSearch').style.display = 'none';
            document.getElementById('displayCustomerCode').textContent = tempId;
            document.getElementById('displayCustomerName').textContent = name.trim() + ' (新客戶)';
            document.getElementById('customerSelected').classList.add('active');
            
            showToast('新客戶資料已暫存，請記得提供正確手機號碼', 'success');
        }
        
        // ========== 產生臨時客戶 ID ==========
        function generateTempCustomerId(mobile) {
            let hash = 0;
            for (let i = 0; i < mobile.length; i++) {
                const char = mobile.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            const positiveHash = Math.abs(hash).toString(16).toUpperCase().padStart(8, '0');
            return 'TEMP-C-' + positiveHash.substring(0, 8);
        }
        
        // ========== 產生臨時產品 ID ==========
        function generateTempProductId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let uuid = '';
            for (let i = 0; i < 8; i++) {
                uuid += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return 'TEMP-P-' + uuid;
        }
        
        // ========== 添加產品行 ==========
        function addProductRow() {
            productRowCount++;
            const tbody = document.getElementById('productsBody');
            const row = document.createElement('tr');
            row.className = 'product-row';
            row.id = `productRow${productRowCount}`;
            
            row.innerHTML = `
                <td>
                    <div class="product-search-wrapper">
                        <input type="text" id="prodCode${productRowCount}" placeholder="編號" oninput="searchProduct(${productRowCount})">
                        <div id="prodAutocomplete${productRowCount}" class="product-autocomplete"></div>
                    </div>
                </td>
                <td>
                    <input type="text" id="prodName${productRowCount}" placeholder="輸入品名" oninput="searchProduct(${productRowCount}, 'name')">
                </td>
                <td>
                    <input type="number" id="prodQty${productRowCount}" min="1" value="1" style="text-align: center;">
                </td>
                <td>
                    <input type="text" id="prodRemark${productRowCount}" placeholder="選填">
                </td>
                <td style="text-align: center;">
                    <input type="checkbox" id="prodNew${productRowCount}" onchange="onNewProductChange(${productRowCount})">
                </td>
                <td>
                    <button type="button" class="btn-delete" onclick="deleteProductRow(${productRowCount})">刪除</button>
                </td>
            `;
            
            tbody.appendChild(row);
        }
        
        // ========== 刪除產品行 ==========
        function deleteProductRow(rowId) {
            const row = document.getElementById(`productRow${rowId}`);
            if (row) {
                row.remove();
            }
            // 如果沒有行了，添加一行
            if (document.querySelectorAll('.product-row').length === 0) {
                addProductRow();
            }
        }
        
        // ========== 產品搜尋 ==========
        async function searchProduct(rowId, searchBy = 'code') {
            const inputId = searchBy === 'name' ? `prodName${rowId}` : `prodCode${rowId}`;
            const input = document.getElementById(inputId);
            const autocomplete = document.getElementById(`prodAutocomplete${rowId}`);
            const keyword = input.value.trim();
            
            if (productSearchTimers[rowId]) {
                clearTimeout(productSearchTimers[rowId]);
            }
            
            autocomplete.classList.remove('active');
            
            if (!keyword || keyword.length < 2) return;
            
            productSearchTimers[rowId] = setTimeout(async () => {
                try {
                    const response = await fetch(`/api/products/search?keyword=${encodeURIComponent(keyword)}`);
                    const data = await response.json();
                    
                    if (!data.success || !data.items || data.items.length === 0) return;
                    
                    autocomplete.innerHTML = data.items.slice(0, 5).map(item => `
                        <div class="autocomplete-item" onclick="selectProduct(${rowId}, '${item.product_code}', '${item.item_name}')">
                            <strong>${item.product_code}</strong> - ${item.item_name}
                        </div>
                    `).join('');
                    
                    autocomplete.classList.add('active');
                } catch (error) {
                    console.error('產品搜尋失敗:', error);
                }
            }, 300);
        }
        
        // ========== 選擇產品 ==========
        function selectProduct(rowId, code, name) {
            document.getElementById(`prodCode${rowId}`).value = code;
            document.getElementById(`prodName${rowId}`).value = name;
            document.getElementById(`prodAutocomplete${rowId}`).classList.remove('active');
            document.getElementById(`prodNew${rowId}`).checked = false;
        }
        
        // ========== 新品變更 ==========
        function onNewProductChange(rowId) {
            const isNew = document.getElementById(`prodNew${rowId}`).checked;
            const codeInput = document.getElementById(`prodCode${rowId}`);
            
            if (isNew) {
                codeInput.value = generateTempProductId();
                codeInput.readOnly = true;
                codeInput.style.background = 'rgba(0,212,255,0.1)';
            } else {
                codeInput.value = '';
                codeInput.readOnly = false;
                codeInput.style.background = '';
            }
        }
        
        // ========== 表單提交 ==========
        async function submitForm() {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            
            try {
                // 收集基本資訊
                const purpose = document.getElementById('purpose').value;
                const requestType = document.getElementById('requestType').value;
                const date = document.getElementById('requestDate').value;
                
                if (!date) {
                    showToast('請選擇日期', 'error');
                    return;
                }
                
                // 驗證客戶資訊（用途=客戶時）
                let customerCode = '';
                let customerName = '';
                let customerMobile = '';
                let isNewCustomer = false;
                let customerStagingId = null;
                
                if (purpose === '客戶') {
                    customerCode = document.getElementById('customerCode').value;
                    customerName = document.getElementById('customerName').value;
                    customerMobile = document.getElementById('customerMobile').value;
                    
                    if (!customerCode) {
                        showToast('請選擇或填寫客戶資料', 'error');
                        return;
                    }
                    
                    isNewCustomer = customerCode.startsWith('TEMP-');
                    if (isNewCustomer) {
                        customerStagingId = customerCode;
                    }
                }
                
                // 驗證調撥來源
                let transferFrom = '';
                if (requestType === '調撥') {
                    transferFrom = document.getElementById('transferFrom').value;
                    if (!transferFrom) {
                        showToast('請選擇調撥來源門市', 'error');
                        return;
                    }
                }
                
                // 收集產品資料
                const items = [];
                const rows = document.querySelectorAll('.product-row');
                
                for (let i = 0; i < rows.length; i++) {
                    const rowId = rows[i].id.replace('productRow', '');
                    const code = document.getElementById(`prodCode${rowId}`).value.trim();
                    const name = document.getElementById(`prodName${rowId}`).value.trim();
                    const qty = parseInt(document.getElementById(`prodQty${rowId}`).value);
                    const remark = document.getElementById(`prodRemark${rowId}`).value.trim();
                    const isNew = document.getElementById(`prodNew${rowId}`).checked;
                    
                    if (!name) {
                        showToast(`第 ${i+1} 筆產品：品名不可為空`, 'error');
                        return;
                    }
                    
                    if (!qty || qty < 1) {
                        showToast(`第 ${i+1} 筆產品：數量必須大於 0`, 'error');
                        return;
                    }
                    
                    items.push({
                        date: date,
                        product_code: code || (isNew ? generateTempProductId() : ''),
                        product_name: name,
                        quantity: qty,
                        remark: remark,
                        purpose: purpose,
                        request_type: requestType,
                        transfer_from: transferFrom,
                        customer_code: customerCode,
                        customer_name: customerName,
                        customer_mobile: customerMobile,
                        is_new_customer: isNewCustomer,
                        is_new_product: isNew,
                        customer_staging_id: customerStagingId,
                        product_staging_id: isNew ? (code || generateTempProductId()) : null,
                        requester: currentUser.name,
                        department: currentUser.department
                    });
                }
                
                if (items.length === 0) {
                    showToast('請至少添加一筆產品', 'error');
                    return;
                }
                
                // 送出 API
                const response = await fetch('/api/needs/batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: items })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(`成功提交 ${data.count} 筆需求`, 'success');
                    // 重置表單
                    resetForm();
                } else {
                    showToast(data.message || '提交失敗', 'error');
                }
                
            } catch (error) {
                console.error('提交錯誤:', error);
                showToast('系統錯誤，請稍後再試', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交送出';
            }
        }
        
        // ========== 重置表單 ==========
        function resetForm() {
            document.getElementById('purpose').value = '備貨';
            document.getElementById('requestType').value = '請購';
            onPurposeChange();
            onRequestTypeChange();
            clearCustomer();
            
            // 清除所有產品行並添加新的一行
            document.getElementById('productsBody').innerHTML = '';
            productRowCount = 0;
            addProductRow();
        }
        
        // ========== 顯示提示 ==========
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
