<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查詢 - 電腦舖</title>
    <link rel="stylesheet" href="shared/global-background.css">
    <script src="shared/global-background.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px 40px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 {
            text-align: left;
            font-size: 1.2em;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: left;
            color: #8892b0;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .nav {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav a:hover {
            color: #00d4ff;
            border-color: #00d4ff;
        }
        .query-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .query-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            display: block;
        }
        .query-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }
        .query-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        .query-title {
            font-size: 1.3em;
            color: #00d4ff;
            margin-bottom: 10px;
        }
        .query-desc {
            color: #8892b0;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 查詢</h1>
        <p class="subtitle">Query Center</p>

        <div class="nav">
            <a href="index.html">🏠 首頁</a>
        </div>

        <div class="query-grid">
            <a href="customer_search.html" class="query-card" target="_blank">
                <div class="query-icon">👤</div>
                <div class="query-title">客戶查詢</div>
                <div class="query-desc">搜尋客戶資料、聯絡資訊與交易紀錄</div>
            </a>

            <a href="inventory_query.html" class="query-card" target="_blank">
                <div class="query-icon">📦</div>
                <div class="query-title">庫存查詢</div>
                <div class="query-desc">查詢商品庫存數量與各倉庫分佈</div>
            </a>
        </div>
    </div>
</body>
</html>
