<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>業績目標管理 - 電腦舖營運系統</title>
    <link rel="stylesheet" href="shared/global-background.css">
    <script src="shared/global-background.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px 40px; }
        h1 {
            text-align: left;
            font-size: 1.2em;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: left;
            color: #8892b0;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .nav {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav a:hover {
            color: #00d4ff;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        .filter-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-group label {
            color: #8892b0;
            font-size: 0.9em;
        }
        .filter-group select {
            padding: 10px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1em;
        }
        .filter-group select option {
            background: #1a1a2e;
            color: #fff;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: #fff;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .btn-success {
            background: #4caf50;
            color: #fff;
        }
        .btn-success:hover {
            background: #45a049;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .card h2 {
            color: #00d4ff;
            font-size: 1.3em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .info-box {
            background: rgba(0, 212, 255, 0.05);
            border-left: 4px solid #00d4ff;
            padding: 15px 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 20px;
            color: #ccd6f6;
            font-size: 0.9em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        th {
            color: #00d4ff;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        td { color: #ccd6f6; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .input-target {
            width: 150px;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1em;
            text-align: right;
        }
        .input-target:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .current-value {
            color: #8892b0;
            font-size: 0.85em;
            margin-left: 10px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        .status-new { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .status-exists { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid #4caf50;
            color: #4caf50;
            display: block;
        }
        .message.error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #f44336;
            display: block;
        }
        .summary-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .summary-box h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .summary-item:last-child {
            border-bottom: none;
        }
        .summary-label {
            color: #8892b0;
        }
        .summary-value {
            color: #00d4ff;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .input-target { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 業績目標管理</h1>
        <div class="subtitle">只須輸入個人目標，門市與部門目標自動計算</div>
        
        <div class="nav">
            <a href="/">🏠 首頁</a>
            <a href="/admin.html">⚙️ 資料管理中心</a>
        </div>

        <div id="messageBox" class="message"></div>

        <!-- 篩選條件 -->
        <div class="card">
            <div class="filter-bar">
                <div class="filter-group">
                    <label>📅 年份</label>
                    <select id="yearSelect">
                        <option value="2026" selected>2026</option>
                        <option value="2027">2027</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📅 月份</label>
                    <select id="monthSelect">
                        <option value="1">1月</option>
                        <option value="2">2月</option>
                        <option value="3">3月</option>
                        <option value="4">4月</option>
                        <option value="5">5月</option>
                        <option value="6">6月</option>
                        <option value="7">7月</option>
                        <option value="8">8月</option>
                        <option value="9">9月</option>
                        <option value="10">10月</option>
                        <option value="11">11月</option>
                        <option value="12">12月</option>
                    </select>
                </div>
                <button class="btn btn-success" onclick="saveAllTargets()">💾 儲存全部目標</button>
            </div>
            
            <div class="info-box">
                💡 <strong>說明：</strong>請輸入每位業務員的個人目標。門市目標 = 該門市所有員工目標加總；部門目標 = 該部門所有員工目標加總。
            </div>
        </div>

        <!-- 個人目標 -->
        <div class="card">
            <h2>👤 個人業績目標</h2>
            <table>
                <thead>
                    <tr>
                        <th>業務員</th>
                        <th>所屬門市</th>
                        <th>目標金額</th>
                        <th>狀態</th>
                    </tr>
                </thead>
                <tbody id="personalTable">
                    <!-- 由 JavaScript 動態生成 -->
                </tbody>
            </table>
            
            <!-- 自動計算摘要 -->
            <div class="summary-box">
                <h3>📊 自動計算摘要</h3>
                <div class="summary-grid">
                    <div>
                        <div class="summary-item">
                            <span class="summary-label">豐原門市合計</span>
                            <span class="summary-value" id="summaryFengyuan">NT$ 0</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">潭子門市合計</span>
                            <span class="summary-value" id="summaryTanzi">NT$ 0</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">大雅門市合計</span>
                            <span class="summary-value" id="summaryDaya">NT$ 0</span>
                        </div>
                    </div>
                    <div>
                        <div class="summary-item">
                            <span class="summary-label">門市部合計</span>
                            <span class="summary-value" id="summaryStoreDept">NT$ 0</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">業務部合計</span>
                            <span class="summary-value" id="summaryBusinessDept">NT$ 0</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">公司總計</span>
                            <span class="summary-value" id="summaryTotal">NT$ 0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 員工資料（所屬門市）
        const staffData = [
            { name: '林榮祺', store: '豐原', dept: '門市部' },
            { name: '林峙文', store: '豐原', dept: '門市部' },
            { name: '劉育仕', store: '潭子', dept: '門市部' },
            { name: '林煜捷', store: '潭子', dept: '門市部' },
            { name: '張永承', store: '大雅', dept: '門市部' },
            { name: '張家碩', store: '大雅', dept: '門市部' },
            { name: '鄭宇晉', store: '-', dept: '業務部' },
            { name: '梁仁佑', store: '-', dept: '業務部' }
        ];

        // 初始化表格
        function initTable() {
            const tbody = document.getElementById('personalTable');
            tbody.innerHTML = staffData.map(staff => `
                <tr>
                    <td><strong>${staff.name}</strong></td>
                    <td>${staff.store}</td>
                    <td>
                        <input type="number" 
                               class="input-target" 
                               id="target_${staff.name}" 
                               placeholder="輸入目標"
                               data-store="${staff.store}"
                               data-dept="${staff.dept}"
                               oninput="updateSummary()">
                        <span class="current-value" id="current_${staff.name}"></span>
                    </td>
                    <td><span class="status-badge status-new" id="status_${staff.name}">新資料</span></td>
                </tr>
            `).join('');
        }

        // 更新摘要計算
        function updateSummary() {
            let fengyuan = 0, tanzi = 0, daya = 0;
            let storeDept = 0, businessDept = 0;
            
            staffData.forEach(staff => {
                const input = document.getElementById(`target_${staff.name}`);
                const value = parseInt(input?.value) || 0;
                
                if (staff.store === '豐原') fengyuan += value;
                if (staff.store === '潭子') tanzi += value;
                if (staff.store === '大雅') daya += value;
                
                if (staff.dept === '門市部') storeDept += value;
                if (staff.dept === '業務部') businessDept += value;
            });
            
            document.getElementById('summaryFengyuan').textContent = formatMoney(fengyuan);
            document.getElementById('summaryTanzi').textContent = formatMoney(tanzi);
            document.getElementById('summaryDaya').textContent = formatMoney(daya);
            document.getElementById('summaryStoreDept').textContent = formatMoney(storeDept);
            document.getElementById('summaryBusinessDept').textContent = formatMoney(businessDept);
            document.getElementById('summaryTotal').textContent = formatMoney(storeDept + businessDept);
        }

        // 格式化金額
        function formatMoney(amount) {
            return 'NT$ ' + (amount || 0).toLocaleString('zh-TW');
        }

        // 顯示訊息
        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.textContent = text;
            box.className = 'message ' + type;
            setTimeout(() => { box.className = 'message'; }, 5000);
        }

        // 載入現有資料
        async function loadCurrentData() {
            const year = document.getElementById('yearSelect').value;
            const month = document.getElementById('monthSelect').value;
            
            try {
                const response = await fetch(`/api/targets?year=${year}&month=${month}`);
                const data = await response.json();
                
                if (data.success) {
                    // 填充個人資料
                    data.personal.forEach(p => {
                        const input = document.getElementById(`target_${p.name}`);
                        const current = document.getElementById(`current_${p.name}`);
                        const status = document.getElementById(`status_${p.name}`);
                        
                        if (input) {
                            input.value = p.target_amount || '';
                            if (p.target_amount) {
                                current.textContent = `現有: ${formatMoney(p.target_amount)}`;
                                status.textContent = '已設定';
                                status.className = 'status-badge status-exists';
                            } else {
                                current.textContent = '';
                                status.textContent = '新資料';
                                status.className = 'status-badge status-new';
                            }
                        }
                    });
                    
                    updateSummary();
                    showMessage(`✅ 已載入 ${year}年${month}月 的目標資料`, 'success');
                }
            } catch (error) {
                console.error('載入資料失敗:', error);
                showMessage('❌ 載入資料失敗', 'error');
            }
        }

        // 儲存全部目標
        async function saveAllTargets() {
            const year = document.getElementById('yearSelect').value;
            const month = document.getElementById('monthSelect').value;
            
            const personalTargets = [];
            let fengyuan = 0, tanzi = 0, daya = 0;
            let storeDept = 0, businessDept = 0;
            
            // 收集個人目標並計算門市/部門合計
            staffData.forEach(staff => {
                const input = document.getElementById(`target_${staff.name}`);
                const value = input && input.value ? parseInt(input.value) : 0;
                
                if (value > 0) {
                    personalTargets.push({
                        category: '個人',
                        name: staff.name,
                        target: value
                    });
                }
                
                // 計算門市合計
                if (staff.store === '豐原') fengyuan += value;
                if (staff.store === '潭子') tanzi += value;
                if (staff.store === '大雅') daya += value;
                
                // 計算部門合計
                if (staff.dept === '門市部') storeDept += value;
                if (staff.dept === '業務部') businessDept += value;
            });
            
            if (personalTargets.length === 0) {
                showMessage('⚠️ 請至少輸入一個目標', 'error');
                return;
            }
            
            // 加入門市目標
            const storeTargets = [
                { category: '門市', name: '豐原門市', target: fengyuan },
                { category: '門市', name: '潭子門市', target: tanzi },
                { category: '門市', name: '大雅門市', target: daya }
            ].filter(t => t.target > 0);
            
            // 加入部門目標
            const deptTargets = [
                { category: '部門', name: '門市部', target: storeDept },
                { category: '部門', name: '業務部', target: businessDept }
            ].filter(t => t.target > 0);
            
            // 加入公司總目標
            const companyTarget = { category: '公司', name: '公司', target: storeDept + businessDept };
            
            const allTargets = [...personalTargets, ...storeTargets, ...deptTargets];
            if (companyTarget.target > 0) {
                allTargets.push(companyTarget);
            }
            
            try {
                const response = await fetch('/api/targets/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ year, month, targets: allTargets })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage(`✅ 成功儲存 ${result.saved_count} 筆目標（含自動計算的門市與部門目標）`, 'success');
                    loadCurrentData();
                } else {
                    showMessage('❌ 儲存失敗: ' + result.error, 'error');
                }
            } catch (error) {
                console.error('儲存失敗:', error);
                showMessage('❌ 儲存失敗', 'error');
            }
        }

        // 頁面載入時初始化
        document.addEventListener('DOMContentLoaded', () => {
            initTable();
            const now = new Date();
            document.getElementById('yearSelect').value = now.getFullYear();
            document.getElementById('monthSelect').value = now.getMonth() + 1;
            loadCurrentData();
            
            // 監聽年份和月份變化，自動載入資料
            document.getElementById('yearSelect').addEventListener('change', loadCurrentData);
            document.getElementById('monthSelect').addEventListener('change', loadCurrentData);
        });
    </script>
</body>
</html>
