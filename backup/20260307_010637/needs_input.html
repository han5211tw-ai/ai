<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>請購調撥需求表 - 電腦舖</title>

    <script>window.version='20250301-0200';</script>
    <link rel="stylesheet" href="shared/auth_ui.css">
    <script src="shared/auth_ui.js?v=20250303-1402"></script>
    <link rel="stylesheet" href="shared/global-background.css">
    <script src="shared/global-background.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html,body{overflow-x:hidden}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft JhengHei',sans-serif;background:linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#16213e 100%);min-height:100vh;color:#fff;padding:20px 40px}
        .container{max-width:1400px;margin:0 auto}
        h1{text-align:left;font-size:1.2em;margin-bottom:5px;background:linear-gradient(90deg,#00d4ff,#7b2cbf);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .subtitle{text-align:left;color:#8892b0;margin-bottom:20px;font-size:0.9em}
        .login-section,.form-section{display:none}
        .login-section.active,.form-section.active{display:block}
        .login-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:40px;max-width:400px;margin:0 auto;text-align:center}
        .login-box h2{color:#00d4ff;margin-bottom:30px}
        .form-group{margin-bottom:15px;text-align:left}
        .form-group label{display:block;margin-bottom:6px;color:#8892b0;font-size:0.95em}
        .form-group input,.form-group select{width:100%;max-width:100%;padding:10px 12px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;background:rgba(255,255,255,0.05);color:#fff;font-size:0.95em}
        .form-group input:focus,.form-group select:focus{outline:none;border-color:#00d4ff}
        select option{background:#1a1a2e;color:#fff}
        .btn{padding:10px 25px;border:none;border-radius:6px;background:linear-gradient(135deg,#00d4ff,#7b2cbf);color:#fff;font-size:1.05em;cursor:pointer;transition:transform 0.2s}
        .btn:hover{transform:translateY(-2px)}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .error-msg{color:#f44336;margin-top:10px;font-size:0.95em}
        .user-info{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 20px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;font-size:1.05em}
        .user-info span{color:#00d4ff;font-weight:bold}
        .btn-logout{padding:5px 12px;font-size:0.9em;background:rgba(244,67,54,0.2);border:1px solid rgba(244,67,54,0.5);color:#f44336}
        .header-section{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin-bottom:20px}
        .header-title{color:#00d4ff;font-size:1.1em;margin-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:10px}
        .form-row{display:flex;gap:15px;margin-bottom:12px;flex-wrap:wrap}
        .form-field{flex:1;min-width:200px}
        .form-field label{display:block;margin-bottom:5px;color:#8892b0;font-size:0.9em}
        .form-field input,.form-field select{width:100%;padding:10px 12px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;background:rgba(255,255,255,0.05);color:#fff;font-size:0.95em}
        .form-field input:focus,.form-field select:focus{outline:none;border-color:#00d4ff}
        .customer-section{background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.2);border-radius:8px;padding:15px;margin-top:10px;display:none}
        .customer-section.active{display:block}
        .customer-search-wrapper{position:relative}
        .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#1a1a2e;border:1px solid rgba(255,255,255,0.2);border-radius:6px;max-height:200px;overflow-y:auto;z-index:100;display:none}
        .autocomplete-list.active{display:block}
        .autocomplete-item{padding:10px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.1)}
        .autocomplete-item:hover{background:rgba(0,212,255,0.1)}
        .customer-selected{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);border-radius:6px;padding:10px;margin-top:8px;display:none}
        .customer-selected.active{display:flex;justify-content:space-between;align-items:center}
        .products-section{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin-bottom:20px}
        .products-table{width:100%;border-collapse:collapse}
        .products-table th{text-align:left;padding:12px 10px;color:#8892b0;border-bottom:2px solid rgba(255,255,255,0.2);font-size:0.9em;font-weight:500}
        .products-table td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);vertical-align:top;height:60px;box-sizing:border-box}
        .products-table tr{height:60px}
        .product-row input{width:100%;padding:8px 10px;border:1px solid rgba(255,255,255,0.2);border-radius:4px;background:rgba(255,255,255,0.05);color:#fff;font-size:0.9em;box-sizing:border-box}
        .product-row input:focus{outline:none;border-color:#00d4ff}
        .product-row input.error{border-color:#f44336;background:rgba(244,67,54,0.1)}
        .product-autocomplete{position:absolute;top:100%;left:0;right:0;background:#1a1a2e;border:1px solid rgba(255,255,255,0.2);border-radius:4px;max-height:150px;overflow-y:auto;z-index:50;display:none}
        .product-autocomplete.active{display:block}
        .product-search-wrapper{position:relative}
        .btn-add{margin-top:15px;padding:10px 20px;background:rgba(0,212,255,0.2);border:1px solid #00d4ff;color:#00d4ff;border-radius:6px;cursor:pointer;font-size:0.95em;transition:all 0.2s}
        .btn-add:hover{background:rgba(0,212,255,0.3)}
        .btn-delete{padding:6px 12px;background:rgba(244,67,54,0.2);border:1px solid #f44336;color:#f44336;border-radius:4px;cursor:pointer;font-size:0.85em;transition:all 0.2s}
        .btn-delete:hover{background:rgba(244,67,54,0.3)}
        .field-error{color:#f44336;font-size:0.85em;margin-top:4px;display:none}
        .field-error.show{display:block}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;color:#fff;font-size:0.95em;z-index:1000;opacity:0;transition:opacity 0.3s}
        .toast.show{opacity:1}
        .toast.success{background:rgba(76,175,80,0.9)}
        .toast.error{background:rgba(244,67,54,0.9)}
        .toast-center{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px 40px;border-radius:12px;color:#fff;font-size:1.2em;z-index:2000;opacity:0;transition:opacity 0.3s;background:rgba(0,0,0,0.85);border:2px solid #00d4ff;box-shadow:0 0 20px rgba(0,212,255,0.3);text-align:center;min-width:300px}
        .toast-center.show{opacity:1}
        .toast-center.info{background:rgba(0,212,255,0.9)}
        .recent-section{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin-top:20px}
        .recent-section h3{color:#00d4ff;margin-bottom:15px;font-size:1.1em}
        .recent-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .recent-item .info{flex:1;min-width:200px;font-size:0.9em;line-height:1.5}
        .recent-item .status{display:inline-block;padding:4px 10px;border-radius:4px;font-size:0.85em;margin-right:10px}
        .status-pending{background:rgba(255,152,0,0.2);color:#ff9800}
        .status-cancelled{background:rgba(244,67,54,0.2);color:#f44336}
        .status-arrived{background:rgba(33,150,243,0.2);color:#2196f3}
        .status-completed{background:rgba(76,175,80,0.2);color:#4caf50}
        .btn-cancel{padding:6px 12px;font-size:0.85em;background:rgba(244,67,54,0.2);border:1px solid rgba(244,67,54,0.5);color:#f44336;border-radius:4px;cursor:pointer}
        .btn-cancel:hover{background:rgba(244,67,54,0.3)}
        .history-section{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin-top:20px}
        .history-section h3{color:#00d4ff;margin-bottom:15px;font-size:1.1em}
        .history-filters{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;align-items:center}
        .history-filters select,.history-filters input{padding:8px 12px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;background:rgba(255,255,255,0.05);color:#fff;font-size:0.9em}
        .history-filters select option{background:#1a1a2e;color:#fff}
        .history-filters button{padding:8px 16px;background:rgba(0,212,255,0.2);border:1px solid #00d4ff;color:#00d4ff;border-radius:6px;cursor:pointer;font-size:0.9em;transition:all 0.2s}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        .history-filters button:hover{background:rgba(0,212,255,0.3)}
        .history-pagination{display:flex;justify-content:center;gap:10px;margin-top:15px;align-items:center}
        .history-pagination button{padding:6px 12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:4px;cursor:pointer;font-size:0.85em;transition:all 0.2s}
        .history-pagination button:hover:not(:disabled){background:rgba(255,255,255,0.2)}
        .history-pagination button:disabled{opacity:0.3;cursor:not-allowed}
        .history-pagination span{color:#8892b0;font-size:0.9em}
        @media(max-width:768px){.form-row{flex-direction:column}.form-field{min-width:100%}.products-table{font-size:0.85em}.products-table th,.products-table td{padding:8px 5px}.recent-item{flex-direction:column;align-items:flex-start}.history-filters{flex-direction:column;align-items:stretch}.history-filters input{width:100%}}
        /* 新客戶彈窗樣式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }
        .modal h3 {
            color: #00d4ff;
            margin-bottom: 20px;
        }
        .modal .form-group {
            margin-bottom: 15px;
        }
        .modal .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #8892b0;
            font-size: 0.9em;
        }
        .modal .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 1em;
        }
        .modal .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .error-text {
            color: #f44336;
            font-size: 0.85em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 請購調撥需求表</h1>
        <p class="subtitle">請購與調撥需求提交</p>
        
        <!-- 表單區 -->
        <div class="form-section" id="formSection" style="display:none;">
            <!-- 使用者資訊 - 完全複製 V1 -->
            <div class="user-info">
                <div>
                    填表人：<span id="userName">-</span>｜
                    單位：<span id="userDept">-</span>
                    <span id="storeSelectorContainer" style="display:none; margin-left: 15px; white-space: nowrap;">
                        代送門市：
                        <select id="supervisorStoreSelect" style="padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; font-size: 0.9em; width: auto;">
                            <option value="豐原門市">豐原門市</option>
                            <option value="潭子門市">潭子門市</option>
                            <option value="大雅門市">大雅門市</option>
                        </select>
                    </span>
                </div>
                <button class="btn btn-logout" onclick="logout()">重新登入</button>
            </div>
            
            <!-- 單據頭 -->
            <div class="header-section">
                <div class="header-title">📋 表單資訊</div>
                <div class="form-row">
                    <div class="form-field" style="flex:0.5">
                        <label>日期 *</label>
                        <input type="date" id="requestDate">
                    </div>
                    <div class="form-field" style="flex:0.5">
                        <label>需求類型 *</label>
                        <select id="requestType" onchange="onRequestTypeChange()">
                            <option value="請購">請購</option>
                            <option value="調撥">調撥</option>
                        </select>
                    </div>
                    <div class="form-field" style="flex:0.5">
                        <label>需求用途 *</label>
                        <select id="purpose" onchange="onPurposeChange()">
                            <option value="備貨">備貨</option>
                            <option value="客戶">客戶</option>
                        </select>
                    </div>
                </div>
                <div id="transferSection" style="display:none">
                    <div class="form-row">
                        <div class="form-field">
                            <label>調撥來源 *</label>
                            <select id="transferFrom">
                                <option value="">選擇來源門市</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div id="customerSection" class="customer-section">
                    <div class="form-row">
                        <div class="form-field" style="flex:2">
                            <label>客戶 *</label>
                            <div class="customer-search-wrapper" style="position:relative">
                                <input type="text" id="customerSearch" placeholder="輸入姓名、手機或統編搜尋..." oninput="searchCustomer()">
                                <div id="customerAutocomplete" class="autocomplete-list"></div>
                                <input type="hidden" id="customerCode">
                                <input type="hidden" id="customerName">
                                <input type="hidden" id="customerMobile">
                                <div id="customerSelected" class="customer-selected">
                                    <div>
                                        <span style="color:#00d4ff">編號:</span> <span id="displayCustomerCode"></span>
                                        <span style="color:#00d4ff;margin-left:15px">姓名:</span> <span id="displayCustomerName"></span>
                                    </div>
                                    <button type="button" class="btn" onclick="clearCustomer()" style="background:rgba(255,255,255,0.1);padding:6px 12px;font-size:0.85em">清除</button>
                                </div>
                            </div>
                        </div>
                        <div class="form-field" style="flex:1">
                            <label>&nbsp;</label>
                            <button type="button" class="btn" onclick="showNewCustomerDialog()" style="width:100%;background:rgba(0,212,255,0.2)">+ 新客戶</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 產品明細 -->
            <div class="products-section">
                <div class="header-title">📦 產品明細（可多列）<span style="color:#8892b0;font-size:0.8em">預設5行，點+新增</span></div>
                <table class="products-table">
                    <thead>
                        <tr>
                            <th style="width:25%">產品編號 <span style="font-size:0.75em;color:#666">(英數+-)</span></th>
                            <th style="width:30%">產品品名 *</th>
                            <th style="width:12%">數量 *</th>
                            <th style="width:18%">備註</th>
                            <th style="width:8%">新品</th>
                            <th style="width:7%"></th>
                        </tr>
                    </thead>
                    <tbody id="productsBody"></tbody>
                </table>
                <button type="button" class="btn-add" onclick="addProductRow()">+ 新增產品列</button>
            </div>
            
            <div style="text-align:center;padding:20px">
                <button id="submitBtn" class="btn" onclick="submitForm()" style="padding:14px 50px;font-size:1.1em">提交送出</button>
            </div>
            
            <!-- 最近提交區塊（30分鐘內可取消） -->
            <div class="recent-section" id="recentSection" style="display:none;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin-top:20px;">
                <h3 style="color:#00d4ff;margin-bottom:15px;font-size:1.1em">📝 最近提交（30分鐘內可取消）</h3>
                <div id="recentList"></div>
            </div>
            
            <!-- 歷史紀錄區塊 -->
            <div class="history-section" id="historySection" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:20px;margin-top:20px;">
                <h3 style="color:#00d4ff;margin-bottom:15px;font-size:1.1em">📜 歷史紀錄</h3>
                <div class="history-filters" style="display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;align-items:center;">
                    <select id="historyStatusFilter" onchange="loadHistory()" style="padding:8px 12px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;background:rgba(255,255,255,0.05);color:#fff;font-size:0.9em;">
                        <option value="all">📋 全部</option>
                        <option value="active">⏳ 未處理</option>
                        <option value="done">✅ 已處理</option>
                        <option value="cancelled">❌ 已取消</option>
                    </select>
                    <input type="text" id="historySearch" placeholder="搜尋品名/客戶/部門..." onkeyup="if(event.key==='Enter')loadHistory()" style="padding:8px 12px;border:1px solid rgba(255,255,255,0.2);border-radius:6px;background:rgba(255,255,255,0.05);color:#fff;font-size:0.9em;flex:1;min-width:150px;">
                    <button onclick="loadHistory()" style="padding:8px 16px;background:rgba(0,212,255,0.2);border:1px solid #00d4ff;color:#00d4ff;border-radius:6px;cursor:pointer;font-size:0.9em;">🔍 搜尋</button>
                </div>
                <div id="historyList" style="min-height:100px;">
                    <div style="text-align:center;color:#8892b0;padding:20px;">載入中...</div>
                </div>
                <div class="history-pagination" id="historyPagination" style="display:flex;justify-content:center;gap:10px;margin-top:15px;align-items:center;">
                    <button onclick="changeHistoryPage(-1)" id="historyPrevBtn" style="padding:6px 12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:4px;cursor:pointer;font-size:0.85em;">← 上一頁</button>
                    <span id="historyPageInfo" style="color:#8892b0;font-size:0.9em;">第 1 頁</span>
                    <button onclick="changeHistoryPage(1)" id="historyNextBtn" style="padding:6px 12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:4px;cursor:pointer;font-size:0.85em;">下一頁 →</button>
                </div>
            </div>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script>
    // 全局變數
    let currentUser=null;
    const allStores=['豐原門市','潭子門市','大雅門市','業務部','總公司倉庫'];
    let productRowCount=0;
    let customerSearchTimer=null;
    let productSearchTimers={};
    let isSubmitting=false; // 防重複提交旗標
    
    // 初始化 - 使用共用登入元件
    document.addEventListener('DOMContentLoaded',async function(){
        console.log('[NeedsInput] Initializing with shared auth...');
        
        try{
            // 使用共用登入元件
            const user=await requireLogin({
                minRole:'staff',
                title:'🛒 請購調撥需求表',
                subtitle:'身分證後四碼驗證'
            });
            
            console.log('[NeedsInput] Login success:',user);
            currentUser=user;
            
            // 顯示表單
            document.getElementById('formSection').style.display='block';
            document.getElementById('userName').textContent=user.name;
            document.getElementById('userDept').textContent=user.department;
            
            // 莊圍迪特殊處理
            if(user.name==='莊圍迪'){
                document.getElementById('storeSelectorContainer').style.display='inline';

    // 客戶搜尋 - 加強版（含重複警示）
    async function searchCustomer(){
        const searchInput=document.getElementById('customerSearch');
        const autocompleteList=document.getElementById('customerAutocomplete');
        const keyword=searchInput.value.trim();
        if(customerSearchTimer)clearTimeout(customerSearchTimer);
        autocompleteList.classList.remove('active');
        if(!keyword||keyword.length<2)return;
        if(/^\d+$/.test(keyword)&&keyword.length<3)return;
        customerSearchTimer=setTimeout(async()=>{
            try{
                const response=await fetch('/api/customers/search?keyword='+encodeURIComponent(keyword));
                const data=await response.json();
                if(!data.success||data.items.length===0){
                    autocompleteList.innerHTML='<div class="autocomplete-item" onclick="showNewCustomerDialog()" style="color:#f44336"><strong>🆕新客戶</strong>-點選填寫新客戶</div>';
                    autocompleteList.classList.add('active');
                    // 無搜尋結果時，檢查是否為潛在重複
                    checkPotentialDuplicate(keyword);
                    return;
                }
                // 有搜尋結果時，顯示並標記相似度
                const hasHighSimilarity = data.items.some(item => isHighSimilarity(item.short_name, keyword));
                autocompleteList.innerHTML=data.items.map(item=>{
                    const isSimilar = isHighSimilarity(item.short_name, keyword);
                    const highlightStyle = isSimilar ? 'background:rgba(255,193,7,0.2);border-left:3px solid #ffc107;' : '';
                    const warningIcon = isSimilar ? '⚠️ ' : '';
                    return '<div class="autocomplete-item" onclick="selectCustomer(\''+item.customer_id+'\',\''+item.short_name+'\',\''+(item.mobile||'')+'\')" style="'+highlightStyle+'">'+
                    '<div style="font-weight:bold">'+warningIcon+item.short_name+'</div>'+
                    '<div style="font-size:0.85em;color:#8892b0">'+(item.mobile||'無電話')+'|'+(item.tax_id?'統編:'+item.tax_id+'|':'')+item.customer_id+'</div>'+
                    '</div>';
                }).join('')+
                '<div class="autocomplete-item" onclick="showNewCustomerDialog()" style="color:#f44336;border-top:1px solid rgba(255,255,255,0.1);margin-top:5px;padding-top:10px;"><strong>🆕以上都不是，建立新客戶</strong></div>';
                autocompleteList.classList.add('active');
                // 如果有高度相似客戶，顯示警示
                if(hasHighSimilarity){
                    showDuplicateWarning(data.items.slice(0, 3), keyword);
                }
            }catch(error){console.error('搜尋失敗:',error);}
        },300);
    }

    // 檢查名稱相似度
    function isHighSimilarity(name, keyword){
        if(!name || !keyword) return false;
        const cleanName = name.replace(/\s/g, '').toLowerCase();
        const cleanKeyword = keyword.replace(/\s/g, '').toLowerCase();
        // 完全包含或高度相似
        return cleanName.includes(cleanKeyword) || cleanKeyword.includes(cleanName) ||
               similarity(cleanName, cleanKeyword) > 0.6;
    }

    // 簡易相似度計算（Levenshtein distance 簡化版）
    function similarity(s1, s2){
        const longer = s1.length > s2.length ? s1 : s2;
        const shorter = s1.length > s2.length ? s2 : s1;
        if(longer.length === 0) return 1.0;
        const matchCount = [...shorter].filter((c, i) => longer[i] === c).length;
        return matchCount / longer.length;
    }

    // 檢查潛在重複（無搜尋結果時）
    async function checkPotentialDuplicate(keyword){
        // 如果輸入的是手機或統編格式，顯示特別提示
        const cleanInput = keyword.replace(/[-\s]/g, '');
        if(/^09\d{8}$/.test(cleanInput) || /^\d{8}$/.test(cleanInput)){
            showToast('⚠️ 此號碼格式正確但無對應客戶，請確認是否輸入正確','warning');
        }
    }

    // 顯示重複警示
    function showDuplicateWarning(items, keyword){
        const similarNames = items.filter(item => isHighSimilarity(item.short_name, keyword))
                                  .map(item => item.short_name)
                                  .join('、');
        if(similarNames){
            console.log('發現相似客戶:', similarNames);
            // 在 console 記錄，不干擾使用者操作
        }
    }

    // 提交新客戶
    async function submitNewCustomer(){
        const name = document.getElementById('newCustomerName').value.trim();
        const mobileInput = document.getElementById('newCustomerMobile').value.trim();

        // 驗證姓名
        if(!name){
            document.getElementById('nameError').style.display = 'block';
            return;
        } else {
            document.getElementById('nameError').style.display = 'none';
        }

        // 驗證手機
        const cleanMobile = normalizeMobile(mobileInput);
        if(!validateMobileFormat(cleanMobile)){
            document.getElementById('mobileError').style.display = 'block';
            return;
        } else {
            document.getElementById('mobileError').style.display = 'none';
        }

        // 🔍 檢查是否有相似客戶
        const checkResponse = await fetch('/api/customers/search?keyword='+encodeURIComponent(name));
        const checkData = await checkResponse.json();
        if(checkData.success && checkData.items.length > 0){
            const similarItems = checkData.items.filter(item => isHighSimilarity(item.short_name, name));
            if(similarItems.length > 0){
                const confirmMsg = '⚠️ 發現相似客戶：\n\n' +
                    similarItems.slice(0, 3).map(item =>
                        '• ' + item.short_name + ' (' + (item.mobile || '無手機') + ')'
                    ).join('\n') +
                    '\n\n確定要建立新客戶嗎？';
                if(!confirm(confirmMsg)){
                    hideNewCustomerModal();
                    document.getElementById('customerSearch').value = name;
                    searchCustomer();
                    return;
                }
            }
        }

        // 🔍 檢查手機是否已存在
        const mobileCheckResponse = await fetch('/api/customers/search?keyword='+encodeURIComponent(cleanMobile));
        const mobileCheckData = await mobileCheckResponse.json();
        if(mobileCheckData.success && mobileCheckData.items.length > 0){
            const sameMobileItem = mobileCheckData.items.find(item => item.mobile === cleanMobile);
            if(sameMobileItem){
                const confirmMsg = '📱 此手機號碼已存在：\n\n' +
                    '客戶：' + sameMobileItem.short_name + '\n' +
                    '手機：' + sameMobileItem.mobile + '\n' +
                    '編號：' + sameMobileItem.customer_id + '\n\n' +
                    '確定要建立新客戶嗎？（建議使用現有客戶）';
                if(!confirm(confirmMsg)){
                    hideNewCustomerModal();
                    selectCustomer(sameMobileItem.customer_id, sameMobileItem.short_name, sameMobileItem.mobile);
                    return;
                }
            }
        }

        // 建立新客戶
        const tempId = generateTempCustomerId(cleanMobile);
        document.getElementById('customerCode').value = tempId;
        document.getElementById('customerName').value = name;
        document.getElementById('customerMobile').value = cleanMobile;
        document.getElementById('customerSearch').style.display = 'none';
        document.getElementById('displayCustomerCode').textContent = tempId;
        document.getElementById('displayCustomerName').textContent = name + '(新客戶)';
        document.getElementById('customerSelected').classList.add('active');
        hideNewCustomerModal();
        showToast('新客戶資料已暫存（手機：'+cleanMobile+'）','success');
    }
    
    // 手機號碼正規化
    function normalizeMobile(input){
        if(!input)return'';
        // 去除所有非數字字元
        let cleaned=input.replace(/[^0-9]/g,'');
        // 處理 +886 或 886 前綴
        if(cleaned.startsWith('886')&&cleaned.length>=10){
            cleaned='0'+cleaned.substring(3);
        }else if(cleaned.startsWith('09')&&cleaned.length===10){
            // 已經是 09 開頭，保持不變
        }else if(!cleaned.startsWith('0')&&cleaned.length===9){
            // 9 開頭且長度 9，補 0
            cleaned='0'+cleaned;
        }
        return cleaned;
    }
    
    // 驗證手機格式
    function validateMobileFormat(mobile){
        return/^09\d{8}$/.test(mobile);
    }
    
    // 產生臨時客戶ID
    function generateTempCustomerId(mobile){
        let hash=0;
        for(let i=0;i<mobile.length;i++){
            hash=((hash<<5)-hash)+mobile.charCodeAt(i);
            hash=hash&0xFFFFFFFF;
        }
        return'TEMP-C-'+Math.abs(hash).toString(16).toUpperCase().padStart(8,'0');
    }
    
    // 產生臨時產品ID
    function generateTempProductId(){
        const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let uuid='';
        for(let i=0;i<8;i++)uuid+=chars.charAt(Math.floor(Math.random()*chars.length));
        return'TEMP-P-'+uuid;
    }
    
    // 驗證產品編號
    function validateProductCode(code){
        if(!code)return true;
        return/^[A-Za-z0-9\-]+$/.test(code);

    // 查詢產品庫存
    async function queryProductStock(rowId,productCode){
        const stockDiv=document.getElementById('prodStock'+rowId);
        if(!stockDiv)return;
        try{
            const response=await fetch('/api/product/info?code='+encodeURIComponent(productCode));
            const data=await response.json();
            if(data.found&&data.stock&&data.stock.length>0){
                const totalStock=data.stock.reduce((sum,item)=>sum+item.qty,0);
                if(totalStock===0){
                    // 庫存為0顯示紅字
                    stockDiv.innerHTML='<div style="color:#f44336;font-size:0.85em;margin-top:4px">庫存: 0（無庫存）</div>';
                }else{
                    const stockDetails=data.stock.map(s=>s.warehouse+':'+s.qty).join(' / ');
                    stockDiv.innerHTML='<div style="color:#00d4ff;font-size:0.8em;margin-top:4px;line-height:1.4"><div>總庫存: '+totalStock+'</div><div style="color:#8892b0;font-size:0.9em;">'+stockDetails+'</div></div>';
                }
                stockDiv.style.display='block';
            }else{
                // 無庫存資料也顯示紅字
                stockDiv.innerHTML='<div style="color:#f44336;font-size:0.85em;margin-top:4px">庫存: 0（無庫存）</div>';
                stockDiv.style.display='block';
            }
        }catch(error){
            console.error('庫存查詢失敗:',error);
            stockDiv.style.display='none';
        }
    }
    
    // 新品變更
    function onNewProductChange(rowId){
        const isNew=document.getElementById('prodNew'+rowId).checked;
        const codeInput=document.getElementById('prodCode'+rowId);
        const stockDiv=document.getElementById('prodStock'+rowId);
        if(isNew){
            codeInput.value=generateTempProductId();
            codeInput.readOnly=true;

        }else{
            codeInput.value='';
            codeInput.readOnly=false;
            codeInput.style.background='';
            if(stockDiv)stockDiv.style.display='none';
        }
    }
    
    // 表單提交
    async function submitForm(){
        // 防重複提交檢查
        if(isSubmitting){
            showToast('已送出處理中，請稍候','warning');
            return;
        }
        isSubmitting=true;
        const submitBtn=document.getElementById('submitBtn');
        submitBtn.disabled=true;
        submitBtn.textContent='送出中…';
        
        try{
            const date=document.getElementById('requestDate').value;
            const requestType=document.getElementById('requestType').value;
            const purpose=document.getElementById('purpose').value;
            if(!date){showToast('請選擇日期','error');return;}
            let customerCode='',customerName='',customerMobile='';
            let isNewCustomer=false,customerStagingId=null;
            if(purpose==='客戶'){
                customerCode=document.getElementById('customerCode').value;
                customerName=document.getElementById('customerName').value;
                // 正規化手機號碼
                const rawMobile=document.getElementById('customerMobile').value;
                customerMobile=normalizeMobile(rawMobile);
                // 驗證手機格式
                if(customerMobile&&!validateMobileFormat(customerMobile)){
                    showToast('客戶手機格式錯誤（正規化後：'+customerMobile+'）','error');
                    return;
                }
                if(!customerCode){showToast('請選擇或填寫客戶資料','error');return;}
                isNewCustomer=customerCode.startsWith('TEMP-');
                if(isNewCustomer)customerStagingId=customerCode;
            }
            let transferFrom='';
            if(requestType==='調撥'){
                transferFrom=document.getElementById('transferFrom').value;
                if(!transferFrom){showToast('請選擇調撥來源門市','error');return;}
            }
            const items=[];
            let hasNewProduct=false;
            const rows=document.querySelectorAll('.product-row');
            for(let i=0;i<rows.length;i++){
                const rowId=rows[i].id.replace('productRow','');
                const codeInput=document.getElementById('prodCode'+rowId);
                const code=codeInput.value.trim();
                const name=document.getElementById('prodName'+rowId).value.trim();
                const qty=parseInt(document.getElementById('prodQty'+rowId).value);
                const remark=document.getElementById('prodRemark'+rowId).value.trim();
                const isNew=document.getElementById('prodNew'+rowId).checked;
                if(!name&&!code)continue;
                if(!name){showToast('第'+(i+1)+'列品名不可為空','error');return;}
                if(!qty||qty<1){showToast('第'+(i+1)+'列數量必須大於0','error');return;}
                if(code&&!validateProductCode(code)){showToast('第'+(i+1)+'列產品編號只能輸入英數及-','error');codeInput.focus();return;}
                let productStagingId=null;
                let isNewProductFlag=false;
                let finalProductCode=code;
                // 方案B：強制勾選 - 無編號時必須勾選新品
                if(!code&&name&&!isNew){
                    showToast('第'+(i+1)+'列：無產品編號時，請勾選「新品」或輸入產品編號','error');
                    return;
                }
                // 判斷是否為新品：必須勾選 checkbox
                if(isNew){
                    isNewProductFlag=true;
                    hasNewProduct=true;
                    productStagingId=generateTempProductId();
                    finalProductCode=productStagingId; // 新品使用 TEMP-P-XXX 作為編號
                }
                items.push({product_code:finalProductCode,product_name:name,quantity:qty,remark:remark,is_new_product:isNewProductFlag,product_staging_id:productStagingId});
            }
            if(items.length===0){showToast('請至少填寫一筆產品','error');return;}
            
            // 新客戶與新品提示 - 同時顯示在畫面中央
            const hasNewCustomer=isNewCustomer;
            const newProductCount=items.filter(i=>i.is_new_product).length;
            
            if(hasNewCustomer||hasNewProduct){
                let promptMessage='';
                if(hasNewCustomer){
                    promptMessage+='👤 新客戶將進入待建檔中心\n';
                }
                if(hasNewProduct){
                    promptMessage+='📦 新品將進入待建檔中心（'+newProductCount+'筆）';
                }
                showToastCenter(promptMessage.trim(),'info',3500);
                // 等待 2 秒讓用戶看到提示
                await new Promise(resolve=>setTimeout(resolve,2000));
            }
            
            // 將 header 資料合併到每個 item（符合 /api/needs/batch 格式）
            const fullItems=items.map(item=>({
                ...item,
                date:date,
                request_type:requestType,
                purpose:purpose,
                department:currentUser.department,
                requester:currentUser.name,
                transfer_from:transferFrom,
                customer_code:customerCode,
                customer_name:customerName,
                customer_mobile:customerMobile,
                is_new_customer:isNewCustomer,
                customer_staging_id:customerStagingId
            }));
            console.log('[DEBUG] Sending API request with items:',fullItems.length,fullItems);
            const response=await fetch('/api/needs/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:fullItems})});
            console.log('[DEBUG] API response status:',response.status);
            const data=await response.json();
            console.log('[DEBUG] API response data:',data);
            if(data.success){
                // 構建成功訊息
                let successMsg='成功提交 '+data.count+' 筆需求';
                if(data.customer_staging_id){
                    successMsg+='\n客戶 staging: '+data.customer_staging_id;
                }
                if(data.product_staging_count&&data.product_staging_count>0){
                    successMsg+='\n新品待建檔: '+data.product_staging_count+' 筆';
                }
                showToast(successMsg,'success');
                
                // 立即將新提交的單子添加到最近提交列表
                addToRecentList(fullItems);
                
                resetForm();
            }else{showToast(data.message||'提交失敗','error');}
        }catch(error){
            console.error('[DEBUG] API error:',error);
            showToast('提交失敗，請稍後再試','error');
        }finally{
            isSubmitting=false;
            submitBtn.disabled=false;
            submitBtn.textContent='提交送出';
        }
    }
    
    // 重置表單
    function resetForm(){
        document.getElementById('purpose').value='備貨';
        document.getElementById('requestType').value='請購';
        onPurposeChange();
        onRequestTypeChange();
        clearCustomer();
        document.getElementById('productsBody').innerHTML='';
        productRowCount=0;
        for(let i=0;i<5;i++)addProductRow();
        loadRecentSubmissions();
        loadHistory(); // 刷新歷史紀錄
    }

    // 取消項目
    async function cancelItem(id){
        if(!confirm('確定要取消這筆需求嗎？'))return;
        try{
            const response=await fetch('/api/needs/cancel',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({id:id,current_user:currentUser.name})
            });
            const data=await response.json();
            if(data.success){
                showToast('已取消','success');
                loadRecentSubmissions();
                loadHistory(); // 刷新歷史紀錄
            }else{
                showToast(data.message||'取消失敗','error');
            }
        }catch(error){
            showToast('取消失敗','error');
        }
    }

    // 標記已到貨（同部門員工可操作）
    async function arriveItem(id){
        if(!confirm('確定要標記這筆需求為已到貨嗎？'))return;

        try{
            const response=await fetch('/api/needs/arrive',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({id:id})
            });
            const data=await response.json();
            if(data.success){
                showToast('已標記為已到貨','success');
                loadRecentSubmissions();
                loadHistory();
            }else{
                showToast(data.message||'標記失敗','error');
            }
        }catch(error){
            showToast('標記失敗','error');
        }
    }

    // 歷史紀錄相關變數
    let historyOffset=0;
    const historyLimit=50;
    let historyTotal=0;
    
    // 載入歷史紀錄 - 顯示同部門所有人
    async function loadHistory(){
        if(!currentUser)return;
        
        const status=document.getElementById('historyStatusFilter').value;
        const search=document.getElementById('historySearch').value.trim();
        const listContainer=document.getElementById('historyList');
        
        listContainer.innerHTML='<div style="text-align:center;color:#8892b0;padding:20px;">載入中...</div>';
        
        try{
            // 改為抓取同部門所有紀錄
            const department=currentUser.department;
            let url='/api/needs/history?limit='+historyLimit+'&offset='+historyOffset+'&status='+status+'&department='+encodeURIComponent(department);
            if(search)url+='&q='+encodeURIComponent(search);
            
            const response=await fetch(url);
            const data=await response.json();
            
            if(data.success&&data.items&&data.items.length>0){
                historyTotal=data.total;
                
                // 分類：自己的 vs 別人的
                const myItems=data.items.filter(item=>item.requester===currentUser.name);
                const othersItems=data.items.filter(item=>item.requester!==currentUser.name);
                
                let listHtml='';
                
                // 自己的紀錄
                if(myItems.length>0){
                    listHtml+='<div style="color:#00d4ff;font-size:0.9em;margin-bottom:10px;border-bottom:1px solid rgba(0,212,255,0.3);padding-bottom:5px;">我的紀錄</div>';
                    listHtml+=myItems.map(item=>{
                        let statusClass='status-pending';
                        let statusText=item.status;

                        if(item.status_type==='cancelled'){
                            statusClass='status-cancelled';
                            statusText='已取消';
                        }else if(item.status==='已採購' || item.status==='已調撥'){
                            statusClass='status-arrived';
                            statusText=item.status;
                        }else if(item.status==='已到貨' || item.status_type==='done'){
                            statusClass='status-completed';
                            statusText='已完成';
                        }

                        return '<div class="recent-item">'+
                            '<div class="info">'+
                                '<strong>'+item.date+'</strong> | '+item.department+' | 填表人: '+item.requester+'<br>'+
                                '產品: '+(item.product_code||'-')+' | 品名: '+(item.item_name||'-')+' | 數量: '+item.quantity+'<br>'+
                                '客戶: '+(item.customer_code||'-')+(item.purpose==='客戶'?' (客戶)':'')+
                                (item.cancelled_at?' <span style="color:#f44336;font-size:0.85em;">(取消於 '+item.cancelled_at.substring(0,10)+')</span>':'')+
                            '</div>'+
                            '<div>'+
                                '<span class="status '+statusClass+'">'+statusText+'</span>'+
                            '</div>'+
                        '</div>';
                    }).join('');
                }
                
                // 別人的紀錄（同部門可操作）
                if(othersItems.length>0){
                    listHtml+='<div style="color:#8892b0;font-size:0.9em;margin:15px 0 10px 0;border-bottom:1px solid rgba(136,146,176,0.3);padding-bottom:5px;">同部門其他人</div>';
                    listHtml+=othersItems.map(item=>{
                        let statusClass='status-pending';
                        let statusText=item.status;

                        if(item.status_type==='cancelled'){
                            statusClass='status-cancelled';
                            statusText='已取消';
                        }else if(item.status==='已採購' || item.status==='已調撥'){
                            statusClass='status-arrived';
                            statusText=item.status;
                        }else if(item.status==='已到貨' || item.status_type==='done'){
                            statusClass='status-completed';
                            statusText='已完成';
                        }

                        return '<div class="recent-item" style="opacity:0.8;">'+
                            '<div class="info">'+
                                '<strong>'+item.date+'</strong> | '+item.department+' | 填表人: '+item.requester+'<br>'+
                                '產品: '+(item.product_code||'-')+' | 品名: '+(item.item_name||'-')+' | 數量: '+item.quantity+'<br>'+
                                '客戶: '+(item.customer_code||'-')+(item.purpose==='客戶'?' (客戶)':'')+
                                (item.cancelled_at?' <span style="color:#f44336;font-size:0.85em;">(取消於 '+item.cancelled_at.substring(0,10)+')</span>':'')+
                            '</div>'+
                            '<div>'+
                                '<span class="status '+statusClass+'">'+statusText+'</span>'+
                            '</div>'+
                        '</div>';
                    }).join('');
                }
                
                listContainer.innerHTML=listHtml;
                
                // 更新分頁資訊
                const currentPage=Math.floor(historyOffset/historyLimit)+1;
                const totalPages=Math.ceil(historyTotal/historyLimit);
                document.getElementById('historyPageInfo').textContent='第 '+currentPage+' / '+totalPages+' 頁 (共 '+historyTotal+' 筆)';
                document.getElementById('historyPrevBtn').disabled=historyOffset<=0;
                document.getElementById('historyNextBtn').disabled=(historyOffset+historyLimit)>=historyTotal;
            }else{
                listContainer.innerHTML='<div style="text-align:center;color:#8892b0;padding:30px;">暫無資料</div>';
                document.getElementById('historyPageInfo').textContent='第 1 頁';
                document.getElementById('historyPrevBtn').disabled=true;
                document.getElementById('historyNextBtn').disabled=true;
            }
        }catch(error){
            console.error('載入歷史紀錄失敗:',error);
            listContainer.innerHTML='<div style="text-align:center;color:#f44336;padding:20px;">載入失敗，請重試</div>';
        }
    }
    
    // 切換歷史紀錄頁碼
    function changeHistoryPage(direction){
        const newOffset=historyOffset+(direction*historyLimit);
        if(newOffset>=0&&newOffset<historyTotal){
            historyOffset=newOffset;
            loadHistory();
        }
    }
    
    // 取得狀態樣式類別
    function getStatusClass(status){
        switch(status){
            case '待處理': return 'status-pending';
            case '已採購': return 'status-arrived';
            case '已調撥': return 'status-arrived';
            case '已到貨': return 'status-arrived';
            case '已完成': return 'status-completed';
            case '已取消': return 'status-cancelled';
            default: return 'status-pending';
        }
    }
    
    // 顯示提示（延長時間並支援點擊關閉）
    function showToast(message,type,duration){
        const toast=document.getElementById('toast');
        toast.textContent=message;
        toast.className='toast '+type+' show';
        // 預設時間：error/warning 5秒，success/info 8秒（含新品/新客戶資訊時較長）
        const displayDuration=duration||(type==='success'||type==='info'?8000:5000);
        
        // 清除之前的計時器
        if(toast.hideTimer)clearTimeout(toast.hideTimer);
        
        // 設定自動隱藏
        toast.hideTimer=setTimeout(()=>{toast.classList.remove('show');},displayDuration);
        
        // 點擊即可關閉
        toast.onclick=function(){toast.classList.remove('show');};
    }
    
    // 顯示置中提示（用於重要訊息如新品提示）
    function showToastCenter(message,type,duration){
        // 創建或取得置中 toast 元素
        let centerToast=document.getElementById('toastCenter');
        if(!centerToast){
            centerToast=document.createElement('div');
            centerToast.id='toastCenter';
            centerToast.className='toast-center';
            document.body.appendChild(centerToast);
        }
        centerToast.textContent=message;
        centerToast.className='toast-center '+type+' show';
        
        const displayDuration=duration||3000;
        
        // 清除之前的計時器
        if(centerToast.hideTimer)clearTimeout(centerToast.hideTimer);
        
        // 設定自動隱藏
        centerToast.hideTimer=setTimeout(()=>{centerToast.classList.remove('show');},displayDuration);
        
        // 點擊即可關閉
        centerToast.onclick=function(){centerToast.classList.remove('show');};
    }
    
    // ============================================
    // 自動輪詢新需求通知（方案4）
    // ============================================
    let lastNeedCount = 0;
    let pollingInterval = null;
    
    // 播放提示音
    function playNotificationSound() {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
            
            // 第二聲
            setTimeout(() => {
                const osc2 = audioContext.createOscillator();
                const gain2 = audioContext.createGain();
                osc2.connect(gain2);
                gain2.connect(audioContext.destination);
                osc2.frequency.value = 1000;
                osc2.type = 'sine';
                gain2.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                osc2.start(audioContext.currentTime);
                osc2.stop(audioContext.currentTime + 0.5);
            }, 200);
        } catch (e) {
            console.log('無法播放提示音:', e);
        }
    }
    
    // 檢查新需求
    async function checkNewNeeds() {
        try {
            const response = await fetch('/api/needs/latest?limit=1');
            const data = await response.json();
            
            if (data.items && data.items.length > 0) {
                const currentCount = data.items.length;
                
                // 首次載入時記錄數量
                if (lastNeedCount === 0) {
                    lastNeedCount = currentCount;
                    return;
                }
                
                // 如果有新需求
                if (currentCount > lastNeedCount) {
                    const latestNeed = data.items[0];
                    showCenterToast(`🛒 新需求單！\n${latestNeed.requester} 提交了 ${latestNeed.product_name || '新需求'}`, 5000);
                    playNotificationSound();
                    lastNeedCount = currentCount;
                    
                    // 重新載入歷史紀錄
                    if (typeof loadHistory === 'function') {
                        loadHistory();
                    }
                } else {
                    lastNeedCount = currentCount;
                }
            }
        } catch (e) {
            console.log('輪詢新需求失敗:', e);
        }
    }
    
    // 啟動自動輪詢
    function startPolling() {
        if (pollingInterval) return;
        
        // 初始檢查
        checkNewNeeds();
        
        // 每30秒輪詢一次
        pollingInterval = setInterval(checkNewNeeds, 30000);
        console.log('自動輪詢已啟動（每30秒）');
    }
    
    // 停止自動輪詢
    function stopPolling() {
        if (pollingInterval) {
            clearInterval(pollingInterval);
            pollingInterval = null;
            console.log('自動輪詢已停止');
        }
    }
    
    // 頁面可見時啟動，不可見時停止（節省資源）
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            stopPolling();
        } else {
            startPolling();
        }
    });
    
    // 頁面載入完成後啟動輪詢
    document.addEventListener('DOMContentLoaded', () => {
        // 延遲啟動，等待其他初始化完成
        setTimeout(startPolling, 2000);
    });
    </script>
