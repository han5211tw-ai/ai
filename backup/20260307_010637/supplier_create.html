<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廠商建檔 - 電腦舖營運系統</title>
    <link rel="stylesheet" href="shared/auth_ui.css?v=2">
    <script src="shared/auth_ui.js?v=2"></script>
    <link rel="stylesheet" href="shared/global-background.css">
    <script src="shared/global-background.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px 40px; }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        h1 {
            font-size: 1.2em;
            margin-bottom: 0;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-name {
            color: #00d4ff;
            font-size: 0.95em;
        }
        .btn-logout {
            padding: 6px 12px;
            background: rgba(244,67,54,0.2);
            border: 1px solid rgba(244,67,54,0.5);
            color: #f44336;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .subtitle {
            text-align: left;
            color: #8892b0;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .nav {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav a:hover {
            color: #00d4ff;
            border-color: #00d4ff;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
        }
        .card h2 {
            color: #00d4ff;
            font-size: 1.1em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #8892b0;
            font-size: 0.9em;
        }
        .form-group label .required {
            color: #f44336;
            margin-left: 4px;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 1em;
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        .form-control:read-only {
            background: rgba(255, 255, 255, 0.05);
            color: #8892b0;
            cursor: not-allowed;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
        }
        .btn-submit:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: #4caf50; }
        .toast.error { background: #f44336; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <script>
        // 頁面載入時檢查權限（只有老闆跟會計可以進入）
        document.addEventListener('DOMContentLoaded', async function() {
            if (window.checkAuth) {
                const authResult = await window.checkAuth({ minRole: 'staff' });
                if (!authResult.success) {
                    window.location.href = 'index.html';
                    return;
                }
                // 檢查是否為老闆或會計
                const userTitle = authResult.title || '';
                if (userTitle !== '老闆' && !userTitle.includes('會計')) {
                    alert('⚠️ 只有老闆跟會計可以進入廠商建檔頁面');
                    window.location.href = 'index.html';
                    return;
                }
                // 顯示使用者姓名
                document.getElementById('userDisplay').textContent = authResult.name || '';
                document.getElementById('createdBy').value = authResult.name || '';
            }
        });
    </script>

    <div class="container">
        <div class="header-row">
            <h1>🏭 廠商建檔</h1>
            <div class="user-info">
                <span id="userDisplay" class="user-name"></span>
                <button onclick="window.authLogout && window.authLogout()" class="btn-logout">登出</button>
            </div>
        </div>
        <p class="subtitle">Supplier Registration</p>

        <div class="nav">
            <a href="supplier_portal.html">🏭 廠商專區</a>
        </div>

        <div class="card">
            <h2>📋 基本資訊</h2>
            
            <div class="form-row">
                <div class="form-group">
                    <label>建檔人員</label>
                    <input type="text" id="createdBy" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label>廠商編號 <span class="required">*</span></label>
                    <input type="text" id="supplierCode" class="form-control" readonly>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>廠商全名 <span class="required">*</span></label>
                    <input type="text" id="supplierName" class="form-control" placeholder="請輸入廠商全名">
                </div>
                <div class="form-group">
                    <label>廠商簡稱</label>
                    <input type="text" id="shortName" class="form-control" placeholder="請輸入廠商簡稱">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>統一編號</label>
                    <input type="text" id="taxId" class="form-control" placeholder="請輸入統一編號（8碼）" maxlength="8">
                </div>
                <div class="form-group">
                    <label>業務代表</label>
                    <input type="text" id="contactPerson" class="form-control" placeholder="請輸入業務代表姓名">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>電話</label>
                    <input type="text" id="phone" class="form-control" placeholder="例如：04-12345678">
                </div>
                <div class="form-group">
                    <label>手機</label>
                    <input type="text" id="mobile" class="form-control" placeholder="例如：0912345678">
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" class="form-control" placeholder="請輸入 Email">
            </div>

            <div class="form-group">
                <label>地址</label>
                <input type="text" id="address" class="form-control" placeholder="請輸入地址">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>付款條件</label>
                    <select id="paymentTerms" class="form-control">
                        <option value="">請選擇付款條件</option>
                        <option value="月結">月結</option>
                        <option value="現金">現金</option>
                        <option value="支票">支票</option>
                        <option value="匯款">匯款</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>狀態</label>
                    <select id="status" class="form-control">
                        <option value="啟用">啟用</option>
                        <option value="停用">停用</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>銀行名稱</label>
                    <input type="text" id="bankName" class="form-control" placeholder="請輸入銀行名稱">
                </div>
                <div class="form-group">
                    <label>銀行帳號</label>
                    <input type="text" id="bankAccount" class="form-control" placeholder="請輸入銀行帳號">
                </div>
            </div>

            <div class="form-group">
                <label>備註</label>
                <textarea id="remark" class="form-control" placeholder="請輸入備註" rows="3"></textarea>
            </div>

            <button class="btn-submit" onclick="submitForm()">✓ 建立廠商資料</button>
        </div>
    </div>

    <script>
        // 頁面載入時自動產生廠商編號
        document.addEventListener('DOMContentLoaded', async function() {
            await generateSupplierCode();
        });

        // 自動產生廠商編號
        async function generateSupplierCode() {
            try {
                const response = await fetch('/api/supplier/next-code');
                const data = await response.json();
                if (data.success) {
                    document.getElementById('supplierCode').value = data.supplier_code;
                }
            } catch (error) {
                console.error('產生廠商編號失敗:', error);
            }
        }

        async function submitForm() {
            const supplierCode = document.getElementById('supplierCode').value.trim();
            const supplierName = document.getElementById('supplierName').value.trim();
            const shortName = document.getElementById('shortName').value.trim();
            const taxId = document.getElementById('taxId').value.trim();
            const contactPerson = document.getElementById('contactPerson').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const email = document.getElementById('email').value.trim();
            const address = document.getElementById('address').value.trim();
            const paymentTerms = document.getElementById('paymentTerms').value;
            const bankName = document.getElementById('bankName').value.trim();
            const bankAccount = document.getElementById('bankAccount').value.trim();
            const remark = document.getElementById('remark').value.trim();
            const status = document.getElementById('status').value;
            const createdBy = document.getElementById('createdBy').value;

            if (!supplierCode || !supplierName) {
                showToast('請填寫必填欄位（廠商編號、廠商全名）', 'error');
                return;
            }

            try {
                const response = await fetch('/api/supplier/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        supplier_code: supplierCode,
                        supplier_name: supplierName,
                        short_name: shortName,
                        tax_id: taxId,
                        contact_person: contactPerson,
                        phone: phone,
                        mobile: mobile,
                        email: email,
                        address: address,
                        payment_terms: paymentTerms,
                        bank_name: bankName,
                        bank_account: bankAccount,
                        remark: remark,
                        status: status,
                        created_by: createdBy
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showToast('廠商建立成功！', 'success');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    showToast(data.message || '建立失敗', 'error');
                }
            } catch (error) {
                showToast('系統錯誤，請稍後再試', 'error');
            }
        }

        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
