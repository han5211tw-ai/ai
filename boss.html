<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老闆專屬控制台 - 電腦舖營運系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 100%; margin: 0 auto; padding: 40px 60px; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav a:hover, .nav a.active {
            color: #ffd700;
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .card h2 {
            color: #00d4ff;
            font-size: 1.3em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }
        .stat-label { color: #8892b0; font-size: 0.9em; margin-bottom: 10px; }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-sub {
            font-size: 0.85em;
            color: #8892b0;
            margin-top: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.95em;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        th {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-weight: 600;
        }
        td { color: #ccd6f6; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .badge-pending { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.3); }
        .badge-processing { background: rgba(0, 212, 255, 0.2); color: #00d4ff; border: 1px solid rgba(0, 212, 255, 0.3); }
        .badge-done { background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid rgba(76, 175, 80, 0.3); }
        .btn-complete {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-complete:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
        }
        .btn-complete:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .remark-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            padding: 6px 10px;
            color: #fff;
            font-size: 0.9em;
            width: 380px;
            max-width: 420px;
        }
        .remark-input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .btn-save-remark {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            color: #00d4ff;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            margin-left: 4px;
        }
        .btn-save-remark:hover {
            background: rgba(0, 212, 255, 0.3);
        }
        /* 系統健康連結狀態顏色 */
        #healthLink {
            color: #8892b0;
            border-color: rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        #healthLink.status-green {
            color: #22c55e;
            border-color: rgba(34, 197, 94, 0.5);
            background: rgba(34, 197, 94, 0.1);
        }
        #healthLink.status-yellow {
            color: #eab308;
            border-color: rgba(234, 179, 8, 0.5);
            background: rgba(234, 179, 8, 0.1);
        }
        #healthLink.status-red {
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.5);
            background: rgba(239, 68, 68, 0.1);
        }
        /* 待處理請購需求表格字體調整 */
        #needsTable table {
            font-size: 0.9em;
        }
        #needsTable th {
            font-size: 0.9em;
        }
        #needsTable td {
            font-size: 0.9em;
        }
        .highlight-box {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 107, 107, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .highlight-title {
            color: #ffd700;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .highlight-content {
            white-space: pre-wrap;
            line-height: 1.8;
            color: #ccd6f6;
        }
        .two-col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
        }
        .loading {
            color: #8892b0;
            text-align: center;
            padding: 40px;
        }
        .update-time {
            text-align: center;
            color: #8892b0;
            margin-top: 20px;
            font-size: 0.9em;
        }
        .empty-state {
            text-align: center;
            color: #8892b0;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👑 老闆專屬控制台</h1>
        <p class="subtitle">Tech Dashboard - Boss Edition</p>

        <div class="nav">
            <a href="index.html">🏠 首頁</a>
            <a href="Store_Manager.html">🏬 主管</a>
            <a href="Accountants.html">🧮 會計</a>
            <a href="department.html">🏢 部門</a>
            <a href="store.html">🏬 門市</a>
            <a href="business.html">💼 業務</a>
            <a href="personal.html">🧑‍💼 個人</a>
            <a href="roster.html">📅 班表</a>
            <a href="customer_search.html">🔍 客戶</a>
            <a href="staging_center_v2.html">📋 待建檔</a>
            <a href="supervision_score.html">📊 督導評分</a>
            <a href="roster_input.html">📝 班表管理</a>
            <a href="admin/health.html" id="healthLink">🔧 系統健康</a>
        </div>

        <!-- 整體營收 -->
        <div class="card">
            <h2>💰 整體營收總覽（2026 Q1）</h2>
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-label">本季總營收</div>
                    <div class="stat-value" id="totalRevenue">
                        <div class="loading">載入中...</div>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">平均日營收</div>
                    <div class="stat-value" id="avgRevenue">
                        <div class="loading">載入中...</div>
                    </div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">最高單日</div>
                    <div class="stat-value" id="maxRevenue">
                        <div class="loading">載入中...</div>
                    </div>
                    <div class="stat-sub" id="maxRevenueDate"></div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">總交易筆數</div>
                    <div class="stat-value" id="totalOrders">
                        <div class="loading">載入中...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="two-col">
            <!-- 部門業績 -->
            <div class="card">
                <h2>🏢 部門業績</h2>
                <div id="deptTable">
                    <div class="loading">載入中...</div>
                </div>
            </div>

            <!-- 門市業績 -->
            <div class="card">
                <h2>🏬 門市業績</h2>
                <div id="storeTable">
                    <div class="loading">載入中...</div>
                </div>
            </div>
        </div>

        <!-- 整體營業分析 -->
        <div class="card">
            <h2>📊 整體營業分析（每日 20:00 自動生成）</h2>
            <div id="analysisContent">
                <div class="loading">載入中...</div>
            </div>
            <div class="update-time">
                分析時間：<span id="analysisTime">--</span>
            </div>
        </div>

        <!-- 採購需求表 -->
        <div class="card">
            <h2>🛒 待處理請購需求</h2>
            <div id="needsTable">
                <div class="loading">載入中...</div>
            </div>
        </div>

        <div class="update-time">
            資料即時從資料庫讀取 | 最後更新：<span id="updateTime">--</span>
        </div>
    </div>

    <script>
        // 格式化金額
        function formatMoney(value) {
            if (value >= 10000) {
                return 'NT$ ' + (value / 10000).toFixed(1) + '萬';
            }
            return 'NT$ ' + value.toLocaleString();
        }

        // 格式化數字
        function formatNumber(value) {
            return value.toLocaleString();
        }

        // 載入整體營收
        async function loadSummary() {
            try {
                const response = await fetch('/api/summary');
                const data = await response.json();
                document.getElementById('totalRevenue').textContent = formatMoney(data.total);
                document.getElementById('avgRevenue').textContent = formatMoney(data.avg);
                document.getElementById('maxRevenue').textContent = formatMoney(data.max);
            } catch (error) {
                console.error('載入營收失敗:', error);
            }
        }

        // 載入交易筆數
        async function loadOrderCount() {
            try {
                const response = await fetch('/api/sales/daily');
                const data = await response.json();
                // 計算總交易筆數（所有天的交易筆數加總）
                let total = 0;
                data.forEach(d => {
                    total += d.count || 0;
                });
                document.getElementById('totalOrders').textContent = formatNumber(total);
            } catch (error) {
                console.error('載入筆數失敗:', error);
            }
        }

        // 載入部門業績
        async function loadDeptPerformance() {
            try {
                const response = await fetch('/api/performance/department');
                const data = await response.json();
                
                const html = `
                    <table>
                        <thead>
                            <tr>
                                <th>部門</th>
                                <th>目標</th>
                                <th>實際</th>
                                <th>達成率</th>
                                <th>毛利率</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(row => `
                                <tr>
                                    <td>${row.name}</td>
                                    <td>${formatMoney(row.target)}</td>
                                    <td>${formatMoney(row.revenue)}</td>
                                    <td>${(row.achievement_rate * 100).toFixed(1)}%</td>
                                    <td>${(row.margin_rate * 100).toFixed(1)}%</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('deptTable').innerHTML = html;
            } catch (error) {
                console.error('載入部門業績失敗:', error);
                document.getElementById('deptTable').innerHTML = '<div class="empty-state">載入失敗</div>';
            }
        }

        // 載入門市業績
        async function loadStorePerformance() {
            try {
                const response = await fetch('/api/performance/store');
                const data = await response.json();
                
                const html = `
                    <table>
                        <thead>
                            <tr>
                                <th>門市</th>
                                <th>目標</th>
                                <th>實際</th>
                                <th>達成率</th>
                                <th>毛利率</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(row => `
                                <tr>
                                    <td>${row.name}</td>
                                    <td>${formatMoney(row.target)}</td>
                                    <td>${formatMoney(row.revenue)}</td>
                                    <td>${(row.achievement_rate * 100).toFixed(1)}%</td>
                                    <td>${(row.margin_rate * 100).toFixed(1)}%</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('storeTable').innerHTML = html;
            } catch (error) {
                console.error('載入門市業績失敗:', error);
                document.getElementById('storeTable').innerHTML = '<div class="empty-state">載入失敗</div>';
            }
        }

        // 載入營業分析
        async function loadAnalysis() {
            try {
                // 同時載入三個分析
                const [deptRes, storeRes, personalRes] = await Promise.all([
                    fetch('/api/analysis/department'),
                    fetch('/api/analysis/store'),
                    fetch('/api/analysis/personal')
                ]);
                
                const deptData = await deptRes.json();
                const storeData = await storeRes.json();
                const personalData = await personalRes.json();
                
                // 使用最新的更新時間
                const lastUpdate = deptData.last_update || storeData.last_update || personalData.last_update;
                document.getElementById('analysisTime').textContent = lastUpdate || '未生成';
                
                const html = `
                    <div class="highlight-box">
                        <div class="highlight-title">🏢 部門分析</div>
                        <div class="highlight-content">${deptData.content || '暫無分析資料'}</div>
                    </div>
                    <div class="highlight-box">
                        <div class="highlight-title">🏬 門市分析</div>
                        <div class="highlight-content">${storeData.content || '暫無分析資料'}</div>
                    </div>
                    <div class="highlight-box">
                        <div class="highlight-title">🧑‍💼 個人業績分析</div>
                        <div class="highlight-content">${personalData.content || '暫無分析資料'}</div>
                    </div>
                `;
                document.getElementById('analysisContent').innerHTML = html;
            } catch (error) {
                console.error('載入分析失敗:', error);
                document.getElementById('analysisContent').innerHTML = '<div class="empty-state">分析資料載入失敗</div>';
            }
        }

        // 載入需求表（只顯示請購）
        async function loadNeeds() {
            try {
                const response = await fetch('/api/needs/latest?type=' + encodeURIComponent('請購'));
                const data = await response.json();

                if (!data.items || data.items.length === 0) {
                    document.getElementById('needsTable').innerHTML = '<div class="empty-state">暫無需求資料</div>';
                    return;
                }

                const html = `
                    <table>
                        <thead>
                            <tr>
                                <th>項次</th>
                                <th>日期</th>
                                <th>產品編號</th>
                                <th>產品名稱</th>
                                <th>數量</th>
                                <th>需求類型</th>
                                <th>需求用途</th>
                                <th>需求部門</th>
                                <th>填表人員</th>
                                <th>庫存狀況</th>
                                <th>備註</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.items.map((item, idx) => `
                                <tr data-id="${item.id}">
                                    <td>${idx + 1}</td>
                                    <td>${item.date || '-'}</td>
                                    <td>${item.product_code || '-'}</td>
                                    <td>
                                        <div>${item.display_name || item.item_name}</div>
                                        ${item.last_price ? `<div style="color: #8892b0; font-size: 0.8em; margin-top: 4px;">${item.last_vendor ? item.last_vendor + ' - ' : ''}進價: NT$ ${item.last_price.toLocaleString()}</div>` : ''}
                                    </td>
                                    <td>${item.quantity}</td>
                                    <td>${item.request_type || '請購'}${item.transfer_from ? '<br><small style="color:#ffc107;">來源:' + item.transfer_from + '</small>' : ''}</td>
                                    <td>${item.purpose === '客戶' ? '客戶:' + (item.customer_code || '-') : '備貨'}</td>
                                    <td>${item.department || '-'}</td>
                                    <td>${item.requester || '-'}</td>
                                    <td>
                                        ${item.stock_warehouses && item.stock_warehouses.length > 0
                                            ? item.stock_warehouses.map(sw => `<div>${sw.warehouse}: ${sw.qty}</div>`).join('')
                                            : '-'
                                        }
                                    </td>
                                    <td>
                                        <input type="text" class="remark-input" id="remark-${item.id}" value="${item.remark || ''}" placeholder="輸入備註...">
                                        <button class="btn-save-remark" onclick="saveRemark(${item.id})">儲存</button>
                                    </td>
                                    <td>
                                        <button class="btn-complete" onclick="completeNeed(${item.id}, this)">已完成</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('needsTable').innerHTML = html;
            } catch (error) {
                console.error('載入需求表失敗:', error);
                document.getElementById('needsTable').innerHTML = '<div class="empty-state">需求資料載入失敗</div>';
            }
        }

        // 狀態樣式
        function getStatusClass(status) {
            if (!status) return 'pending';
            if (status.includes('完成') || status.includes('已處理')) return 'done';
            if (status.includes('處理中')) return 'processing';
            return 'pending';
        }

        // 儲存備註
        async function saveRemark(id) {
            const input = document.getElementById(`remark-${id}`);
            const remark = input.value.trim();
            const btn = event.target;
            const originalText = btn.textContent;

            btn.textContent = '儲存中...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/needs/remark', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, remark: remark })
                });

                const result = await response.json();

                if (result.success) {
                    btn.textContent = '✓ 已儲存';
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.disabled = false;
                    }, 1500);
                } else {
                    alert('儲存失敗：' + (result.message || '未知錯誤'));
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('儲存備註失敗:', error);
                alert('儲存失敗，請稍後再試');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        // 標記需求為已完成
        async function completeNeed(id, btn) {
            if (!confirm('確定要標記此需求為已完成嗎？')) {
                return;
            }

            btn.disabled = true;
            btn.textContent = '處理中...';

            try {
                const response = await fetch('/api/needs/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                });

                const result = await response.json();

                if (result.success) {
                    // 移除該行
                    const row = btn.closest('tr');
                    row.style.transition = 'all 0.3s ease';
                    row.style.opacity = '0';
                    setTimeout(() => {
                        row.remove();
                        // 重新整理編號
                        const rows = document.querySelectorAll('#needsTable tbody tr');
                        rows.forEach((r, idx) => {
                            r.cells[0].textContent = idx + 1;
                        });
                        // 如果沒有資料了，顯示空狀態
                        if (rows.length === 0) {
                            document.getElementById('needsTable').innerHTML = '<div class="empty-state">暫無需求資料</div>';
                        }
                    }, 300);
                } else {
                    alert('標記失敗：' + (result.message || '未知錯誤'));
                    btn.disabled = false;
                    btn.textContent = '已完成';
                }
            } catch (error) {
                console.error('標記完成失敗:', error);
                alert('標記失敗，請稍後再試');
                btn.disabled = false;
                btn.textContent = '已完成';
            }
        }

        // 更新時間
        document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-TW');

        // 載入所有資料
        loadSummary();
        loadOrderCount();
        loadDeptPerformance();
        loadStorePerformance();
        loadAnalysis();
        loadNeeds();
        loadHealthStatus();

        // 每 1 小時自動重新整理
        setInterval(() => {
            location.reload();
        }, 3600000);

        // 獲取系統健康狀態並更新連結顏色
        async function loadHealthStatus() {
            try {
                const response = await fetch('/api/v1/admin/health');
                const data = await response.json();
                
                const healthLink = document.getElementById('healthLink');
                if (healthLink && data.overall_status) {
                    // 移除舊的狀態類別
                    healthLink.classList.remove('status-green', 'status-yellow', 'status-red');
                    // 添加新的狀態類別
                    healthLink.classList.add(`status-${data.overall_status}`);
                }
            } catch (error) {
                console.error('獲取健康狀態失敗:', error);
            }
        }
