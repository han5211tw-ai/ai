<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待建檔中心 - 電腦舖營運系統</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card h3 { color: #8892b0; font-size: 0.85em; margin-bottom: 10px; }
        .stat-card .number { font-size: 2em; font-weight: bold; color: #00d4ff; }
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #8892b0;
            cursor: pointer;
            font-size: 1em;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff;
            border-color: transparent;
        }
        .table-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(0,212,255,0.08); color: #00d4ff; }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            margin-right: 5px;
        }
        .btn-view { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .btn-match { background: rgba(76,175,80,0.2); color: #4caf50; }
        .btn-reject { background: rgba(244,67,54,0.2); color: #f44336; }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }
        .status-pending { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-synced { background: rgba(76,175,80,0.2); color: #4caf50; }
        .status-review { background: rgba(255,152,0,0.2); color: #ff9800; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 待建檔中心</h1>
        <p class="subtitle">統一管理新客戶與新商品的待建檔流程</p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>👤 客戶待處理</h3>
                <div class="number" id="customerCount">-</div>
            </div>
            <div class="stat-card">
                <h3>📦 商品待處理</h3>
                <div class="number" id="productCount">-</div>
            </div>
        </div>
        
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('all')">全部</button>
            <button class="tab-btn" onclick="switchTab('customer')">客戶</button>
            <button class="tab-btn" onclick="switchTab('product')">商品</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>類型</th>
                        <th>名稱</th>
                        <th>關鍵資訊</th>
                        <th>狀態</th>
                        <th>申請人</th>
                        <th>時間</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let currentTab = 'all';
        
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadData();
        }
        
        async function loadData() {
            try {
                const [customerRes, productRes] = await Promise.all([
                    fetch('/api/staging/list?type=customer'),
                    fetch('/api/staging/list?type=product')
                ]);
                
                const customerData = await customerRes.json();
                const productData = await productRes.json();
                
                if (customerData.success && productData.success) {
                    const customers = customerData.data.customers.map(c => ({...c, _type: 'customer'}));
                    const products = productData.data.products.map(p => ({...p, _type: 'product'}));
                    
                    document.getElementById('customerCount').textContent = 
                        customers.filter(c => c.status === 'pending' || c.status === 'needs_review').length;
                    document.getElementById('productCount').textContent = 
                        products.filter(p => p.status === 'pending' || p.status === 'needs_review').length;
                    
                    let items = currentTab === 'customer' ? customers : 
                                currentTab === 'product' ? products : 
                                [...customers, ...products];
                    
                    items = items.filter(i => i.status === 'pending' || i.status === 'needs_review');
                    items.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                    
                    renderTable(items);
                }
            } catch (e) {
                console.error('載入失敗', e);
            }
        }
        
        function renderTable(items) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = items.map(item => {
                const isCustomer = item._type === 'customer';
                const name = isCustomer ? item.short_name : item.product_name;
                const keyInfo = isCustomer ? (item.mobile || '-') : (item.input_product_code || '-');
                const statusClass = `status-${item.status}`;
                const statusText = {pending: '等待ERP', synced: '已同步', needs_review: '需審核', rejected: '已駁回'}[item.status] || item.status;
                
                return `<tr>
                    <td>${isCustomer ? '👤' : '📦'} ${isCustomer ? '客戶' : '商品'}</td>
                    <td><strong>${name}</strong></td>
                    <td>${keyInfo}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>${isCustomer ? item.created_by : item.requested_by}</td>
                    <td>${new Date(item.created_at).toLocaleDateString()}</td>
                    <td>
                        <button class="btn btn-view">查看</button>
                        ${item.status === 'needs_review' ? `<button class="btn btn-match">匹配</button>` : ''}
                    </td>
                </tr>`;
            }).join('');
        }
        
        loadData();
    </script>
</body>
</html>
