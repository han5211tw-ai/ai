<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>{% block title %}電腦舖營運系統{% endblock %}</title>
    
    <!-- 全域樣式 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='shared/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='shared/auth_ui.css') }}">
    
    {% block styles %}{% endblock %}
</head>
<body>
    <!-- App Shell -->
    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span>🖥️</span>
                    <span>電腦舖</span>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Nav items will be injected by JS -->
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">👤</div>
                    <div>
                        <div class="user-name" id="userName">使用者</div>
                        <div class="user-role" id="userRole">角色</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title" id="pageTitle">{% block page_title %}首頁{% endblock %}</h1>
            </header>
            <div class="content-workspace" id="contentWorkspace">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Load Components -->
    <script src="{{ url_for('static', filename='shared/auth_ui.js') }}"></script>
    <script src="{{ url_for('static', filename='shared/sidebar-nav.js') }}"></script>
    <script src="{{ url_for('static', filename='shared/split-view.js') }}"></script>
    <script src="{{ url_for('static', filename='shared/modal-system.js') }}"></script>
    <script src="{{ url_for('static', filename='shared/app-shell-integration.js') }}"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
