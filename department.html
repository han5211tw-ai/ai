<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部門業績分析 - 電腦舖營運看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav a:hover, .nav a.active {
            color: #00d4ff;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .card h2 {
            color: #00d4ff;
            font-size: 1.3em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        th {
            color: #00d4ff;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        td { color: #ccd6f6; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .number { font-family: 'Courier New', monospace; }
        .highlight { color: #00d4ff; font-weight: bold; }
        /* 達成率顏色 */
        .ach-excellent { color: #4caf50; font-weight: bold; }  /* ≥80% 綠色 */
        .ach-good { color: #ffc107; font-weight: bold; }       /* ≥60% 黃色 */
        .ach-warning { color: #ff9800; font-weight: bold; }    /* ≥40% 橘色 */
        .ach-danger { color: #f44336; font-weight: bold; }     /* <40% 紅色 */
        .chart-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
        }
        .chart-container {
            position: relative;
            height: 300px;
        }
        .loading {
            color: #8892b0;
            text-align: center;
            padding: 40px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00d4ff;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 部門業績分析</h1>
        
        <div class="nav">
            <a href="index.html">🏠 首頁</a>
            <a href="department.html" class="active">🏢 部門</a>
            <a href="store.html">🏬 門市</a>
            <a href="business.html">💼 業務</a>
            <a href="personal.html">🧑‍💼 個人</a>
            <a href="roster.html">📅 班表</a>
            <a href="customer_search.html">🔍 客戶</a>
        </div>

        <div class="card">
            <h2>📊 部門業績表</h2>
            <div id="deptTable">
                <div class="loading">載入中...</div>
            </div>
        </div>

        <div class="chart-row">
            <div class="card">
                <h2>📈 部門業績達成率</h2>
                <div class="chart-container">
                    <canvas id="achievementChart"></canvas>
                </div>
            </div>
            <div class="card">
                <h2>💰 部門毛利率</h2>
                <div class="chart-container">
                    <canvas id="marginChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🤖 AI 分析</h2>
            <div id="analysis" style="white-space: pre-line; line-height: 1.8; color: #ccd6f6;">
                <div class="loading">載入分析中...</div>
            </div>
            <p style="margin-top: 15px; color: #8892b0; font-size: 0.85em;">
                最後更新：<span id="analysisTime">--</span>
            </p>
        </div>

        <a href="index.html" class="back-link">← 返回首頁</a>
    </div>

    <script>
        // 格式化金額
        function formatMoney(value) {
            return 'NT$ ' + value.toLocaleString();
        }

        // 載入部門資料
        async function loadDeptData() {
            try {
                const response = await fetch('/api/performance/department');
                const data = await response.json();
                
                // 填充表格
                const tableHtml = `
                    <table>
                        <thead>
                            <tr>
                                <th>部門名稱</th>
                                <th>目標業績</th>
                                <th>實際業績</th>
                                <th>達成率</th>
                                <th>毛利率</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(row => {
                                const ach = row.achievement_rate * 100;
                                let achClass = 'ach-danger';
                                if (ach >= 80) achClass = 'ach-excellent';
                                else if (ach >= 60) achClass = 'ach-good';
                                else if (ach >= 40) achClass = 'ach-warning';
                                return `
                                <tr>
                                    <td>${row.name}</td>
                                    <td class="number">${formatMoney(row.target)}</td>
                                    <td class="number">${formatMoney(row.revenue)}</td>
                                    <td class="number ${achClass}">${ach.toFixed(2)}%</td>
                                    <td class="number">${(row.margin_rate * 100).toFixed(2)}%</td>
                                </tr>
                            `}).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('deptTable').innerHTML = tableHtml;
                
                // 繪製達成率圖表
                const ctx1 = document.getElementById('achievementChart').getContext('2d');
                new Chart(ctx1, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.name),
                        datasets: [{
                            label: '達成率 (%)',
                            data: data.map(d => {
                                const val = d.achievement_rate * 100;
                                return val < 1 ? 1 : val; // 最小顯示 1% 讓 0% 也能看到柱子
                            }),
                            backgroundColor: data.map(d => {
                                if (d.name.includes('門市部')) return '#00d4ff';
                                if (d.name.includes('業務部')) return '#ffc107';
                                return '#00d4ff';
                            }),
                            borderRadius: 8,
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const idx = context.dataIndex;
                                        const actualValue = (data[idx].achievement_rate * 100).toFixed(1);
                                        return `達成率: ${actualValue}%`;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 100,
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                ticks: { color: '#8892b0' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#ccd6f6' }
                            }
                        }
                    }
                });

                // 繪製毛利率圖表（柱狀圖）
                const ctx2 = document.getElementById('marginChart').getContext('2d');
                new Chart(ctx2, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.name),
                        datasets: [{
                            label: '毛利率 (%)',
                            data: data.map(d => {
                                const val = d.margin_rate * 100;
                                return val < 1 ? 1 : val; // 最小顯示 1% 讓 0% 也能看到柱子
                            }),
                            backgroundColor: data.map(d => {
                                if (d.name.includes('門市部')) return '#00d4ff';
                                if (d.name.includes('業務部')) return '#ffc107';
                                return '#00d4ff';
                            }),
                            borderRadius: 8,
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const idx = context.dataIndex;
                                        const actualValue = (data[idx].margin_rate * 100).toFixed(1);
                                        return `毛利率: ${actualValue}%`;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                ticks: {
                                    color: '#8892b0',
                                    callback: function(value) { return value + '%'; }
                                }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#ccd6f6' }
                            }
                        }
                    }
                });

                // 載入 AI 分析
                const analysisResponse = await fetch('/api/analysis/department');
                const analysisData = await analysisResponse.json();
                document.getElementById('analysis').textContent = analysisData.content;
                document.getElementById('analysisTime').textContent = analysisData.last_update;

            } catch (error) {
                console.error('載入部門資料失敗:', error);
                document.getElementById('deptTable').innerHTML = '<div class="loading">載入失敗</div>';
            }
        }

        loadDeptData();
    </script>
</body>
</html>
