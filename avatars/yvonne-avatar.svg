<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- 外圓 -->
  <circle cx="256" cy="256" r="190" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
  
  <!-- 裝飾圓點 -->
  <circle cx="350" cy="180" r="12" fill="#ffd700" opacity="0.9"/>
  <circle cx="160" cy="320" r="8" fill="#ff6b9d" opacity="0.85"/>
  <circle cx="380" cy="340" r="10" fill="#4ecdc4" opacity="0.9"/>
  
  <!-- Y 字母 -->
  <text x="256" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="200" font-weight="700" fill="rgba(255,255,255,0.95)" text-anchor="middle" filter="url(#glow)">Y</text>
  
  <!-- 名字 -->
  <text x="256" y="420" font-family="-apple-system, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">Yvonne</text>
</svg>