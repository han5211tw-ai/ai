<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbc2eb;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="cheekGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffb6c1;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ffb6c1;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- 外圈光暈 -->
  <circle cx="256" cy="256" r="200" fill="rgba(255,255,255,0.3)"/>
  
  <!-- 可愛龍蝦/機器人角色 -->
  <g transform="translate(256, 240)">
    <!-- 身體 -->
    <ellipse cx="0" cy="40" rx="70" ry="85" fill="#667eea"/>
    <ellipse cx="0" cy="40" rx="55" ry="70" fill="#764ba2"/>
    
    <!-- 頭部 -->
    <circle cx="0" cy="-30" r="60" fill="#667eea"/>
    
    <!-- 眼睛 -->
    <circle cx="-20" cy="-40" r="18" fill="white"/>
    <circle cx="20" cy="-40" r="18" fill="white"/>
    <circle cx="-18" cy="-38" r="10" fill="#333"/>
    <circle cx="18" cy="-38" r="10" fill="#333"/>
    <!-- 眼晴高光 -->
    <circle cx="-14" cy="-42" r="4" fill="white"/>
    <circle cx="22" cy="-42" r="4" fill="white"/>
    
    <!-- 腮紅 -->
    <ellipse cx="-35" cy="-20" rx="12" ry="8" fill="url(#cheekGradient)"/>
    <ellipse cx="35" cy="-20" rx="12" ry="8" fill="url(#cheekGradient)"/>
    
    <!-- 微笑 -->
    <path d="M -15 -10 Q 0 5 15 -10" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    
    <!-- 觸角/耳朵 -->
    <path d="M -40 -70 Q -50 -100 -30 -110" fill="none" stroke="#667eea" stroke-width="8" stroke-linecap="round"/>
    <path d="M 40 -70 Q 50 -100 30 -110" fill="none" stroke="#667eea" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-30" cy="-110" r="8" fill="#ffd700"/>
    <circle cx="30" cy="-110" r="8" fill="#ffd700"/>
    
    <!-- 手臂 -->
    <path d="M -60 20 Q -90 40 -80 70" fill="none" stroke="#667eea" stroke-width="12" stroke-linecap="round"/>
    <path d="M 60 20 Q 90 40 80 70" fill="none" stroke="#667eea" stroke-width="12" stroke-linecap="round"/>
    <circle cx="-80" cy="75" r="10" fill="#ffd700"/>
    <circle cx="80" cy="75" r="10" fill="#ffd700"/>
    
    <!-- 裝飾星星 -->
    <polygon points="-50,-80 -45,-90 -35,-90 -43,-97 -40,-107 -50,-101 -60,-107 -57,-97 -65,-90 -55,-90" fill="#ffd700" opacity="0.8"/>
    <polygon points="50,-75 53,-82 60,-82 55,-87 57,-95 50,-91 43,-95 45,-87 40,-82 47,-82" fill="#4ecdc4" opacity="0.8"/>
  </g>
  
  <!-- 底部小裝飾 -->
  <circle cx="100" cy="400" r="6" fill="white" opacity="0.5"/>
  <circle cx="420" cy="120" r="8" fill="white" opacity="0.4"/>
  <circle cx="400" cy="380" r="5" fill="#ffd700" opacity="0.6"/>
  
</svg>