<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- 外圓環 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- 內圓 -->
  <circle cx="256" cy="256" r="140" fill="rgba(255,255,255,0.1)"/>
  
  <!-- 抽象幾何圖形 - 代表 Y 的概念但更簡約 -->
  <!-- 上方三角形 -->
  <polygon points="256,140 196,240 316,240" fill="rgba(255,255,255,0.9)"/>
  
  <!-- 下方線條（V 的感覺）-->
  <path d="M 196 240 L 256 340 L 316 240" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 中間點綴 -->
  <circle cx="256" cy="290" r="8" fill="#ffd700"/>
  
  <!-- 裝飾小圓點 -->
  <circle cx="360" cy="160" r="10" fill="#4ecdc4" opacity="0.8"/>
  <circle cx="140" cy="350" r="6" fill="#ff6b9d" opacity="0.8"/>
  <circle cx="380" cy="320" r="8" fill="#ffd700" opacity="0.6"/>
  
</svg>