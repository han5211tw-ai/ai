<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人業績分析 - 電腦舖營運系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav a:hover, .nav a.active, .nav span.active {
            color: #00d4ff;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        .nav span.active {
            cursor: default;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .card h2 {
            color: #00d4ff;
            font-size: 1.3em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        th {
            color: #00d4ff;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        td { color: #ccd6f6; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .number { font-family: 'Courier New', monospace; }
        .rank-1 { color: #ffd700; font-weight: bold; }
        .rank-2 { color: #c0c0c0; font-weight: bold; }
        .rank-3 { color: #cd7f32; font-weight: bold; }
        .highlight { color: #00d4ff; font-weight: bold; }
        /* 達成率顏色 */
        .ach-excellent { color: #4caf50; font-weight: bold; }  /* ≥80% 綠色 */
        .ach-good { color: #ffc107; font-weight: bold; }       /* ≥60% 黃色 */
        .ach-warning { color: #ff9800; font-weight: bold; }    /* ≥40% 橘色 */
        .ach-danger { color: #f44336; font-weight: bold; }     /* <40% 紅色 */
        /* 排名切換按鈕 */
        .rank-toggle {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }
        .rank-btn {
            padding: 4px 10px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 4px;
            background: rgba(0, 212, 255, 0.05);
            color: #8892b0;
            cursor: pointer;
            font-size: 0.75em;
            transition: all 0.3s ease;
        }
        .rank-btn:hover {
            border-color: #00d4ff;
            color: #00d4ff;
        }
        .rank-btn.active {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            color: #00d4ff;
        }
        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 20px;
        }
        .loading {
            color: #8892b0;
            text-align: center;
            padding: 40px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00d4ff;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
    <link rel="stylesheet" href="version-component.css">
</head>
<body>
    <div class="container">
        <h1>🧑‍💼 個人業績分析</h1>
        
        <div class="nav">
            <a href="index.html">🏠 首頁</a>
            <a href="department.html">🏢 部門</a>
            <a href="store.html">🏬 門市</a>
            <a href="business.html">💼 業務</a>
            <a href="roster.html">📅 班表</a>
            <a href="customer_search.html">🔍 客戶</a>
        </div>

        <div class="card">
            <h2 style="display: flex; align-items: center; flex-wrap: wrap;">
                🏆 個人排名（2026 Q1）
                <div class="rank-toggle">
                    <button class="rank-btn" onclick="switchRank('achievement')">達成率</button>
                    <button class="rank-btn" onclick="switchRank('margin')">毛利率</button>
                    <button class="rank-btn" onclick="switchRank('orders')">單數</button>
                    <button class="rank-btn active" onclick="switchRank('revenue')">業績</button>
                </div>
            </h2>
            <div id="personalTable">
                <div class="loading">載入中...</div>
            </div>
        </div>

        <div class="card">
            <h2>📊 個人業績圖表</h2>
            <div class="chart-container">
                <canvas id="personalChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>🤖 AI 分析</h2>
            <div id="analysis" style="white-space: pre-line; line-height: 1.8; color: #ccd6f6;">
                <div class="loading">載入分析中...</div>
            </div>
            <p style="margin-top: 15px; color: #8892b0; font-size: 0.85em;">
                最後更新：<span id="analysisTime">--</span>
            </p>
        </div>

        <a href="index.html" class="back-link">← 返回首頁</a>
    </div>

    <script>
        // 格式化金額
        function formatMoney(value) {
            return 'NT$ ' + value.toLocaleString();
        }

        let originalData = [];
        let currentRankType = 'revenue';
        let personalChart = null;

        // 切換排名方式
        function switchRank(type) {
            currentRankType = type;
            
            // 更新按鈕狀態
            document.querySelectorAll('.rank-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 重新渲染
            renderTable();
            renderChart();
        }

        // 根據排序類型排序資料並重新計算排名
        function getSortedData() {
            if (!originalData.length) return [];
            
            let sorted = [...originalData];
            
            switch(currentRankType) {
                case 'achievement':
                    sorted.sort((a, b) => b.achievement_rate - a.achievement_rate);
                    break;
                case 'margin':
                    sorted.sort((a, b) => b.margin_rate - a.margin_rate);
                    break;
                case 'orders':
                    sorted.sort((a, b) => b.orders - a.orders);
                    break;
                case 'revenue':
                default:
                    sorted.sort((a, b) => b.total - a.total);
                    break;
            }
            
            // 重新賦予排名
            return sorted.map((item, index) => ({
                ...item,
                rank: index + 1
            }));
        }

        // 渲染表格
        function renderTable() {
            const data = getSortedData();
            
            const tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>業務員</th>
                            <th>目標業績</th>
                            <th>實際業績</th>
                            <th>達成率</th>
                            <th>毛利率</th>
                            <th>單數</th>
                            <th>平均單價</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(row => {
                            const achievement = (row.achievement_rate * 100).toFixed(1);
                            let achievementClass = 'ach-danger';
                            if (row.achievement_rate >= 0.8) achievementClass = 'ach-excellent';
                            else if (row.achievement_rate >= 0.6) achievementClass = 'ach-good';
                            else if (row.achievement_rate >= 0.4) achievementClass = 'ach-warning';
                            const margin = (row.margin_rate * 100).toFixed(1);
                            return `
                            <tr>
                                <td class="${row.rank === 1 ? 'rank-1' : row.rank === 2 ? 'rank-2' : row.rank === 3 ? 'rank-3' : ''}">
                                    ${row.rank === 1 ? '🥇' : row.rank === 2 ? '🥈' : row.rank === 3 ? '🥉' : ''} ${row.rank}
                                </td>
                                <td class="${row.rank <= 3 ? 'highlight' : ''}">${row.name}</td>
                                <td class="number">${formatMoney(row.target)}</td>
                                <td class="number">${formatMoney(row.total)}</td>
                                <td class="number ${achievementClass}">${achievement}%</td>
                                <td class="number">${margin}%</td>
                                <td class="number">${row.orders}</td>
                                <td class="number">${formatMoney(row.avg)}</td>
                            </tr>
                        `}).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('personalTable').innerHTML = tableHtml;
        }

        // 渲染圖表
        function renderChart() {
            const data = getSortedData();
            
            if (personalChart) {
                personalChart.destroy();
            }
            
            let label, chartData, yAxisCallback;
            
            switch(currentRankType) {
                case 'achievement':
                    label = '達成率 (%)';
                    chartData = data.map(d => (d.achievement_rate * 100).toFixed(1));
                    yAxisCallback = function(value) { return value + '%'; };
                    break;
                case 'margin':
                    label = '毛利率 (%)';
                    chartData = data.map(d => (d.margin_rate * 100).toFixed(1));
                    yAxisCallback = function(value) { return value + '%'; };
                    break;
                case 'orders':
                    label = '單數';
                    chartData = data.map(d => d.orders);
                    yAxisCallback = function(value) { return value + ' 單'; };
                    break;
                case 'revenue':
                default:
                    label = '實際業績 (NT$)';
                    chartData = data.map(d => d.total);
                    yAxisCallback = function(value) { return 'NT$ ' + (value/10000) + '萬'; };
                    break;
            }
            
            const ctx = document.getElementById('personalChart').getContext('2d');
            personalChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.name),
                    datasets: [{
                        label: label,
                        data: chartData,
                        backgroundColor: data.map((d, i) => 
                            i === 0 ? '#ffd700' : i === 1 ? '#c0c0c0' : i === 2 ? '#cd7f32' : '#00d4ff'
                        ),
                        borderRadius: 8,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { 
                                color: '#8892b0',
                                callback: yAxisCallback
                            }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { color: '#ccd6f6' }
                        }
                    }
                }
            });
        }

        // 載入個人資料
        async function loadPersonalData() {
            try {
                const response = await fetch('/api/performance/personal');
                originalData = await response.json();
                
                renderTable();
                renderChart();
            } catch (error) {
                console.error('載入個人資料失敗:', error);
                document.getElementById('personalTable').innerHTML = '<div class="loading">載入失敗</div>';
            }
        }

        loadPersonalData();

        // 載入 AI 分析
        async function loadAnalysis() {
            try {
                const response = await fetch('/api/analysis/personal');
                const data = await response.json();
                document.getElementById('analysis').innerHTML = data.content || '暫無分析資料';
                document.getElementById('analysisTime').textContent = data.last_update || '--';
            } catch (error) {
                console.error('載入分析失敗:', error);
                document.getElementById('analysis').innerHTML = '分析資料載入失敗';
            }
        }
        loadAnalysis();
    </script>

</html>
