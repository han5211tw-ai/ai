{% extends "base.html" %}

{% block title %}查詢{% endblock %}
{% block page_title %}查詢{% endblock %}

{% block styles %}
<style>
.query-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.query-card {
    background: var(--color-bg-elevated);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-lg);
    padding: 30px;
    text-align: center;
    transition: all var(--transition-normal);
    cursor: pointer;
    text-decoration: none;
    color: var(--color-text-primary);
    display: block;
}

.query-card:hover {
    transform: translateY(-5px);
    border-color: var(--color-brand-primary);
    box-shadow: 0 10px 30px rgba(250, 191, 19, 0.2);
}

.query-icon {
    font-size: 3em;
    margin-bottom: 15px;
}

.query-title {
    font-size: 1.3em;
    color: var(--color-brand-primary);
    margin-bottom: 10px;
}

.query-desc {
    color: var(--color-text-secondary);
    font-size: 0.95em;
}


</style>
{% endblock %}

{% block content %}
<div class="query-grid">
    <a href="customer_search.html" class="query-card" target="_blank">
        <div class="query-icon">👤</div>
        <div class="query-title">客戶查詢</div>
        <div class="query-desc">搜尋客戶資料、聯絡資訊與交易紀錄</div>
    </a>

    <a href="inventory_query.html" class="query-card" target="_blank">
        <div class="query-icon">📦</div>
        <div class="query-title">庫存查詢</div>
        <div class="query-desc">查詢商品庫存數量與各倉庫分佈</div>
    </a>
</div>
{% endblock %}
