<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電腦舖營運看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 50px;
            font-size: 1.1em;
        }
        .section-title {
            color: #00d4ff;
            font-size: 1.2em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        .btn-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .btn-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00d4ff;
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.2);
        }
        .btn-icon {
            font-size: 2.5em;
            margin-bottom: 15px;
        }
        .btn-title {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }
        .btn-desc {
            font-size: 0.9em;
            color: #8892b0;
        }
        .chart-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .chart-container {
            position: relative;
            height: 350px;
            margin-top: 20px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }
        .stat-label {
            color: #8892b0;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00d4ff;
        }
        .update-time {
            text-align: center;
            color: #8892b0;
            margin-top: 40px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖥️ 電腦舖營運看板</h1>
        <p class="subtitle">Tech Dashboard System v1.0</p>

        <div class="section-title">📊 業績分析頁面</div>
        <div class="btn-grid">
            <a href="department.html" class="btn-card">
                <div class="btn-icon">🏢</div>
                <div class="btn-title">部門業績數據表</div>
                <div class="btn-desc">達成率、毛利率、業績表</div>
            </a>
            <a href="store.html" class="btn-card">
                <div class="btn-icon">🏬</div>
                <div class="btn-title">門市業績表</div>
                <div class="btn-desc">達成率、毛利率、五星好評</div>
            </a>
            <a href="personal.html" class="btn-card">
                <div class="btn-icon">🧑‍💼</div>
                <div class="btn-title">個人業績</div>
                <div class="btn-desc">達成率、業績表、毛利率</div>
            </a>
            <a href="roster.html" class="btn-card">
                <div class="btn-icon">📅</div>
                <div class="btn-title">班表</div>
                <div class="btn-desc">人員排班與出勤管理</div>
            </a>
        </div>

        <div class="section-title">☁️ 雲端文件連結</div>
        <div class="btn-grid">
            <a href="https://1drv.ms/x/c/6480de932f72b94e/IQCCj1uz5GwBT5xN4adCYTwuAbn4vP5ZZVsX1M-mem4XSxg?e=6XaqR3" class="btn-card" target="_blank">
                <div class="btn-icon">🔴</div>
                <div class="btn-title">需求表</div>
                <div class="btn-desc">各部門請購需求追蹤</div>
            </a>
            <a href="https://1drv.ms/x/c/6480de932f72b94e/IQCdDxO_Nke0SYeYjet7Z1ZhAevA1hWTrfGgCJ8EQc6SMT8?e=8uxM9p" class="btn-card" target="_blank">
                <div class="btn-icon">✅</div>
                <div class="btn-title">LINE 回覆紀錄</div>
                <div class="btn-desc">客服對話與回覆統計</div>
            </a>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">本季總營收</div>
                <div class="stat-value" id="totalRevenue">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">今日營收</div>
                <div class="stat-value" id="todayRevenue">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">平均日營收</div>
                <div class="stat-value" id="avgRevenue">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">最高單日</div>
                <div class="stat-value" id="maxRevenue">--</div>
            </div>
        </div>

        <div class="chart-section">
            <div class="section-title">📈 本季每日銷售金額趨勢（2026 Q1）</div>
            <div class="chart-container">
                <canvas id="salesChart"></canvas>
            </div>
        </div>

        <div class="update-time">
            最後更新：2026-02-21 | 資料來源：公司資料庫
        </div>
    </div>

    <script>
        const salesData = [
            {date: '2026-01-01', amount: 270641}, {date: '2026-01-02', amount: 51390},
            {date: '2026-01-03', amount: 40565}, {date: '2026-01-04', amount: 13807},
            {date: '2026-01-05', amount: 10686}, {date: '2026-01-06', amount: 43805},
            {date: '2026-01-07', amount: 98867}, {date: '2026-01-08', amount: 63147},
            {date: '2026-01-09', amount: 177962}, {date: '2026-01-10', amount: 46192},
            {date: '2026-01-11', amount: 6980}, {date: '2026-01-12', amount: 10745},
            {date: '2026-01-13', amount: 239637}, {date: '2026-01-14', amount: 51431},
            {date: '2026-01-15', amount: 238578}, {date: '2026-01-16', amount: 62879},
            {date: '2026-01-17', amount: 21372}, {date: '2026-01-18', amount: 42581},
            {date: '2026-01-19', amount: 187992}, {date: '2026-01-20', amount: 158498},
            {date: '2026-01-21', amount: 91231}, {date: '2026-01-22', amount: 154035},
            {date: '2026-01-23', amount: 104160}, {date: '2026-01-24', amount: 94307},
            {date: '2026-01-25', amount: 24704}, {date: '2026-01-26', amount: 38452},
            {date: '2026-01-27', amount: 59184}, {date: '2026-01-28', amount: 171523},
            {date: '2026-01-29', amount: 159232}, {date: '2026-01-30', amount: 207022},
            {date: '2026-01-31', amount: 34745}, {date: '2026-02-01', amount: 56466},
            {date: '2026-02-02', amount: 22191}, {date: '2026-02-03', amount: 2736},
            {date: '2026-02-04', amount: 94770}, {date: '2026-02-05', amount: 79760},
            {date: '2026-02-06', amount: 802672}, {date: '2026-02-07', amount: 65398},
            {date: '2026-02-08', amount: 10481}, {date: '2026-02-09', amount: 185587},
            {date: '2026-02-10', amount: 130959}, {date: '2026-02-11', amount: 83860},
            {date: '2026-02-12', amount: 233452}, {date: '2026-02-13', amount: 76413},
            {date: '2026-02-14', amount: 30053}, {date: '2026-02-15', amount: 55777},
            {date: '2026-02-16', amount: 6372}, {date: '2026-02-17', amount: 5033},
            {date: '2026-02-18', amount: 3700}, {date: '2026-02-19', amount: 9761},
            {date: '2026-02-20', amount: 78321}
        ];

        const amounts = salesData.map(d => d.amount);
        const total = amounts.reduce((a, b) => a + b, 0);
        const avg = Math.round(total / amounts.length);
        const max = Math.max(...amounts);
        const today = amounts[amounts.length - 1];

        document.getElementById('totalRevenue').textContent = 'NT$ ' + (total/10000).toFixed(1) + '萬';
        document.getElementById('todayRevenue').textContent = 'NT$ ' + today.toLocaleString();
        document.getElementById('avgRevenue').textContent = 'NT$ ' + (avg/10000).toFixed(1) + '萬';
        document.getElementById('maxRevenue').textContent = 'NT$ ' + (max/10000).toFixed(1) + '萬';

        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: salesData.map(d => d.date.slice(5)),
                datasets: [{
                    label: '每日銷售金額 (NT$)',
                    data: amounts,
                    backgroundColor: amounts.map(v => v > 200000 ? '#ff6b6b' : '#00d4ff'),
                    borderRadius: 4,
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { 
                            color: '#8892b0',
                            callback: function(value) { return 'NT$ ' + (value / 1000) + 'K'; }
                        }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { 
                            color: '#8892b0',
                            maxRotation: 45,
                            minRotation: 45
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
