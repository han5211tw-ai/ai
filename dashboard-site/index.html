<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電腦舖營運看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 50px;
            font-size: 1.1em;
        }
        .section-title {
            color: #00d4ff;
            font-size: 1.2em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        .btn-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .btn-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00d4ff;
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.2);
        }
        .btn-icon { font-size: 2.5em; margin-bottom: 15px; }
        .btn-title { font-size: 1.2em; font-weight: 600; margin-bottom: 8px; color: #fff; }
        .btn-desc { font-size: 0.9em; color: #8892b0; }
        .chart-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .chart-container {
            position: relative;
            height: 350px;
            margin-top: 20px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }
        .stat-label { color: #8892b0; font-size: 0.9em; margin-bottom: 10px; }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00d4ff;
        }
        .loading {
            color: #8892b0;
            text-align: center;
            padding: 20px;
        }
        .update-time {
            text-align: center;
            color: #8892b0;
            margin-top: 40px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖥️ 電腦舖營運看板</h1>
        <p class="subtitle">Tech Dashboard System v2.0 - 即時資料</p>

        <div class="section-title">📊 業績分析頁面</div>
        <div class="btn-grid">
            <a href="department.html" class="btn-card">
                <div class="btn-icon">🏢</div>
                <div class="btn-title">部門業績指標</div>
                <div class="btn-desc">達成率、毛利率、業績表</div>
            </a>
            <a href="store.html" class="btn-card">
                <div class="btn-icon">🏬</div>
                <div class="btn-title">門市業績指標</div>
                <div class="btn-desc">達成率、毛利率、五星好評</div>
            </a>
            <a href="personal.html" class="btn-card">
                <div class="btn-icon">🧑‍💼</div>
                <div class="btn-title">個人業績指標</div>
                <div class="btn-desc">達成率、業績表、毛利率</div>
            </a>
            <a href="roster.html" class="btn-card">
                <div class="btn-icon">📅</div>
                <div class="btn-title">班表</div>
                <div class="btn-desc">人員排班與出勤管理</div>
            </a>
        </div>

        <div class="section-title">☁️ 雲端文件連結</div>
        <div class="btn-grid">
            <a href="https://1drv.ms/x/c/6480de932f72b94e/IQCCj1uz5GwBT5xN4adCYTwuAbn4vP5ZZVsX1M-mem4XSxg?e=6XaqR3" class="btn-card" target="_blank">
                <div class="btn-icon">🔴</div>
                <div class="btn-title">需求表</div>
                <div class="btn-desc">各部門請購需求追蹤</div>
            </a>
            <a href="https://1drv.ms/x/c/6480de932f72b94e/IQCdDxO_Nke0SYeYjet7Z1ZhAevA1hWTrfGgCJ8EQc6SMT8?e=8uxM9p" class="btn-card" target="_blank">
                <div class="btn-icon">✅</div>
                <div class="btn-title">LINE 回覆紀錄</div>
                <div class="btn-desc">客服對話與回覆統計</div>
            </a>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">本季總營收</div>
                <div class="stat-value" id="totalRevenue">
                    <div class="loading">載入中...</div>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-label">今日營收</div>
                <div class="stat-value" id="todayRevenue">
                    <div class="loading">載入中...</div>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-label">平均日營收</div>
                <div class="stat-value" id="avgRevenue">
                    <div class="loading">載入中...</div>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-label">最高單日</div>
                <div class="stat-value" id="maxRevenue">
                    <div class="loading">載入中...</div>
                </div>
            </div>
        </div>

        <div class="chart-section">
            <div class="section-title">📈 本季每日銷售金額趨勢（2026 Q1）</div>
            <div class="chart-container">
                <canvas id="salesChart"></canvas>
            </div>
        </div>

        <div class="update-time">
            資料即時從資料庫讀取 | 最後更新：<span id="updateTime">--</span>
        </div>
    </div>

    <script>
        // 格式化金額
        function formatMoney(value) {
            if (value >= 10000) {
                return 'NT$ ' + (value / 10000).toFixed(1) + '萬';
            }
            return 'NT$ ' + value.toLocaleString();
        }

        // 載入總計數據
        async function loadSummary() {
            try {
                const response = await fetch('/api/summary');
                const data = await response.json();
                document.getElementById('totalRevenue').textContent = formatMoney(data.total);
                document.getElementById('todayRevenue').textContent = formatMoney(data.today);
                document.getElementById('avgRevenue').textContent = formatMoney(data.avg);
                document.getElementById('maxRevenue').textContent = formatMoney(data.max);
            } catch (error) {
                console.error('載入總計失敗:', error);
            }
        }

        // 載入圖表資料
        async function loadChart() {
            try {
                const response = await fetch('/api/sales/daily');
                const salesData = await response.json();
                
                const amounts = salesData.map(d => d.amount);
                
                const ctx = document.getElementById('salesChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: salesData.map(d => d.date.slice(5)),
                        datasets: [{
                            label: '每日銷售金額 (NT$)',
                            data: amounts,
                            backgroundColor: amounts.map(v => v > 200000 ? '#ff6b6b' : '#00d4ff'),
                            borderRadius: 4,
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                ticks: { 
                                    color: '#8892b0',
                                    callback: function(value) { return 'NT$ ' + (value / 1000) + 'K'; }
                                }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { 
                                    color: '#8892b0',
                                    maxRotation: 45,
                                    minRotation: 45
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('載入圖表失敗:', error);
            }
        }

        // 更新時間
        document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-TW');

        // 載入資料
        loadSummary();
        loadChart();

        // 每 60 秒自動重新整理
        setInterval(() => {
            location.reload();
        }, 60000);
    </script>
</body>
</html>
