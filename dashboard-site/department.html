<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部門業績數據表 - 電腦舖營運看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .nav {
            text-align: center;
            margin-bottom: 20px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
            transition: all 0.3s;
        }
        .nav a:hover { background: rgba(255,255,255,0.4); }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-left: 5px solid #667eea;
            padding-left: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }
        tr:hover { background: #f5f5f5; }
        .number { font-family: 'Courier New', monospace; font-weight: bold; }
        .positive { color: #28a745; }
        .negative { color: #dc3545; }
        .chart-container { position: relative; height: 300px; margin-top: 20px; }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 部門業績數據表</h1>
        
        <div class="nav">
            <a href="index.html">🏠 首頁</a>
            <a href="department.html">🏢 部門業績</a>
            <a href="store.html">🏬 門市業績</a>
            <a href="personal.html">🧑‍💼 個人業績</a>
            <a href="roster.html">📅 班表</a>
        </div>

        <div class="card">
            <h2>📊 部門業績達成率</h2>
            <table>
                <thead>
                    <tr>
                        <th>部門名稱</th>
                        <th>目標業績</th>
                        <th>實際業績</th>
                        <th>毛利</th>
                        <th>達成率</th>
                        <th>毛利率</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>門市部</td>
                        <td class="number">NT$ 8,457,499</td>
                        <td class="number">NT$ 3,910,704</td>
                        <td class="number">NT$ 1,023,160</td>
                        <td class="number negative">46.24%</td>
                        <td class="number">26.16%</td>
                    </tr>
                    <tr>
                        <td>業務部</td>
                        <td class="number">NT$ 2,629,050</td>
                        <td class="number">NT$ 1,533,790</td>
                        <td class="number">NT$ 449,691</td>
                        <td class="number negative">58.34%</td>
                        <td class="number">29.32%</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h2>📈 部門業績達成率圖表</h2>
            <div class="chart-container">
                <canvas id="deptChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>💰 部門毛利率分析</h2>
            <div class="chart-container">
                <canvas id="marginChart"></canvas>
            </div>
        </div>

        <a href="index.html" class="back-link">← 返回首頁</a>
    </div>

    <script>
        // 部門達成率圖表
        const ctx1 = document.getElementById('deptChart').getContext('2d');
        new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: ['門市部', '業務部'],
                datasets: [{
                    label: '達成率 (%)',
                    data: [46.24, 58.34],
                    backgroundColor: ['rgba(255, 99, 132, 0.8)', 'rgba(54, 162, 235, 0.8)'],
                    borderColor: ['rgba(255, 99, 132, 1)', 'rgba(54, 162, 235, 1)'],
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        ticks: {
                            callback: function(value) { return value + '%'; }
                        }
                    }
                }
            }
        });

        // 毛利率圖表
        const ctx2 = document.getElementById('marginChart').getContext('2d');
        new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['門市部', '業務部'],
                datasets: [{
                    data: [26.16, 29.32],
                    backgroundColor: ['rgba(255, 99, 132, 0.8)', 'rgba(54, 162, 235, 0.8)'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    </script>
</body>
</html>
