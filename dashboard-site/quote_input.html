{% extends "base.html" %}

{% block title %}報價單輸入 - 電腦舖{% endblock %}
{% block page_title %}報價作業{% endblock %}

{% block styles %}
<style>
.container { width: 100%; margin: 0; padding: 0; }

/* 報價單樣式 */
.quote-section {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
}

.section-title {
    color: #FABF13;
    font-size: 1.1em;
    margin-bottom: 15px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    padding-bottom: 10px;
}

.form-row {
    display: flex;
    gap: 15px;
    margin-bottom: 12px;
    flex-wrap: wrap;
}

.form-field {
    flex: 1;
    min-width: 200px;
}

.form-field label {
    display: block;
    margin-bottom: 6px;
    color: #8892b0;
    font-size: 0.95em;
}

.form-field input,
.form-field select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.05);
    color: #fff;
    font-size: 0.95em;
}

.form-field input:focus,
.form-field select:focus {
    outline: none;
    border-color: #FABF13;
}

/* 產品明細表 */
.items-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 15px;
}

.items-table th,
.items-table td {
    padding: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: left;
}

.items-table th {
    background: rgba(250, 191, 19, 0.1);
    color: #FABF13;
}

.items-table input {
    width: 100%;
    padding: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.05);
    color: #fff;
}

.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #FABF13 0%, #e6a800 100%);
    color: #231815;
    cursor: pointer;
    transition: transform 0.2s;
}

.btn:hover {
    transform: translateY(-2px);
}

.btn-secondary {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.total-section {
    text-align: right;
    padding: 15px;
    background: rgba(250, 191, 19, 0.05);
    border-radius: 8px;
    margin-top: 15px;
}

.total-amount {
    font-size: 1.5em;
    color: #FABF13;
    font-weight: bold;
}

/* 報價單列表 */
.quote-list {
    margin-top: 30px;
}

.quote-item {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.quote-info {
    flex: 1;
}

.quote-no {
    color: #FABF13;
    font-weight: bold;
}

.quote-actions {
    display: flex;
    gap: 10px;
}

/* 彈窗樣式 */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-overlay.active {
    display: flex;
}

.modal-content {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    padding: 30px;
    max-width: 500px;
    width: 90%;
}

.modal-title {
    color: #FABF13;
    font-size: 1.2em;
    margin-bottom: 20px;
}
</style>
{% endblock %}

{% block content %}
<div class="container">
    <!-- 報價單表單 -->
    <div class="quote-section">
        <div class="section-title">📝 新增報價單</div>
        <form id="quoteForm">
            <div class="form-row">
                <div class="form-field">
                    <label>報價單號</label>
                    <input type="text" id="quoteNo" readonly>
                </div>
                <div class="form-field">
                    <label>日期</label>
                    <input type="date" id="quoteDate" required>
                </div>
                <div class="form-field">
                    <label>客戶</label>
                    <input type="text" id="customerName" placeholder="搜尋客戶..." required>
                    <input type="hidden" id="customerId">
                </div>
            </div>
            
            <!-- 產品明細 -->
            <table class="items-table">
                <thead>
                    <tr>
                        <th>產品名稱</th>
                        <th>數量</th>
                        <th>單價</th>
                        <th>小計</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="itemsBody">
                    <!-- 動態新增 -->
                </tbody>
            </table>
            
            <button type="button" class="btn btn-secondary" onclick="addItem()">+ 新增產品</button>
            
            <div class="total-section">
                總金額：<span class="total-amount" id="totalAmount">NT$ 0</span>
            </div>
            
            <div class="form-row" style="margin-top: 20px;">
                <button type="submit" class="btn">💾 儲存報價單</button>
            </div>
        </form>
    </div>
    
    <!-- 報價單列表 -->
    <div class="quote-list">
        <div class="section-title">📋 報價單列表</div>
        <div id="quoteListContainer">
            <div style="color: #8892b0; text-align: center; padding: 40px;">載入中...</div>
        </div>
    </div>
</div>

<!-- 轉訂單彈窗 -->
<div class="modal-overlay" id="convertModal">
    <div class="modal-content">
        <div class="modal-title">🔄 轉換為訂單</div>
        <div id="modalQuoteInfo"></div>
        <div class="form-field" style="margin: 20px 0;">
            <label>訂金金額（可留空）</label>
            <input type="number" id="depositAmount" min="0" placeholder="輸入訂金金額">
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button class="btn btn-secondary" onclick="closeModal()">取消</button>
            <button class="btn" onclick="confirmConvert()">確認轉換</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentQuoteNo = null;

// 初始化
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('quoteDate').value = new Date().toISOString().slice(0, 10);
    generateQuoteNo();
    addItem(); // 預設一列
    loadQuoteList();
});

// 產生報價單號
async function generateQuoteNo() {
    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    try {
        const response = await fetch(`/api/quote/next-no?date=${today}`);
        const data = await response.json();
        if (data.success) {
            document.getElementById('quoteNo').value = data.quote_no;
        }
    } catch (error) {
        console.error('產生單號失敗:', error);
    }
}

// 新增產品列
function addItem() {
    const tbody = document.getElementById('itemsBody');
    const row = document.createElement('tr');
    row.innerHTML = `
        <td><input type="text" class="product-name" placeholder="產品名稱" onchange="calculateTotal()"></td>
        <td><input type="number" class="qty" min="1" value="1" onchange="calculateTotal()"></td>
        <td><input type="number" class="price" min="0" placeholder="單價" onchange="calculateTotal()"></td>
        <td class="subtotal">0</td>
        <td><button type="button" class="btn btn-secondary" onclick="this.closest('tr').remove(); calculateTotal();">刪除</button></td>
    `;
    tbody.appendChild(row);
}

// 計算總額
function calculateTotal() {
    let total = 0;
    document.querySelectorAll('#itemsBody tr').forEach(row => {
        const qty = parseInt(row.querySelector('.qty').value) || 0;
        const price = parseInt(row.querySelector('.price').value) || 0;
        const subtotal = qty * price;
        row.querySelector('.subtotal').textContent = subtotal.toLocaleString();
        total += subtotal;
    });
    document.getElementById('totalAmount').textContent = 'NT$ ' + total.toLocaleString();
}

// 儲存報價單
document.getElementById('quoteForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const items = [];
    document.querySelectorAll('#itemsBody tr').forEach(row => {
        const name = row.querySelector('.product-name').value;
        const qty = parseInt(row.querySelector('.qty').value) || 0;
        const price = parseInt(row.querySelector('.price').value) || 0;
        if (name && qty > 0 && price > 0) {
            items.push({ product_name: name, qty: qty, unit_price: price, subtotal: qty * price });
        }
    });
    
    if (items.length === 0) {
        alert('請至少新增一筆產品');
        return;
    }
    
    const data = {
        doc_no: document.getElementById('quoteNo').value,
        doc_type: 'QUOTE',
        target_id: document.getElementById('customerId').value,
        target_name: document.getElementById('customerName').value,
        total_amount: items.reduce((sum, item) => sum + item.subtotal, 0),
        items: items
    };
    
    try {
        const response = await fetch('/api/sales-doc/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            alert('報價單已儲存！');
            this.reset();
            document.getElementById('quoteDate').value = new Date().toISOString().slice(0, 10);
            generateQuoteNo();
            addItem();
            loadQuoteList();
        } else {
            alert('儲存失敗');
        }
    } catch (error) {
        console.error('儲存失敗:', error);
        alert('儲存失敗');
    }
});

// 載入報價單列表
async function loadQuoteList() {
    try {
        const response = await fetch('/api/sales-doc/list?type=QUOTE&limit=10');
        const data = await response.json();
        const container = document.getElementById('quoteListContainer');
        
        if (!data.documents || data.documents.length === 0) {
            container.innerHTML = '<div style="color: #8892b0; text-align: center; padding: 40px;">暫無報價單</div>';
            return;
        }
        
        container.innerHTML = data.documents.map(doc => `
            <div class="quote-item">
                <div class="quote-info">
                    <div class="quote-no">${doc.doc_no}</div>
                    <div>${doc.target_name} | NT$ ${doc.total_amount.toLocaleString()}</div>
                </div>
                <div class="quote-actions">
                    <button class="btn" onclick="openConvertModal('${doc.doc_no}', '${doc.target_name}', ${doc.total_amount})">轉訂單</button>
                </div>
            </div>
        `).join('');
    } catch (error) {
        console.error('載入失敗:', error);
        document.getElementById('quoteListContainer').innerHTML = '<div style="color: #8892b0; text-align: center; padding: 40px;">載入失敗</div>';
    }
}

// 開啟轉換彈窗
function openConvertModal(quoteNo, customerName, totalAmount) {
    currentQuoteNo = quoteNo;
    document.getElementById('modalQuoteInfo').innerHTML = `
        <p>報價單號：${quoteNo}</p>
        <p>客戶：${customerName}</p>
        <p>總金額：NT$ ${totalAmount.toLocaleString()}</p>
    `;
    document.getElementById('convertModal').classList.add('active');
}

// 關閉彈窗
function closeModal() {
    document.getElementById('convertModal').classList.remove('active');
    document.getElementById('depositAmount').value = '';
}

// 確認轉換
async function confirmConvert() {
    const deposit = parseInt(document.getElementById('depositAmount').value) || 0;
    
    try {
        const response = await fetch('/api/sales-doc/convert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                source_doc_no: currentQuoteNo,
                target_type: 'ORDER',
                deposit_amount: deposit
            })
        });
        
        if (response.ok) {
            alert('已成功轉換為訂單！');
            closeModal();
            loadQuoteList();
        } else {
            alert('轉換失敗');
        }
    } catch (error) {
        console.error('轉換失敗:', error);
        alert('轉換失敗');
    }
}
</script>
{% endblock %}
