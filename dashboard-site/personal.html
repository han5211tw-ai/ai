<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人業績 - 電腦舖營運看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav a:hover, .nav a.active {
            color: #00d4ff;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .card h2 {
            color: #00d4ff;
            font-size: 1.3em;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        th {
            color: #00d4ff;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        td { color: #ccd6f6; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .number { font-family: 'Courier New', monospace; }
        .rank-1 { color: #ffd700; font-weight: bold; }
        .rank-2 { color: #c0c0c0; font-weight: bold; }
        .rank-3 { color: #cd7f32; font-weight: bold; }
        .highlight { color: #00d4ff; font-weight: bold; }
        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 20px;
        }
        .loading {
            color: #8892b0;
            text-align: center;
            padding: 40px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00d4ff;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧑‍💼 個人業績</h1>
        
        <div class="nav">
            <a href="index.html">🏠 首頁</a>
            <a href="department.html">🏢 部門業績</a>
            <a href="store.html">🏬 門市業績</a>
            <a href="personal.html" class="active">🧑‍💼 個人業績</a>
            <a href="roster.html">📅 班表</a>
        </div>

        <div class="card">
            <h2>🏆 個人業績排名（2026 Q1）</h2>
            <div id="personalTable">
                <div class="loading">載入中...</div>
            </div>
        </div>

        <div class="card">
            <h2>📊 個人業績圖表</h2>
            <div class="chart-container">
                <canvas id="personalChart"></canvas>
            </div>
        </div>

        <a href="index.html" class="back-link">← 返回首頁</a>
    </div>

    <script>
        // 格式化金額
        function formatMoney(value) {
            return 'NT$ ' + value.toLocaleString();
        }

        // 載入個人資料
        async function loadPersonalData() {
            try {
                const response = await fetch('/api/performance/personal');
                const data = await response.json();
                
                // 填充表格
                const tableHtml = `
                    <table>
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>業務員</th>
                                <th>總業績</th>
                                <th>單數</th>
                                <th>平均單價</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(row => `
                                <tr>
                                    <td class="${row.rank === 1 ? 'rank-1' : row.rank === 2 ? 'rank-2' : row.rank === 3 ? 'rank-3' : ''}">
                                        ${row.rank === 1 ? '🥇' : row.rank === 2 ? '🥈' : row.rank === 3 ? '🥉' : ''} ${row.rank}
                                    </td>
                                    <td class="${row.rank <= 3 ? 'highlight' : ''}">${row.name}</td>
                                    <td class="number">${formatMoney(row.total)}</td>
                                    <td class="number">${row.orders}</td>
                                    <td class="number">${formatMoney(row.avg)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('personalTable').innerHTML = tableHtml;
                
                // 繪製圖表
                const ctx = document.getElementById('personalChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(d => d.name),
                        datasets: [{
                            label: '總業績 (NT$)',
                            data: data.map(d => d.total),
                            backgroundColor: data.map((d, i) => 
                                i === 0 ? '#ffd700' : i === 1 ? '#c0c0c0' : i === 2 ? '#cd7f32' : '#00d4ff'
                            ),
                            borderRadius: 8,
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        indexAxis: 'y',
                        plugins: { legend: { display: false } },
                        scales: {
                            x: {
                                beginAtZero: true,
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                ticks: { 
                                    color: '#8892b0',
                                    callback: function(value) { return 'NT$ ' + (value/10000) + '萬'; }
                                }
                            },
                            y: {
                                grid: { display: false },
                                ticks: { color: '#ccd6f6' }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('載入個人資料失敗:', error);
                document.getElementById('personalTable').innerHTML = '<div class="loading">載入失敗</div>';
            }
        }

        loadPersonalData();
    </script>
</body>
</html>
