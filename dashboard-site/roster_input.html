    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 儲存按鈕 */

<body>
    <div class="container">
        <!-- 排班區塊 -->
        <div id="rosterSection" class="roster-section" style="display:none;">
            <div class="user-info">
                <div>填表人：<span id="userName">-</span>｜單位：<span id="userStore">-</span> <span style="font-size:0.7rem;color:var(--color-text-secondary);font-family:monospace;">v1.10</span></div>
                <button class="btn btn-logout" onclick="logout()">重新登入</button>
            </div>

            <!-- 主管選擇區（僅主管可見）-->
            <div id="supervisorPanel" class="supervisor-panel" style="display:none;">
                
                <div class="form-row">
                    <div class="form-group">
                        <select id="supervisorStore" onchange="loadSupervisorRoster()">
                            <option value="">請選擇店別</option>
                            <option value="豐原">豐原門市</option>
                            <option value="潭子">潭子門市</option>
                            <option value="大雅">大雅門市</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 月份資訊 -->
            <div class="month-info">
                <div class="month-title" id="monthTitle">4月班表</div>
                <div class="roster-status" id="rosterStatus"></div>
            </div>

            <!-- 班別說明 -->
            <div class="shift-legend">
                <div class="shift-legend-item"><div class="shift-dot morning"></div><span>早班</span></div>
                <div class="shift-legend-item"><div class="shift-dot evening"></div><span>晚班</span></div>
                <div class="shift-legend-item"><div class="shift-dot night"></div><span>值班</span></div>
                <div class="shift-legend-item"><div class="shift-dot off"></div><span>休假</span></div>
                <div class="shift-legend-item"><div class="shift-dot full"></div><span>全班</span></div>
                <div class="shift-legend-item"><div class="shift-dot special"></div><span>特休</span></div>
            </div>

            <!-- 班別統計（僅顯示登入者自己的統計）-->
            <div class="shift-stats" id="shiftStats" style="display:none;">
                <div class="shift-stats-title">我的班別統計</div>
                <div class="shift-stats-grid">
                    <div class="shift-stat-item">
                        <div class="shift-stat-count" id="count-早">0</div>
                        <div class="shift-stat-label">早班</div>
                    </div>
                    <div class="shift-stat-item">
                        <div class="shift-stat-count" id="count-晚">0</div>
                        <div class="shift-stat-label">晚班</div>
                    </div>
                    <div class="shift-stat-item">
                        <div class="shift-stat-count" id="count-值">0</div>
                        <div class="shift-stat-label">值班</div>
                    </div>
                    <div class="shift-stat-item">
                        <div class="shift-stat-count" id="count-休">0</div>
                        <div class="shift-stat-label">休假</div>
                    </div>
                    <div class="shift-stat-item">
                        <div class="shift-stat-count" id="count-全">0</div>
                        <div class="shift-stat-label">全班</div>
                    </div>
                    <div class="shift-stat-item">
                        <div class="shift-stat-count" id="count-特">0</div>
                        <div class="shift-stat-label">特休</div>
                    </div>
                </div>
            </div>

            <!-- 個人班表容器 -->
            <div id="rostersContainer">
                <!-- 動態生成 -->
            </div>

            <!-- 儲存按鈕 -->
            <div class="action-buttons">
                <button id="saveBtn" class="btn btn-primary" onclick="saveRoster()">💾 儲存班表</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentUser = null;
        let rosterData = {}; // { staffName: { date: shift } }
        let isSupervisor = false;
        let currentStore = '';
        let staffList = [];

        // 店別對應人員
        const storeStaff = {
            '豐原': ['林峙文', '林榮祺'],
            '潭子': ['林煜捷', '劉育仕'],
            '大雅': ['張永承', '張家碩']
        };

        // 人員對應店別
        const staffStore = {};
        Object.entries(storeStaff).forEach(([store, staff]) => {
            staff.forEach(name => staffStore[name] = store);
        });

        // 檢查是否為頁面重新載入（從其他頁面返回時自動登出）
        window.onpageshow = function(event) {
            if (event.persisted) {
                logout();
            }
        };

        // 頁面登入成功後的處理
        window.onLoginSuccess = function(data) {
            console.log('[Roster] Login success:', data);
            currentUser = data;
            isSupervisor = data.department.includes('主管') || data.name === '莊圍迪';

            document.getElementById('rosterSection').style.display = 'block';
            sessionStorage.setItem('roster_user', JSON.stringify(data));

            if (isSupervisor) {
                document.getElementById('supervisorPanel').style.display = 'block';
                setMonthTitle();
                document.getElementById('rostersContainer').innerHTML = '<div style="text-align:center; color:var(--color-text-secondary); padding:40px;">請先選擇門市</div>';
            } else {
                document.getElementById('supervisorPanel').style.display = 'none';
                currentStore = staffStore[data.name];
                staffList = storeStaff[currentStore];
                setMonthTitle();
                loadEmployeeRoster();
            }
        };

        // 登出
        function logout() {
            sessionStorage.removeItem('roster_user');
            authLogout();
        }

        // 檢查登入狀態
        function checkLogin() {
            const userData = sessionStorage.getItem('roster_user');
            if (userData) {
                currentUser = JSON.parse(userData);
                isSupervisor = currentUser.department.includes('主管') || currentUser.name === '莊圍迪';

                document.getElementById('loginSection').classList.remove('active');
                document.getElementById('rosterSection').classList.add('active');

                document.getElementById('userName').textContent = currentUser.name;
                document.getElementById('userStore').textContent = isSupervisor ? '主管' : (staffStore[currentUser.name] + '門市');

                if (isSupervisor) {
                    document.getElementById('supervisorPanel').style.display = 'block';
                    setMonthTitle();
                    document.getElementById('rostersContainer').innerHTML = '<div style="text-align:center; color:var(--color-text-secondary); padding:40px;">請先選擇門市</div>';
                } else {
                    document.getElementById('supervisorPanel').style.display = 'none';
                    currentStore = staffStore[currentUser.name];
                    staffList = storeStaff[currentStore];
                    setMonthTitle();
                    loadEmployeeRoster();
                }
            }
        }

        // 設置月份標題
        function setMonthTitle() {
            const now = new Date();
            let nextYear = now.getFullYear();
            let nextMonth = now.getMonth() + 2;
            if (nextMonth > 12) { nextMonth = 1; nextYear++; }
            const monthNames = ['', '1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            document.getElementById('monthTitle').textContent = `${nextYear}年 ${monthNames[nextMonth]}班表`;
            updateRosterStatus(nextYear, nextMonth);
        }

        // 檢查排班開放狀態
        function updateRosterStatus(year, month) {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth() + 1;
            const currentDate = now.getDate();
            const currentHour = now.getHours();
            const lastDayOfMonth = new Date(currentYear, currentMonth, 0).getDate();

            let isNextMonth = (year === currentYear && month === currentMonth + 1) ||
                             (year === currentYear + 1 && currentMonth === 12 && month === 1);

            const statusDiv = document.getElementById('rosterStatus');
            const saveBtn = document.getElementById('saveBtn');

            if (!isNextMonth) {
                statusDiv.innerHTML = `<span style="color:var(--color-status-error);">✗ 只能排下個月的班表</span>`;
                saveBtn.disabled = true;
                return;
            }

            if (currentDate < 24) {
                statusDiv.innerHTML = `<span style="color:var(--color-status-error);">✗ 排班尚未開放，每月24號開放</span>`;
                saveBtn.disabled = true;
            } else if (currentDate === lastDayOfMonth && currentHour >= 15) {
                statusDiv.innerHTML = `<span style="color:var(--color-status-error);">✗ 本月排班已截止（月底15:00截止）</span>`;
                saveBtn.disabled = true;
            } else {
                statusDiv.innerHTML = `<span style="color:var(--color-status-success);">✓ 排班開放中（24號開放，月底15:00截止）</span>`;
                saveBtn.disabled = false;
            }
        }

        // 主管載入門市班表
        async function loadSupervisorRoster() {
            const store = document.getElementById('supervisorStore').value;
            if (!store) {
                document.getElementById('rostersContainer').innerHTML = '<div style="text-align:center; color:var(--color-text-secondary); padding:40px;">請先選擇門市</div>';
                return;
            }
            currentStore = store;
            staffList = storeStaff[store];
            await loadRosterData(store, staffList, true);
        }

        // 員工載入班表
        async function loadEmployeeRoster() {
            // 將登入者排在第一位
            const sortedStaffList = [...staffList];
            const myIndex = sortedStaffList.indexOf(currentUser.name);
            if (myIndex > 0) {
                // 移除自己，插入到第一位
                sortedStaffList.splice(myIndex, 1);
                sortedStaffList.unshift(currentUser.name);
            }
            await loadRosterData(currentStore, sortedStaffList, false);
        }

        // 載入班表資料
        async function loadRosterData(store, staffNames, editableAll) {
            const now = new Date();
            let year = now.getFullYear();
            let month = now.getMonth() + 2;
            if (month > 12) { month = 1; year++; }

            const daysInMonth = new Date(year, month, 0).getDate();
            const firstDay = new Date(year, month - 1, 1).getDay();

            // 從後端載入現有班表
            const startDate = `${year}-${String(month).padStart(2,'0')}-01`;
            const endDate = `${year}-${String(month).padStart(2,'0')}-${daysInMonth}`;
            rosterData = {};

            try {
                const response = await fetch(`/api/roster/range?store=${encodeURIComponent(store)}&start=${startDate}&end=${endDate}`);
                const data = await response.json();

                if (data.success && data.roster) {
                    data.roster.forEach(record => {
                        if (!rosterData[record.staff_name]) rosterData[record.staff_name] = {};
                        rosterData[record.staff_name][record.date] = record.shift_code;
                    });
                }
            } catch (e) {
                console.error('載入班表失敗:', e);
            }

            // 生成每個人的月曆
            const container = document.getElementById('rostersContainer');
            container.innerHTML = '';

            staffNames.forEach(staffName => {
                const isSelf = staffName === currentUser.name;
                const editable = editableAll || isSelf;

                const staffDiv = document.createElement('div');
                staffDiv.className = 'staff-roster';

                // 標題
                const headerDiv = document.createElement('div');
                headerDiv.className = 'staff-roster-header';
                headerDiv.innerHTML = `
                    <div class="staff-name">${staffName}${isSelf ? '<span class="self-tag">(我)</span>' : ''}</div>
                `;
                staffDiv.appendChild(headerDiv);

                // 月曆
                const calendarDiv = document.createElement('div');

                // 星期標題
                const weekdayHeader = document.createElement('div');
                weekdayHeader.className = 'calendar-header';
                ['日', '一', '二', '三', '四', '五', '六'].forEach(day => {
                    weekdayHeader.innerHTML += `<div>${day}</div>`;
                });
                calendarDiv.appendChild(weekdayHeader);

                // 日期網格
                const gridDiv = document.createElement('div');
                gridDiv.className = 'calendar-grid';

                // 空白格子
                for (let i = 0; i < firstDay; i++) {
                    gridDiv.innerHTML += '<div class="calendar-day empty"></div>';
                }

                // 日期格子
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                    const currentShift = rosterData[staffName]?.[dateStr] || '';

                    let cellHtml = `<div class="calendar-day">`;
                    cellHtml += `<div class="day-number">${day}</div>`;

                    if (editable) {
                        cellHtml += `<select class="shift-select" onchange="updateRoster('${staffName}', '${dateStr}', this.value)" data-staff="${staffName}" data-date="${dateStr}">`;
                        cellHtml += `<option value="">-</option>`;
                        ['早', '晚', '值', '休', '全', '特'].forEach(shift => {
                            const selected = currentShift === shift ? 'selected' : '';
                            cellHtml += `<option value="${shift}" ${selected}>${shift}</option>`;
                        });
                        cellHtml += `</select>`;
                    } else {
                        const shiftClass = currentShift ? `shift-${currentShift}` : '';
                        const shiftText = currentShift || '-';
                        cellHtml += `<select class="shift-select ${shiftClass}" disabled><option>${shiftText}</option></select>`;
                    }

                    cellHtml += `</div>`;
                    gridDiv.innerHTML += cellHtml;
                }

                calendarDiv.appendChild(gridDiv);
                staffDiv.appendChild(calendarDiv);
                container.appendChild(staffDiv);

                // 更新樣式
                if (editable) {
                    staffDiv.querySelectorAll('select.shift-select').forEach(select => {
                        if (select.value) {
                            select.className = `shift-select shift-${select.value}`;
                        }
                    });
                }
            });

            // 更新登入者的班別統計
            updateShiftStats();
        }

        // 更新班表資料
        function updateRoster(staffName, date, shift) {
            if (!rosterData[staffName]) rosterData[staffName] = {};
            if (shift) {
                rosterData[staffName][date] = shift;
            } else {
                delete rosterData[staffName][date];
            }

            const select = document.querySelector(`select[data-staff="${staffName}"][data-date="${date}"]`);
            if (select) {
                select.className = 'shift-select' + (shift ? ` shift-${shift}` : '');
            }

            // 如果是登入者自己，更新統計
            if (staffName === currentUser.name) {
                updateShiftStats();
            }
        }

        // 更新班別統計
        function updateShiftStats() {
            if (!currentUser || !rosterData[currentUser.name]) return;

            const myShifts = rosterData[currentUser.name];
            const counts = { '早': 0, '晚': 0, '值': 0, '休': 0, '全': 0, '特': 0 };

            Object.values(myShifts).forEach(shift => {
                if (counts.hasOwnProperty(shift)) {
                    counts[shift]++;
                }
            });

            // 更新顯示
            document.getElementById('count-早').textContent = counts['早'];
            document.getElementById('count-晚').textContent = counts['晚'];
            document.getElementById('count-值').textContent = counts['值'];
            document.getElementById('count-休').textContent = counts['休'];
            document.getElementById('count-全').textContent = counts['全'];
            document.getElementById('count-特').textContent = counts['特'];

            // 顯示統計區域
            document.getElementById('shiftStats').style.display = 'block';
        }

        // 儲存班表
        async function saveRoster() {
            if (!currentUser) {
                showToast('請先登入', 'error');
                return;
            }

            const records = [];
            Object.entries(rosterData).forEach(([staffName, dates]) => {
                Object.entries(dates).forEach(([date, shift]) => {
                    if (shift) {
                        records.push({
                            date: date,
                            staff_name: staffName,
                            location: currentStore,
                            shift_code: shift
                        });
                    }
                });
            });

            if (records.length === 0) {
                showToast('請至少選擇一個班別', 'error');
                return;
            }

            try {
                const response = await fetch('/api/roster/batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ records })
                });

                const result = await response.json();
                if (result.success) {
                    showToast('班表已儲存', 'success');
                } else {
                    showToast(result.message || '儲存失敗', 'error');
                }
            } catch (e) {
                showToast('儲存失敗', 'error');
            }
        }

        // 顯示提示
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 初始化
        checkLogin();
    </script>
</html>
<!-- 原始內容結束 -->
{% endblock %}
