{% extends "base.html" %}

{% block title %}LINE 回覆 - 編輯 | COSH ERP{% endblock %}

{% block page_title %}💬 新增回覆{% endblock %}

{% block styles %}
<style>
    /* ── 頁面專用 ─────────────────────────── */
    .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--space-5);
    }
    .page-subtitle {
        font-size: var(--font-size-sm);
        color: var(--color-text-secondary);
    }

    /* 表單卡片最大寬度 */
    .form-card {
        max-width: 640px;
    }

    /* Checkbox */
    .checkbox-wrap {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        padding: var(--space-2) 0;
    }
    .checkbox-wrap input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: var(--color-brand-primary);
        cursor: pointer;
    }
    .checkbox-wrap label {
        font-size: var(--font-size-md);
        color: var(--color-text-primary);
        cursor: pointer;
    }

    /* 按鈕區分隔線 */
    .form-actions {
        display: flex;
        gap: var(--space-3);
        margin-top: var(--space-6);
        padding-top: var(--space-5);
        border-top: 1px solid var(--color-border-default);
    }

    /* 錯誤提示 */
    .error-message {
        color: var(--color-status-error);
        font-size: var(--font-size-xs);
        margin-top: var(--space-2);
        display: none;
    }
    .error-message.show { display: block; }
    .form-field.has-error .form-input { border-color: var(--color-status-error); }

    @media (max-width: 768px) {
        .form-card { padding: var(--space-5); }
    }
</style>
{% endblock %}

{% block content %}
<!-- 頁面標題 -->
<div class="page-header">
    <span class="page-subtitle" id="pageSubtitle">記錄 LINE 官方帳號客戶回覆</span>
    <a href="/line_replies" class="btn btn-secondary">← 返回列表</a>
</div>

<!-- 表單 -->
<div class="card form-card">
    <form id="replyForm">

        <!-- 日期時間 -->
        <div class="form-field" style="margin-bottom: var(--space-5);">
            <label>回覆日期時間 <span style="color:var(--color-status-error)">*</span></label>
            <div class="form-row" style="margin-bottom: 0; gap: var(--space-3);">
                <input type="date" id="replyDate" class="form-input" required style="flex:1;">
                <input type="time" id="replyTime" class="form-input" required style="flex:1;">
            </div>
            <div class="error-message" id="errorDatetime">請選擇有效的日期時間（不能是未來）</div>
        </div>

        <!-- 客戶名稱 -->
        <div class="form-field" style="margin-bottom: var(--space-5);">
            <label>客戶 LINE 名稱 <span style="color:var(--color-status-error)">*</span></label>
            <input type="text" id="customerName" class="form-input" placeholder="請輸入客戶在 LINE 上的名稱" required>
            <div class="error-message" id="errorCustomer">請輸入客戶名稱</div>
        </div>

        <!-- 提問內容 -->
        <div class="form-field" style="margin-bottom: var(--space-5);">
            <label>提問與回覆事項 <span style="color:var(--color-status-error)">*</span></label>
            <textarea id="inquiryContent" class="form-input" style="min-height:120px;resize:vertical;line-height:1.6;" placeholder="請輸入客戶提問內容及回覆事項..." required></textarea>
            <div class="error-message" id="errorContent">請輸入提問與回覆事項</div>
        </div>

        <!-- 門市與人員（唯讀） -->
        <div class="form-row" style="margin-bottom: var(--space-5);">
            <div class="form-field">
                <label>回覆門市</label>
                <input type="text" id="replyStore" class="form-input" disabled>
            </div>
            <div class="form-field">
                <label>回覆人員</label>
                <input type="text" id="replyStaff" class="form-input" disabled>
            </div>
        </div>

        <!-- 結案狀態 -->
        <div class="form-field" style="margin-bottom: var(--space-4);">
            <div class="checkbox-wrap">
                <input type="checkbox" id="isResolved">
                <label for="isResolved">已結案 / 成交</label>
            </div>
        </div>

        <!-- 按鈕 -->
        <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="btnSubmit">儲存</button>
            <a href="/line_replies" class="btn btn-secondary">取消</a>
        </div>

    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    let editId      = null;
    let currentUser = null;

    document.addEventListener('DOMContentLoaded', () => {
        currentUser = getCurrentUser();
        if (!currentUser) {
            alert('請先登入');
            window.location.href = '/login.html';
            return;
        }

        document.getElementById('replyStore').value = currentUser.store || currentUser.department || '';
        document.getElementById('replyStaff').value = currentUser.name || '';

        const urlParams = new URLSearchParams(window.location.search);
        editId = urlParams.get('id');

        if (editId) {
            document.getElementById('pageTitle').textContent = '💬 編輯回覆';
            loadReplyData(editId);
        } else {
            const now = new Date();
            document.getElementById('replyDate').value = formatDate(now);
            document.getElementById('replyTime').value = formatTime(now);
        }

        document.getElementById('replyDate').max = formatDate(new Date());
        document.getElementById('replyForm').addEventListener('submit', handleSubmit);
    });

    function getCurrentUser() {
        try {
            const userData = sessionStorage.getItem('currentUser') || localStorage.getItem('currentUser');
            if (userData) {
                const user = JSON.parse(userData);
                return {
                    name:       user.name || user.staff_name,
                    title:      user.title || user.role,
                    store:      user.store || user.department,
                    department: user.department
                };
            }
        } catch (e) {
            console.error('取得使用者資訊失敗:', e);
        }
        return null;
    }

    async function loadReplyData(id) {
        try {
            const response = await fetch(`/api/line-replies/${id}`);
            const result   = await response.json();

            if (result.success) {
                const data = result.data;
                const dt   = new Date(data.reply_datetime);
                document.getElementById('replyDate').value        = formatDate(dt);
                document.getElementById('replyTime').value        = formatTime(dt);
                document.getElementById('customerName').value     = data.customer_line_name;
                document.getElementById('inquiryContent').value   = data.inquiry_content;
                document.getElementById('isResolved').checked     = data.is_resolved;
                document.getElementById('replyStore').value       = data.reply_store;
                document.getElementById('replyStaff').value       = data.reply_staff;
            } else {
                alert('載入資料失敗: ' + result.message);
                window.location.href = '/line_replies';
            }
        } catch (error) {
            console.error('載入資料失敗:', error);
            alert('載入資料失敗');
            window.location.href = '/line_replies';
        }
    }

    async function handleSubmit(e) {
        e.preventDefault();
        clearErrors();

        const date          = document.getElementById('replyDate').value;
        const time          = document.getElementById('replyTime').value;
        const customerName  = document.getElementById('customerName').value.trim();
        const inquiryContent = document.getElementById('inquiryContent').value.trim();
        let hasError = false;

        if (!date || !time || new Date(`${date}T${time}`) > new Date()) {
            showError('datetime');
            hasError = true;
        }
        if (!customerName)   { showError('customer'); hasError = true; }
        if (!inquiryContent) { showError('content');  hasError = true; }
        if (hasError) return;

        const data = {
            reply_datetime:      `${date}T${time}`,
            customer_line_name:  customerName,
            inquiry_content:     inquiryContent,
            reply_store:         document.getElementById('replyStore').value,
            reply_staff:         document.getElementById('replyStaff').value,
            is_resolved:         document.getElementById('isResolved').checked
        };

        const btn = document.getElementById('btnSubmit');
        btn.disabled    = true;
        btn.textContent = '儲存中...';

        try {
            const url    = editId ? `/api/line-replies/${editId}` : '/api/line-replies';
            const method = editId ? 'PUT' : 'POST';
            const response = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();

            if (result.success) {
                window.location.href = '/line_replies';
            } else {
                alert('儲存失敗: ' + result.message);
                btn.disabled    = false;
                btn.textContent = '儲存';
            }
        } catch (error) {
            console.error('儲存失敗:', error);
            alert('儲存失敗');
            btn.disabled    = false;
            btn.textContent = '儲存';
        }
    }

    function showError(field) {
        const idMap = { datetime: 'errorDatetime', customer: 'errorCustomer', content: 'errorContent' };
        const el = document.getElementById(idMap[field]);
        if (el) el.classList.add('show');
        const inputIdMap = { datetime: 'replyDate', customer: 'customerName', content: 'inquiryContent' };
        const inputEl = document.getElementById(inputIdMap[field]);
        if (inputEl) inputEl.closest('.form-field')?.classList.add('has-error');
    }

    function clearErrors() {
        document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
        document.querySelectorAll('.form-field').forEach(el => el.classList.remove('has-error'));
    }

    function formatDate(date) {
        return new Date(date).toISOString().split('T')[0];
    }

    function formatTime(date) {
        const d = new Date(date);
        return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
</script>
{% endblock %}
