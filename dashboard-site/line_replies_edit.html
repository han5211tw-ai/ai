<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 回覆 - 編輯 | COSH ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared/global.css">
    <style>
        /* ── 頁面標題 ─────────────────────────── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .page-title-wrap {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        .page-title {
            font-family: var(--font-serif-tc);
            font-weight: 300;
            font-size: 22px;
            color: var(--color-text-primary);
            letter-spacing: 0.03em;
        }
        .page-subtitle {
            font-family: var(--font-deco);
            font-weight: 300;
            font-size: 13px;
            color: var(--color-text-muted);
        }

        /* ── 表單卡片 ─────────────────────────── */
        .form-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-md);
            padding: 28px 32px;
            max-width: 600px;
        }

        /* ── 表單欄位 ─────────────────────────── */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 400;
            color: var(--color-text-secondary);
            margin-bottom: 8px;
        }
        .form-label .required {
            color: #dc3545;
            margin-left: 2px;
        }
        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            background: var(--color-bg-input);
            color: var(--color-text-primary);
            transition: border-color var(--transition-fast);
            box-sizing: border-box;
        }
        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--color-brand-primary);
        }
        .form-input:disabled,
        .form-select:disabled {
            background: var(--color-bg-hover);
            color: var(--color-text-muted);
            cursor: not-allowed;
        }
        .form-textarea {
            min-height: 120px;
            resize: vertical;
            line-height: 1.6;
        }

        /* ── 日期時間選擇器 ───────────────────── */
        .datetime-wrap {
            display: flex;
            gap: 12px;
        }
        .datetime-wrap .form-input {
            flex: 1;
        }

        /* ── Checkbox ────────────────────────── */
        .checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }
        .checkbox-wrap input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--color-brand-primary);
            cursor: pointer;
        }
        .checkbox-wrap label {
            font-size: 14px;
            color: var(--color-text-primary);
            cursor: pointer;
        }

        /* ── 唯讀資訊 ─────────────────────────── */
        .info-row {
            display: flex;
            gap: 20px;
        }
        .info-row .form-group {
            flex: 1;
        }

        /* ── 按鈕區 ───────────────────────────── */
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--color-border-light);
        }

        /* ── 錯誤提示 ─────────────────────────── */
        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .form-group.has-error .form-input,
        .form-group.has-error .form-textarea {
            border-color: #dc3545;
        }

        /* ── 響應式 ───────────────────────────── */
        @media (max-width: 768px) {
            .form-card {
                padding: 20px;
            }
            .datetime-wrap {
                flex-direction: column;
                gap: 8px;
            }
            .info-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebar"></nav>

    <!-- 主要內容 -->
    <main class="main-content">
        <!-- 頁面標題 -->
        <div class="page-header">
            <div class="page-title-wrap">
                <span class="page-deco">LINE Reply</span>
                <h1 class="page-title" id="pageTitle">新增回覆</h1>
                <span class="page-subtitle" id="pageSubtitle">記錄 LINE 官方帳號客戶回覆</span>
            </div>
            <a href="/line_replies.html" class="btn btn-secondary">← 返回列表</a>
        </div>

        <!-- 表單 -->
        <div class="form-card">
            <form id="replyForm">
                <!-- 日期時間 -->
                <div class="form-group">
                    <label class="form-label">
                        回覆日期時間 <span class="required">*</span>
                    </label>
                    <div class="datetime-wrap">
                        <input type="date" id="replyDate" class="form-input" required>
                        <input type="time" id="replyTime" class="form-input" required>
                    </div>
                    <div class="error-message" id="errorDatetime">請選擇有效的日期時間（不能是未來）</div>
                </div>

                <!-- 客戶名稱 -->
                <div class="form-group">
                    <label class="form-label">
                        客戶 LINE 名稱 <span class="required">*</span>
                    </label>
                    <input type="text" id="customerName" class="form-input" placeholder="請輸入客戶在 LINE 上的名稱" required>
                    <div class="error-message" id="errorCustomer">請輸入客戶名稱</div>
                </div>

                <!-- 提問內容 -->
                <div class="form-group">
                    <label class="form-label">
                        提問與回覆事項 <span class="required">*</span>
                    </label>
                    <textarea id="inquiryContent" class="form-textarea" placeholder="請輸入客戶提問內容及回覆事項..." required></textarea>
                    <div class="error-message" id="errorContent">請輸入提問與回覆事項</div>
                </div>

                <!-- 門市與人員（唯讀） -->
                <div class="info-row">
                    <div class="form-group">
                        <label class="form-label">回覆門市</label>
                        <input type="text" id="replyStore" class="form-input" disabled>
                    </div>
                    <div class="form-group">
                        <label class="form-label">回覆人員</label>
                        <input type="text" id="replyStaff" class="form-input" disabled>
                    </div>
                </div>

                <!-- 結案狀態 -->
                <div class="form-group">
                    <div class="checkbox-wrap">
                        <input type="checkbox" id="isResolved">
                        <label for="isResolved">已結案 / 成交</label>
                    </div>
                </div>

                <!-- 按鈕 -->
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="btnSubmit">儲存</button>
                    <a href="/line_replies.html" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Scripts -->
    <script src="shared/sidebar-nav.js"></script>
    <script>
        // ── 全域狀態 ───────────────────────────
        let editId = null;
        let currentUser = null;

        // ── 初始化 ─────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            // 取得登入使用者資訊
            currentUser = getCurrentUser();
            if (!currentUser) {
                alert('請先登入');
                window.location.href = '/login.html';
                return;
            }

            // 填入門市與人員
            document.getElementById('replyStore').value = currentUser.store || currentUser.department || '';
            document.getElementById('replyStaff').value = currentUser.name || '';

            // 檢查是否為編輯模式
            const urlParams = new URLSearchParams(window.location.search);
            editId = urlParams.get('id');

            if (editId) {
                document.getElementById('pageTitle').textContent = '編輯回覆';
                loadReplyData(editId);
            } else {
                // 新增模式：預設為現在時間
                const now = new Date();
                document.getElementById('replyDate').value = formatDate(now);
                document.getElementById('replyTime').value = formatTime(now);
            }

            // 限制日期不能選未來
            const today = new Date();
            document.getElementById('replyDate').max = formatDate(today);

            // 綁定表單提交
            document.getElementById('replyForm').addEventListener('submit', handleSubmit);
        });

        // ── 取得登入使用者 ─────────────────────
        function getCurrentUser() {
            try {
                // 優先從 sessionStorage 取得，其次 localStorage
                const sessionData = sessionStorage.getItem('currentUser');
                const localData = localStorage.getItem('currentUser');
                const userData = sessionData || localData;
                if (userData) {
                    const user = JSON.parse(userData);
                    // 轉換格式以相容現有程式碼
                    return {
                        name: user.name || user.staff_name,
                        title: user.title || user.role,
                        store: user.store || user.department,
                        department: user.department
                    };
                }
            } catch (e) {
                console.error('取得使用者資訊失敗:', e);
            }
            return null;
        }

        // ── 載入回覆資料（編輯模式）──────────────
        async function loadReplyData(id) {
            try {
                const response = await fetch(`/api/line-replies/${id}`);
                const result = await response.json();

                if (result.success) {
                    const data = result.data;
                    const dt = new Date(data.reply_datetime);

                    document.getElementById('replyDate').value = formatDate(dt);
                    document.getElementById('replyTime').value = formatTime(dt);
                    document.getElementById('customerName').value = data.customer_line_name;
                    document.getElementById('inquiryContent').value = data.inquiry_content;
                    document.getElementById('isResolved').checked = data.is_resolved;

                    // 顯示原始門市與人員（唯讀）
                    document.getElementById('replyStore').value = data.reply_store;
                    document.getElementById('replyStaff').value = data.reply_staff;
                } else {
                    alert('載入資料失敗: ' + result.message);
                    window.location.href = '/line_replies.html';
                }
            } catch (error) {
                console.error('載入資料失敗:', error);
                alert('載入資料失敗');
                window.location.href = '/line_replies.html';
            }
        }

        // ── 表單提交 ───────────────────────────
        async function handleSubmit(e) {
            e.preventDefault();

            // 清除錯誤狀態
            clearErrors();

            // 驗證
            const date = document.getElementById('replyDate').value;
            const time = document.getElementById('replyTime').value;
            const customerName = document.getElementById('customerName').value.trim();
            const inquiryContent = document.getElementById('inquiryContent').value.trim();

            let hasError = false;

            // 驗證日期時間
            if (!date || !time) {
                showError('datetime');
                hasError = true;
            } else {
                const selectedDatetime = new Date(`${date}T${time}`);
                const now = new Date();
                if (selectedDatetime > now) {
                    showError('datetime');
                    hasError = true;
                }
            }

            if (!customerName) {
                showError('customer');
                hasError = true;
            }

            if (!inquiryContent) {
                showError('content');
                hasError = true;
            }

            if (hasError) return;

            // 組合資料
            const data = {
                reply_datetime: `${date}T${time}`,
                customer_line_name: customerName,
                inquiry_content: inquiryContent,
                reply_store: document.getElementById('replyStore').value,
                reply_staff: document.getElementById('replyStaff').value,
                is_resolved: document.getElementById('isResolved').checked
            };

            // 送出
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.textContent = '儲存中...';

            try {
                let response;
                if (editId) {
                    // 更新
                    response = await fetch(`/api/line-replies/${editId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    // 新增
                    response = await fetch('/api/line-replies', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }

                const result = await response.json();

                if (result.success) {
                    window.location.href = '/line_replies.html';
                } else {
                    alert('儲存失敗: ' + result.message);
                    btn.disabled = false;
                    btn.textContent = '儲存';
                }
            } catch (error) {
                console.error('儲存失敗:', error);
                alert('儲存失敗');
                btn.disabled = false;
                btn.textContent = '儲存';
            }
        }

        // ── 錯誤處理 ───────────────────────────
        function showError(field) {
            const errorEl = document.getElementById(`error${field.charAt(0).toUpperCase() + field.slice(1)}`);
            if (errorEl) {
                errorEl.classList.add('show');
            }
            const inputEl = document.getElementById(field === 'datetime' ? 'replyDate' : 
                                                     field === 'customer' ? 'customerName' : 
                                                     field === 'content' ? 'inquiryContent' : field);
            if (inputEl) {
                inputEl.closest('.form-group')?.classList.add('has-error');
            }
        }

        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.form-group').forEach(el => el.classList.remove('has-error'));
        }

        // ── 工具函數 ───────────────────────────
        function formatDate(date) {
            const d = new Date(date);
            return d.toISOString().split('T')[0];
        }

        function formatTime(date) {
            const d = new Date(date);
            return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }
    </script>
</body>
</html>
